<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Wish — Earn & Reward Platform</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✨</text></svg>"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&family=DM+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:#0d0b1e;font-family:'Plus Jakarta Sans',sans-serif;}
#root{height:100%;}
input,button,select,textarea{font-family:inherit;}
input[type=range]{-webkit-appearance:none;height:5px;border-radius:3px;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:#8b5cf6;cursor:pointer;}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
::-webkit-scrollbar{display:none;}
body{background:#0d0b1e;}
@keyframes up{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideL{from{opacity:0;transform:translateX(-100%)}to{opacity:1;transform:translateX(0)}}
@keyframes slideR{from{opacity:0;transform:translateX(100%)}to{opacity:1;transform:translateX(0)}}
@keyframes breathe{0%,100%{opacity:.7;transform:scale(1)}50%{opacity:1;transform:scale(1.04)}}
@keyframes tick{0%,100%{color:#f59e0b}50%{color:#fbbf24}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(139,92,246,.4)}70%{box-shadow:0 0 0 9px rgba(139,92,246,0)}}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes shimmer{0%{background-position:-600px 0}100%{background-position:600px 0}}
@keyframes popIn{0%{transform:scale(.85);opacity:0}100%{transform:scale(1);opacity:1}}
.sec{animation:up .28s ease both;}
.ptr{height:6px;background:rgba(139,92,246,.1);border-radius:99px;overflow:hidden;}
.ptrf{height:100%;border-radius:99px;transition:width .6s ease;}
.rip{cursor:pointer;transition:transform .15s;}
.rip:hover{transform:translateY(-1px);}
.rip:active{transform:scale(.97);}
.dot{width:8px;height:8px;border-radius:50%;animation:pulse 2s infinite;}
.pill-badge{position:absolute;top:-5px;right:-5px;width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;border:2px solid #0d0b1e;font-family:'DM Mono',monospace;animation:popIn .3s ease;}
.menu-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;backdrop-filter:blur(6px);animation:fadeIn .2s;}
.menu-drawer{position:fixed;top:0;bottom:0;width:290px;background:linear-gradient(180deg,#13102a,#0d0b1e);border-right:1px solid rgba(139,92,246,.15);z-index:201;display:flex;flex-direction:column;overflow:hidden;}
.menu-item{width:100%;background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:14px;padding:14px 24px;color:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:500;transition:all .18s;text-align:left;}
.menu-item:hover{background:rgba(139,92,246,.1);}
.tab-btn{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;transition:all .18s;padding:8px 0;flex:1;font-family:'Plus Jakarta Sans',sans-serif;}
.inp-base{width:100%;background:rgba(139,92,246,.07)!important;border:1.5px solid rgba(139,92,246,.2)!important;color:#fff!important;border-radius:13px;padding:12px 16px;font-size:13px;outline:none;font-family:'Plus Jakarta Sans',sans-serif;transition:border .2s;}
.inp-base:focus{border-color:rgba(139,92,246,.5)!important;}
.inp-base::placeholder{color:rgba(255,255,255,.2);}
.admin-nav{display:flex;border-bottom:1px solid rgba(139,92,246,.1);overflow-x:auto;margin-bottom:0;}
.admin-tab{flex-shrink:0;padding:12px 18px;background:none;border:none;color:rgba(255,255,255,.4);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;}
.admin-tab.active{color:#a78bfa;border-bottom-color:#8b5cf6;}
.toggle{width:46px;height:26px;border-radius:99px;cursor:pointer;border:none;position:relative;transition:background .2s;flex-shrink:0;}
.toggle::after{content:"";position:absolute;width:20px;height:20px;border-radius:50%;background:#fff;top:3px;transition:left .2s;}
.toggle.on{background:linear-gradient(135deg,#8b5cf6,#6d28d9);}
.toggle.on::after{left:23px;}
.toggle.off{background:rgba(255,255,255,.15);}
.toggle.off::after{left:3px;}
.stat-card{background:#191534;border:1px solid rgba(139,92,246,.13);border-radius:16px;padding:18px;text-align:center;}
.user-row{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:14px;margin-bottom:8px;background:#191534;border:1px solid rgba(139,92,246,.1);}
.prof-photo-ring{position:relative;width:104px;height:104px;margin:0 auto;}
.prof-photo-img{width:104px;height:104px;border-radius:50%;object-fit:cover;border:3px solid #8b5cf6;box-shadow:0 0 0 4px rgba(139,92,246,.18),0 8px 32px rgba(139,92,246,.3);}
.prof-photo-initials{width:104px;height:104px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:34px;font-weight:900;border:3px solid #8b5cf6;box-shadow:0 0 0 4px rgba(139,92,246,.18),0 8px 32px rgba(139,92,246,.3);}
.prof-cam-btn{position:absolute;bottom:2px;right:2px;width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#8b5cf6,#6d28d9);border:2.5px solid #0d0b1e;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;box-shadow:0 2px 8px rgba(139,92,246,.5);transition:transform .2s;}
.prof-cam-btn:hover{transform:scale(1.1);}
.prof-stat-card{background:#191534;border:1px solid rgba(139,92,246,.13);border-radius:14px;padding:14px 10px;text-align:center;flex:1;}
.prof-edit-inp{width:100%;background:rgba(139,92,246,.07);border:1.5px solid rgba(139,92,246,.2);color:#fff;border-radius:11px;padding:10px 14px;font-size:13px;outline:none;font-family:inherit;transition:border .2s;}
.prof-edit-inp:focus{border-color:rgba(139,92,246,.5);}
.prof-section{background:#191534;border:1px solid rgba(139,92,246,.13);border-radius:16px;padding:16px;margin-bottom:12px;}
.prof-row{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid rgba(139,92,246,.06);}
.prof-row:last-child{border-bottom:none;}
.badge-chip{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:10px;font-weight:700;border:1px solid;}
@keyframes profileIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.profile-screen{animation:profileIn .3s ease both;}
</style>
</head>
<body>
<div id="root"></div>
<script>
const { useState, useEffect, useRef } = React;
const C = {
  bg: "#0d0b1e",
  s1: "#13102a",
  s2: "#191534",
  s3: "#211d42",
  border: "rgba(139,92,246,.13)",
  border2: "rgba(139,92,246,.25)",
  brand: "#8b5cf6",
  brandLt: "#a78bfa",
  brandDk: "#6d28d9",
  pink: "#ec4899",
  cyan: "#06b6d4",
  gold: "#f59e0b",
  goldLt: "#fbbf24",
  green: "#10b981",
  greenLt: "#34d399",
  red: "#ef4444",
  muted: "rgba(255,255,255,.40)",
  faint: "rgba(139,92,246,.07)",
  white: "#fff"
};
const APP_NAME = "Wish";
const APP_TAGLINE = "Earn & Reward Platform";
const USD_PER_POINT = 1e-3;
const REFERRAL_BONUS = 300;
const MINING_CYCLE = 8 * 60 * 60;
const SUN_CYCLE = 4 * 60 * 60;
const AD_COOLDOWN_S = 5 * 60 * 60;
const DAILY_PTS_MAP = {
  1: 80, 2: 55, 3: 70, 4: 45, 5: 90, 6: 60, 7: 120, 8: 50, 9: 75, 10: 65,
  11: 85, 12: 55, 13: 95, 14: 40, 15: 110, 16: 70, 17: 60, 18: 80, 19: 50,
  20: 100, 21: 45, 22: 75, 23: 65, 24: 90, 25: 55, 26: 85, 27: 70, 28: 60,
  29: 95, 30: 80, 31: 115
};
const now = new Date();
const todayDate = now.getDate();
const isSunday = now.getDay() === 0;
const dailyPts = DAILY_PTS_MAP[todayDate] || 60;
const MINING_S = isSunday ? SUN_CYCLE : MINING_CYCLE;

// ===========================================
// AuthScreen Component
// ===========================================
function AuthScreen({ onLogin, lang = "en" }) {
  const [mode, setMode] = useState("welcome");
  const [method, setMethod] = useState("email");
  const [form, setForm] = useState({ name: "", email: "", phone: "", pass: "", conf: "" });
  const [errs, setErrs] = useState({});
  const [loading, setLoading] = useState(false);
  const [otpStep, setOtpStep] = useState(false);
  const [otpToken, setOtpToken] = useState("");
  const [otpSending, setOtpSending] = useState(false);
  const [otpInput, setOtpInput] = useState(["", "", "", "", "", ""]);
  const [otpErr, setOtpErr] = useState("");
  const [resendT, setResendT] = useState(60);
  const [pendingUser, setPU] = useState(null);
  const [lockMsg, setLockMsg] = useState("");
  const [lockTimer, setLockTimer] = useState(0);
  const otpRefs = [useRef(), useRef(), useRef(), useRef(), useRef(), useRef()];
  
  useEffect(() => {
    if (!otpStep) return;
    setResendT(60);
    const iv = setInterval(() => setResendT((t) => t > 0 ? t - 1 : 0), 1000);
    return () => clearInterval(iv);
  }, [otpStep]);

  const sendOtp = async (nu) => {
    setPU(nu);
    setOtpStep(true);
    setOtpInput(["", "", "", "", "", ""]);
    setOtpErr("");
    setOtpSending(true);
    
    const isEmailReg = !!(nu.email && nu.email.includes("@"));
    const dest = isEmailReg ? nu.email : nu.phone;
    
    setTimeout(() => {
      const otp = Math.floor(100000 + Math.random() * 900000).toString();
      console.log('📧 OTP for', dest, 'is:', otp);
      setOtpErr(`Test OTP: ${otp} (check console)`);
      setOtpToken('test-token');
      setOtpSending(false);
      setTimeout(() => otpRefs[0].current?.focus(), 100);
    }, 1000);
  };

  const handleOtpKey = (idx, val) => {
    if (!/^[0-9]?$/.test(val)) return;
    const nv = [...otpInput];
    nv[idx] = val;
    setOtpInput(nv);
    if (val && idx < 5) otpRefs[idx + 1].current?.focus();
  };

  const handleOtpBack = (idx, e) => {
    if (e.key === "Backspace" && !otpInput[idx] && idx > 0) otpRefs[idx - 1].current?.focus();
  };

  const verifyOtp = async () => {
    const entered = otpInput.join("");
    if (entered.length < 6) { setOtpErr("Please enter all 6 digits"); return; }
    setOtpSending(true);
    
    setTimeout(() => {
      const newUser = {
        ...pendingUser,
        id: "u" + Date.now(),
        joined: new Date().toLocaleDateString(),
        country: "🌍",
        isAdmin: pendingUser?.email === "admin@wish.com",
        active: true,
        pts: 0,
        usd: 0
      };
      onLogin(newUser);
      setOtpSending(false);
    }, 1000);
  };

  const resendOtp = async () => {
    setOtpInput(["", "", "", "", "", ""]);
    setOtpErr("");
    setResendT(60);
    setOtpSending(true);
    
    setTimeout(() => {
      const otp = Math.floor(100000 + Math.random() * 900000).toString();
      console.log('📧 New OTP:', otp);
      setOtpErr(`New OTP: ${otp} (check console)`);
      setOtpSending(false);
      setTimeout(() => otpRefs[0].current?.focus(), 100);
    }, 1000);
  };

  const validate = () => {
    const e = {};
    if (mode === "register" && !form.name) e.name = "Name required";
    if (method === "email") {
      if (!form.email.match(/^[^\s@]+@[^\s@]+\.[^\s@]+$/)) e.email = "Invalid email";
    } else {
      if (!form.phone.match(/^\+?[\d\s\-]{8,15}$/)) e.phone = "Invalid phone";
    }
    if (mode === "register") {
      if (form.pass.length < 6) e.pass = "Password too short";
      else if (form.pass !== form.conf) e.conf = "Passwords don't match";
    } else {
      if (form.pass.length < 1) e.pass = "Password required";
    }
    setErrs(e);
    return Object.keys(e).length === 0;
  };

  const submit = async () => {
    if (!validate()) return;
    setLoading(true);
    setTimeout(() => setLoading(false), 500);

    if (mode === "login") {
      const users = JSON.parse(localStorage.getItem('wish_users') || '[]');
      const u = users.find(x =>
        (method === "email" ? x.email === form.email : x.phone === form.phone)
        && x.pass === form.pass
      );
      if (u) {
        onLogin(u);
      } else {
        setErrs({ pass: "Wrong credentials" });
      }
    } else {
      const nu = {
        id: "u" + Date.now(),
        name: form.name,
        email: form.email,
        phone: form.phone,
        pass: form.pass,
        pts: 0,
        usd: 0,
        joined: new Date().toLocaleDateString(),
        country: "🌍",
        isAdmin: false,
        active: true
      };
      sendOtp(nu);
    }
  };

  if (otpStep) {
    const isEmailChannel = !!(pendingUser?.email && pendingUser.email.includes("@"));
    const dest = isEmailChannel ? pendingUser.email : pendingUser.phone;
    const masked = isEmailChannel
      ? dest.replace(/(.{2})(.+)(@.+)/, (_, a, b, c) => a + "*".repeat(Math.min(b.length, 5)) + c)
      : dest.replace(/(.{3}).+(.{2})$/, (_, a, b) => a + "•••••" + b);
    const allFilled = otpInput.every(v => v !== "");

    return React.createElement("div", { style: { minHeight: "100vh", background: C.bg, display: "flex", alignItems: "center", justifyContent: "center", padding: "20px" } },
      React.createElement("div", { style: { background: C.s1, padding: "30px", borderRadius: "20px", width: "100%", maxWidth: "380px", border: "1px solid rgba(139,92,246,.2)" } },
        React.createElement("div", { style: { textAlign: "center", marginBottom: "20px" } },
          React.createElement("div", { style: { fontSize: "48px", marginBottom: "10px" } }, "✨"),
          React.createElement("div", { style: { fontSize: "20px", fontWeight: "bold", color: "#fff" } }, "Verify Your Account"),
          React.createElement("div", { style: { fontSize: "12px", color: C.muted, marginTop: "5px" } }, "Code sent to")
        ),
        React.createElement("div", { style: { background: "rgba(139,92,246,.07)", borderRadius: "12px", padding: "12px", marginBottom: "20px", textAlign: "center" } },
          React.createElement("div", { style: { fontFamily: "'DM Mono',monospace", fontSize: "14px", color: "#fff" } }, masked)
        ),
        React.createElement("div", { style: { display: "flex", gap: "8px", justifyContent: "center", marginBottom: "20px" } },
          otpInput.map((v, i) =>
            React.createElement("input", {
              key: i,
              ref: otpRefs[i],
              value: v,
              maxLength: 1,
              onChange: (e) => handleOtpKey(i, e.target.value),
              onKeyDown: (e) => handleOtpBack(i, e),
              style: {
                width: "45px",
                height: "50px",
                textAlign: "center",
                fontSize: "20px",
                background: "#0d0b1e",
                border: "1px solid " + (v ? C.brand : "rgba(139,92,246,.2)"),
                borderRadius: "10px",
                color: "#fff"
              }
            })
          )
        ),
        otpErr && React.createElement("div", { style: { background: "rgba(239,68,68,.1)", border: "1px solid rgba(239,68,68,.2)", borderRadius: "8px", padding: "10px", marginBottom: "15px", color: "#f87171", fontSize: "12px", textAlign: "center" } }, otpErr),
        React.createElement("button", {
          onClick: verifyOtp,
          disabled: !allFilled || otpSending,
          style: {
            width: "100%",
            padding: "14px",
            background: allFilled ? "linear-gradient(135deg,#8b5cf6,#6d28d9)" : "rgba(255,255,255,.1)",
            border: "none",
            borderRadius: "12px",
            color: "#fff",
            fontSize: "15px",
            fontWeight: "bold",
            cursor: allFilled ? "pointer" : "default",
            marginBottom: "15px"
          }
        }, otpSending ? "Verifying..." : "Verify & Continue"),
        React.createElement("div", { style: { textAlign: "center", fontSize: "13px" } },
          resendT > 0
            ? React.createElement("span", { style: { color: C.muted } }, "Resend in ", resendT, "s")
            : React.createElement("span", { onClick: resendOtp, style: { color: C.brandLt, cursor: "pointer", textDecoration: "underline" } }, "Resend Code")
        ),
        React.createElement("div", { style: { textAlign: "center", marginTop: "15px" } },
          React.createElement("span", { onClick: () => { setOtpStep(false); setPU(null); }, style: { fontSize: "12px", color: C.muted, cursor: "pointer" } }, "← Change email/phone")
        )
      )
    );
  }

  if (mode === "welcome") {
    return React.createElement("div", { style: { minHeight: "100vh", background: C.bg, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: "20px" } },
      React.createElement("div", { style: { textAlign: "center", marginBottom: "40px" } },
        React.createElement("div", { style: { fontSize: "72px", marginBottom: "20px" } }, "✨"),
        React.createElement("div", { style: { fontSize: "36px", fontWeight: "bold", background: "linear-gradient(135deg,#fff,#8b5cf6)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent", marginBottom: "10px" } }, APP_NAME),
        React.createElement("div", { style: { fontSize: "16px", color: C.muted } }, APP_TAGLINE)
      ),
      React.createElement("div", { style: { width: "100%", maxWidth: "300px" } },
        React.createElement("button", { onClick: () => setMode("login"), style: { width: "100%", padding: "15px", background: "linear-gradient(135deg,#8b5cf6,#6d28d9)", border: "none", borderRadius: "12px", color: "#fff", fontSize: "16px", fontWeight: "bold", cursor: "pointer", marginBottom: "10px" } }, "Sign In"),
        React.createElement("button", { onClick: () => setMode("register"), style: { width: "100%", padding: "15px", background: "rgba(255,255,255,.05)", border: "1px solid rgba(139,92,246,.2)", borderRadius: "12px", color: "#fff", fontSize: "16px", fontWeight: "bold", cursor: "pointer" } }, "Create Account")
      )
    );
  }

  return React.createElement("div", { style: { minHeight: "100vh", background: C.bg, padding: "20px", display: "flex", flexDirection: "column", justifyContent: "center" } },
    React.createElement("div", { style: { maxWidth: "350px", margin: "0 auto", width: "100%" } },
      React.createElement("button", { onClick: () => setMode("welcome"), style: { background: "none", border: "none", color: C.muted, fontSize: "14px", cursor: "pointer", marginBottom: "20px" } }, "← Back"),
      React.createElement("div", { style: { fontSize: "28px", fontWeight: "bold", color: "#fff", marginBottom: "10px" } }, mode === "login" ? "Welcome Back" : "Join Wish"),
      React.createElement("div", { style: { fontSize: "14px", color: C.muted, marginBottom: "30px" } },
        mode === "login" ? "Don't have an account? " : "Already have an account? ",
        React.createElement("span", { onClick: () => setMode(mode === "login" ? "register" : "login"), style: { color: C.brandLt, cursor: "pointer", fontWeight: "bold" } },
          mode === "login" ? "Sign up" : "Sign in"
        )
      ),
      React.createElement("div", { style: { display: "flex", background: "rgba(139,92,246,.1)", borderRadius: "10px", padding: "4px", marginBottom: "20px" } },
        ["email", "phone"].map(m =>
          React.createElement("div", {
            key: m,
            onClick: () => setMethod(m),
            style: {
              flex: 1,
              textAlign: "center",
              padding: "10px",
              borderRadius: "8px",
              background: method === m ? "linear-gradient(135deg,#8b5cf6,#6d28d9)" : "transparent",
              color: method === m ? "#fff" : C.muted,
              fontWeight: "bold",
              fontSize: "14px",
              cursor: "pointer"
            }
          }, m === "email" ? "📧 Email" : "📱 Phone")
        )
      ),
      mode === "register" && React.createElement("div", { style: { marginBottom: "15px" } },
        React.createElement("input", {
          type: "text",
          placeholder: "Full Name",
          value: form.name,
          onChange: (e) => setForm({ ...form, name: e.target.value }),
          style: {
            width: "100%",
            padding: "12px",
            background: "#0d0b1e",
            border: "1px solid " + (errs.name ? "#ef4444" : "rgba(139,92,246,.2)"),
            borderRadius: "10px",
            color: "#fff",
            fontSize: "14px"
          }
        }),
        errs.name && React.createElement("div", { style: { fontSize: "12px", color: "#ef4444", marginTop: "5px" } }, errs.name)
      ),
      React.createElement("div", { style: { marginBottom: "15px" } },
        React.createElement("input", {
          type: method === "email" ? "email" : "tel",
          placeholder: method === "email" ? "your@email.com" : "+1234567890",
          value: method === "email" ? form.email : form.phone,
          onChange: (e) => setForm({ ...form, [method === "email" ? "email" : "phone"]: e.target.value }),
          style: {
            width: "100%",
            padding: "12px",
            background: "#0d0b1e",
            border: "1px solid " + (errs.email || errs.phone ? "#ef4444" : "rgba(139,92,246,.2)"),
            borderRadius: "10px",
            color: "#fff",
            fontSize: "14px"
          }
        })
      ),
      React.createElement("div", { style: { marginBottom: "20px" } },
        React.createElement("input", {
          type: "password",
          placeholder: "Password",
          value: form.pass,
          onChange: (e) => setForm({ ...form, pass: e.target.value }),
          style: {
