      React.createElement('circle',{cx:16,cy:14,r:1.5,fill:"currentColor",stroke:"none"})
    ),
  };
  const NAV=[
    {id:"home",label:L("home")},
    {id:"earn",label:L("earn")},
    {id:"tasks",label:L("tasks")},
    {id:"convert",label:L("convert")},
    {id:"wallet",label:L("wallet")},
  ];

  return(
    <div style={{minHeight:"100vh",background:C.bg,color:C.white,fontFamily:"'DM Sans',sans-serif",maxWidth:480,margin:"0 auto",position:"relative",display:"flex",flexDirection:"column",direction:dir}}>
      <style>{CSS}</style>
      {/* Header */}
      <div style={{padding:"14px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",background:C.s1,borderBottom:`1px solid ${C.border}`,position:"sticky",top:0,zIndex:10}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <button onClick={()=>setSO(true)} style={{background:"none",border:"none",cursor:"pointer",padding:"4px 2px",display:"flex",flexDirection:"column",gap:5,justifyContent:"center"}}>
            <div style={{width:22,height:2,background:C.white,borderRadius:2}}/>
            <div style={{width:22,height:2,background:C.white,borderRadius:2}}/>
            <div style={{width:22,height:2,background:C.white,borderRadius:2}}/>
          </button>
          <div style={{fontSize:20,fontWeight:800,background:`linear-gradient(90deg,${C.brandLt},${C.pink})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>⭐ {APP_NAME}</div>
        </div>
      </div>
      {/* Content */}
      <div style={{flex:1,overflowY:"auto",paddingTop:16,paddingBottom:80}}>{TAB[tab]}</div>
      {/* Bottom Nav */}
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:C.s1,borderTop:`1px solid ${C.border}`,display:"flex",zIndex:10,paddingBottom:"env(safe-area-inset-bottom,0px)"}}>
        {NAV.map(n=>{
          const active=tab===n.id;
          const accentCol=n.id==="wallet"?"#f59e0b":n.id==="earn"?"#a78bfa":n.id==="convert"?"#34d399":C.brandLt;
          return(
            <button key={n.id} onClick={()=>setTab(n.id)} style={{flex:1,padding:"10px 2px 6px",background:"none",border:"none",color:active?accentCol:C.muted,cursor:"pointer",textAlign:"center",transition:"color .2s"}}>
              <div className={active?(n.id==="convert"?"nav-ico-convert-active":"nav-ico-active"):""} style={{display:"flex",justifyContent:"center",alignItems:"center",height:26}}>
                {NAV_ICONS[n.id](active)}
              </div>
              <div style={{fontSize:9.5,fontWeight:active?700:400,marginTop:2,letterSpacing:active?.4:0,transition:"all .2s"}}>{n.label}</div>
              {active&&<span className="nav-pill" style={{background:accentCol}}/>}
            </button>
          );
        })}
      </div>
      {/* Global hidden file input — reused for camera & gallery from any screen */}
      <input ref={fileInputRef} type="file" accept="image/*" capture={picCapture?"user":undefined} style={{display:"none"}} onChange={e=>{
        const f=e.target.files&&e.target.files[0];
        if(!f)return;
        const rd=new FileReader();
        rd.onload=ev=>{
          // 1. Resize to max 400 px on the client so the payload stays small
          const img=new Image();
          img.onload=()=>{
            const MAX=150;
            const scale=Math.min(MAX/img.width,MAX/img.height,1);
            const cvs=document.createElement("canvas");
            cvs.width=Math.round(img.width*scale);
            cvs.height=Math.round(img.height*scale);
            cvs.getContext("2d").drawImage(img,0,0,cvs.width,cvs.height);
            const dataUrl=cvs.toDataURL("image/jpeg",0.72);
            // 2. Show local preview immediately so the user sees feedback at once
            setU(p=>({...p,avatar:dataUrl}));
            setAP(false);
            // 3. Upload to Supabase Storage — get back a permanent public URL,
            //    then save it to the DB immediately (don't rely on auto-save,
            //    which would send the huge data-URL and get rejected).
            fetch("/api/user",{method:"POST",headers:{"Content-Type":"application/json"},
              body:JSON.stringify({action:"uploadAvatar",userId:u.id,imageData:dataUrl})
            })
            .then(r=>r.json())
            .then(d=>{
              if(!d.url) return;
              // Swap preview for real URL in UI
              setU(p=>({...p,avatar:d.url}));
              // Persist URL to DB right now
              fetch("/api/user",{method:"POST",headers:{"Content-Type":"application/json"},
                body:JSON.stringify({id:u.id,email:u.email,avatar:d.url})
              }).catch(()=>{});
            })
            .catch(()=>{/* preview remains in UI; DB keeps previous avatar */});
          };
          img.src=ev.target.result;
        };
        rd.readAsDataURL(f);
        e.target.value="";
      }}/>
      {/* Announcement Toast */}
      {annToast&&(
        <div style={{position:"fixed",top:16,left:"50%",transform:"translateX(-50%)",zIndex:9999,background:C.s2,border:`1px solid ${C.brand}`,borderRadius:16,padding:"12px 16px",boxShadow:"0 4px 24px rgba(0,0,0,.5)",display:"flex",alignItems:"center",gap:12,maxWidth:380,width:"calc(100% - 32px)",animation:"popIn .3s ease",cursor:"pointer"}} onClick={()=>{setAnnToast(null);localStorage.setItem('wish_ann_seen',Date.now().toString());annToastShown.current=false;setSV("announcements");}}>
          <span style={{fontSize:22,flexShrink:0}}>{annToast.icon||"📢"}</span>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:12,color:C.brand,fontWeight:700,marginBottom:2}}>New Announcement</div>
            <div style={{fontSize:13,fontWeight:700,color:C.white,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{annToast.title}</div>
            {annToast.body&&<div style={{fontSize:12,color:C.muted,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{annToast.body}</div>}
          </div>
          <button onClick={e=>{e.stopPropagation();setAnnToast(null);}} style={{background:"none",border:"none",color:C.muted,fontSize:18,cursor:"pointer",lineHeight:1,padding:"4px",flexShrink:0}}>✕</button>
        </div>
      )}
      {/* Sidebar Overlay */}
      {sidebarOpen&&(
        <>
          <div className="menu-overlay" onClick={()=>setSO(false)}/>
          <div className="menu-drawer" style={{animation:"slideL .25s ease both"}}>
            {/* Sidebar Header */}
            <div style={{padding:"20px 24px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:`1px solid rgba(139,92,246,.15)`}}>
              <div style={{fontSize:18,fontWeight:800,background:`linear-gradient(90deg,${C.brandLt},${C.pink})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>⭐ {APP_NAME}</div>
              <button onClick={()=>setSO(false)} style={{background:"none",border:"none",color:C.muted,fontSize:20,cursor:"pointer",lineHeight:1,padding:4}}>✕</button>
            </div>
            {/* User info */}
            <div style={{padding:"16px 24px",display:"flex",alignItems:"center",gap:12,borderBottom:`1px solid rgba(139,92,246,.1)`}}>
              <div style={{width:44,height:44,borderRadius:"50%",background:`linear-gradient(135deg,${C.brand},${C.pink})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,fontWeight:800,color:"#fff",flexShrink:0,overflow:"hidden"}}>
                {u.avatar
                  ? <img src={u.avatar} style={{width:"100%",height:"100%",objectFit:"cover"}} alt="avatar"/>
                  : u.name[0].toUpperCase()
                }
              </div>
              <div>
                <div style={{fontSize:14,fontWeight:700,color:C.white}}>{u.name}</div>
                <div style={{fontSize:12,color:C.muted,marginTop:2}}>{u.email}</div>
              </div>
            </div>
            {/* Menu Items */}
            <div style={{flex:1,overflowY:"auto",paddingTop:8}}>
              {(()=>{
                const lastSeen = Number(localStorage.getItem('wish_ann_seen')||0);
                const unread = annList.filter(a=>new Date(a.sentAt).getTime()>lastSeen).length;
                return [
                  {icon:"👤",label:"Profile"},
                  {icon:"🏆",label:"Leader Board"},
                  {icon:"👥",label:"Referral Team"},
                  {icon:"📢",label:"Announcement",badge:unread},
                  {icon:"📄",label:"White Paper"},
                  {icon:"🎧",label:"Support Portal"},
                  {icon:"🔐",label:"Security"},
                ].map(item=>(
                  <button key={item.label} className="menu-item" onClick={()=>{
                    if(item.label==="Profile"){setSO(false);setSV("profile");}
                    else if(item.label==="Leader Board"){setSO(false);setSV("leaders");}
                    else if(item.label==="Security"){setSO(false);setSV("security");}
                    else if(item.label==="Referral Team"){setSO(false);setSV("referral");}
                    else if(item.label==="Announcement"){
                      localStorage.setItem('wish_ann_seen', Date.now().toString());
                      annToastShown.current = false;
                      setAnnToast(null);
                      fetch('/api/announcements').then(r=>r.ok?r.json():null).then(d=>{if(d?.announcements)setAnnList(d.announcements);}).catch(()=>{});
                      setSO(false);setSV("announcements");
                    }
                    else setSO(false);
                  }}>
                    <span style={{fontSize:20}}>{item.icon}</span>
                    <span style={{flex:1}}>{item.label}</span>
                    {item.badge>0&&(
                      <span style={{background:"#ef4444",color:"#fff",fontSize:11,fontWeight:800,borderRadius:99,padding:"2px 7px",marginRight:6,minWidth:20,textAlign:"center"}}>
                        {item.badge}
                      </span>
                    )}
                    <span style={{color:C.muted,fontSize:18}}>›</span>
                  </button>
                ));
              })()}
            </div>
            {/* Logout Button */}
            <div style={{padding:"16px 24px 24px",borderTop:`1px solid rgba(139,92,246,.1)`}}>
              <button onClick={()=>{setSO(false);setLD(true);}} style={{width:"100%",background:"rgba(239,68,68,.12)",border:"1px solid rgba(239,68,68,.3)",borderRadius:12,padding:"13px",color:"#f87171",fontWeight:700,fontSize:14,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
                👋 Logout
              </button>
            </div>
          </div>
        </>
      )}
      {/* Profile Screen (from sidebar) */}
      {sidebarView==="profile"&&(
        <div style={{position:"fixed",inset:0,background:C.bg,zIndex:150,display:"flex",flexDirection:"column",maxWidth:480,left:"50%",transform:"translateX(-50%)",width:"100%"}}>
          {/* Profile Header */}
          <div style={{padding:"14px 16px",display:"flex",alignItems:"center",gap:14,background:C.s1,borderBottom:`1px solid ${C.border}`,flexShrink:0}}>
            <button onClick={()=>setSV(null)} style={{background:"none",border:"none",color:C.white,fontSize:22,cursor:"pointer",lineHeight:1,padding:4}}>←</button>
            <div style={{fontSize:18,fontWeight:800,color:C.white}}>Account</div>
          </div>
          {/* Profile Content */}
          <div style={{flex:1,overflowY:"auto",padding:"16px 16px 32px"}}>

            {/* ── Profile Photo Card ── */}
            <div style={{
              background:"linear-gradient(160deg,rgba(139,92,246,.09),rgba(236,72,153,.05),rgba(6,182,212,.04))",
              border:"1px solid rgba(139,92,246,.2)",
              borderRadius:24,
              padding:"28px 20px 20px",
              marginBottom:20,
              textAlign:"center",
              position:"relative",
              overflow:"hidden",
            }}>
              {/* Subtle ambient glow */}
              <div style={{position:"absolute",top:-40,left:"50%",transform:"translateX(-50%)",width:200,height:200,borderRadius:"50%",background:"radial-gradient(circle,rgba(139,92,246,.12),transparent 70%)",pointerEvents:"none"}}/>

              {/* Avatar with gradient ring */}
              <div onClick={()=>setAP(p=>!p)} style={{
                display:"inline-flex",alignItems:"center",justifyContent:"center",
                width:96,height:96,borderRadius:"50%",
                background:"linear-gradient(135deg,#8b5cf6,#ec4899,#06b6d4)",
                padding:3,
                margin:"0 auto 14px",
                cursor:"pointer",
                position:"relative",
                boxShadow:"0 8px 32px rgba(139,92,246,.38),0 2px 10px rgba(0,0,0,.5)",
                transition:"transform .18s ease,box-shadow .18s ease",
              }}>
                {/* Inner circle — clips photo */}
                <div style={{
                  width:"100%",height:"100%",borderRadius:"50%",
                  overflow:"hidden",
                  background:"#0a0818",
                  display:"flex",alignItems:"center",justifyContent:"center",
                  position:"relative",
                }}>
                  {u.avatar
                    ?<img src={u.avatar} style={{width:"100%",height:"100%",objectFit:"cover"}} alt="profile"/>
                    :<span style={{fontSize:36,fontWeight:800,color:"#fff",lineHeight:1,userSelect:"none"}}>{u.name[0].toUpperCase()}</span>
                  }
                  {/* Hover scrim */}
                  <div style={{position:"absolute",inset:0,borderRadius:"50%",background:"rgba(0,0,0,.0)",display:"flex",alignItems:"center",justifyContent:"center"}}/>
                </div>
                {/* Camera badge */}
                <div style={{
                  position:"absolute",bottom:0,right:0,
                  width:30,height:30,borderRadius:"50%",
                  background:"linear-gradient(135deg,#8b5cf6,#ec4899)",
                  border:"2.5px solid #0a0818",
                  display:"flex",alignItems:"center",justifyContent:"center",
                  fontSize:14,
                  boxShadow:"0 2px 10px rgba(139,92,246,.6)",
                }}>📷</div>
              </div>

              {/* Name & hint */}
              <div style={{fontSize:17,fontWeight:800,color:"#fff",marginBottom:3,position:"relative"}}>{u.name}</div>
              <div style={{fontSize:12,color:C.muted,position:"relative"}}>
                {avatarPick?"Choose an option below":"Tap photo to update"}
              </div>

              {/* ── Action sheet ── */}
              {avatarPick&&(
                <div style={{
                  marginTop:20,
                  background:"rgba(8,6,22,.94)",
                  backdropFilter:"blur(20px)",
                  borderRadius:20,
                  border:"1px solid rgba(139,92,246,.22)",
                  overflow:"hidden",
                  animation:"splashFade .2s ease",
                  position:"relative",
                }}>
                  <div style={{padding:"13px 16px 10px",fontSize:11,fontWeight:700,color:"rgba(255,255,255,.3)",textTransform:"uppercase",letterSpacing:.12}}>
                    Profile Photo
                  </div>

                  {/* Take Photo */}
                  <button
                    onClick={()=>{setPC(true);setAP(false);setTimeout(()=>{fileInputRef.current&&fileInputRef.current.click();},50);}}
                    style={{width:"100%",background:"none",border:"none",borderTop:"1px solid rgba(255,255,255,.06)",padding:"14px 16px",cursor:"pointer",display:"flex",alignItems:"center",gap:14,textAlign:"left",fontFamily:"inherit"}}>
                    <div style={{width:44,height:44,borderRadius:14,background:"linear-gradient(135deg,rgba(139,92,246,.22),rgba(139,92,246,.1))",border:"1px solid rgba(139,92,246,.32)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>📷</div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:14,fontWeight:700,color:"#fff",textAlign:"left"}}>Take Photo</div>
                      <div style={{fontSize:12,color:C.muted,marginTop:1,textAlign:"left"}}>Open camera and capture</div>
                    </div>
                    <div style={{color:"rgba(255,255,255,.18)",fontSize:18,fontWeight:300}}>›</div>
                  </button>

                  {/* Choose from Gallery */}
                  <button
                    onClick={()=>{setPC(false);setAP(false);setTimeout(()=>{fileInputRef.current&&fileInputRef.current.click();},50);}}
                    style={{width:"100%",background:"none",border:"none",borderTop:"1px solid rgba(255,255,255,.06)",padding:"14px 16px",cursor:"pointer",display:"flex",alignItems:"center",gap:14,textAlign:"left",fontFamily:"inherit"}}>
                    <div style={{width:44,height:44,borderRadius:14,background:"linear-gradient(135deg,rgba(6,182,212,.18),rgba(6,182,212,.08))",border:"1px solid rgba(6,182,212,.3)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>🖼️</div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:14,fontWeight:700,color:"#fff",textAlign:"left"}}>Choose from Gallery</div>
                      <div style={{fontSize:12,color:C.muted,marginTop:1,textAlign:"left"}}>Select an existing photo</div>
                    </div>
                    <div style={{color:"rgba(255,255,255,.18)",fontSize:18,fontWeight:300}}>›</div>
                  </button>

                  {/* Cancel */}
                  <button
                    onClick={()=>setAP(false)}
                    style={{width:"100%",background:"none",border:"none",borderTop:"1px solid rgba(255,255,255,.06)",padding:"13px 16px",color:"rgba(255,255,255,.28)",fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>
                    Cancel
                  </button>
                </div>
              )}
            </div>

            {/* Account Settings */}
            <div style={{fontSize:12,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:.1,marginBottom:10,padding:"0 4px"}}>Account Settings</div>
            <div style={{background:C.s2,borderRadius:16,marginBottom:16,border:`1px solid ${C.border}`,overflow:"hidden"}}>
              {/* Change Name */}
              <div style={{padding:"16px"}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:12}}>
                  <div style={{flex:1}}>
                    <div style={{fontSize:15,fontWeight:700,color:C.white}}>Change Name</div>
                    <div style={{fontSize:12,color:C.muted,marginTop:3}}>Update your display name.</div>
                  </div>
                  <button onClick={()=>setEF(editingField==="name"?null:"name")} style={{background:editingField==="name"?"rgba(255,255,255,.1)":C.brand,border:editingField==="name"?`1px solid ${C.border}`:"none",borderRadius:8,padding:"7px 16px",color:editingField==="name"?C.muted:"#fff",fontWeight:700,fontSize:12,cursor:"pointer",flexShrink:0}}>{editingField==="name"?"CANCEL":"CHANGE"}</button>
                </div>
                {editingField==="name"&&(
                  <div style={{display:"flex",gap:8,marginTop:12}}>
                    <input value={editName} onChange={e=>setEN(e.target.value)} style={{flex:1,background:"rgba(139,92,246,.07)",border:`1.5px solid ${C.border2}`,color:"#fff",borderRadius:10,padding:"10px 12px",fontSize:13,outline:"none",fontFamily:"inherit"}} placeholder="Your display name"/>
                    <button onClick={()=>{if(editName.trim()){saveProfileField({name:editName.trim()});setPMsg("Name updated!");setEF(null);}else setPMsg("Name can't be empty!");setTimeout(()=>setPMsg(""),2500);}} style={{background:C.green,border:"none",borderRadius:10,padding:"10px 16px",color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer"}}>SAVE</button>
                  </div>
                )}
              </div>
              <div style={{height:1,background:C.border}}/>
              {/* Change Email */}
              <div style={{padding:"16px"}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:12}}>
                  <div style={{flex:1}}>
                    <div style={{fontSize:15,fontWeight:700,color:C.white}}>Change Email</div>
                    <div style={{fontSize:12,color:C.muted,marginTop:3}}>Update your email address for account access.</div>
                  </div>
                  <button onClick={()=>setEF(editingField==="email"?null:"email")} style={{background:editingField==="email"?"rgba(255,255,255,.1)":C.brand,border:editingField==="email"?`1px solid ${C.border}`:"none",borderRadius:8,padding:"7px 16px",color:editingField==="email"?C.muted:"#fff",fontWeight:700,fontSize:12,cursor:"pointer",flexShrink:0}}>{editingField==="email"?"CANCEL":"CHANGE"}</button>
                </div>
                {editingField==="email"&&(
                  <div style={{display:"flex",gap:8,marginTop:12}}>
                    <input value={editEmail} onChange={e=>setEE(e.target.value)} type="email" style={{flex:1,background:"rgba(139,92,246,.07)",border:`1.5px solid ${C.border2}`,color:"#fff",borderRadius:10,padding:"10px 12px",fontSize:13,outline:"none",fontFamily:"inherit"}} placeholder="you@email.com"/>
                    <button onClick={()=>{if(editEmail.match(/^[^\s@]+@[^\s@]+\.[^\s@]+$/)){setU(p=>({...p,email:editEmail}));setPMsg("Email updated!");setEF(null);}else setPMsg("Invalid email!");setTimeout(()=>setPMsg(""),2500);}} style={{background:C.green,border:"none",borderRadius:10,padding:"10px 16px",color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer"}}>SAVE</button>
                  </div>
                )}
              </div>
              <div style={{height:1,background:C.border}}/>
              {/* Change Password */}
              <div style={{padding:"16px"}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:12}}>
                  <div style={{flex:1}}>
                    <div style={{fontSize:15,fontWeight:700,color:C.white}}>Change Password</div>
                    <div style={{fontSize:12,color:C.muted,marginTop:3}}>Update your password to keep account secure.</div>
                  </div>
                  <button onClick={()=>setEF(editingField==="pass"?null:"pass")} style={{background:editingField==="pass"?"rgba(255,255,255,.1)":C.brand,border:editingField==="pass"?`1px solid ${C.border}`:"none",borderRadius:8,padding:"7px 16px",color:editingField==="pass"?C.muted:"#fff",fontWeight:700,fontSize:12,cursor:"pointer",flexShrink:0}}>{editingField==="pass"?"CANCEL":"CHANGE"}</button>
                </div>
                {editingField==="pass"&&(
                  <div style={{marginTop:12}}>
                    <input value={editCurrPass} onChange={e=>setECP(e.target.value)} type="password" style={{width:"100%",background:"rgba(139,92,246,.07)",border:`1.5px solid ${C.border2}`,color:"#fff",borderRadius:10,padding:"10px 12px",fontSize:13,outline:"none",fontFamily:"inherit",marginBottom:8}} placeholder="Current password"/>
                    <input value={editPass} onChange={e=>setEP(e.target.value)} type="password" style={{width:"100%",background:"rgba(139,92,246,.07)",border:`1.5px solid ${C.border2}`,color:"#fff",borderRadius:10,padding:"10px 12px",fontSize:13,outline:"none",fontFamily:"inherit",marginBottom:8}} placeholder="New password (min 6 characters)"/>
                    <button onClick={()=>{
                      if(!editCurrPass){setPMsg("Enter your current password first.");setTimeout(()=>setPMsg(""),2500);return;}
                      if(editCurrPass!==u.pass){setPMsg("Current password is incorrect.");setTimeout(()=>setPMsg(""),2500);return;}
                      if(editPass.length<6){setPMsg("New password must be at least 6 characters.");setTimeout(()=>setPMsg(""),2500);return;}
                      saveProfileField({pass:editPass});setEP("");setECP("");setPMsg("Password updated!");setEF(null);setTimeout(()=>setPMsg(""),2500);
                    }} style={{width:"100%",background:`linear-gradient(135deg,${C.brand},${C.pink})`,border:"none",borderRadius:10,padding:"11px",color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer"}}>SAVE PASSWORD</button>
                  </div>
                )}
              </div>
            </div>
