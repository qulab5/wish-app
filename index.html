      <div style={{margin:'14px 16px 0',background:'rgba(245,158,11,.04)',border:'1px solid rgba(245,158,11,.1)',borderRadius:18,padding:'16px'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <div style={{width:42,height:42,borderRadius:'50%',background:'linear-gradient(135deg,#f59e0b,#f97316)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,boxShadow:'0 4px 14px rgba(245,158,11,.35)'}}>🪙</div>
            <div>
              <div style={{fontSize:14,fontWeight:700,color:C.white,lineHeight:1.2}}>Wish Coin</div>
              <div style={{fontSize:11,color:'rgba(255,255,255,.3)',marginTop:2}}>WISH · Solana</div>
            </div>
          </div>
          <div style={{textAlign:'right'}}>
            <div style={{fontSize:18,fontWeight:800,color:'#f59e0b'}}>
              {balLoading && wishBal === null ? <span style={{opacity:.4}}>…</span> : (fmt(wishBal) ?? '—')}
            </div>
            <div style={{fontSize:10,color:'rgba(255,255,255,.25)',letterSpacing:.5,marginTop:2}}>WISH</div>
          </div>
        </div>
      </div>

      {/* SOL row */}
      <div style={{margin:'10px 16px 0',background:'rgba(99,102,241,.04)',border:'1px solid rgba(99,102,241,.1)',borderRadius:18,padding:'16px'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <div style={{width:42,height:42,borderRadius:'50%',background:'linear-gradient(135deg,#9945FF,#14F195)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,boxShadow:'0 4px 14px rgba(153,69,255,.25)'}}>◎</div>
            <div>
              <div style={{fontSize:14,fontWeight:700,color:C.white,lineHeight:1.2}}>Solana</div>
              <div style={{fontSize:11,color:'rgba(255,255,255,.3)',marginTop:2}}>SOL · Native</div>
            </div>
          </div>
          <div style={{textAlign:'right'}}>
            <div style={{fontSize:18,fontWeight:800,color:'#a78bfa'}}>
              {balLoading && solBal === null ? <span style={{opacity:.4}}>…</span> : (solBal ?? '—')}
            </div>
            <div style={{fontSize:10,color:'rgba(255,255,255,.25)',letterSpacing:.5,marginTop:2}}>SOL</div>
          </div>
        </div>
      </div>

      {/* Wallet address row */}
      <div style={{margin:'10px 16px 0',background:'rgba(255,255,255,.03)',border:'1px solid rgba(255,255,255,.07)',borderRadius:16,padding:'14px 16px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div>
          <div style={{fontSize:10,color:'rgba(255,255,255,.25)',letterSpacing:1.4,textTransform:'uppercase',marginBottom:5}}>Wallet Address</div>
          <div style={{fontSize:13,color:'rgba(255,255,255,.6)',fontFamily:'monospace',letterSpacing:.4}}>
            {wallet.slice(0,6)}…{wallet.slice(-6)}
          </div>
        </div>
        <button onClick={copyAddr}
          style={{padding:'8px 14px',background:copied?'rgba(52,211,153,.12)':'rgba(255,255,255,.06)',border:`1px solid ${copied?'rgba(52,211,153,.35)':'rgba(255,255,255,.1)'}`,borderRadius:10,color:copied?'#34d399':'rgba(255,255,255,.45)',fontSize:12,fontWeight:600,cursor:'pointer',transition:'all .2s'}}>
          {copied ? '✓ Copied' : '📋 Copy'}
        </button>
      </div>

      {/* Transaction history */}
      <div style={{margin:'18px 16px 0'}}>
        <div style={{fontSize:12,color:'rgba(255,255,255,.3)',letterSpacing:1.4,textTransform:'uppercase',marginBottom:10}}>Transaction History</div>
        {txHistory.length === 0
          ? <div style={{textAlign:'center',padding:'24px 0',color:'rgba(255,255,255,.2)',fontSize:13}}>No transactions yet</div>
          : txHistory.map(tx => {
              const isSent = tx.type === 'sent';
              const addr   = tx.address || '';
              const short  = addr.length > 10 ? addr.slice(0,5)+'…'+addr.slice(-5) : addr || '—';
              const date   = new Date(tx.createdAt).toLocaleDateString(undefined,{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
              return (
                <div key={tx.id} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 14px',background:'rgba(255,255,255,.03)',border:'1px solid rgba(255,255,255,.06)',borderRadius:14,marginBottom:8}}>
                  <div style={{display:'flex',alignItems:'center',gap:12}}>
                    <div style={{width:36,height:36,borderRadius:'50%',background:isSent?'rgba(248,113,113,.15)':'rgba(52,211,153,.15)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,flexShrink:0}}>
                      {isSent ? '📤' : '📥'}

                      <div style={{fontSize:13,fontWeight:700,color:C.white}}>{isSent ? 'Sent' : 'Received'}</div>
                      <div style={{fontSize:11,color:'rgba(255,255,255,.3)',marginTop:2,fontFamily:'monospace'}}>{isSent ? 'To: ' : 'From: '}{short}</div>
                      <div style={{fontSize:10,color:'rgba(255,255,255,.2)',marginTop:1}}>{date}</div>
                    </div>

                  <div style={{textAlign:'right'}}>
                    <div style={{fontSize:15,fontWeight:800,color:isSent?'#f87171':'#34d399'}}>
                      {isSent ? '−' : '+'}{tx.amount}
                    </div>
                    <div style={{fontSize:10,color:'rgba(255,255,255,.25)',marginTop:2}}>WISH</div>
                  </div>

              );
            })
        }
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════
   MAIN APP
═══════════════════════════════════════════════ */
function MainApp({user,onLogout,lang,setLang}){
  const [tab,setTab]       = useState("home");
  const [u,setU]           = useState({...user});
  const [logoutDlg,setLD]  = useState(false);
  const [tasksDone,setTD]  = useState({});
  const [joinsDone,setJD]  = useState({});
  const [adLeft,setAL]     = useState(5);
  const [adShowing,setAS]  = useState(false);
  const [adData,setAD]     = useState(null);
  const [spinning,setSpin]   = useState(false);
  const [spinResult,setSR]   = useState(null);
  const [spinAngle,setSA]    = useState(0);
  const [spinNextFree,setSNF]= useState(()=>Security.load('snf_'+user.id,0)||0); // epoch ms when next free spin is available
  const [extraSpins,setES]   = useState(0);   // additional spins earned by watching ads
  const [spinAdPopup,setSAP] = useState(false);
  const [mineStartedAt,setMSAt]= useState(0);        // epoch ms when session began (0 = no session)
  const [mineT,setMineT]       = useState(MINE_SESSION_S);
  const [mineReady,setMR]      = useState(false);
  const [mineStarted,setMS]    = useState(false);
  const [mineAdShow,setMAd]    = useState(false);
  const [mineBoosts,setMineBoosts] = useState(0);
  const [convSuccess,setConvS] = useState(false);  // flash "Converted!" feedback
  const [langMenu,setLM]      = useState(false);
  const [avatarPick,setAP]    = useState(false);
  const fileInputRef          = React.useRef(null);
  const [picCapture,setPC]    = useState(false);
  const [editName,setEN]      = useState(user.name);
  const [editEmail,setEE]     = useState(user.email);
  const [editPass,setEP]      = useState("");
  const [profileMsg,setPMsg]  = useState("");
  const [sidebarOpen, setSO]  = useState(false);
  const [sidebarView, setSV]  = useState(null);
  const [refCopied,  setRefCopied] = useState("");
  const [editingField, setEF] = useState(null);
  // Guard: auto-save must not fire until the initial DB load has finished.
  // Without this, the stale localStorage user (saved at login time) would be
  // written back to the DB 2 seconds after every page refresh, overwriting any
  // points/state that were saved to the DB since that last login.
  const dbLoaded = React.useRef(false);
  // Always-current mirror of u — lets setTimeout callbacks (e.g. doSpin's
  // 4.2s timer) read the latest pts/usd without stale-closure issues.
  const uRef = React.useRef(u);
  useEffect(()=>{ uRef.current = u; });
  const L = k => t$(lang,k);
  const dir = (LANGS[lang]||LANGS.en).dir;

  useEffect(()=>{
    if(!mineStarted||mineReady)return;
    const iv=setInterval(()=>setMineT(t=>{if(t<=1){setMR(true);return 0;}return t-1;}),1000);
    return()=>clearInterval(iv);
  },[mineStarted,mineReady]);

  // Load saved progress from MongoDB on first mount
  useEffect(()=>{
    fetch(`/api/user?email=${encodeURIComponent(user.email)}`)
      .then(r=>r.json())
      .then(d=>{
        // Always unlock auto-save, even when the user isn't in the DB yet
        // (demo/in-memory users). Without this the flag stays false and saves
        // are permanently blocked for those accounts.
        dbLoaded.current = true;
        if(!d.user) return;
        const {pts,usd,avatar,name,tasksDone:td,adLeft:al,adDate,spinAngle:sa,
               spinNextFree:snf,extraSpins:es,lang:dbLang,tokens:dbTokens,
               refCode:dbRefCode,refBy:dbRefBy,refPts:dbRefPts,refs:dbRefs,
               walletAddress:dbWa}=d.user;
        // Restore language preference from DB (cross-device)
        if(dbLang){ setLang(dbLang); Security.save('lang',dbLang); }
        setU(p=>({...p,
          // Prefer the DB value, but never let a DB 0 overwrite a locally-earned
          // value that was already synced to localStorage.  Saves bring the DB
          // value UP; a DB value lower than localStorage means a save failed.
          pts: Math.max(pts ?? 0, p.pts),
          usd: Math.max(usd ?? 0, p.usd),
          tokens: dbTokens ?? p.tokens ?? 0,
          avatar:avatar||p.avatar,
          name:name||p.name,
          refCode:       dbRefCode||p.refCode||null,
          refBy:         dbRefBy  ||p.refBy  ||null,
          refPts:        Math.max(dbRefPts??0, p.refPts??0),
          refs:          dbRefs   ||p.refs   ||[],
          walletAddress: dbWa     ||p.walletAddress||null,
        }));
        const today=new Date().toDateString();
        if(al!=null) setAL(adDate===today?al:5);
        if(sa!=null) setSA(sa);
        // Take max(DB, local) — prevents a stale DB 0 from overwriting a valid local cooldown.
        setSNF(p=>Math.max(snf??0, p));
        if(es!=null)  setES(es);
        // ── Restore task state + mining session ──────────────────────────────
        // Mining session start time is stored as tasksDone.__mine_startedAt
        // (a reserved JSONB key) so it persists without any schema migration.
        if(td){
          setTD(td);
          const msa = td.__mine_startedAt;
          const mb  = td.__mine_boosts || 0;
          if(msa){
            const elapsedS = Math.floor((Date.now() - msa) / 1000);
            setMSAt(msa);
            setMineBoosts(mb);
            if(elapsedS >= MINE_SESSION_S){
              // Session finished while user was away — ready to claim
              setMineT(0); setMS(true); setMR(true);
            } else {
              // Session still running — resume from correct position
              setMineT(MINE_SESSION_S - elapsedS); setMS(true); setMR(false);
            }
          }
        }
      })
      .catch(()=>{ dbLoaded.current = true; });  // unlock even on network error
  },[]);

  // Keep last_user in localStorage in sync with the live pts/usd so that a
  // page refresh renders the correct value immediately (no 0-flash while the
  // DB load is still in-flight).  Only runs after dbLoaded so the stale
  // login-snapshot is never promoted back on top of a DB load.
  useEffect(()=>{
    if(!dbLoaded.current) return;
    Security.save('last_user',{...u});
  },[u.pts,u.usd]);

  // Persist spinNextFree to localStorage immediately on change so it survives
  // a page refresh even if the DB save hasn't completed yet.
  useEffect(()=>{
    if(spinNextFree>0) Security.save('snf_'+u.id, spinNextFree);
  },[spinNextFree]);

  // Auto-save progress (debounced 2s after last change).
  // avatar is intentionally excluded — it is saved explicitly after upload
  // to avoid sending a huge base64 data-URL that exceeds Supabase's body limit.
  useEffect(()=>{
    // Skip until the initial DB load has applied fresh server state.
    // Without this guard the stale localStorage snapshot (saved at login time)
    // would overwrite the DB 2 seconds after every page refresh.
    if(!dbLoaded.current) return;
    const t=setTimeout(()=>{
      fetch('/api/user',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({id:u.id,email:u.email,name:u.name,pts:u.pts,usd:u.usd,
          tokens:u.tokens??0,tasksDone,adLeft,adDate:new Date().toDateString(),spinAngle,spinNextFree,extraSpins,
          refCode:u.refCode||null,refPts:u.refPts??0,refs:u.refs??[]})
      }).then(r=>r.json()).then(d=>{if(!d.success)console.error('[auto-save]',d);}).catch(e=>console.error('[auto-save]',e));
    },2000);
    return()=>clearTimeout(t);
  },[u.pts,u.usd,u.name,u.refPts,tasksDone,adLeft,spinAngle,spinNextFree,extraSpins]);

  const fmtTime=s=>{const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;return`${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(sec).padStart(2,"0")}`;};
  const addPts=(pts,usd=0)=>setU(p=>({...p,pts:p.pts+pts,usd:+(p.usd+usd).toFixed(2)}));

  // Pts accumulated in the current mining session (updates every second as mineT ticks).
  // elapsed-time pts + boost pts — transferred to balance only on Claim.
  const mineElapsed = MINE_SESSION_S - mineT;
  const mineAccum = mineStarted
    ? Math.floor(mineElapsed * MINE_PTS_HOUR / 3600) + mineBoosts * MINE_BOOST_PTS
    : 0;

  const watchAd=()=>{if(adLeft<=0)return;setAD(rndAd());setAS(true);};
  const claimAd=()=>{
    const newPts=u.pts+adData.pts;
    const newUsd=+(u.usd+adData.pts*USD_PER_POINT).toFixed(2);
    const newAL=adLeft-1;
    addPts(adData.pts);setAL(p=>p-1);setAS(false);setAD(null);
    fetch('/api/user',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({id:u.id,email:u.email,pts:newPts,usd:newUsd,adLeft:newAL,adDate:new Date().toDateString()})
    }).catch(()=>{});
  };
  const doSpin=()=>{
    if(spinning) return;
    const now=Date.now();
    const hasFree=now>=spinNextFree;
    const totalSpins=(hasFree?1:0)+extraSpins;
    if(totalSpins<=0){setSAP(true);return;}
    setSpin(true);setSR(null);
    // Pre-compute post-spin values now, while state is fresh.
    // The setTimeout closure below is stale w.r.t. setState calls, so we
    // must capture these values here and pass them through the closure.
    const newSnf=hasFree?now+24*60*60*1000:spinNextFree;
    const newEs=hasFree?extraSpins:extraSpins-1;
    if(hasFree) setSNF(newSnf);
    else        setES(newEs);
    // Save spin consumption immediately so a refresh before the 4.2s animation
    // completes doesn't restore the free spin from the DB.
    fetch('/api/user',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({id:u.id,email:u.email,spinNextFree:newSnf,extraSpins:newEs})
    }).catch(()=>{});
    const i=Math.floor(Math.random()*SPIN_PTS.length);
    const targetOffset=(337.5-i*45+720)%360;
    const currentMod=spinAngle%360;
    const diff=(targetOffset-currentMod+360)%360;
    const newAngle=spinAngle+5*360+diff;
    setSA(newAngle);
    setTimeout(()=>{
      // Read from uRef so we get the latest pts/usd even if state has
      // changed (e.g. mining claim) during the 4.2s animation.
      const cu=uRef.current;
      const newPts=cu.pts+SPIN_PTS[i];
      const newUsd=+(cu.usd+SPIN_USD[i]*0.01).toFixed(2);
      addPts(SPIN_PTS[i],SPIN_USD[i]*0.01);
      setSR({pts:SPIN_PTS[i],usd:SPIN_USD[i]*0.01});
      setSpin(false);
      // Persist immediately — don't rely on the 2s auto-save debounce which
      // can be cancelled by a page refresh before it fires.
      fetch('/api/user',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({id:cu.id,email:cu.email,pts:newPts,usd:newUsd,
          spinAngle:newAngle,spinNextFree:newSnf,extraSpins:newEs})
      })
      .then(r=>r.json())
      .then(d=>{ if(!d.success) console.error('[spin save]',d); })
      .catch(e=>console.error('[spin save network]',e));
      if(newEs<=0) setSAP(true);
    },4200);
  };
  const doConvert=()=>{
    const tokensToMint=Math.floor(uRef.current.pts/PTS_PER_TOKEN);
    if(tokensToMint<=0) return;
    const ptsUsed=tokensToMint*PTS_PER_TOKEN;
    const newPts=uRef.current.pts-ptsUsed;
    const newTokens=(uRef.current.tokens??0)+tokensToMint;
    setU(p=>({...p, pts:newPts, tokens:newTokens}));
    setConvS(true);
    setTimeout(()=>setConvS(false),2500);
    fetch('/api/user',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({id:uRef.current.id,email:uRef.current.email,
        pts:newPts,tokens:newTokens})
    }).then(r=>r.json()).then(d=>{if(!d.success)console.error('[convert save]',d);})
      .catch(e=>console.error('[convert save]',e));
  };
  const watchSpinAd=()=>{
    showRewardedAd(()=>{
      const newEs=extraSpins+1;
      setES(newEs);setSAP(false);
      // Persist the new spin count immediately
      fetch('/api/user',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({id:u.id,email:u.email,extraSpins:newEs})
      }).catch(()=>{});
    });
  };
  const doneTask=(id,pts)=>{if(tasksDone[id])return;setTD(p=>({...p,[id]:true}));addPts(pts);};
  const doneJoin=(id,pts)=>{if(joinsDone[id])return;setJD(p=>({...p,[id]:true}));addPts(pts);};
  const claimMining=()=>{
    if(!mineReady)return;
    const earned = mineAccum;
    // Compute new totals now (u.pts/u.usd are still the pre-claim values here).
    const newPts = u.pts + earned;
    const newUsd = +(u.usd + earned * USD_PER_POINT).toFixed(2);
    addPts(earned, earned * USD_PER_POINT);
    setMSAt(0); setMineT(MINE_SESSION_S); setMR(false); setMS(false); setMineBoosts(0);
    // eslint-disable-next-line no-unused-vars
    const {__mine_startedAt:_a, __mine_boosts:_b, ...cleanTD} = tasksDone;
    setTD(cleanTD);
    // Save pts + usd + session reset immediately — do NOT rely on the 2s
    // auto-save debounce.  If the user refreshes or signs out right after
    // claiming, the DB must already have the new balance.
    fetch('/api/user',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({id:u.id,email:u.email,pts:newPts,usd:newUsd,tasksDone:cleanTD})
    }).then(r=>r.json()).then(d=>{if(!d.success)console.error('[mine claim save]',d);})
      .catch(e=>console.error('[mine claim save]',e));
    // ── Give referrer 10% of this mining claim ────────────────────────────
    if(u.refBy){
      const bonus=Math.floor(earned*REF_MINE_PCT);
      if(bonus>0){
        fetch(`/api/user?refCode=${encodeURIComponent(u.refBy)}`)
          .then(r=>r.json())
          .then(rd=>{
            if(!rd.user)return;
            const ref=rd.user;
            const newRefPts=(ref.refPts||0)+bonus;
            const newRefs=(ref.refs||[]).map(r=>r.name===u.name?{...r,pts:(r.pts||0)+bonus}:r);
            fetch('/api/user',{method:'POST',headers:{'Content-Type':'application/json'},
              body:JSON.stringify({id:ref.id,email:ref.email,pts:(ref.pts||0)+bonus,refPts:newRefPts,refs:newRefs})
            }).catch(()=>{});
          }).catch(()=>{});
      }
    }
  };
  const startMiningAfterAd=()=>{setMAd(false);setMS(true);};

  // ═══ AD INTEGRATION PLACEHOLDERS ═══════════════════════════════════════
  // TODO: Replace showRewardedAd() with your actual ad network SDK call.
  // e.g. AdMob: admob.showRewardedAd(adUnitId).then(onRewarded)
  //      IronSource: ironSource.showRewardedVideo().then(onRewarded)
  // onRewarded is called only after the user successfully watches the ad.
  const showRewardedAd = (onRewarded) => {
    // PLACEHOLDER — remove the line below and wire in your real ad SDK
    console.log("[AD] showRewardedAd called — integrate your ad SDK here");
    onRewarded(); // <-- remove this when real ad SDK is integrated
  };

  // Start a 4-hour mining session (requires watching a rewarded ad).
  // Session start time is stored in tasksDone.__mine_startedAt (existing JSONB column)
  // so it survives sign-out and app close with no schema migration required.
  const startMiningWithAd = () => {
    if (mineStarted) return;

        if(!f)return;
        const rd=new FileReader();
        rd.onload=ev=>{
          // 1. Resize to max 400 px on the client so the payload stays small
          const img=new Image();
          img.onload=()=>{
            const MAX=400;
            const scale=Math.min(MAX/img.width,MAX/img.height,1);
            const cvs=document.createElement("canvas");
            cvs.width=Math.round(img.width*scale);
            cvs.height=Math.round(img.height*scale);
            cvs.getContext("2d").drawImage(img,0,0,cvs.width,cvs.height);
            const dataUrl=cvs.toDataURL("image/jpeg",0.85);
            // 2. Show local preview immediately so the user sees feedback at once
            setU(p=>({...p,avatar:dataUrl}));
            setAP(false);
            // 3. Upload to Supabase Storage — get back a permanent public URL,

              }).catch(()=>{});
            })
            .catch(()=>{/* preview remains in UI; DB keeps previous avatar */});
          };
          img.src=ev.target.result;

/* ═══════════════════════════════════════════════
   SECURITY UTILITIES
   Namespaced localStorage wrapper + SHA-256 PIN hashing.
   All keys stored under prefix "wish_" to avoid collisions.
═══════════════════════════════════════════════ */
const Security = {
  /* SHA-256 PIN hash + app salt. Falls back to djb2 in environments without SubtleCrypto. */
  async hashPin(pin) {
    try {
      const enc = new TextEncoder().encode(pin + '\u2605wish\u2605v1');
      const buf = await crypto.subtle.digest('SHA-256', enc);
      return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
    } catch(_) {
      let h = 5381;
      for (const c of (pin + 'wish_salt')) h = ((h << 5) + h + c.charCodeAt(0)) | 0;
      return (h >>> 0).toString(16);
    }
  },
  async verifyPin(pin, stored) { return (await this.hashPin(pin)) === stored; },

  /* ── Global storage ── */
  save(k, v)  { try { localStorage.setItem('wish_'+k, JSON.stringify(v)); } catch(_){} },
  load(k, d=null) {
    try { const v=localStorage.getItem('wish_'+k); return v===null?d:JSON.parse(v); }
    catch(_){ return d; }
  },
  remove(k) { try { localStorage.removeItem('wish_'+k); } catch(_){} },

  /* ── Per-user storage (key = "wish_uid_{userId}_{k}") ──
     All security is scoped to a specific user ID so multiple users on the
     same device each have fully independent PIN / biometric settings. */
  _uk(uid,k) { return `uid_${uid}_${k}`; },
  saveUser(uid,k,v)      { this.save(this._uk(uid,k),v); },
  loadUser(uid,k,d=null) { return this.load(this._uk(uid,k),d); },
  removeUser(uid,k)      { this.remove(this._uk(uid,k)); },

  /* True once the user has completed the security-setup flow at least once */
  hasSecuritySetup(uid) { return !!this.loadUser(uid,'security_done'); },

  /* Web: checks PublicKeyCredential (Face ID / Touch ID in browser). */
  checkBioSupport() {
    return typeof window!=='undefined' && 'PublicKeyCredential' in window;
  },

  /* Check if device has platform biometric authenticator (async) */
  async checkPlatformBio() {
    if (!this.checkBioSupport()) return false;
    try { return await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable(); }
    catch(_) { return false; }
  },

  /* WebAuthn registration — creates a device-bound biometric credential and stores its ID.
     Native equivalent: LocalAuthentication.authenticateAsync() / react-native-biometrics enroll */
  async setupBiometric(uid) {
    if (!this.checkBioSupport()) return { success:false, error:'not_supported' };
    const avail = await this.checkPlatformBio();
    if (!avail) return { success:false, error:'no_hardware' };
    try {
      /* User ID must be 1–64 bytes; pad/truncate the uid string */
      const uid8 = new Uint8Array(16);
      const enc  = new TextEncoder().encode(uid);
      uid8.set(enc.slice(0,16));
      const cred = await navigator.credentials.create({ publicKey:{
        challenge: crypto.getRandomValues(new Uint8Array(32)),
        rp:  { name:'Wish App' },
        user:{ id:uid8, name:uid, displayName:'Wish User' },
        pubKeyCredParams:[{alg:-7,type:'public-key'},{alg:-257,type:'public-key'}],
        authenticatorSelection:{ authenticatorAttachment:'platform', userVerification:'required' },
        timeout:60000,
      }});
      /* Store the credential ID (base64) so we can reference it later for auth */
      const credId = btoa(String.fromCharCode(...new Uint8Array(cred.rawId)));
      this.saveUser(uid,'bio_cred_id',credId);
      return { success:true };
    } catch(e) {
      return { success:false, error: e.name==='NotAllowedError'?'cancelled':(e.message||'unknown') };
    }
  },

  /* WebAuthn assertion — prompts the native biometric dialog to authenticate.
     Native equivalent: LocalAuthentication.authenticateAsync({ promptMessage:'Unlock Wish' }) */
  async authenticateBiometric(uid) {
    const credStr = this.loadUser(uid,'bio_cred_id',null);
    if (!credStr) return { success:false, error:'no_credential' };
    try {
      const credBytes = Uint8Array.from(atob(credStr), c=>c.charCodeAt(0));
      const assertion = await navigator.credentials.get({ publicKey:{
        challenge: crypto.getRandomValues(new Uint8Array(32)),
        rpId: window.location.hostname || 'localhost',
        allowCredentials:[{ id:credBytes, type:'public-key', transports:['internal'] }],
        userVerification:'required',
        timeout:60000,
      }});
      return { success:!!assertion };
    } catch(e) {
      return { success:false, error: e.name==='NotAllowedError'?'cancelled':(e.message||'unknown') };
    }
  },
};

/* ═══════════════════════════════════════════════
   PIN KEYPAD — numeric 0-9 grid + backspace
═══════════════════════════════════════════════ */
function PinKeypad({ onKey, disabled }) {
  const [activeKey, setAK] = useState(null);
  const rows = [['1','2','3'],['4','5','6'],['7','8','9'],['','0','⌫']];
  const press = (k) => {
    if (!k || disabled) return;
    setAK(k); setTimeout(()=>setAK(null), 140);
    onKey(k);
  };
  /* Button size: cap at 72px but shrink on narrow viewports.
     (100vw - 40px side padding - 2 × 16px gaps) / 3 columns */
  const btnSize = 'min(72px, calc((100vw - 40px - 32px) / 3))';
  const fontSize = 'min(26px, calc((100vw - 40px - 32px) / 3 * 0.38))';
  return (
    <div style={{display:'flex',flexDirection:'column',gap:'min(14px,2.5vh)',alignItems:'center',userSelect:'none',width:'100%'}}>
      {rows.map((row,ri)=>(
        <div key={ri} style={{display:'flex',gap:'min(16px,4vw)',width:'100%',justifyContent:'center'}}>
          {row.map((k,ki)=>{
            const isBack = k==='⌫';
            const isEmpty = k==='';
            const isActive = activeKey===k;
            return (
              <button key={ki} onPointerDown={()=>press(k)} style={{
                width:btnSize, height:btnSize, borderRadius:'50%', flexShrink:0,
                background: isEmpty ? 'transparent'
                  : isActive ? (isBack ? 'rgba(239,68,68,.3)' : 'rgba(139,92,246,.35)')
                  : isBack ? 'rgba(239,68,68,.1)' : 'rgba(139,92,246,.1)',
                border: isEmpty ? 'none'
                  : isBack ? '1px solid rgba(239,68,68,.25)' : '1px solid rgba(139,92,246,.22)',
                color: isEmpty ? 'transparent' : isBack ? '#ef4444' : '#fff',
                fontSize: isBack ? 'min(22px,5.5vw)' : fontSize,
                fontWeight: 600,
                cursor: isEmpty||disabled ? 'default' : 'pointer',
                opacity: disabled ? .35 : 1,
                transition: 'background .12s, transform .12s',
                transform: isActive ? 'scale(0.93)' : 'scale(1)',
                fontFamily:'inherit',
                display:'flex', alignItems:'center', justifyContent:'center',
                WebkitTapHighlightColor:'transparent',
                touchAction:'none',
              }}>{k}</button>
            );
          })}
        </div>
      ))}
    </div>
  );
}

/* ═══════════════════════════════════════════════
   SLIDE TO OPEN — iOS-style slide gesture for new users
═══════════════════════════════════════════════ */
function SlideToOpen({ onUnlock }) {
  const [frac, setFrac]       = useState(0);   // 0–1 drag fraction
  const [dragging, setDrag]   = useState(false);
  const [done, setDone]       = useState(false);
  const [fadeOut, setFO]      = useState(false);
  const trackRef  = useRef(null);
  const startRef  = useRef(null);
  const THUMB = 64;

  const getMax = () => Math.max(1, (trackRef.current?.offsetWidth||320) - THUMB - 8);

  const onPD = (e) => {
    if (done) return;
    e.currentTarget.setPointerCapture(e.pointerId);
    startRef.current = e.clientX - frac * getMax();
    setDrag(true);
  };
  const onPM = (e) => {
    if (startRef.current===null||done) return;
    const f = Math.max(0, Math.min(1, (e.clientX - startRef.current) / getMax()));
    setFrac(f);
    if (f >= 0.93 && !done) {
      setDone(true); setFrac(1);
      setTimeout(()=>{ setFO(true); setTimeout(onUnlock,380); }, 280);
    }
  };
  const onPU = () => { if (!done) setFrac(0); startRef.current=null; setDrag(false); };

  return (
    <div style={{
      position:'fixed',inset:0,zIndex:9998,
      background:'linear-gradient(160deg,#080616,#13102a 52%,#0a0820)',
      display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
      fontFamily:"'Plus Jakarta Sans',sans-serif",overflow:'hidden',
      opacity:fadeOut?0:1,transition:'opacity .38s ease',
    }}>
      {/* Ambient */}
      <div style={{position:'absolute',top:'14%',right:'9%',width:210,height:210,borderRadius:'50%',
        background:'radial-gradient(circle,rgba(139,92,246,.15),transparent 68%)',
        animation:'float 5s ease infinite',pointerEvents:'none'}}/>
      <div style={{position:'absolute',bottom:'20%',left:'7%',width:170,height:170,borderRadius:'50%',
        background:'radial-gradient(circle,rgba(236,72,153,.1),transparent 68%)',
        animation:'float 4s ease infinite reverse',pointerEvents:'none'}}/>

      {/* Hero */}
      <div style={{textAlign:'center',marginBottom:56,animation:'splashFade .6s ease .1s both'}}>
        <div style={{fontSize:64,marginBottom:10,
          filter:'drop-shadow(0 0 22px rgba(139,92,246,.55))'}}>⭐</div>
        <div style={{fontSize:34,fontWeight:900,letterSpacing:-1,
          background:'linear-gradient(100deg,#c4b5fd,#a78bfa,#ec4899)',
          WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',marginBottom:8}}>
          Welcome to Wish
        </div>
        <div style={{fontSize:14,color:'rgba(255,255,255,.38)',fontWeight:500,lineHeight:1.6}}>
          Your earning journey starts here
        </div>
      </div>

      {/* Slide track */}
      <div ref={trackRef} style={{
        width:'78%',maxWidth:340,height:72,borderRadius:99,
        background:'rgba(139,92,246,.07)',
        border:'1px solid rgba(139,92,246,.2)',
        position:'relative',overflow:'hidden',
        boxShadow:'inset 0 2px 12px rgba(0,0,0,.3), 0 4px 24px rgba(0,0,0,.25)',
        animation:'splashFade .6s ease .3s both',
      }}>
        {/* Progress fill */}
        <div style={{
          position:'absolute',top:0,left:0,bottom:0,
          width:`calc(${frac*100}% + 36px)`,
          background:`linear-gradient(90deg,rgba(139,92,246,.3),rgba(139,92,246,.1))`,
          borderRadius:99,
          transition:dragging?'none':'width .35s cubic-bezier(.34,1.56,.64,1)',
        }}/>
        {/* Label */}
        <div style={{
          position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',
          fontSize:14,fontWeight:700,letterSpacing:.8,userSelect:'none',pointerEvents:'none',
          color:`rgba(255,255,255,${Math.max(.15, .6 - frac*.7)})`,
          transition:'color .1s',
        }}>
          {done?'Opening…':'Slide to Open  ›'}
        </div>
        {/* Thumb */}
        <div
          onPointerDown={onPD} onPointerMove={onPM}
          onPointerUp={onPU}   onPointerCancel={onPU}
          style={{
            position:'absolute',left:4,top:4,
            width:THUMB,height:THUMB,borderRadius:'50%',
            background: done
              ? 'linear-gradient(135deg,#10b981,#059669)'
              : 'linear-gradient(135deg,#a78bfa,#8b5cf6)',
            boxShadow: done
              ? '0 4px 22px rgba(16,185,129,.55)'
              : '0 4px 22px rgba(139,92,246,.55)',
            display:'flex',alignItems:'center',justifyContent:'center',
            fontSize:26,color:'#fff',fontWeight:700,
            transform:`translateX(${frac*getMax()}px)`,
            transition:dragging?'none':'transform .38s cubic-bezier(.34,1.56,.64,1), background .3s, box-shadow .3s',
            cursor:done?'default':'grab',
            touchAction:'none',userSelect:'none',
            WebkitTapHighlightColor:'transparent',
          }}
        >{done?'✓':'›'}</div>
      </div>

      {/* Hint */}
      <div style={{
        marginTop:22,fontSize:12,color:'rgba(255,255,255,.22)',fontWeight:500,
        animation:'splashFade .6s ease .55s both',
      }}>Drag the button all the way to the right</div>
    </div>
  );
}

/* ═══════════════════════════════════════════════
   SECURITY SETUP
   Shown AFTER successful account creation / sign-in.
   Two independent sections: PIN Code + Fingerprint.
   Each has a checkbox and a dedicated setup button.
   Fingerprint uses WebAuthn platform authenticator.
   All settings are per-user, keyed by user.id.
═══════════════════════════════════════════════ */
function SecuritySetup({ user, onComplete }) {
  const uid = user?.id;

  /* ── What the user wants to enable (checkboxes) ── */
  const [usePin, setUsePin]   = useState(false);
  const [useBio, setUseBio]   = useState(false);

  /* ── Completion state ── */
  const [pinDone, setPinDone] = useState(false);
  const [bioDone, setBioDone] = useState(false);

  /* ── Biometric device support: null=checking, true, false ── */
  const [bioSupp, setBioSupp] = useState(null);

  /* ── PIN modal ── */
  const [pinModal, setPinModal]   = useState(false);
  const [pinStep,  setPinStep]    = useState('enter');  // 'enter' | 'confirm'
  const [pin1,     setPin1]       = useState('');
  const [pin2,     setPin2]       = useState('');
  const [pinHint,  setPinHint]    = useState('');
  const [showHintI,setShowHintI]  = useState(false);
  const [pinShake, setPinShake]   = useState(false);
  const [pinSaving,setPinSaving]  = useState(false);
  const [pinErr,   setPinErr]     = useState('');
  const [pinVis,   setPinVis]     = useState(false);

  /* ── Biometric setup ── */
  const [bioLoading, setBioLoading] = useState(false);
  const [bioMsg,     setBioMsg]     = useState('');
  const [bioMsgType, setBioMsgType] = useState('info'); // 'success' | 'error'

  /* ── General error ── */
  const [error, setError] = useState('');

  /* Async platform check on mount */
  useEffect(()=>{
    Security.checkPlatformBio().then(ok=>setBioSupp(ok)).catch(()=>setBioSupp(false));
  },[]);

  const doShake = ()=>{ setPinShake(true); setTimeout(()=>setPinShake(false),620); };

  /* ── PIN Modal handlers ── */
  const openPinModal = ()=>{
    setPin1(''); setPin2(''); setPinStep('enter'); setPinErr(''); setPinSaving(false);
    setPinModal(true);
  };
  const closePinModal = ()=>{
    setPinModal(false); setPin1(''); setPin2(''); setPinStep('enter'); setPinErr('');
  };
  const onPinKey = (k)=>{
    if (pinSaving) return;
    if (pinStep==='enter'){
      if(k==='⌫'){ setPin1(p=>p.slice(0,-1)); return; }
      if(pin1.length<4) setPin1(p=>p+k);
    } else {
      if(k==='⌫'){ setPin2(p=>p.slice(0,-1)); return; }
      if(pin2.length<4) setPin2(p=>p+k);
    }
  };
  /* Auto-advance enter → confirm */
  useEffect(()=>{
    if(pinStep==='enter'&&pin1.length===4) setTimeout(()=>setPinStep('confirm'),230);
  },[pin1]);
  /* Auto-verify at 4 confirm digits */
  useEffect(()=>{
    if(pinStep!=='confirm'||pin2.length!==4||pinSaving) return;
    setPinSaving(true);
    if(pin1===pin2){
      Security.hashPin(pin1).then(hash=>{
        Security.saveUser(uid,'pin_hash',hash);
        if(pinHint.trim()) Security.saveUser(uid,'pin_hint',pinHint.trim());
        setPinSaving(false); setPinDone(true); closePinModal();
      });
    } else {
      doShake(); setPinErr('PINs do not match. Try again.');
      setTimeout(()=>{ setPin2(''); setPinErr(''); setPinSaving(false); },1700);
    }
  },[pin2]);

  /* ── Biometric setup via WebAuthn ── */
  const handleBioSetup = async ()=>{
    setBioLoading(true); setBioMsg('');
    const res = await Security.setupBiometric(uid);
    setBioLoading(false);
    if(res.success){
      Security.saveUser(uid,'has_bio',true);
      setBioDone(true);
      setBioMsgType('success'); setBioMsg('Fingerprint set up successfully!');
    } else {
      setBioMsgType('error');
      if(res.error==='cancelled')   setBioMsg('Setup cancelled. Tap again to retry.');
      else if(res.error==='no_hardware') { setBioMsg('Your device does not support fingerprint authentication.'); setBioSupp(false); }
      else setBioMsg('Fingerprint setup failed. Please try again.');
    }
  };

  /* ── Continue / finalize ── */
  const handleContinue = ()=>{
    if(usePin&&!pinDone){ setError('Please complete your PIN setup first.'); return; }
    if(useBio&&!bioDone){ setError('Please complete fingerprint setup first.'); return; }
    setError('');
    Security.saveUser(uid,'security_done',true);
    Security.save('first_launch','1');
    onComplete();
  };

  const BG = {position:'fixed',inset:0,zIndex:9997,background:'linear-gradient(160deg,#080616,#13102a 52%,#0a0820)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'flex-start',fontFamily:"'Plus Jakarta Sans',sans-serif",padding:'60px 24px 40px',overflow:'auto'};
  const ORBS = <>
    <div style={{position:'absolute',top:'6%',right:'5%',width:200,height:200,borderRadius:'50%',background:'radial-gradient(circle,rgba(139,92,246,.15),transparent 68%)',animation:'float 5s ease infinite',pointerEvents:'none'}}/>
    <div style={{position:'absolute',bottom:'8%',left:'5%',width:160,height:160,borderRadius:'50%',background:'radial-gradient(circle,rgba(236,72,153,.1),transparent 68%)',animation:'float 4s ease infinite reverse',pointerEvents:'none'}}/>
  </>;

  /* ── PIN Modal overlay ── */
  const PinModalEl = pinModal&&(
    <div style={{position:'fixed',inset:0,zIndex:9999,background:'rgba(0,0,0,.88)',display:'flex',alignItems:'center',justifyContent:'center',padding:24,backdropFilter:'blur(8px)'}}>
      <div style={{background:'linear-gradient(160deg,#13102a,#0d0b1e)',border:'1px solid rgba(139,92,246,.3)',borderRadius:24,padding:'28px 20px',width:'100%',maxWidth:340,display:'flex',flexDirection:'column',alignItems:'center'}}>
        {/* Modal header */}
        <div style={{width:'100%',display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
          <div style={{fontSize:16,fontWeight:800,color:'#fff'}}>{pinStep==='enter'?'Create PIN':'Confirm PIN'}</div>
          <button onClick={closePinModal} style={{background:'none',border:'none',color:'rgba(255,255,255,.4)',fontSize:20,cursor:'pointer',lineHeight:1,fontFamily:'inherit'}}>✕</button>
        </div>
        {/* Step dots */}
        <div style={{display:'flex',gap:8,marginBottom:20}}>
          {['enter','confirm'].map((s,i)=>(
            <div key={s} style={{height:6,borderRadius:99,width:pinStep===s?24:6,background:pinStep===s||i===0?'#a78bfa':'rgba(255,255,255,.15)',transition:'all .3s'}}/>
          ))}
        </div>
        <div style={{fontSize:13,color:'rgba(255,255,255,.38)',marginBottom:24,textAlign:'center'}}>
          {pinStep==='enter'?'Choose a 4-digit PIN to protect your account':'Re-enter the same PIN to confirm'}
        </div>
        <PinDots filled={pinStep==='enter'?pin1.length:pin2.length} shake={pinShake} visible={pinVis} raw={pinStep==='enter'?pin1:pin2}/>
        {pinErr
          ?<div style={{marginTop:14,fontSize:13,color:'#ef4444',fontWeight:600,textAlign:'center',animation:'splashFade .3s ease'}}>⚠ {pinErr}</div>
          :<button onClick={()=>setPinVis(v=>!v)} style={{marginTop:12,background:'none',border:'none',color:'rgba(255,255,255,.28)',fontSize:12,cursor:'pointer',fontFamily:'inherit'}}>
            {pinVis?'🙈 Hide PIN':'👁 Show PIN'}
          </button>
        }
        {pinStep==='enter'&&(
          <div style={{marginTop:14,width:'100%'}}>
            {!showHintI
              ?<button onClick={()=>setShowHintI(true)} style={{background:'none',border:'none',color:'rgba(255,255,255,.22)',fontSize:12,cursor:'pointer',fontFamily:'inherit',display:'block',margin:'0 auto'}}>+ Add PIN hint (optional)</button>
              :<input value={pinHint} onChange={e=>setPinHint(e.target.value)} maxLength={40} placeholder="e.g. Favourite year…"
                  style={{width:'100%',background:'rgba(139,92,246,.07)',border:'1px solid rgba(139,92,246,.22)',borderRadius:11,padding:'10px 14px',color:'#fff',fontSize:13,outline:'none',fontFamily:'inherit',textAlign:'center'}}/>
            }
          </div>
        )}
        <div style={{marginTop:22}}><PinKeypad onKey={onPinKey} disabled={pinSaving}/></div>
      </div>
    </div>
  );

  return (
    <div style={BG}>
      {ORBS}
      {PinModalEl}

      {/* Header */}
      <div style={{width:76,height:76,borderRadius:24,marginBottom:16,background:'linear-gradient(135deg,rgba(139,92,246,.22),rgba(236,72,153,.14))',border:'1px solid rgba(139,92,246,.32)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:38,boxShadow:'0 8px 32px rgba(139,92,246,.22)',flexShrink:0}}>🔐</div>
      <div style={{fontSize:22,fontWeight:800,color:'#fff',marginBottom:6,textAlign:'center'}}>Secure Your Account</div>
      <div style={{fontSize:13,color:'rgba(255,255,255,.38)',marginBottom:28,textAlign:'center',lineHeight:1.6,maxWidth:290}}>
        Add extra security to protect your account.<br/>Both options are optional.
      </div>

      {/* ── PIN Code section ── */}
      <div style={{width:'100%',maxWidth:340,display:'flex',flexDirection:'column',gap:14,marginBottom:24}}>
        <div style={{background:'rgba(255,255,255,.04)',border:`1.5px solid ${usePin?'rgba(139,92,246,.45)':'rgba(255,255,255,.1)'}`,borderRadius:18,padding:'18px 20px',transition:'all .2s',boxShadow:usePin?'0 0 22px rgba(139,92,246,.15)':'none'}}>
          {/* Checkbox row */}
          <div style={{display:'flex',alignItems:'center',gap:12,cursor:'pointer',marginBottom:usePin?14:0}} onClick={()=>{ setUsePin(p=>!p); setError(''); }}>
            <div style={{width:26,height:26,borderRadius:8,background:usePin?'linear-gradient(135deg,#8b5cf6,#6d28d9)':'rgba(255,255,255,.08)',border:`2px solid ${usePin?'#8b5cf6':'rgba(255,255,255,.2)'}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,color:'#fff',transition:'all .2s',flexShrink:0}}>
              {usePin?'✓':''}
            </div>
            <div style={{flex:1}}>
              <div style={{fontSize:15,fontWeight:700,color:usePin?'#a78bfa':'#fff'}}>🔢 Use PIN Code</div>
              <div style={{fontSize:12,color:'rgba(255,255,255,.35)',marginTop:2}}>4-digit secret code</div>
            </div>
            {pinDone&&<div style={{background:'rgba(16,185,129,.15)',border:'1px solid rgba(16,185,129,.3)',borderRadius:20,padding:'3px 10px',fontSize:11,color:'#34d399',fontWeight:700,flexShrink:0}}>✓ Set</div>}
          </div>
          {/* Set PIN button */}
          {usePin&&(
            <button onClick={openPinModal} style={{width:'100%',background:pinDone?'rgba(16,185,129,.1)':'linear-gradient(135deg,rgba(139,92,246,.22),rgba(109,40,217,.22))',border:`1px solid ${pinDone?'rgba(16,185,129,.3)':'rgba(139,92,246,.35)'}`,borderRadius:13,padding:'13px',color:pinDone?'#34d399':'#a78bfa',fontSize:14,fontWeight:700,cursor:'pointer',fontFamily:'inherit',transition:'all .2s'}}>
              {pinDone?'✓ PIN Configured — Change PIN':'Set PIN Code'}
            </button>
          )}
        </div>

        {/* ── Fingerprint section (only if device may support it) ── */}
        {bioSupp!==false&&(
          <div style={{background:'rgba(255,255,255,.04)',border:`1.5px solid ${useBio?'rgba(139,92,246,.45)':'rgba(255,255,255,.1)'}`,borderRadius:18,padding:'18px 20px',transition:'all .2s',boxShadow:useBio?'0 0 22px rgba(139,92,246,.15)':'none'}}>
            {/* Checkbox row */}
            <div style={{display:'flex',alignItems:'center',gap:12,cursor:bioSupp===null?'default':'pointer',marginBottom:useBio?14:0,opacity:bioSupp===null?.65:1}} onClick={()=>{ if(bioSupp) { setUseBio(p=>!p); setError(''); } }}>
              <div style={{width:26,height:26,borderRadius:8,background:useBio?'linear-gradient(135deg,#8b5cf6,#6d28d9)':'rgba(255,255,255,.08)',border:`2px solid ${useBio?'#8b5cf6':'rgba(255,255,255,.2)'}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,color:'#fff',transition:'all .2s',flexShrink:0}}>
                {useBio?'✓':''}
              </div>
              <div style={{flex:1}}>
                <div style={{fontSize:15,fontWeight:700,color:useBio?'#a78bfa':'#fff'}}>👆 Use Fingerprint</div>
                <div style={{fontSize:12,color:'rgba(255,255,255,.35)',marginTop:2}}>
                  {bioSupp===null?'Checking device support…':'Fingerprint / Face ID'}
                </div>
              </div>
              {bioDone&&<div style={{background:'rgba(16,185,129,.15)',border:'1px solid rgba(16,185,129,.3)',borderRadius:20,padding:'3px 10px',fontSize:11,color:'#34d399',fontWeight:700,flexShrink:0}}>✓ Set</div>}
            </div>
            {/* Set Up Fingerprint button */}
            {useBio&&(
              <>
                <button onClick={handleBioSetup} disabled={bioLoading||bioDone}
                  style={{width:'100%',background:bioDone?'rgba(16,185,129,.1)':bioLoading?'rgba(139,92,246,.07)':'linear-gradient(135deg,rgba(139,92,246,.22),rgba(109,40,217,.22))',border:`1px solid ${bioDone?'rgba(16,185,129,.3)':bioLoading?'rgba(139,92,246,.2)':'rgba(139,92,246,.35)'}`,borderRadius:13,padding:'13px',color:bioDone?'#34d399':bioLoading?'rgba(255,255,255,.45)':'#a78bfa',fontSize:14,fontWeight:700,cursor:bioLoading||bioDone?'default':'pointer',fontFamily:'inherit',display:'flex',alignItems:'center',justifyContent:'center',gap:8,transition:'all .2s'}}>
                  {bioLoading&&<div style={{width:16,height:16,borderRadius:'50%',border:'2px solid #8b5cf6',borderTopColor:'transparent',animation:'spin 1s linear infinite',flexShrink:0}}/>}
                  {bioDone?'✓ Fingerprint Configured':bioLoading?'Waiting for biometric…':'Set Up Fingerprint'}
                </button>
                {bioMsg&&(
                  <div style={{marginTop:10,padding:'8px 14px',borderRadius:10,background:bioMsgType==='success'?'rgba(16,185,129,.1)':'rgba(239,68,68,.1)',border:`1px solid ${bioMsgType==='success'?'rgba(16,185,129,.25)':'rgba(239,68,68,.25)'}`,fontSize:12,color:bioMsgType==='success'?'#34d399':'#f87171',textAlign:'center'}}>
                    {bioMsgType==='success'?'✓ ':'⚠ '}{bioMsg}
                  </div>
                )}
              </>
            )}
          </div>
        )}

        <div style={{textAlign:'center',fontSize:12,color:'rgba(255,255,255,.22)',marginTop:-4}}>
          You can skip both options and add security later in Settings
        </div>
      </div>

      {error&&<div style={{marginBottom:14,fontSize:13,color:'#ef4444',fontWeight:600,textAlign:'center',animation:'splashFade .25s ease'}}>⚠ {error}</div>}

      <button onClick={handleContinue} style={{width:'100%',maxWidth:340,background:'linear-gradient(135deg,#8b5cf6,#6d28d9)',border:'none',borderRadius:14,padding:'15px',color:'#fff',fontWeight:800,fontSize:15,cursor:'pointer',boxShadow:'0 6px 24px rgba(139,92,246,.4)',flexShrink:0}}>
        Continue →
      </button>
    </div>
  );
}

/* ═══════════════════════════════════════════════
   UNLOCK SCREEN
   Shown when a returning user already has security set up.
   Per-user: reads/writes Security.loadUser(uid, …).
   Supports PIN keypad + Fingerprint / Face ID button.
   Escalating lockout: 30s → 60s → 2m → 5m per wave.
═══════════════════════════════════════════════ */
function UnlockScreen({ user, onUnlock }) {
  const uid    = user?.id;
  const hasPin = uid && !!Security.loadUser(uid,'pin_hash',null);
  const hasBio = uid &&  Security.loadUser(uid,'has_bio',false);
  const hint   = uid ?   Security.loadUser(uid,'pin_hint',null) : null;

  const [pin, setPin]       = useState('');
  const [error, setError]   = useState('');
  const [shake, setShake]   = useState(false);
  const [verifying, setVfy] = useState(false);
  const [visible, setVis]   = useState(false);
  const [showHint, setSH]   = useState(false);
  const [bioMsg,     setBioMsg]     = useState('');
  const [bioLoading, setBioLoading] = useState(false);
  const [failed, setFailed] = useState(()=> uid ? Security.loadUser(uid,'failed_pin',0) : 0);
  const [lockUntil, setLU]  = useState(()=> uid ? Security.loadUser(uid,'lock_until',0) : 0);
  const [now, setNow]       = useState(()=>Date.now());

  const isLocked = lockUntil > now;
  const secsLeft = Math.max(0, Math.ceil((lockUntil - now)/1000));

  /* Escalating lockout durations (ms) */
  const lockDur = (n) => n>=8?300000 : n>=7?120000 : n>=6?60000 : 30000;

  /* Tick every 500ms while locked */
  useEffect(()=>{
    if (!isLocked) return;
    const iv=setInterval(()=>{
      const n=Date.now(); setNow(n);
      if (lockUntil<=n){
        setFailed(0); Security.saveUser(uid,'failed_pin',0);
        setLU(0);     Security.saveUser(uid,'lock_until',0);
        setError('');
      }
    },500);
    return()=>clearInterval(iv);
  },[lockUntil,isLocked]);

  /* Auto-verify at 4 digits */
  useEffect(()=>{
    if (pin.length!==4||verifying||isLocked) return;
    setVfy(true);
    Security.verifyPin(pin, Security.loadUser(uid,'pin_hash')).then(ok=>{
      if (ok){
        Security.saveUser(uid,'failed_pin',0); Security.saveUser(uid,'lock_until',0);
        setPin(''); setVfy(false); onUnlock();
      } else {
        const nf=failed+1;
        setFailed(nf); Security.saveUser(uid,'failed_pin',nf);
        const msg=nf>=5
          ? 'Too many attempts. Temporarily locked.'
          : `Incorrect PIN. ${5-nf} attempt${5-nf===1?'':'s'} left.`;
        if (nf>=5){ const u2=Date.now()+lockDur(nf); setLU(u2); Security.saveUser(uid,'lock_until',u2); }
        setShake(true); setError(msg);
        setTimeout(()=>{ setShake(false); setPin(''); setError(''); setVfy(false); },1700);
      }
    });
  },[pin]);

  const onKey=(k)=>{
    if (verifying||isLocked) return;
    if (k==='⌫'){ setPin(p=>p.slice(0,-1)); setError(''); return; }
    if (pin.length<4) setPin(p=>p+k);
  };

  /* Biometric unlock via WebAuthn platform authenticator.
     Native (Expo): swap Security.authenticateBiometric() for:
       import * as LA from 'expo-local-authentication';
       const r = await LA.authenticateAsync({ promptMessage:'Unlock Wish' });
       if (r.success) onUnlock(); */
  const tryBiometric = async ()=>{
    if (bioLoading) return;
    setBioMsg(''); setBioLoading(true);
    const res = await Security.authenticateBiometric(uid);
    setBioLoading(false);
    if (res.success){
      onUnlock();
    } else if (res.error==='cancelled'){
      setBioMsg('Authentication cancelled.');
      setTimeout(()=>setBioMsg(''),3000);
    } else if (res.error==='no_credential'){
      setBioMsg('Biometric not configured. Please use your PIN.');
      setTimeout(()=>setBioMsg(''),4000);
    } else {
      setBioMsg('Fingerprint not recognized. Please try again.');
      setTimeout(()=>setBioMsg(''),3000);
    }
  };

  return (
    <div style={{
      position:'fixed',inset:0,zIndex:9997,
      background:'linear-gradient(160deg,#080616,#13102a 52%,#0a0820)',
      fontFamily:"'Plus Jakarta Sans',sans-serif",
      overflowY:'auto',overflowX:'hidden',
    }}>
      {/* Ambient orbs — decorative only, pointer-events off */}
      <div style={{position:'fixed',top:'8%',left:'5%',width:160,height:160,borderRadius:'50%',background:'radial-gradient(circle,rgba(139,92,246,.14),transparent 68%)',animation:'float 5s ease infinite',pointerEvents:'none'}}/>
      <div style={{position:'fixed',bottom:'10%',right:'5%',width:120,height:120,borderRadius:'50%',background:'radial-gradient(circle,rgba(236,72,153,.09),transparent 68%)',animation:'float 4s ease infinite reverse',pointerEvents:'none'}}/>

      {/* Scrollable content column */}
      <div style={{
        minHeight:'100%',display:'flex',flexDirection:'column',alignItems:'center',
        justifyContent:'center',padding:'24px 20px 32px',boxSizing:'border-box',
      }}>

        {/* ── Greeting row (avatar + name inline, compact) ── */}
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:16,animation:'splashFade .5s ease both'}}>
          <div style={{width:40,height:40,borderRadius:'50%',background:'linear-gradient(135deg,#8b5cf6,#ec4899)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:17,fontWeight:800,color:'#fff',flexShrink:0,boxShadow:'0 3px 14px rgba(139,92,246,.4)'}}>
            {user?.name?.[0]?.toUpperCase()||'U'}
          </div>
          <div style={{fontSize:14,fontWeight:700,color:'#fff'}}>Hi, {user?.name?.split(' ')[0]||'Welcome back'}!</div>
        </div>

        {/* ── Lock icon + title ── */}
        <div style={{
          width:64,height:64,borderRadius:20,marginBottom:12,
          background:isLocked?'linear-gradient(135deg,rgba(239,68,68,.22),rgba(185,28,28,.14))':'linear-gradient(135deg,rgba(139,92,246,.22),rgba(236,72,153,.14))',
          border:`1px solid ${isLocked?'rgba(239,68,68,.3)':'rgba(139,92,246,.3)'}`,
          display:'flex',alignItems:'center',justifyContent:'center',fontSize:32,
          boxShadow:`0 6px 24px ${isLocked?'rgba(239,68,68,.2)':'rgba(139,92,246,.2)'}`,
          transition:'all .4s ease',
        }}>
          {isLocked?'🔒':'🔓'}
        </div>

        <div style={{fontSize:20,fontWeight:800,color:'#fff',marginBottom:4,textAlign:'center'}}>
          {isLocked?'App Locked':'Enter your PIN'}
        </div>
        <div style={{fontSize:12,color:'rgba(255,255,255,.38)',marginBottom:isLocked?14:18,textAlign:'center',lineHeight:1.5}}>
          {isLocked?'Too many failed attempts — please wait':'Enter your 4-digit PIN to continue'}
        </div>

        {/* ── Lockout countdown ── */}
        {isLocked&&(
          <div style={{width:80,height:80,borderRadius:'50%',marginBottom:20,border:'3px solid rgba(239,68,68,.35)',background:'rgba(239,68,68,.08)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',boxShadow:'0 0 26px rgba(239,68,68,.2)'}}>
            <div style={{fontSize:26,fontWeight:800,color:'#ef4444',fontFamily:'monospace'}}>{secsLeft}</div>
            <div style={{fontSize:9,color:'rgba(239,68,68,.6)',letterSpacing:.5}}>SEC</div>
          </div>
        )}

        {/* ── PIN entry ── */}
        {!isLocked&&hasPin&&(<>
          <PinDots filled={pin.length} shake={shake} visible={visible} raw={pin}/>

          {/* Error or show/hint toggles */}
          <div style={{height:28,display:'flex',alignItems:'center',justifyContent:'center',gap:16,marginTop:6}}>
            {error
              ?<div style={{fontSize:12,color:'#ef4444',fontWeight:600,animation:'splashFade .3s ease'}}>⚠ {error}</div>
              :<>
                <button onClick={()=>setVis(v=>!v)} style={{background:'none',border:'none',color:'rgba(255,255,255,.3)',fontSize:11,cursor:'pointer',fontFamily:'inherit'}}>
                  {visible?'🙈 Hide':'👁 Show'}
                </button>
                {hint&&<button onClick={()=>setSH(s=>!s)} style={{background:'none',border:'none',color:'rgba(255,255,255,.25)',fontSize:11,cursor:'pointer',fontFamily:'inherit'}}>💡 Hint</button>}
              </>
            }
          </div>
          {showHint&&hint&&(
            <div style={{marginBottom:8,background:'rgba(245,158,11,.1)',border:'1px solid rgba(245,158,11,.22)',borderRadius:10,padding:'6px 14px',fontSize:11,color:'#f59e0b',textAlign:'center'}}>💡 {hint}</div>
          )}

          {/* Keypad — responsive button size via vw */}
          <div style={{marginTop:14,width:'100%',maxWidth:300}}>
            <PinKeypad onKey={onKey} disabled={verifying}/>
          </div>

          {/* Failed-attempt pips */}
          {failed>0&&failed<5&&(
            <div style={{marginTop:12,display:'flex',gap:6,justifyContent:'center'}}>
              {[0,1,2,3,4].map(i=>(
                <div key={i} style={{width:8,height:8,borderRadius:'50%',background:i<failed?'#ef4444':'rgba(255,255,255,.15)',transition:'background .3s'}}/>
              ))}
            </div>
          )}
        </>)}

        {/* ── Biometric button ── */}
        {!isLocked&&hasBio&&(
          <>
            {hasPin&&(
              <div style={{display:'flex',alignItems:'center',gap:10,width:'100%',maxWidth:280,margin:'14px 0 10px'}}>
                <div style={{flex:1,height:1,background:'rgba(255,255,255,.1)'}}/>
                <span style={{fontSize:11,color:'rgba(255,255,255,.28)',letterSpacing:.5}}>or</span>
                <div style={{flex:1,height:1,background:'rgba(255,255,255,.1)'}}/>
              </div>
            )}
            <button onClick={tryBiometric} disabled={bioLoading}
              style={{width:'100%',maxWidth:280,display:'flex',alignItems:'center',justifyContent:'center',gap:10,
                background:bioLoading?'rgba(139,92,246,.06)':'rgba(139,92,246,.1)',
                border:'1px solid rgba(139,92,246,.28)',borderRadius:16,
                padding:'13px 20px',color:'#a78bfa',fontSize:14,fontWeight:700,
                cursor:bioLoading?'default':'pointer',fontFamily:'inherit',
                boxShadow:'0 3px 14px rgba(139,92,246,.16)',transition:'all .2s',
              }}>
              {bioLoading
                ?<><div style={{width:18,height:18,borderRadius:'50%',border:'2px solid #8b5cf6',borderTopColor:'transparent',animation:'spin 1s linear infinite',flexShrink:0}}/> Waiting…</>
                :<><span style={{fontSize:24}}>👆</span> Use Fingerprint / Face ID</>
              }
            </button>
          </>
        )}

        {/* Biometric status message */}
        {bioMsg&&(
          <div style={{marginTop:10,background:'rgba(139,92,246,.1)',border:'1px solid rgba(139,92,246,.2)',borderRadius:10,padding:'8px 14px',fontSize:11,color:'#a78bfa',maxWidth:280,textAlign:'center',animation:'splashFade .3s ease'}}>
            ℹ️ {bioMsg}
          </div>
        )}

      </div>{/* end content column */}
    </div>
  );
}

/* ═══════════════════════════════════════════════
   SECURITY SETTINGS VIEW
   Rendered inside the MainApp sidebar overlay.
   Allows users to change PIN and toggle biometric.
   Changing PIN requires verifying the current PIN first.
═══════════════════════════════════════════════ */
function SecuritySettingsView({ user }) {
  const uid = user?.id;
  const [hasPin, setHasPin]   = useState(()=> uid&&!!Security.loadUser(uid,'pin_hash',null));
  const [hasBio, setHasBio]   = useState(()=> uid&&Security.loadUser(uid,'has_bio',false));
  const [mode, setMode]       = useState('view');  // view|verifyPin|newPin|confirmPin
  const [oldPin, setOP]       = useState('');
  const [newPin, setNP]       = useState('');
  const [confPin, setCP]      = useState('');
  const [error, setError]     = useState('');
  const [shake, setShake]     = useState(false);
  const [msg, setMsg]         = useState('');
  const [verifying, setVfy]   = useState(false);
  const [bioLoading, setBioL] = useState(false);
  const [bioSupp, setBioSupp] = useState(null);

  useEffect(()=>{
    Security.checkPlatformBio().then(ok=>setBioSupp(ok)).catch(()=>setBioSupp(false));
  },[]);

  const doShake = ()=>{ setShake(true); setTimeout(()=>setShake(false),620); };
  const showMsg = (m)=>{ setMsg(m); setTimeout(()=>setMsg(''),3000); };
  const reset   = ()=>{ setMode('view'); setOP(''); setNP(''); setCP(''); setError(''); setVfy(false); };

  const onKey=(k)=>{
    if (verifying) return;
    const map={verifyPin:[oldPin,setOP],newPin:[newPin,setNP],confirmPin:[confPin,setCP]};
    const [val,setVal]=map[mode]||[];
    if(!setVal) return;
    if(k==='⌫'){setVal(p=>p.slice(0,-1));return;}
    if(val.length<4) setVal(p=>p+k);
  };

  /* Verify current PIN */
  useEffect(()=>{
    if(mode!=='verifyPin'||oldPin.length!==4||verifying) return;
    setVfy(true);
    Security.verifyPin(oldPin, Security.loadUser(uid,'pin_hash')).then(ok=>{
      if(ok){ setOP(''); setMode('newPin'); setError(''); setVfy(false); }
      else{ doShake(); setError('Incorrect current PIN.'); setTimeout(()=>{setOP('');setError('');setVfy(false);},1700); }
    });
  },[oldPin]);

  /* Auto-advance to confirm */
  useEffect(()=>{
    if(mode==='newPin'&&newPin.length===4) setTimeout(()=>setMode('confirmPin'),230);
  },[newPin]);

  /* Validate and save new PIN */
  useEffect(()=>{
    if(mode!=='confirmPin'||confPin.length!==4||verifying) return;
    setVfy(true);
    if(newPin===confPin){
      Security.hashPin(newPin).then(hash=>{
        Security.saveUser(uid,'pin_hash',hash);
        setNP(''); setCP(''); setHasPin(true);
        showMsg('PIN changed successfully!'); reset();
      });
    } else {
      doShake(); setError('PINs do not match.');
      setTimeout(()=>{setCP('');setError('');setVfy(false);},1700);
    }
  },[confPin]);

  const currentPin={verifyPin:oldPin,newPin:newPin,confirmPin:confPin}[mode]||'';
  const pinTitles={verifyPin:'Enter current PIN',newPin:'Enter new PIN',confirmPin:'Confirm new PIN'};

  /* ── Inline PIN entry (change PIN flow) ── */
  if (mode!=='view') return (
    <div style={{flex:1,overflowY:'auto',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'0 24px 40px'}}>
      <div style={{fontSize:14,fontWeight:700,color:C.white,marginBottom:32,textAlign:'center'}}>{pinTitles[mode]}</div>
      <PinDots filled={currentPin.length} shake={shake} visible={false}/>
      {error&&<div style={{marginTop:14,fontSize:13,color:C.red,fontWeight:600,textAlign:'center',animation:'splashFade .3s ease'}}>⚠ {error}</div>}
      <div style={{marginTop:28}}><PinKeypad onKey={onKey} disabled={verifying}/></div>
      <button onClick={reset} style={{marginTop:20,background:'none',border:'none',color:C.muted,fontSize:13,cursor:'pointer',fontFamily:'inherit'}}>Cancel</button>
    </div>
  );

  /* ── Settings view ── */
  return (
    <div style={{flex:1,overflowY:'auto',padding:'16px 16px 32px'}}>
      {msg&&<div style={{background:'rgba(16,185,129,.15)',border:`1px solid rgba(16,185,129,.3)`,borderRadius:12,padding:'10px 16px',fontSize:13,color:C.green,marginBottom:16,textAlign:'center',fontWeight:600}}>✓ {msg}</div>}

      {/* PIN section */}
      <div style={{fontSize:11,fontWeight:700,color:C.muted,textTransform:'uppercase',letterSpacing:.1,marginBottom:10}}>PIN Code</div>
      <div style={{background:C.s2,borderRadius:16,marginBottom:20,border:`1px solid ${C.border}`,padding:'16px'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:hasPin?12:0}}>
          <div>
            <div style={{fontSize:15,fontWeight:700,color:C.white}}>4-Digit PIN</div>
            <div style={{fontSize:12,color:C.muted,marginTop:2}}>{hasPin?'Active — tap to change':'Not configured'}</div>
          </div>
          <div style={{fontSize:11,fontWeight:700,color:hasPin?C.green:C.red,background:hasPin?'rgba(16,185,129,.15)':'rgba(239,68,68,.15)',borderRadius:6,padding:'3px 9px'}}>{hasPin?'✓ ON':'✗ OFF'}</div>
        </div>
        {hasPin&&(
          <button onClick={()=>setMode('verifyPin')} style={{width:'100%',background:'rgba(139,92,246,.12)',border:`1px solid rgba(139,92,246,.25)`,borderRadius:10,padding:'10px',color:C.brandLt,fontSize:13,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>
            🔄 Change PIN
          </button>
        )}
        {!hasPin&&(
          <button onClick={()=>setMode('newPin')} style={{width:'100%',background:C.brand,border:'none',borderRadius:10,padding:'10px',color:'#fff',fontSize:13,fontWeight:700,cursor:'pointer',fontFamily:'inherit',marginTop:12}}>
            + Set Up PIN
          </button>
        )}
      </div>

      {/* Biometric section */}
      <div style={{fontSize:11,fontWeight:700,color:C.muted,textTransform:'uppercase',letterSpacing:.1,marginBottom:10}}>Biometric</div>
      <div style={{background:C.s2,borderRadius:16,marginBottom:20,border:`1px solid ${C.border}`,padding:'16px'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:(hasBio||bioSupp===false)?0:12}}>
          <div>
            <div style={{fontSize:15,fontWeight:700,color:C.white}}>Fingerprint / Face ID</div>
            <div style={{fontSize:12,color:C.muted,marginTop:2}}>
              {bioSupp===false?'Not supported on this device':hasBio?'Active — tap to disable':'Not configured'}
            </div>
          </div>
          {bioSupp!==false&&(
            <button onClick={()=>{ const n=!hasBio; setHasBio(n); Security.saveUser(uid,'has_bio',n); if(!n){Security.removeUser(uid,'bio_cred_id');} }} style={{width:48,height:28,borderRadius:99,border:'none',cursor:'pointer',background:hasBio?'linear-gradient(135deg,#8b5cf6,#6d28d9)':'rgba(255,255,255,.15)',position:'relative',transition:'background .2s',flexShrink:0}}>
              <div style={{position:'absolute',width:22,height:22,borderRadius:'50%',background:'#fff',top:3,left:hasBio?23:3,transition:'left .2s'}}/>
            </button>
          )}
        </div>
        {/* Register / re-register fingerprint via WebAuthn */}
        {bioSupp!==false&&(
          <button onClick={async ()=>{
            setBioL(true);
            const res = await Security.setupBiometric(uid);
            setBioL(false);
            if(res.success){
              Security.saveUser(uid,'has_bio',true);
              setHasBio(true);
              showMsg(hasBio?'Fingerprint re-registered!':'Fingerprint enabled!');
            } else if(res.error==='cancelled'){
              showMsg('Setup cancelled.');
            } else if(res.error==='no_hardware'){
              setBioSupp(false);
              showMsg('No biometric hardware detected.');
            } else {
              showMsg('Fingerprint setup failed. Please try again.');
            }
          }} disabled={bioLoading}
            style={{marginTop:12,width:'100%',background:'rgba(139,92,246,.1)',border:`1px solid rgba(139,92,246,.25)`,borderRadius:10,padding:'10px',color:C.brandLt,fontSize:13,fontWeight:700,cursor:bioLoading?'default':'pointer',fontFamily:'inherit',display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
            {bioLoading
              ?<><div style={{width:14,height:14,borderRadius:'50%',border:'2px solid #8b5cf6',borderTopColor:'transparent',animation:'spin 1s linear infinite'}}/> Waiting for biometric…</>
              :<>👆 {hasBio?'Re-register Fingerprint':'Register Fingerprint'}</>
            }
          </button>
        )}
      </div>

      {/* Info footer */}
      <div style={{background:C.s2,borderRadius:16,padding:14,border:`1px solid ${C.border}`}}>
        <div style={{fontSize:13,color:C.muted,lineHeight:1.7}}>
          🔐 Your security settings are tied to your account (<strong style={{color:C.brandLt}}>{user?.name}</strong>) and stored only on this device. Logging out preserves your settings for your next login.
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════
   ROOT  —  Corrected phase-based router
   ─────────────────────────────────────────────
   Correct flow:
     splash → slide (1st launch) │ auth (returning, no session)
                                 │ unlock (returning, session + security)
                                 │ secSetup (returning, session, no security)
     slide  → auth
     auth   → secSetup (1st security setup) │ app (already secured)
     secSetup → app
     unlock → app
     logout → auth
═══════════════════════════════════════════════ */
function WishApp(){
  const [loggedUser,setLU] = useState(null);
  const [lang,setLang]     = useState("en");

  const handleLogin=(u)=>{ setLU(u); };
  const handleLogout=()=>{ setLU(null); };

  const isAdminUser = loggedUser && (loggedUser.role==="super_admin"||loggedUser.role==="moderator"||loggedUser.isAdmin);
  if(!loggedUser) return <AuthScreen onLogin={handleLogin} lang={lang}/>;
  if(isAdminUser) return <AdminPanel user={loggedUser} onExit={handleLogout} lang={lang}/>;
  return <MainApp user={loggedUser} onLogout={handleLogout} lang={lang} setLang={setLang}/>;
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(WishApp));
</script>
</body>
</html>
