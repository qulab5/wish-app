                <span style={{fontWeight:700,color:C.white,fontSize:14}}>{tpl.name}</span>
                <span style={{
                  fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:99,
                  background:tpl.enabled?"rgba(16,185,129,.13)":"rgba(255,255,255,.06)",
                  color:tpl.enabled?C.green:"rgba(255,255,255,.35)",
                  border:`1px solid ${tpl.enabled?"rgba(16,185,129,.3)":"rgba(255,255,255,.12)"}`,
                }}>{tpl.enabled?"Enabled":"Disabled"}</span>
              </div>
              <div style={{fontSize:12,color:"rgba(255,255,255,.4)",marginTop:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{tpl.description}</div>
              <div style={{fontSize:11,color:"rgba(255,255,255,.25)",marginTop:2}}>Last edited {fmtDate(tpl.updatedAt)}</div>
            </div>

            <div style={{display:"flex",gap:8,flexShrink:0,alignItems:"center"}}>
              <button
                onClick={()=>toggleEnabled(tpl.id)}
                className={`toggle ${tpl.enabled?"on":"off"}`}
                title={tpl.enabled?"Disable this template":"Enable this template"}
                style={{fontSize:0}}
              />
              <button
                onClick={()=>openEditor(tpl)}
                style={{background:`rgba(139,92,246,.12)`,border:`1px solid ${C.border2}`,color:C.brandLt,borderRadius:8,padding:"7px 14px",fontSize:12,fontWeight:700,cursor:"pointer"}}
              >Edit</button>
            </div>
          </div>
        ))}
      </div>
    );
  }

  /* ── Editor view ── */
  const tpl     = templates.find(t=>t.id===editId);
  const vars    = EMAIL_TEMPLATE_VARS[editId]||[];
  const {html:prevHtml,subject:prevSubject} = previewHtml(draft.html,draft.subject);

  return (
    <div style={{display:"flex",flexDirection:"column",gap:0,minHeight:0}}>
      {/* Editor header */}
      <div style={{
        display:"flex",alignItems:"center",gap:10,
        padding:"0 0 16px",borderBottom:`1px solid ${C.border}`,marginBottom:16,
      }}>
        <button onClick={closeEditor} style={{background:"rgba(255,255,255,.07)",border:`1px solid ${C.border}`,color:C.muted,borderRadius:8,padding:"6px 12px",fontSize:12,fontWeight:600,cursor:"pointer"}}>← Back</button>
        <div style={{flex:1}}>
          <div style={{fontWeight:800,color:C.white,fontSize:15,display:"flex",alignItems:"center",gap:8}}>
            <span>{tpl.icon}</span>{tpl.name}
          </div>
          <div style={{fontSize:11,color:"rgba(255,255,255,.35)",marginTop:1}}>{tpl.description}</div>
        </div>
        <div style={{display:"flex",gap:8}}>
          <button
            onClick={()=>setPreview(p=>!p)}
            style={{background:previewMode?`rgba(6,182,212,.15)`:"rgba(255,255,255,.06)",border:`1px solid ${previewMode?"rgba(6,182,212,.4)":C.border}`,color:previewMode?C.cyan:C.muted,borderRadius:8,padding:"7px 13px",fontSize:12,fontWeight:600,cursor:"pointer"}}
          >{previewMode?"✏️ Edit":"👁 Preview"}</button>
          <button
            onClick={()=>setRC(true)}
            style={{background:"rgba(255,255,255,.05)",border:`1px solid ${C.border}`,color:"rgba(255,255,255,.4)",borderRadius:8,padding:"7px 12px",fontSize:12,fontWeight:600,cursor:"pointer"}}
            title="Reset to original default"
          >↺ Reset</button>
          <button
            onClick={saveDraft}
            style={{
              background:saved?`linear-gradient(135deg,${C.green},#047857)`:`linear-gradient(135deg,${C.brand},${C.brandDk})`,
              border:"none",color:"#fff",borderRadius:8,padding:"7px 16px",fontSize:12,fontWeight:700,cursor:"pointer",
              transition:"background .3s",minWidth:70,
            }}
          >{saved?"✓ Saved":"Save"}</button>
        </div>
      </div>

      {previewMode ? (
        /* ── Preview pane ── */
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <div style={{background:"rgba(6,182,212,.07)",border:"1px solid rgba(6,182,212,.2)",borderRadius:10,padding:"10px 14px"}}>
            <span style={{fontSize:11,fontWeight:700,color:"rgba(255,255,255,.35)",marginRight:8}}>SUBJECT</span>
            <span style={{fontSize:13,color:C.white}}>{prevSubject}</span>
          </div>
          <div style={{
            background:"#fff",borderRadius:12,overflow:"hidden",
            border:`1px solid ${C.border}`,
          }}>
            <iframe
              ref={iframeRef}
              title="Email Preview"
              style={{width:"100%",border:"none",minHeight:500,display:"block"}}
              sandbox="allow-same-origin"
            />
          </div>
          <div style={{fontSize:11,color:"rgba(255,255,255,.25)",textAlign:"center"}}>Preview uses sample values for merge tags</div>
        </div>
      ) : (
        /* ── Edit pane ── */
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          {/* Subject */}
          <div>
            <div style={{fontSize:12,fontWeight:600,color:"rgba(255,255,255,.5)",marginBottom:6}}>
              Subject Line
              <span style={{fontWeight:400,color:"rgba(255,255,255,.25)",marginLeft:6,fontSize:11}}>merge tags supported</span>
            </div>
            <input
              id="email-subject"
              className="inp-base"
              value={draft.subject}
              onChange={e=>setDraft(p=>({...p,subject:e.target.value}))}
              placeholder="Email subject…"
            />
          </div>

          {/* Variable reference chips — click to insert into subject */}
          <div>
            <div style={{fontSize:11,fontWeight:700,color:"rgba(255,255,255,.3)",letterSpacing:1,marginBottom:6}}>AVAILABLE MERGE TAGS — click to insert into subject or body</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {vars.map(([tag,desc])=>(
                <div key={tag} style={{display:"flex",gap:0,borderRadius:8,overflow:"hidden",border:`1px solid ${C.border2}`}}>
                  <button
                    onClick={()=>insertVar(tag,"subject")}
                    title={`Insert ${tag} into subject`}
                    style={{background:"rgba(139,92,246,.12)",border:"none",color:C.brandLt,padding:"4px 9px",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"monospace"}}
                  >{tag}</button>
                  <button
                    onClick={()=>insertVar(tag,"html")}
                    title={`Insert ${tag} into body`}
                    style={{background:"rgba(139,92,246,.06)",border:"none",borderLeft:`1px solid ${C.border}`,color:"rgba(255,255,255,.35)",padding:"4px 8px",fontSize:10,cursor:"pointer"}}
                  >body</button>
                  <span style={{padding:"4px 9px",fontSize:11,color:"rgba(255,255,255,.3)",background:"transparent",display:"flex",alignItems:"center"}}>{desc}</span>
                </div>
              ))}
            </div>
          </div>

          {/* HTML body */}
          <div style={{flex:1}}>
            <div style={{fontSize:12,fontWeight:600,color:"rgba(255,255,255,.5)",marginBottom:6}}>
              HTML Body
              <span style={{fontWeight:400,color:"rgba(255,255,255,.25)",marginLeft:6,fontSize:11}}>{draft.html.length.toLocaleString()} chars</span>
            </div>
            <textarea
              id="email-html"
              value={draft.html}
              onChange={e=>setDraft(p=>({...p,html:e.target.value}))}
              spellCheck={false}
              style={{
                width:"100%",minHeight:340,
                background:"rgba(0,0,0,.35)",
                border:`1.5px solid ${C.border2}`,
                color:"#e2e8f0",
                borderRadius:12,padding:"14px 16px",
                fontSize:12,fontFamily:"'DM Mono','Courier New',monospace",
                lineHeight:1.7,
                outline:"none",resize:"vertical",
                transition:"border .2s",
                boxSizing:"border-box",
              }}
              onFocus={e=>e.target.style.borderColor="rgba(139,92,246,.5)"}
              onBlur={e=>e.target.style.borderColor="rgba(139,92,246,.25)"}
            />
          </div>
        </div>
      )}

      {/* Reset confirm */}
      {resetConfirm&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.82)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:999,padding:16}}>
          <div style={{background:C.s2,borderRadius:20,padding:24,maxWidth:300,width:"100%",border:`1px solid ${C.border}`}}>
            <div style={{fontSize:30,textAlign:"center",marginBottom:10}}>↺</div>
            <div style={{fontWeight:700,color:C.white,fontSize:15,textAlign:"center",marginBottom:8}}>Reset to Default?</div>
            <div style={{fontSize:12,color:"rgba(255,255,255,.45)",textAlign:"center",marginBottom:20}}>Your unsaved changes will be lost and the template will be restored to its original content.</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <button onClick={()=>setRC(false)} style={{background:C.s3,border:`1px solid ${C.border}`,borderRadius:12,padding:11,color:C.white,fontWeight:600,cursor:"pointer"}}>Cancel</button>
              <button onClick={resetToDefault} style={{background:`linear-gradient(135deg,${C.brand},${C.brandDk})`,border:"none",borderRadius:12,padding:11,color:"#fff",fontWeight:700,cursor:"pointer"}}>Reset</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ── Rate Limits Tab ───────────────────────────── */
function AdminRateLimits(){
  const [rules, setRules]   = useState(INITIAL_RATE_LIMITS);
  const [editId, setEditId] = useState(null);    // rule being edited
  const [addModal, setAdd]  = useState(false);   // create new rule
  const [globalOn, setGO]   = useState(true);    // master kill-switch
  const [saved, setSaved]   = useState(false);
  const [filterCat, setFC]  = useState("all");

  // Draft used for both edit and create
  const blankDraft = ()=>({
    name:"", description:"", category:"api", endpoint:"",
    enabled:true, limit:60, windowSecs:60,
    scope:"user", penalty:"block", blockDurationSecs:60,
  });
  const [draft, setDraft] = useState(blankDraft());
  const df = (k) => (v) => setDraft(p=>({...p,[k]:v}));

  const openEdit = (r) => {
    setDraft({...r});
    setEditId(r.id);
    setAdd(false);
    setSaved(false);
  };
  const openAdd = () => {
    setDraft(blankDraft());
    setAdd(true);
    setEditId(null);
    setSaved(false);
  };
  const closeModal = () => { setEditId(null); setAdd(false); };

  const saveEdit = () => {
    if(!draft.name.trim()) return;
    setRules(prev=>prev.map(r=>r.id===editId?{...r,...draft}:r));
    setSaved(true);
    setTimeout(()=>{setSaved(false); closeModal();}, 900);
  };

  const createRule = () => {
    if(!draft.name.trim()) return;
    setRules(prev=>[...prev,{
      ...draft,
      id:`rl_custom_${Date.now()}`,
      hits24h:0, blocked24h:0,
    }]);
    closeModal();
  };

  const toggleRule = (id) => setRules(prev=>prev.map(r=>r.id===id?{...r,enabled:!r.enabled}:r));
  const deleteRule = (id) => setRules(prev=>prev.filter(r=>r.id!==id));

  const displayed = filterCat==="all" ? rules : rules.filter(r=>r.category===filterCat);
  const totalBlocked = rules.reduce((s,r)=>s+r.blocked24h,0);
  const totalHits    = rules.reduce((s,r)=>s+r.hits24h,0);
  const activeRules  = rules.filter(r=>r.enabled).length;

  /* ── window/scope/penalty selector row ── */
  const WindowSelector = ({value, onChange}) => {
    const presets = [
      {label:"10 s", v:10},{label:"30 s",v:30},{label:"1 m",v:60},
      {label:"5 m",v:300},{label:"15 m",v:900},{label:"1 h",v:3600},
      {label:"6 h",v:21600},{label:"24 h",v:86400},
    ];
    return (
      <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
        {presets.map(p=>(
          <button key={p.v} onClick={()=>onChange(p.v)}
            style={{
              padding:"5px 11px",borderRadius:8,fontSize:12,fontWeight:600,cursor:"pointer",
              background:value===p.v?`rgba(139,92,246,.25)`:"rgba(255,255,255,.05)",
              border:`1px solid ${value===p.v?C.brand:"rgba(255,255,255,.1)"}`,
              color:value===p.v?C.brandLt:"rgba(255,255,255,.5)",
              transition:"all .15s",
            }}
          >{p.label}</button>
        ))}
        <input type="number" min={1} value={value}
          onChange={e=>onChange(Math.max(1,parseInt(e.target.value)||1))}
          title="Custom value in seconds"
          style={{width:72,background:"rgba(255,255,255,.06)",border:`1px solid ${C.border}`,color:C.white,borderRadius:8,padding:"5px 8px",fontSize:12,outline:"none"}}
        />
      </div>
    );
  };

  const ChipSelector = ({options, value, onChange}) => (
    <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
      {options.map(o=>(
        <button key={o.id} onClick={()=>onChange(o.id)}
          style={{
            padding:"7px 14px",borderRadius:9,fontSize:12,fontWeight:600,cursor:"pointer",textAlign:"left",
            background:value===o.id?`rgba(139,92,246,.2)`:"rgba(255,255,255,.04)",
            border:`1px solid ${value===o.id?C.brand:"rgba(255,255,255,.1)"}`,
            color:value===o.id?C.white:"rgba(255,255,255,.5)",
            transition:"all .15s",
          }}
        >
          <div style={{color:value===o.id?C.brandLt:"inherit"}}>{o.label}</div>
          <div style={{fontSize:10,opacity:.7,marginTop:1,fontWeight:400}}>{o.desc}</div>
        </button>
      ))}
    </div>
  );

  const RuleCard = ({r}) => {
    const cat = RL_CATEGORIES[r.category];
    const pct = r.hits24h>0 ? Math.min(100,Math.round((r.blocked24h/r.hits24h)*100)) : 0;
    return (
      <div className="user-row" style={{flexDirection:"column",alignItems:"stretch",gap:10,opacity:r.enabled?1:.55}}>
        {/* Top row */}
        <div style={{display:"flex",alignItems:"flex-start",gap:10}}>
          <div style={{
            width:38,height:38,borderRadius:9,flexShrink:0,
            background:`${cat.color}18`,border:`1px solid ${cat.color}40`,
            display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,
          }}>{cat.icon}</div>

          <div style={{flex:1,minWidth:0}}>
            <div style={{display:"flex",alignItems:"center",gap:7,flexWrap:"wrap"}}>
              <span style={{fontWeight:700,color:C.white,fontSize:14}}>{r.name}</span>
              <span style={{
                fontSize:10,fontWeight:700,padding:"2px 7px",borderRadius:99,
                background:r.enabled?"rgba(16,185,129,.12)":"rgba(255,255,255,.06)",
                color:r.enabled?C.green:"rgba(255,255,255,.3)",
                border:`1px solid ${r.enabled?"rgba(16,185,129,.25)":"rgba(255,255,255,.1)"}`,
              }}>{r.enabled?"ON":"OFF"}</span>
              <span style={{
                fontSize:10,fontWeight:600,padding:"2px 7px",borderRadius:99,
                background:`${cat.color}18`,color:cat.color,border:`1px solid ${cat.color}30`,
              }}>{cat.label}</span>
            </div>
            <div style={{fontSize:11,color:"rgba(255,255,255,.4)",marginTop:2}}>{r.description}</div>
            {r.endpoint&&<div style={{fontSize:10,fontFamily:"monospace",color:"rgba(255,255,255,.25)",marginTop:2}}>{r.endpoint}</div>}
          </div>

          <div style={{display:"flex",gap:7,flexShrink:0,alignItems:"center"}}>
            <button onClick={()=>toggleRule(r.id)}
              className={`toggle ${r.enabled?"on":"off"}`}
              style={{fontSize:0,width:40,height:22}}
            />
            <button onClick={()=>openEdit(r)}
              style={{background:"rgba(139,92,246,.1)",border:`1px solid ${C.border2}`,color:C.brandLt,borderRadius:8,padding:"6px 11px",fontSize:12,fontWeight:600,cursor:"pointer"}}
            >Edit</button>
            {r.id.startsWith("rl_custom_")&&(
              <button onClick={()=>deleteRule(r.id)}
                style={{background:"rgba(239,68,68,.1)",border:"1px solid rgba(239,68,68,.25)",color:C.red,borderRadius:8,padding:"6px 8px",fontSize:12,fontWeight:600,cursor:"pointer"}}
                title="Delete custom rule"
              >🗑</button>
            )}
          </div>
        </div>

        {/* Stats + config row */}
        <div style={{display:"flex",gap:8,flexWrap:"wrap",paddingLeft:48}}>
          {/* Rate badge */}
          <div style={{
            background:"rgba(139,92,246,.1)",border:`1px solid ${C.border}`,
            borderRadius:8,padding:"5px 11px",display:"flex",alignItems:"center",gap:6,
          }}>
            <span style={{fontSize:15}}>⚡</span>
            <span style={{fontSize:12,fontWeight:700,color:C.brandLt}}>{fmtRate(r.limit,r.windowSecs)}</span>
          </div>
          {/* Scope badge */}
          <div style={{
            background:"rgba(6,182,212,.08)",border:"1px solid rgba(6,182,212,.2)",
            borderRadius:8,padding:"5px 11px",fontSize:11,fontWeight:600,color:C.cyan,
          }}>{RL_SCOPES.find(s=>s.id===r.scope)?.label}</div>
          {/* Penalty badge */}
          <div style={{
            background:r.penalty==="block"?"rgba(239,68,68,.08)":r.penalty==="delay"?"rgba(245,158,11,.08)":"rgba(255,255,255,.05)",
            border:`1px solid ${r.penalty==="block"?"rgba(239,68,68,.2)":r.penalty==="delay"?"rgba(245,158,11,.2)":"rgba(255,255,255,.1)"}`,
            borderRadius:8,padding:"5px 11px",fontSize:11,fontWeight:600,
            color:r.penalty==="block"?C.red:r.penalty==="delay"?C.gold:"rgba(255,255,255,.4)",
          }}>{RL_PENALTIES.find(p=>p.id===r.penalty)?.label}</div>
          {/* 24h stats */}
          <div style={{marginLeft:"auto",display:"flex",gap:12,alignItems:"center"}}>
            <span style={{fontSize:11,color:"rgba(255,255,255,.3)"}}>
              <span style={{color:"rgba(255,255,255,.55)",fontWeight:600}}>{r.hits24h.toLocaleString()}</span> hits/24h
            </span>
            {r.blocked24h>0&&(
              <span style={{fontSize:11,fontWeight:700,color:C.red}}>
                {r.blocked24h} blocked
              </span>
            )}
          </div>
        </div>

        {/* Mini bar showing block rate */}
        {r.hits24h>0&&(
          <div style={{paddingLeft:48,paddingRight:4}}>
            <div style={{height:3,background:"rgba(255,255,255,.07)",borderRadius:99,overflow:"hidden"}}>
              <div style={{
                height:"100%",borderRadius:99,width:`${pct}%`,
                background:pct>10?`linear-gradient(90deg,${C.gold},${C.red})`:`linear-gradient(90deg,${C.green},${C.brandLt})`,
                transition:"width .4s ease",
              }}/>
            </div>
            <div style={{fontSize:10,color:"rgba(255,255,255,.2)",marginTop:2}}>{pct}% block rate</div>
          </div>
        )}
      </div>
    );
  };

  /* ── Edit / Create modal ── */
  const RuleModal = ({isCreate}) => (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.85)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:999,padding:16}}>
      <div style={{background:C.s1,borderRadius:"20px 20px 14px 14px",padding:24,width:"100%",maxWidth:520,border:`1px solid ${C.border}`,maxHeight:"88vh",overflowY:"auto"}}>
        <div style={{fontWeight:800,fontSize:17,color:C.white,marginBottom:20}}>
          {isCreate?"New Rate Limit Rule":"Edit Rule"}
        </div>

        {/* Name */}
        <div style={{marginBottom:14}}>
          <div style={{fontSize:12,fontWeight:600,color:"rgba(255,255,255,.5)",marginBottom:6}}>Rule Name <span style={{color:C.red}}>*</span></div>
          <input className="inp-base" placeholder="e.g. Custom Auth Limit" value={draft.name} onChange={e=>df("name")(e.target.value)}/>
        </div>

        {/* Description */}
        <div style={{marginBottom:14}}>
          <div style={{fontSize:12,fontWeight:600,color:"rgba(255,255,255,.5)",marginBottom:6}}>Description</div>
          <input className="inp-base" placeholder="What does this rule protect?" value={draft.description} onChange={e=>df("description")(e.target.value)}/>
        </div>

        {/* Category */}
        <div style={{marginBottom:14}}>
          <div style={{fontSize:12,fontWeight:600,color:"rgba(255,255,255,.5)",marginBottom:6}}>Category</div>
          <div style={{display:"flex",gap:8}}>
            {Object.entries(RL_CATEGORIES).map(([id,cat])=>(
              <button key={id} onClick={()=>df("category")(id)}
                style={{
                  flex:1,padding:"8px 6px",borderRadius:10,fontSize:12,fontWeight:600,cursor:"pointer",
                  background:draft.category===id?`${cat.color}20`:"rgba(255,255,255,.04)",
                  border:`1px solid ${draft.category===id?cat.color:"rgba(255,255,255,.1)"}`,
                  color:draft.category===id?cat.color:"rgba(255,255,255,.4)",
                }}
              >{cat.icon} {cat.label}</button>
            ))}
          </div>
        </div>

        {/* Endpoint */}
        <div style={{marginBottom:14}}>
          <div style={{fontSize:12,fontWeight:600,color:"rgba(255,255,255,.5)",marginBottom:6}}>Endpoint / Action <span style={{fontWeight:400,color:"rgba(255,255,255,.25)"}}>(optional)</span></div>
          <input className="inp-base" placeholder="e.g. POST /api/send-otp or leave blank for app actions" value={draft.endpoint||""} onChange={e=>df("endpoint")(e.target.value||null)} style={{fontFamily:"monospace",fontSize:12}}/>
        </div>

        {/* Limit + window */}
        <div style={{marginBottom:14,display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <div>
            <div style={{fontSize:12,fontWeight:600,color:"rgba(255,255,255,.5)",marginBottom:6}}>
              Request Limit <span style={{color:C.red}}>*</span>
            </div>
            <input type="number" min={1} className="inp-base"
              value={draft.limit}
              onChange={e=>df("limit")(Math.max(1,parseInt(e.target.value)||1))}
            />
          </div>
          <div>
            <div style={{fontSize:12,fontWeight:600,color:"rgba(255,255,255,.5)",marginBottom:6}}>
              Enabled
            </div>
            <div style={{display:"flex",alignItems:"center",gap:10,paddingTop:10}}>
              <button onClick={()=>df("enabled")(!draft.enabled)}
                className={`toggle ${draft.enabled?"on":"off"}`}
                style={{fontSize:0,width:46,height:26}}
              />
              <span style={{fontSize:13,color:draft.enabled?C.green:"rgba(255,255,255,.35)",fontWeight:600}}>
                {draft.enabled?"Active":"Disabled"}
              </span>
            </div>
          </div>
        </div>

        {/* Time window */}
        <div style={{marginBottom:14}}>
          <div style={{fontSize:12,fontWeight:600,color:"rgba(255,255,255,.5)",marginBottom:6}}>
            Time Window
            <span style={{fontWeight:400,color:C.brandLt,marginLeft:6}}>= {fmtWindow(draft.windowSecs)}</span>
          </div>
          <WindowSelector value={draft.windowSecs} onChange={df("windowSecs")}/>
        </div>

        {/* Scope */}
        <div style={{marginBottom:14}}>
          <div style={{fontSize:12,fontWeight:600,color:"rgba(255,255,255,.5)",marginBottom:6}}>Scope</div>
          <ChipSelector options={RL_SCOPES} value={draft.scope} onChange={df("scope")}/>
        </div>

        {/* Penalty */}
        <div style={{marginBottom:draft.penalty==="block"?14:20}}>
          <div style={{fontSize:12,fontWeight:600,color:"rgba(255,255,255,.5)",marginBottom:6}}>Penalty</div>
          <ChipSelector options={RL_PENALTIES} value={draft.penalty} onChange={df("penalty")}/>
        </div>

        {/* Block duration — only when penalty is block */}
        {draft.penalty==="block"&&draft.windowSecs<86400&&(
          <div style={{marginBottom:20}}>
            <div style={{fontSize:12,fontWeight:600,color:"rgba(255,255,255,.5)",marginBottom:6}}>
              Block Duration
              <span style={{fontWeight:400,color:C.red,marginLeft:6}}>= {fmtWindow(draft.blockDurationSecs)}</span>
            </div>
            <WindowSelector value={draft.blockDurationSecs} onChange={df("blockDurationSecs")}/>
            <div style={{fontSize:11,color:"rgba(255,255,255,.3)",marginTop:4}}>How long to block the client after hitting the limit.</div>
          </div>
        )}

        {/* Preview summary */}
        <div style={{
          background:"rgba(139,92,246,.07)",border:`1px solid ${C.border}`,
          borderRadius:10,padding:"10px 14px",marginBottom:20,
          fontSize:12,color:"rgba(255,255,255,.55)",lineHeight:1.7,
        }}>
          <strong style={{color:C.brandLt}}>Summary:</strong> Allow{" "}
          <strong style={{color:C.white}}>{draft.limit} requests</strong> per{" "}
          <strong style={{color:C.white}}>{fmtWindow(draft.windowSecs)}</strong>{" "}
          {draft.scope==="ip"?"per IP address":draft.scope==="user"?"per user account":"globally"}.{" "}
          {draft.penalty==="block"&&<>Violators are <strong style={{color:C.red}}>blocked for {fmtWindow(draft.blockDurationSecs)}</strong>.</>}
          {draft.penalty==="delay"&&<>Excess requests are <strong style={{color:C.gold}}>throttled / queued</strong>.</>}
          {draft.penalty==="log_only"&&<>Violations are <strong style={{color:C.muted}}>logged only</strong> — no enforcement.</>}
        </div>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <button onClick={closeModal} style={{background:C.s3,border:`1px solid ${C.border}`,borderRadius:12,padding:12,color:C.white,fontWeight:600,cursor:"pointer"}}>Cancel</button>
          <button
            onClick={isCreate?createRule:saveEdit}
            disabled={!draft.name.trim()}
            style={{
              background:saved?`linear-gradient(135deg,${C.green},#047857)`:!draft.name.trim()?"rgba(255,255,255,.07)":`linear-gradient(135deg,${C.brand},${C.brandDk})`,
              border:"none",borderRadius:12,padding:12,
              color:!draft.name.trim()?"rgba(255,255,255,.3)":"#fff",
              fontWeight:700,cursor:!draft.name.trim()?"default":"pointer",
              transition:"background .3s",
            }}
          >{saved?"✓ Saved":isCreate?"Create Rule":"Save Changes"}</button>
        </div>
      </div>
    </div>
  );

  return (
    <div>
      {/* Header row */}
      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:12,marginBottom:16,flexWrap:"wrap"}}>
        <div>
          <div style={{fontWeight:700,color:C.white,fontSize:15}}>Rate Limit Rules</div>
          <div style={{fontSize:12,color:"rgba(255,255,255,.4)",marginTop:2}}>
            {activeRules} active · {rules.length-activeRules} disabled
          </div>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
          {/* Master switch */}
          <div style={{
            display:"flex",alignItems:"center",gap:8,
            background:globalOn?"rgba(16,185,129,.08)":"rgba(239,68,68,.08)",
            border:`1px solid ${globalOn?"rgba(16,185,129,.25)":"rgba(239,68,68,.25)"}`,
            borderRadius:10,padding:"7px 12px",
          }}>
            <button onClick={()=>setGO(g=>!g)}
              className={`toggle ${globalOn?"on":"off"}`}
              style={{fontSize:0,width:40,height:22,flexShrink:0}}
            />
            <span style={{fontSize:12,fontWeight:700,color:globalOn?C.green:C.red,whiteSpace:"nowrap"}}>
              {globalOn?"Enforcing":"Disabled globally"}
            </span>
          </div>
          <button onClick={openAdd} style={{background:`linear-gradient(135deg,${C.brand},${C.brandDk})`,border:"none",color:"#fff",borderRadius:10,padding:"9px 16px",fontSize:13,fontWeight:700,cursor:"pointer",boxShadow:`0 4px 16px ${C.brand}60`,whiteSpace:"nowrap"}}>+ Add Rule</button>
        </div>
      </div>

      {/* Global off banner */}
      {!globalOn&&(
        <div style={{background:"rgba(239,68,68,.1)",border:"1px solid rgba(239,68,68,.3)",borderRadius:11,padding:"10px 14px",marginBottom:16,display:"flex",gap:9,alignItems:"center"}}>
          <span style={{fontSize:18}}>⚠️</span>
          <span style={{fontSize:13,color:C.red,fontWeight:600}}>Rate limiting is globally disabled. All rules are suspended — enable to enforce them.</span>
        </div>
      )}

      {/* 24h summary cards */}
      <div style={{display:"flex",gap:10,marginBottom:18,flexWrap:"wrap"}}>
        {Object.entries(RL_CATEGORIES).map(([id,cat])=>{
          const catRules = rules.filter(r=>r.category===id);
          const blocked  = catRules.reduce((s,r)=>s+r.blocked24h,0);
          const hits     = catRules.reduce((s,r)=>s+r.hits24h,0);
          return (
            <div key={id} className="stat-card" style={{flex:"1 1 120px",cursor:"pointer",border:filterCat===id?`1px solid ${cat.color}`:undefined}}
              onClick={()=>setFC(f=>f===id?"all":id)}>
              <div style={{fontSize:22,marginBottom:4}}>{cat.icon}</div>
              <div style={{fontSize:16,fontWeight:800,color:cat.color}}>{blocked}</div>
              <div style={{fontSize:11,color:"rgba(255,255,255,.4)"}}>blocked / 24h</div>
              <div style={{fontSize:10,color:"rgba(255,255,255,.25)",marginTop:2}}>{hits.toLocaleString()} total hits</div>
            </div>
          );
        })}
        <div className="stat-card" style={{flex:"1 1 120px"}}>
          <div style={{fontSize:22,marginBottom:4}}>🛡️</div>
          <div style={{fontSize:16,fontWeight:800,color:C.brandLt}}>{totalBlocked}</div>
          <div style={{fontSize:11,color:"rgba(255,255,255,.4)"}}>total blocked</div>
          <div style={{fontSize:10,color:"rgba(255,255,255,.25)",marginTop:2}}>{totalHits.toLocaleString()} total hits</div>
        </div>
      </div>

      {filterCat!=="all"&&(
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
          <span style={{fontSize:12,color:"rgba(255,255,255,.4)"}}>Filtered: <strong style={{color:RL_CATEGORIES[filterCat].color}}>{RL_CATEGORIES[filterCat].label}</strong></span>
          <button onClick={()=>setFC("all")} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:12,textDecoration:"underline"}}>Clear</button>
        </div>
      )}

      {/* Rule cards */}
      {displayed.map(r=><RuleCard key={r.id} r={r}/>)}

      {(editId||addModal) && <RuleModal isCreate={addModal}/>}
    </div>
  );
}

/* ── Backup & Restore Tab ──────────────────────── */
function AdminBackup({users, setUsers, adminUser}){
  // History of backups created this session
  const [history, setHistory]       = useState([]);
  // Create-backup state
  const [creating, setCreating]     = useState(false);
  const [createErr, setCreateErr]   = useState("");
  // Restore state
  const [restoreFile, setRF]        = useState(null);   // parsed backup object
  const [restoreRaw, setRRaw]       = useState("");     // filename
  const [parseErr, setParseErr]     = useState("");
  const [strategy, setStrategy]     = useState("upsert");
  const [restoring, setRestoring]   = useState(false);
  const [restoreResult, setRR]      = useState(null);   // {success, results, error}
  const [confirmRestore, setCR]     = useState(false);
  const [adminKey, setAdminKey]     = useState("");
  const fileInputRef                = React.useRef(null);

  // ── helpers ──────────────────────────────────────
  function buildBackupPayload(rows){
    return {
      version:"1.0", app:"wish-app",
      exportedAt:new Date().toISOString(),
      exportedBy:adminUser.email,
      tables:{ users:{ count:rows.length, rows } },
    };
  }

  function downloadJson(obj, filename){
    const blob = new Blob([JSON.stringify(obj,null,2)],{type:"application/json"});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href=url; a.download=filename; a.click();
    URL.revokeObjectURL(url);
  }

  function formatBytes(bytes){
    if(bytes<1024) return `${bytes} B`;
    if(bytes<1024*1024) return `${(bytes/1024).toFixed(1)} KB`;
    return `${(bytes/1024/1024).toFixed(2)} MB`;
  }

  function backupSize(backup){
    return formatBytes(new Blob([JSON.stringify(backup)]).size);
  }

  // ── create backup ─────────────────────────────────
  const createBackup = async () => {
    setCreating(true); setCreateErr("");
    try {
      const headers = {"Content-Type":"application/json"};
      if(adminKey) headers["x-admin-key"] = adminKey;

      const res = await fetch("/api/backup",{headers});
      if(!res.ok) throw new Error(`HTTP ${res.status}`);
      const json = await res.json();
      if(!json.success) throw new Error(json.error||"Unknown error");

      const backup = json.backup;
      const entry  = { id:Date.now(), backup, createdAt:new Date().toISOString(), source:"live" };
      setHistory(h=>[entry,...h]);
      downloadJson(backup, `wish-backup-${new Date().toISOString().slice(0,10)}.json`);
    } catch(err){
      // API unavailable — fall back to in-memory snapshot (demo mode)
      if(err.message.startsWith("HTTP 4")||err.message.includes("fetch")||err.message.includes("Failed")){
        const backup = buildBackupPayload(users);
        const entry  = { id:Date.now(), backup, createdAt:new Date().toISOString(), source:"demo" };
        setHistory(h=>[entry,...h]);
        downloadJson(backup, `wish-backup-${new Date().toISOString().slice(0,10)}.json`);
      } else {
        setCreateErr(err.message);
      }
    } finally { setCreating(false); }
  };

  // ── file upload ───────────────────────────────────
  const onFileChange = (e) => {
    const file = e.target.files[0];
    if(!file){ setRF(null); setRRaw(""); return; }
    setRRaw(file.name); setParseErr(""); setRF(null); setRR(null);
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const parsed = JSON.parse(ev.target.result);
        if(!parsed.version||!parsed.tables||parsed.app!=="wish-app")
          throw new Error("File is not a valid wish-app backup.");
        setRF(parsed);
      } catch(ex){ setParseErr(ex.message); }
    };
    reader.readAsText(file);
    // reset input so re-uploading same file fires onchange
    e.target.value="";
  };

  // ── restore ───────────────────────────────────────
  const runRestore = async () => {
    setCR(false); setRestoring(true); setRR(null);
    try {
      const headers = {"Content-Type":"application/json"};
      if(adminKey) headers["x-admin-key"] = adminKey;

      const res = await fetch("/api/restore",{
        method:"POST",
        headers,
        body: JSON.stringify({backup:restoreFile, strategy}),
      });
      const json = await res.json();
      if(!res.ok||!json.success) throw new Error(json.error||`HTTP ${res.status}`);
      setRR({success:true, results:json.results, source:"live"});
    } catch(err){
      // Demo fallback — apply to in-memory state
      if(err.message.includes("fetch")||err.message.includes("Failed")||err.message.startsWith("HTTP 4")||err.message.startsWith("HTTP 5")){
        const incoming = restoreFile.tables?.users?.rows||[];
        if(strategy==="upsert"){
          const map = {};
          users.forEach(u=>{ map[u.id]=u; });
          incoming.forEach(u=>{ map[u.id]={...map[u.id],...u}; });
          setUsers(Object.values(map));
          setRR({success:true, results:{users:{restored:incoming.length}}, source:"demo"});
        } else {
          const existingIds = new Set(users.map(u=>u.id));
          const toAdd = incoming.filter(u=>!existingIds.has(u.id));
          setUsers(prev=>[...prev,...toAdd]);
          setRR({success:true, results:{users:{restored:toAdd.length, skipped:incoming.length-toAdd.length}}, source:"demo"});
        }
      } else {
        setRR({success:false, error:err.message, source:"live"});
      }
    } finally { setRestoring(false); }
  };

  // ── table row counts from a backup ────────────────
  const tableStats = (backup) =>
    Object.entries(backup.tables||{}).map(([t,d])=>({ table:t, count:d.count||d.rows?.length||0 }));

  // ── render ────────────────────────────────────────
  return (
    <div style={{display:"flex",flexDirection:"column",gap:20}}>

      {/* Admin key field */}
      <div style={{background:"rgba(139,92,246,.07)",border:`1px solid ${C.border}`,borderRadius:12,padding:"12px 16px"}}>
        <div style={{fontSize:12,fontWeight:700,color:"rgba(255,255,255,.4)",marginBottom:6}}>
          ADMIN KEY <span style={{fontWeight:400,color:"rgba(255,255,255,.25)"}}>(optional — required if ADMIN_BACKUP_KEY is set in env)</span>
        </div>
        <input
          className="inp-base"
          type="password"
          placeholder="Leave blank if not configured"
          value={adminKey}
          onChange={e=>setAdminKey(e.target.value)}
          style={{fontFamily:"monospace",fontSize:12}}
        />
      </div>

      {/* ── Create Backup ── */}
      <div style={{background:C.s2,border:`1px solid ${C.border}`,borderRadius:16,overflow:"hidden"}}>
        <div style={{padding:"16px 18px",borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",justifyContent:"space-between",gap:10}}>
          <div>
            <div style={{fontWeight:700,color:C.white,fontSize:14,display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontSize:18}}>💾</span> Create Backup
            </div>
            <div style={{fontSize:12,color:"rgba(255,255,255,.4)",marginTop:2}}>
              Exports a full snapshot of the database to a JSON file.
            </div>
          </div>
          <button
            onClick={createBackup}
            disabled={creating}
            style={{
              background:creating?"rgba(255,255,255,.07)":`linear-gradient(135deg,${C.brand},${C.brandDk})`,
              border:"none",color:creating?"rgba(255,255,255,.3)":"#fff",borderRadius:10,
              padding:"10px 18px",fontSize:13,fontWeight:700,
              cursor:creating?"default":"pointer",
              boxShadow:creating?"none":`0 4px 16px ${C.brand}60`,
              whiteSpace:"nowrap",flexShrink:0,
            }}
          >{creating?"⏳ Exporting…":"⬇ Download Backup"}</button>
        </div>

        {/* What gets backed up */}
        <div style={{padding:"12px 18px",display:"flex",gap:8,flexWrap:"wrap"}}>
          {[["👥","Users table","All user profiles, points, balances"],
            ["⚙️","Config (soon)","App settings & ad network config"],
          ].map(([icon,label,desc])=>(
            <div key={label} style={{flex:"1 1 160px",background:"rgba(255,255,255,.03)",border:`1px solid ${C.border}`,borderRadius:10,padding:"10px 12px"}}>
              <div style={{fontSize:15,marginBottom:4}}>{icon}</div>
              <div style={{fontSize:13,fontWeight:700,color:C.white}}>{label}</div>
              <div style={{fontSize:11,color:"rgba(255,255,255,.35)",marginTop:2}}>{desc}</div>
            </div>
          ))}
        </div>

        {createErr&&(
          <div style={{margin:"0 18px 14px",background:"rgba(239,68,68,.08)",border:"1px solid rgba(239,68,68,.25)",borderRadius:10,padding:"10px 12px",fontSize:12,color:C.red}}>
            ⚠ {createErr}
          </div>
        )}
      </div>

      {/* ── Backup History ── */}
      {history.length>0&&(
        <div style={{background:C.s2,border:`1px solid ${C.border}`,borderRadius:16,overflow:"hidden"}}>
          <div style={{padding:"14px 18px",borderBottom:`1px solid ${C.border}`,fontWeight:700,color:C.white,fontSize:14,display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:16}}>🗂</span> This Session ({history.length})
          </div>
          {history.map((entry,i)=>{
            const stats = tableStats(entry.backup);
            return (
              <div key={entry.id} style={{
                padding:"12px 18px",
                borderBottom:i<history.length-1?`1px solid ${C.border}`:undefined,
                display:"flex",alignItems:"center",gap:12,
              }}>
                <div style={{
                  width:36,height:36,borderRadius:9,flexShrink:0,
                  background:"rgba(16,185,129,.12)",border:"1px solid rgba(16,185,129,.25)",
                  display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,
                }}>✓</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:700,color:C.white,fontSize:13}}>
                    wish-backup-{entry.createdAt.slice(0,10)}.json
                    {entry.source==="demo"&&<span style={{marginLeft:6,fontSize:10,color:C.gold,fontWeight:600}}>demo snapshot</span>}
                  </div>
                  <div style={{fontSize:11,color:"rgba(255,255,255,.35)",marginTop:2}}>
                    {fmtDate(entry.createdAt)} · {backupSize(entry.backup)} · {stats.map(s=>`${s.count} ${s.table}`).join(" · ")}
                  </div>
                </div>
                <button
                  onClick={()=>downloadJson(entry.backup,`wish-backup-${entry.createdAt.slice(0,10)}-${entry.id}.json`)}
                  style={{background:"rgba(139,92,246,.1)",border:`1px solid ${C.border2}`,color:C.brandLt,borderRadius:8,padding:"6px 12px",fontSize:12,fontWeight:600,cursor:"pointer",flexShrink:0}}
                >⬇ Re-download</button>
              </div>
            );
          })}
        </div>
      )}

      {/* ── Restore ── */}
      <div style={{background:C.s2,border:`1px solid rgba(245,158,11,.2)`,borderRadius:16,overflow:"hidden"}}>
        <div style={{padding:"16px 18px",borderBottom:`1px solid rgba(245,158,11,.15)`,display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:20}}>⚠️</span>
          <div>
            <div style={{fontWeight:700,color:C.gold,fontSize:14}}>Restore from Backup</div>
            <div style={{fontSize:12,color:"rgba(255,255,255,.4)",marginTop:1}}>
              Overwrites live data. Only use a backup from this app. Cannot be undone.
            </div>
          </div>
        </div>

        <div style={{padding:"16px 18px",display:"flex",flexDirection:"column",gap:14}}>
          {/* File picker */}
          <div>
            <div style={{fontSize:12,fontWeight:600,color:"rgba(255,255,255,.5)",marginBottom:8}}>Select Backup File</div>
            <div
              onClick={()=>fileInputRef.current?.click()}
              style={{
                border:`2px dashed ${restoreFile?"rgba(16,185,129,.5)":C.border2}`,
                borderRadius:12,padding:"20px",textAlign:"center",cursor:"pointer",
                background:restoreFile?"rgba(16,185,129,.05)":"rgba(255,255,255,.02)",
                transition:"all .2s",
              }}
            >
              <div style={{fontSize:28,marginBottom:6}}>{restoreFile?"✅":"📂"}</div>
              <div style={{fontSize:13,color:restoreFile?C.green:C.muted,fontWeight:600}}>
                {restoreFile ? restoreRaw : "Click to choose a .json backup file"}
              </div>
              {restoreFile&&(
                <div style={{fontSize:11,color:"rgba(255,255,255,.35)",marginTop:4}}>
                  {backupSize(restoreFile)} · exported {fmtDate(restoreFile.exportedAt)}
                  {restoreFile.exportedBy&&<span> by {restoreFile.exportedBy}</span>}
                </div>
              )}
            </div>
            <input ref={fileInputRef} type="file" accept=".json,application/json" onChange={onFileChange} style={{display:"none"}}/>
            {parseErr&&<div style={{fontSize:12,color:C.red,marginTop:6}}>⚠ {parseErr}</div>}
          </div>

          {/* Backup preview */}
          {restoreFile&&(
            <div style={{background:"rgba(255,255,255,.03)",border:`1px solid ${C.border}`,borderRadius:10,padding:"12px 14px"}}>
              <div style={{fontSize:12,fontWeight:700,color:"rgba(255,255,255,.35)",letterSpacing:1,marginBottom:10}}>BACKUP CONTENTS</div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:10}}>
                {tableStats(restoreFile).map(s=>(
                  <div key={s.table} style={{background:"rgba(139,92,246,.1)",border:`1px solid ${C.border}`,borderRadius:8,padding:"6px 12px"}}>
                    <div style={{fontSize:16,fontWeight:800,color:C.brandLt}}>{s.count}</div>
                    <div style={{fontSize:11,color:"rgba(255,255,255,.4)"}}>{s.table}</div>
                  </div>
                ))}
                <div style={{background:"rgba(139,92,246,.1)",border:`1px solid ${C.border}`,borderRadius:8,padding:"6px 12px"}}>
                  <div style={{fontSize:16,fontWeight:800,color:C.brandLt}}>{backupSize(restoreFile)}</div>
                  <div style={{fontSize:11,color:"rgba(255,255,255,.4)"}}>file size</div>
                </div>
              </div>
              <div style={{fontSize:11,color:"rgba(255,255,255,.3)"}}>
                Version {restoreFile.version} · App: {restoreFile.app}
              </div>
            </div>
          )}

          {/* Conflict strategy */}
          {restoreFile&&(
            <div>
              <div style={{fontSize:12,fontWeight:600,color:"rgba(255,255,255,.5)",marginBottom:8}}>Conflict Strategy</div>
              <div style={{display:"flex",gap:8}}>
                {[
                  {id:"upsert", icon:"🔄", label:"Upsert",      desc:"Overwrite existing records with backup values"},
                  {id:"skip",   icon:"⏭",  label:"Skip Existing",desc:"Only insert records not already in the database"},
                ].map(s=>(
                  <button key={s.id} onClick={()=>setStrategy(s.id)}
                    style={{
                      flex:1,padding:"10px 12px",borderRadius:10,cursor:"pointer",textAlign:"left",
                      background:strategy===s.id?"rgba(139,92,246,.18)":"rgba(255,255,255,.03)",
                      border:`1px solid ${strategy===s.id?C.brand:"rgba(255,255,255,.1)"}`,
                      color:strategy===s.id?C.white:"rgba(255,255,255,.45)",
                    }}
                  >
                    <div style={{fontSize:14,marginBottom:3}}>{s.icon} <span style={{fontWeight:700,fontSize:12}}>{s.label}</span></div>
                    <div style={{fontSize:11,opacity:.7}}>{s.desc}</div>
                  </button>
                ))}
              </div>
            </div>
          )}

          {/* Restore button */}
          {restoreFile&&!restoreResult&&(
            <button
              onClick={()=>setCR(true)}
              disabled={restoring}
              style={{
                width:"100%",padding:13,borderRadius:12,border:"none",cursor:restoring?"default":"pointer",
                background:restoring?"rgba(255,255,255,.07)":`linear-gradient(135deg,${C.gold},#b45309)`,
                color:restoring?"rgba(255,255,255,.3)":"#fff",fontWeight:700,fontSize:14,
              }}
            >{restoring?"⏳ Restoring…":"⚡ Restore Database"}</button>
          )}

          {/* Result */}
          {restoreResult&&(
            <div style={{
              background:restoreResult.success?"rgba(16,185,129,.08)":"rgba(239,68,68,.08)",
              border:`1px solid ${restoreResult.success?"rgba(16,185,129,.3)":"rgba(239,68,68,.3)"}`,
              borderRadius:12,padding:"14px 16px",
            }}>
              <div style={{fontWeight:700,color:restoreResult.success?C.green:C.red,fontSize:14,marginBottom:8}}>
                {restoreResult.success?"✅ Restore Complete":"❌ Restore Failed"}
                {restoreResult.source==="demo"&&<span style={{marginLeft:8,fontSize:11,color:C.gold}}>(demo mode)</span>}
              </div>
              {restoreResult.success&&Object.entries(restoreResult.results||{}).map(([table,r])=>(
                <div key={table} style={{fontSize:12,color:"rgba(255,255,255,.6)",marginBottom:4}}>
                  <strong style={{color:C.white}}>{table}:</strong>{" "}
                  {r.restored} record{r.restored!==1?"s":""} restored
                  {r.skipped>0&&<span style={{color:C.muted}}> · {r.skipped} skipped</span>}
                  {r.skipped===true&&<span style={{color:C.muted}}> (not in backup)</span>}
                </div>
              ))}
              {restoreResult.error&&<div style={{fontSize:12,color:C.red}}>{restoreResult.error}</div>}
              <button
                onClick={()=>{setRF(null);setRRaw("");setRR(null);setParseErr("");}}
                style={{marginTop:10,background:"rgba(255,255,255,.07)",border:`1px solid ${C.border}`,borderRadius:8,padding:"6px 14px",color:C.muted,fontSize:12,fontWeight:600,cursor:"pointer"}}
              >Start over</button>
            </div>
          )}
        </div>
      </div>

      {/* Confirm restore dialog */}
      {confirmRestore&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.88)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:999,padding:16}}>
          <div style={{background:C.s1,borderRadius:20,padding:24,maxWidth:340,width:"100%",border:"1px solid rgba(245,158,11,.35)"}}>

}

  { id:"announcement", label:"Announcement", icon:"📢", color:"#06b6d4" },
  { id:"promotion",    label:"Promotion",    icon:"🎁", color:"#10b981" },
  { id:"info",         label:"Info",         icon:"ℹ️", color:"#8b5cf6" },
  { id:"warning",      label:"Warning",      icon:"⚠️", color:"#f59e0b" },
];

const BROADCAST_CHANNELS = [
  { id:"email",   label:"Email",            icon:"✉️",  desc:"Send via Resend to each user's email address" },
  { id:"in_app",  label:"In-App",           icon:"🔔",  desc:"Deliver as a notification inside the app" },
  { id:"push",    label:"Push Notification",icon:"📲",  desc:"Native device push (coming soon)", disabled:true },
];

// Derive unique countries from a user list
const uniqueCountries = (users) => [...new Set(users.map(u=>u.country).filter(Boolean))];

// Audience preview — returns users matching current filters
function filterAudience(users, audience) {
  let out = users.filter(u => !u.isAdmin && u.role !== "super_admin" && u.role !== "moderator");
  if (audience.filter === "active")   out = out.filter(u => u.active);
  if (audience.filter === "inactive") out = out.filter(u => !u.active);
  if (audience.countries.length)      out = out.filter(u => audience.countries.includes(u.country));
  if (audience.minPts !== "")         out = out.filter(u => (u.pts||0) >= Number(audience.minPts));
  if (audience.maxPts !== "")         out = out.filter(u => (u.pts||0) <= Number(audience.maxPts));
  return out;
}

function AdminBroadcast({ users, adminUser }) {
  // Compose
  const [type,    setType]    = useState("announcement");
  const [channel, setChannel] = useState("email");
  const [subject, setSubject] = useState("");
  const [body,    setBody]    = useState("");

  // Audience
  const [audience, setAudience] = useState({
    filter: "active", countries: [], minPts: "", maxPts: "",
  });
  const aud = (k) => (v) => setAudience(p => ({ ...p, [k]: v }));
  const toggleCountry = (c) => setAudience(p => ({
    ...p,
    countries: p.countries.includes(c) ? p.countries.filter(x => x !== c) : [...p.countries, c],
  }));

  // Schedule
  const [sendMode,      setSendMode]  = useState("now");   // "now" | "scheduled"
  const [scheduledFor,  setSF]        = useState("");

  // Send state
  const [confirm,    setConfirm]  = useState(false);
  const [sending,    setSending]  = useState(false);
  const [sendResult, setSR]       = useState(null);

  // History
  const [history, setHistory] = useState([
    {
      id:"bcast_demo1", type:"announcement", channel:"email",

      body:"We've rolled out major new features…",

      sent:4, failed:0,
    },
    {
      id:"bcast_demo2", type:"promotion", channel:"email",
      subject:"🎁 Double points weekend — starts now!",
      body:"This weekend only, every ad you watch earns 2× points…",
      audience:{ filter:"active", countries:[], minPts:"", maxPts:"" },
      recipientCount:3, status:"sent",
      sentAt:"2025-03-15T08:30:00Z", sentBy:"admin@wish.com",
      sent:3, failed:0,
    },
    {
      id:"bcast_demo3", type:"warning", channel:"in_app",
      subject:"Scheduled maintenance — Saturday 2 AM UTC",
      body:"The platform will be down for ~30 minutes…",
      audience:{ filter:"all", countries:[], minPts:"", maxPts:"" },
      recipientCount:4, status:"scheduled",
      sentAt:null, scheduledFor:"2025-04-05T02:00:00Z", sentBy:"admin@wish.com",
      sent:0, failed:0,
    },
  ]);

  const preview = filterAudience(users, audience);
  const countries = uniqueCountries(users);
  const typeInfo    = BROADCAST_TYPES.find(t => t.id === type);
  const channelInfo = BROADCAST_CHANNELS.find(c => c.id === channel);
  const bodyLimit   = channel === "in_app" ? 280 : 5000;
  const canSend     = subject.trim() && body.trim() && preview.length > 0
                      && (sendMode === "now" || scheduledFor);

  const doSend = async () => {
    setConfirm(false);
    setSending(true);
    setSR(null);

    const payload = {
      subject: subject.trim(),
      body: body.trim(),
      type, channel,
      audience,
      scheduledFor: sendMode === "scheduled" ? scheduledFor : null,
      sentBy: adminUser.email,
    };

    try {
      const res = await fetch("/api/broadcast", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });

      // Guard against non-JSON responses (e.g. Vercel HTML error pages)
      const contentType = res.headers.get("content-type") || "";
      if (!contentType.includes("application/json")) {
        throw new Error(`Server returned HTTP ${res.status} (non-JSON response)`);
      }

      const json = await res.json();
      if (!json.success) throw new Error(json.error || `Server error (HTTP ${res.status})`);

      const entry = {
        id: `bcast_${Date.now()}`, type, channel, subject: subject.trim(), body: body.trim(),
        audience: { ...audience },
        recipientCount: preview.length,
        status: sendMode === "scheduled" ? "scheduled" : "sent",
        sentAt: sendMode === "now" ? new Date().toISOString() : null,
        scheduledFor: sendMode === "scheduled" ? scheduledFor : null,
        sentBy: adminUser.email,
        sent: json.sent ?? 0, failed: json.failed ?? 0,
        note: json.note,
      };
      setHistory(h => [entry, ...h]);
      setSR({ ok: true, sent: json.sent, failed: json.failed, note: json.note, source: "live" });
      setSubject(""); setBody("");
    } catch (err) {
      // Demo fallback ONLY when the endpoint doesn't exist yet (local dev without API routes).
      // A TypeError means the fetch itself failed (network down / endpoint absent).
      // A real deployed API returning 4xx/5xx is a genuine error — show it, don't fake success.
      const isNoEndpoint = (err instanceof TypeError) || err.message.includes("HTTP 404");
      if (isNoEndpoint) {
        await new Promise(r => setTimeout(r, 1400));
        const failed = Math.floor(preview.length * 0.05);
        const sent   = preview.length - failed;
        const entry  = {
          id: `bcast_${Date.now()}`, type, channel, subject: subject.trim(), body: body.trim(),
          audience: { ...audience },
          recipientCount: preview.length,
          status: sendMode === "scheduled" ? "scheduled" : "sent",
          sentAt: sendMode === "now" ? new Date().toISOString() : null,
          scheduledFor: sendMode === "scheduled" ? scheduledFor : null,
          sentBy: adminUser.email,
          sent, failed, source: "demo",
        };
        setHistory(h => [entry, ...h]);
        setSR({ ok: true, sent, failed, source: "demo" });
        setSubject(""); setBody("");
      } else {
        setSR({ ok: false, error: err.message });
      }
    } finally {
      setSending(false);
    }

    if (a.maxPts !== "" && a.maxPts != null) parts.push(`≤ ${Number(a.maxPts).toLocaleString()} pts`);

                  disabled={ch.disabled}

          )}
          {preview.length === 0 && (
            <span style={{ fontSize:11, color:"rgba(239,68,68,.6)", background:"rgba(239,68,68,.08)", border:"1px solid rgba(239,68,68,.2)", borderRadius:99, padding:"3px 10px" }}>
              ⚠️ No recipients match filters
            </span>
          )}
          {sendMode === "scheduled" && !scheduledFor && (
            <span style={{ fontSize:11, color:"rgba(255,255,255,.35)", background:"rgba(255,255,255,.05)", border:"1px solid rgba(255,255,255,.1)", borderRadius:99, padding:"3px 10px" }}>
              🕐 Schedule time required
            </span>
          )}
        </div>
      )}

      {/* Send result */}
      {sendResult && (
        <div style={{
          background: sendResult.ok ? "rgba(16,185,129,.08)" : "rgba(239,68,68,.08)",
          border:`1px solid ${sendResult.ok ? "rgba(16,185,129,.3)" : "rgba(239,68,68,.3)"}`,
          borderRadius:12, padding:"14px 16px",
        }}>
          <div style={{ fontWeight:700, fontSize:14, color: sendResult.ok ? C.green : C.red, marginBottom:6 }}>
            {sendResult.ok ? (sendResult.source==="demo" ? "✅ Sent (demo mode)" : "✅ Sent!") : "❌ Failed"}
          </div>
          {sendResult.ok && (
            <div style={{ fontSize:13, color:"rgba(255,255,255,.6)" }}>
              <strong style={{ color:C.white }}>{sendResult.sent}</strong> delivered
              {sendResult.failed > 0 && <span style={{ color:C.red }}> · {sendResult.failed} failed</span>}
              {sendResult.note  && <div style={{ fontSize:11, color:"rgba(255,255,255,.35)", marginTop:4 }}>ℹ {sendResult.note}</div>}
            </div>
          )}
          {!sendResult.ok && <div style={{ fontSize:12, color:C.red }}>{sendResult.error}</div>}
          <button onClick={() => setSR(null)} style={{ marginTop:10, background:"none", border:"none", color:C.muted, fontSize:12, cursor:"pointer", textDecoration:"underline" }}>Dismiss</button>
        </div>
      )}

      {/* ── History ── */}
      {history.length > 0 && (
        <div style={{ background:C.s2, border:`1px solid ${C.border}`, borderRadius:16, overflow:"hidden" }}>
          <div style={{ padding:"14px 18px", borderBottom:`1px solid ${C.border}`, fontWeight:700, color:C.white, fontSize:14, display:"flex", alignItems:"center", gap:8 }}>
            <span style={{ fontSize:16 }}>📋</span> Broadcast History
          </div>
          {history.map((b, i) => {
            const ti  = BROADCAST_TYPES.find(t => t.id === b.type) || BROADCAST_TYPES[0];
            const ci  = BROADCAST_CHANNELS.find(c => c.id === b.channel) || BROADCAST_CHANNELS[0];
            const ss  = statusStyle(b.status);
            return (
              <div key={b.id} style={{
                padding:"14px 18px",
                borderBottom: i < history.length-1 ? `1px solid ${C.border}` : undefined,
              }}>
                <div style={{ display:"flex", alignItems:"flex-start", gap:10 }}>
                  <div style={{
                    width:38, height:38, borderRadius:9, flexShrink:0,
                    background:`${ti.color}18`, border:`1px solid ${ti.color}40`,
                    display:"flex", alignItems:"center", justifyContent:"center", fontSize:18,
                  }}>{ti.icon}</div>

                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ display:"flex", alignItems:"center", gap:7, flexWrap:"wrap" }}>
                      <span style={{ fontWeight:700, color:C.white, fontSize:13 }}>{b.subject}</span>
                      <span style={{
                        fontSize:10, fontWeight:700, padding:"2px 7px", borderRadius:99,
                        background:ss.bg, color:ss.color, border:`1px solid ${ss.border}`,
                      }}>{ss.label}</span>
                      {b.source==="demo" && <span style={{ fontSize:10, color:C.gold, fontWeight:600 }}>demo</span>}
                    </div>
                    <div style={{ fontSize:11, color:"rgba(255,255,255,.35)", marginTop:3, display:"flex", gap:10, flexWrap:"wrap" }}>
                      <span>{ci.icon} {ci.label}</span>
                      <span>🎯 {audienceLabel(b.audience)}</span>
                      <span>👥 {b.recipientCount} recipient{b.recipientCount!==1?"s":""}</span>
                      {b.sent > 0 && <span style={{ color:C.green }}>✓ {b.sent} sent</span>}
                      {b.failed > 0 && <span style={{ color:C.red }}>✕ {b.failed} failed</span>}
                    </div>
                    <div style={{ fontSize:10, color:"rgba(255,255,255,.25)", marginTop:2 }}>
                      {b.status==="scheduled"
                        ? `Scheduled for ${fmtDate(b.scheduledFor)}`
                        : `Sent ${fmtDate(b.sentAt)}`
                      } · by {b.sentBy}
                    </div>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* ── Confirm dialog ── */}
      {confirm && (
        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,.88)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:999, padding:16 }}>
          <div style={{ background:C.s1, borderRadius:20, padding:24, maxWidth:360, width:"100%", border:`1px solid ${typeInfo.color}55` }}>
            <div style={{ fontSize:32, textAlign:"center", marginBottom:8 }}>{typeInfo.icon}</div>
            <div style={{ fontWeight:800, color:C.white, fontSize:16, textAlign:"center", marginBottom:4 }}>
              {sendMode==="scheduled" ? "Schedule broadcast?" : "Send broadcast now?"}
            </div>

            <div style={{ background:"rgba(255,255,255,.04)", border:`1px solid ${C.border}`, borderRadius:10, padding:"12px 14px", margin:"16px 0", fontSize:12 }}>
              {[
                ["Type",     `${typeInfo.icon} ${typeInfo.label}`],
                ["Channel",  `${channelInfo.icon} ${channelInfo.label}`],
                ["Subject",  subject],
                ["Audience", audienceLabel(audience)],
                ["Recipients", `${preview.length} user${preview.length!==1?"s":""}`],
                sendMode==="scheduled" ? ["Scheduled for", scheduledFor ? fmtDate(scheduledFor) : "—"] : ["Delivery","Immediately"],
              ].map(([k,v]) => (
                <div key={k} style={{ display:"flex", gap:8, marginBottom:4 }}>
                  <span style={{ color:"rgba(255,255,255,.4)", minWidth:80, flexShrink:0 }}>{k}</span>
                  <span style={{ color:C.white, wordBreak:"break-word" }}>{v}</span>
                </div>
              ))}
            </div>

            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
              <button onClick={() => setConfirm(false)} style={{ background:C.s3, border:`1px solid ${C.border}`, borderRadius:12, padding:12, color:C.white, fontWeight:600, cursor:"pointer" }}>Cancel</button>
              <button onClick={doSend} style={{
                background:`linear-gradient(135deg,${typeInfo.color},${typeInfo.color}aa)`,
                border:"none", borderRadius:12, padding:12, color:"#fff", fontWeight:700, cursor:"pointer",
              }}>{sendMode==="scheduled" ? "Schedule" : "Send Now"}</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function AdminPanel({user, onExit, lang}){
  const role = user.role || (user.isAdmin ? "super_admin" : "user");
  const [tab,setTab] = useState("dashboard");
  const [users,setUsers] = useState(INITIAL_USERS);

  const tabs = [
    { id:"dashboard", label:"Dashboard", icon:"📊", perm:"view_dashboard" },
    { id:"users",     label:"Users",     icon:"👥", perm:"view_users" },
    { id:"roles",     label:"Roles",     icon:"🛡️", perm:"manage_roles" },
    { id:"apikeys",   label:"API Keys",  icon:"🔑", perm:"manage_api_keys" },
    { id:"webhooks",  label:"Webhooks",  icon:"🔗", perm:"manage_webhooks" },
    { id:"emails",     label:"Emails",      icon:"✉️", perm:"manage_email_templates" },
    { id:"ratelimits", label:"Rate Limits", icon:"🛡️", perm:"manage_rate_limits" },
    { id:"backup",     label:"Backup",      icon:"💾", perm:"manage_backups" },
    { id:"broadcast",  label:"Broadcast",   icon:"📢", perm:"send_broadcasts" },
    { id:"settings",   label:"Settings",   icon:"⚙️", perm:"view_settings" },

  // Ensure current tab is accessible; fall back to first allowed tab
  const activeTab = tabs.find(t=>t.id===tab) ? tab : (tabs[0]?.id||"dashboard");

  const roleInfo = ROLES[role] || ROLES.super_admin;

  return (
    <div style={{height:"100%",display:"flex",flexDirection:"column",background:C.bg,fontFamily:"'Plus Jakarta Sans',sans-serif",color:C.white}}>
      {/* Header */}
      <div style={{
        background:`linear-gradient(135deg,${C.s1},${C.s2})`,
        borderBottom:`1px solid ${C.border}`,
        padding:"16px 20px 0",
        flexShrink:0,
      }}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{
              width:36,height:36,borderRadius:10,
              background:`linear-gradient(135deg,${C.brand},${C.brandDk})`,
              display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,
            }}>✨</div>
            <div>
              <div style={{fontSize:16,fontWeight:800,color:C.white}}>Wish Admin</div>
              <div style={{fontSize:11,color:"rgba(255,255,255,.4)"}}>
                <span style={{color:roleInfo.color}}>{roleInfo.icon} {roleInfo.label}</span>
              </div>
            </div>
          </div>
          <button
            onClick={onExit}
            style={{background:"rgba(239,68,68,.1)",border:"1px solid rgba(239,68,68,.25)",color:C.red,borderRadius:10,padding:"7px 14px",fontSize:12,fontWeight:700,cursor:"pointer"}}
          >Exit</button>
        </div>

        {/* Nav tabs */}
        <div className="admin-nav">
          {tabs.map(t=>(
            <button key={t.id} className={`admin-tab${activeTab===t.id?" active":""}`} onClick={()=>setTab(t.id)}>
              {t.icon} {t.label}
            </button>
          ))}
        </div>
      </div>

      {/* Content */}
      <div style={{flex:1,overflowY:"auto",padding:20}}>
        {activeTab==="dashboard" && <AdminDashboard users={users} adminUser={user}/>}
        {activeTab==="users"     && <AdminUsers users={users} setUsers={setUsers} adminUser={user}/>}
        {activeTab==="roles"     && <AdminRoles users={users} setUsers={setUsers} adminUser={user}/>}
        {activeTab==="apikeys"   && <AdminApiKeys/>}
        {activeTab==="webhooks"  && <AdminWebhooks/>}
        {activeTab==="emails"      && <AdminEmailTemplates/>}
        {activeTab==="ratelimits" && <AdminRateLimits/>}
        {activeTab==="backup"     && <AdminBackup users={users} setUsers={setUsers} adminUser={user}/>}
        {activeTab==="broadcast"  && <AdminBroadcast users={users} adminUser={user}/>}
        {activeTab==="settings"   && <AdminSettings/>}
      </div>
    </div>
  );
}

function WalletTab({ u, C, setU }) {
  const [wallet,    setWallet]    = useState(u.walletAddress || '');
  const [wishBal,   setWBal]      = useState(u.tokens ?? 0);
  const [solBal,    setSBal]      = useState(null);
  const [mintCfg,   setMintCfg]   = useState(false);
  const [screen,    setScreen]    = useState('main');
  const [sendTo,    setSendTo]    = useState('');
  const [sendAmt,   setSendAmt]   = useState('');
  const [msg,       setMsg]       = useState('');
  const [busy,      setBusy]      = useState(false);
  const [copied,    setCopied]    = useState(false);
  const [creating,  setCreating]  = useState(false);
  const [balLoading,setBalLoad]   = useState(false);
  const [txHistory,  setTxHistory] = useState([]);

  // ── Auto-create or restore wallet on mount ─────────────────────────────────
  useEffect(() => {
    loadTx();
    if (u.walletAddress) { loadBalances(u.walletAddress); return; }
    setCreating(true);
    fetch(`/api/wallet?userId=${encodeURIComponent(u.id)}`)
      .then(r => r.json())
      .then(d => { if (d.address) { setWallet(d.address); loadBalances(d.address); }
                   else setMsg(d.error || 'Could not create wallet'); })
      .catch(e => setMsg('Network error: ' + e.message))
      .finally(() => setCreating(false));
  }, []);

  useEffect(() => {
    if (u.walletAddress && !wallet) { setWallet(u.walletAddress); loadBalances(u.walletAddress); }
  }, [u.walletAddress]);

  // Keep WISH balance in sync with in-app tokens when mint not on-chain yet
  useEffect(() => {
    if (!mintCfg) setWBal(u.tokens ?? 0);
  }, [u.tokens, mintCfg]);

  // ── Balance fetch (server-side — avoids CORS on public Solana RPC) ─────────
  const loadBalances = async (addr) => {
    setBalLoad(true);
    try {
      const r = await fetch(`/api/walletBalance?address=${encodeURIComponent(addr)}`);
      const d = await r.json();
      if (!d.error) {
        setSBal(d.sol);
        setMintCfg(!!d.mintConfigured);
        if (d.mintConfigured) {
          setWBal(d.wish);
        } else {
          // Fetch fresh token balance from DB so the refresh button shows
          // the real value even when the in-memory state is stale.
          try {
            const ur = await fetch(`/api/user?email=${encodeURIComponent(u.email)}`);
            const ud = await ur.json();
            const fresh = ud.user?.tokens ?? u.tokens ?? 0;
            setWBal(fresh);
            setU(p => ({ ...p, tokens: fresh }));
          } catch { setWBal(u.tokens ?? 0); }
        }
      }
    } catch(e) { console.warn('[balances]', e.message); }
    finally { setBalLoad(false); }
  };

  // ── Send WISH coins (server-side signing) ──────────────────────────────────
  const send = async () => {
    if (busy || !wallet || !sendTo.trim() || !sendAmt) return;
    setBusy(true); setMsg('');
    try {
      const r = await fetch('/api/walletSend', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId: u.id, toAddress: sendTo.trim(), amount: Number(sendAmt) }),
      });
      const d = await r.json();
      if (d.error) throw new Error(d.error);
      // Update local balance immediately without waiting for a reload
      setWBal(d.newBalance);
      setU(p => ({ ...p, tokens: d.newBalance }));
      setMsg('✅ Sent successfully!');
      setSendTo(''); setSendAmt('');
      loadTx();
      setTimeout(() => { setMsg(''); setScreen('main'); }, 1800);
    } catch(e) { setMsg('❌ ' + (e.message || 'Send failed')); }
    finally    { setBusy(false); }
  };

  const loadTx = () => {
    fetch(`/api/walletTx?userId=${encodeURIComponent(u.id)}`)
      .then(r => r.json())
      .then(d => { if (d.txs) setTxHistory(d.txs); })
      .catch(() => {});
  };

  const copyAddr = async () => {
    try { await navigator.clipboard.writeText(wallet); } catch { /* ignore */ }
    setCopied(true); setTimeout(() => setCopied(false), 2000);
  };

  const back = () => { setScreen('main'); setMsg(''); };
  const fmt  = n => (n === null) ? null : Number(n).toLocaleString(undefined, {maximumFractionDigits:4});

  // ── Loading placeholder ────────────────────────────────────────────────────
  if (!wallet) return (
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'70px 24px',minHeight:320}}>
      <div style={{fontSize:54,marginBottom:20,animation:'float 2.5s ease-in-out infinite'}}>🪙</div>
      {creating
        ? <>
            <div style={{fontSize:15,fontWeight:700,color:C.white,marginBottom:12}}>Setting up your wallet…</div>
            <div style={{display:'flex',gap:7}}>
              {[0,1,2].map(i => <div key={i} style={{width:9,height:9,borderRadius:'50%',background:'#8b5cf6',animation:'dotPulse 1.2s ease infinite',animationDelay:`${i*0.22}s`}}/>)}
            </div>
          </>
        : <div style={{fontSize:13,color:'#f87171',textAlign:'center',lineHeight:1.6}}>{msg || 'Could not load wallet. Refresh to try again.'}</div>}
    </div>
  );

  // ── Send screen ────────────────────────────────────────────────────────────
  if (screen === 'send') return (
    <div style={{padding:'0 16px 32px',animation:'up .3s ease'}}>
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:24}}>
        <button onClick={back} style={{width:36,height:36,borderRadius:10,background:'rgba(255,255,255,.07)',border:'none',color:C.white,fontSize:18,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>←</button>
        <div style={{fontSize:17,fontWeight:800,color:C.white}}>Send Wish Coins</div>
      </div>
      <div style={{background:'linear-gradient(135deg,rgba(245,158,11,.12),rgba(249,115,22,.08))',border:'1px solid rgba(245,158,11,.25)',borderRadius:14,padding:'12px 16px',marginBottom:20,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span style={{fontSize:12,color:'rgba(255,255,255,.45)'}}>Available balance</span>
        <span style={{fontWeight:800,color:'#f59e0b',fontSize:18}}>{wishBal??'…'} <span style={{fontSize:12,opacity:.6}}>WISH</span></span>
      </div>
      <input style={{background:'rgba(255,255,255,.06)',border:'1px solid rgba(255,255,255,.1)',borderRadius:12,padding:'14px 16px',color:C.white,fontSize:14,width:'100%',outline:'none',marginBottom:12,boxSizing:'border-box'}}
        placeholder="Recipient wallet address" value={sendTo} onChange={e=>setSendTo(e.target.value)}/>
      <input style={{background:'rgba(255,255,255,.06)',border:'1px solid rgba(255,255,255,.1)',borderRadius:12,padding:'14px 16px',color:C.white,fontSize:22,fontWeight:700,width:'100%',outline:'none',marginBottom:20,boxSizing:'border-box'}}
        type="number" min="0" placeholder="0" value={sendAmt} onChange={e=>setSendAmt(e.target.value)}/>
      <button onClick={send} disabled={busy||!sendTo||!sendAmt||Number(sendAmt)<=0}
        style={{width:'100%',padding:'16px 0',background:(!sendTo||!sendAmt||Number(sendAmt)<=0)?'rgba(255,255,255,.06)':'linear-gradient(135deg,#f59e0b,#f97316)',border:'none',borderRadius:14,color:(!sendTo||!sendAmt||Number(sendAmt)<=0)?'rgba(255,255,255,.25)':'#fff',fontWeight:800,fontSize:16,cursor:(!sendTo||!sendAmt||Number(sendAmt)<=0)?'not-allowed':'pointer',opacity:busy?.7:1}}>
        {busy?'⏳ Sending…':'📤 Confirm Send'}
      </button>
      {msg && <div style={{marginTop:14,background:msg.startsWith('✅')?'rgba(52,211,153,.08)':'rgba(248,113,113,.08)',border:`1px solid ${msg.startsWith('✅')?'rgba(52,211,153,.25)':'rgba(248,113,113,.25)'}`,borderRadius:12,padding:'10px 14px',color:msg.startsWith('✅')?'#34d399':'#f87171',fontSize:12,fontFamily:'monospace'}}>{msg}</div>}
    </div>
  );

  // ── Receive screen ─────────────────────────────────────────────────────────
  if (screen === 'receive') return (
    <div style={{padding:'0 16px 32px',animation:'up .3s ease'}}>
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:24}}>
        <button onClick={back} style={{width:36,height:36,borderRadius:10,background:'rgba(255,255,255,.07)',border:'none',color:C.white,fontSize:18,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>←</button>
        <div style={{fontSize:17,fontWeight:800,color:C.white}}>Receive</div>
      </div>
      <div style={{background:'linear-gradient(145deg,#1a0833,#120f2e)',border:'1px solid rgba(139,92,246,.2)',borderRadius:22,padding:'24px 20px',textAlign:'center'}}>
        <div style={{fontSize:10,color:'rgba(255,255,255,.35)',letterSpacing:1.5,textTransform:'uppercase',marginBottom:18}}>Send SOL or WISH to this address</div>
        <div style={{display:'inline-block',padding:10,background:'#fff',borderRadius:18,marginBottom:20,boxShadow:'0 0 50px rgba(139,92,246,.35)'}}>
          <img src={`https://api.qrserver.com/v1/create-qr-code/?data=${wallet}&size=180x180&bgcolor=ffffff&color=1a0833&margin=8`}
            alt="QR" style={{display:'block',borderRadius:10,width:180,height:180}}/>
        </div>
        <div style={{fontSize:11,color:'#a78bfa',fontFamily:'monospace',wordBreak:'break-all',lineHeight:1.8,background:'rgba(139,92,246,.08)',borderRadius:12,padding:'10px 14px',marginBottom:20}}>
          {wallet}
        </div>
        <button onClick={copyAddr}
          style={{width:'100%',padding:'15px 0',background:copied?'linear-gradient(135deg,#34d399,#10b981)':'linear-gradient(135deg,#8b5cf6,#7c3aed)',border:'none',borderRadius:14,color:'#fff',fontWeight:800,fontSize:15,cursor:'pointer',transition:'all .25s',boxShadow:copied?'0 4px 20px rgba(52,211,153,.3)':'0 4px 20px rgba(139,92,246,.3)'}}>
          {copied ? '✓ Copied!' : '📋 Copy Address'}
        </button>
      </div>
    </div>
  );

  // ── Main screen ────────────────────────────────────────────────────────────
  return (
    <div style={{paddingBottom:32,animation:'up .3s ease'}}>

      {/* Hero balance card */}
      <div style={{background:'linear-gradient(145deg,#1a0833 0%,#2d1060 50%,#0d1840 100%)',borderBottom:'1px solid rgba(139,92,246,.18)',padding:'28px 20px 22px',position:'relative',overflow:'hidden'}}>
        {/* Ambient glow blobs */}
        <div style={{position:'absolute',top:-50,right:-30,width:180,height:180,borderRadius:'50%',background:'radial-gradient(circle,rgba(245,158,11,.18),transparent 70%)',pointerEvents:'none'}}/>
        <div style={{position:'absolute',bottom:-40,left:-20,width:140,height:140,borderRadius:'50%',background:'radial-gradient(circle,rgba(139,92,246,.22),transparent 70%)',pointerEvents:'none'}}/>

        {/* Header row */}
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:18}}>
          <div style={{fontSize:30,animation:'float 3s ease-in-out infinite',lineHeight:1}}>🪙</div>
          <div>
            <div style={{fontSize:10,color:'rgba(255,255,255,.35)',letterSpacing:1.8,textTransform:'uppercase'}}>Wish Wallet</div>
            <div style={{fontSize:12,color:'rgba(255,255,255,.2)',letterSpacing:.3}}>Solana Network</div>
          </div>
          {/* Refresh button */}
          <button onClick={()=>loadBalances(wallet)} title="Refresh balances"
            style={{marginLeft:'auto',width:32,height:32,borderRadius:8,background:'rgba(255,255,255,.06)',border:'1px solid rgba(255,255,255,.08)',color:'rgba(255,255,255,.4)',fontSize:14,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',animation:balLoading?'spin 1s linear infinite':'none'}}>
            ↻
          </button>
        </div>

        {/* WISH balance — big hero number */}
        <div style={{marginBottom:10}}>
          <div style={{
            fontSize:50,fontWeight:900,letterSpacing:-2,lineHeight:1,
            background:'linear-gradient(135deg,#fde68a 0%,#f59e0b 40%,#f97316 100%)',
            WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',
            filter:'drop-shadow(0 2px 16px rgba(245,158,11,.5))',
          }}>
            {balLoading && wishBal === null

            onMouseOver={e=>e.currentTarget.style.opacity='.8'} onMouseOut={e=>e.currentTarget.style.opacity='1'}>
