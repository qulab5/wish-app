function Card({ch,style={},glow=false,animate=false}){
  return <div style={{
    background: C.s2,
    border: `1px solid ${glow ? C.border2 : C.border}`,
    borderRadius: 18,
    overflow: "hidden",
    boxShadow: glow ? `0 0 30px ${C.brand}40` : "none",
    animation: animate ? "float 3s ease infinite" : "none",
    transition: "all 0.3s ease",
    ...style
  }}>{ch}</div>;
}

function Inp({label,type="text",val,onChange,err,placeholder,icon,countryCode,onCountryChange,selectedCountry}){
  const [show,setShow]=useState(false);
  const [focused,setFocused]=useState(false);
  
  const shouldShowError = err && typeof err === 'string' && err !== '[object Object]' && err.trim() !== '';
  
  if (type === "phone-with-code") {
    return (
      <div style={{marginBottom:16}}>
        {label&&<div style={{fontSize:11,fontWeight:700,color:C.muted,letterSpacing:.08,textTransform:"uppercase",marginBottom:6}}>{label}</div>}
        <div style={{display:"flex",gap:8}}>
          <div style={{position:"relative", width:"120px"}}>
            <select 
              value={selectedCountry} 
              onChange={onCountryChange}
              className="country-select"
              style={{
                width:"100%",
                padding:"13px 30px 13px 12px",
                background:"rgba(139,92,246,.07)",
                border:`1.5px solid ${shouldShowError?"rgba(239,68,68,.5)":focused?C.brand:C.border2}`,
                color:C.white,
                borderRadius:13,
                fontSize:14,
                fontFamily:"inherit",
                outline:"none",
                transition:"border 0.2s, box-shadow 0.2s",
                boxShadow:focused?`0 0 0 3px ${C.brand}30`:"none",
                appearance:"none",
                cursor:"pointer"
              }}
              onFocus={()=>setFocused(true)}
              onBlur={()=>setFocused(false)}
            >
              {COUNTRIES.map((c, idx) => (
                <option key={idx} value={c.code} style={{background:C.s1, color:"#fff", padding:"10px"}}>
                  {c.flag} {c.code} {c.name}
                </option>
              ))}
            </select>
          </div>
          
          <div style={{position:"relative", flex:1}}>
            {icon&&<div style={{position:"absolute",left:14,top:"50%",transform:"translateY(-50%)",fontSize:18,lineHeight:1,color:focused?C.brand:C.muted,transition:"color 0.2s"}}>{icon}</div>}
            <input 
              type="tel"
              value={val} 
              onChange={(e) => onChange(e.target.value)}
              placeholder={placeholder}
              onFocus={()=>setFocused(true)}
              onBlur={()=>setFocused(false)}
              style={{
                width:"100%",
                background:"rgba(139,92,246,.07)",
                border:`1.5px solid ${shouldShowError?"rgba(239,68,68,.5)":focused?C.brand:C.border2}`,
                color:C.white,
                borderRadius:13,
                padding:`13px 16px 13px ${icon?"44px":"16px"}`,
                fontSize:14,
                fontFamily:"inherit",
                outline:"none",
                transition:"border 0.2s, box-shadow 0.2s",
                boxShadow:focused?`0 0 0 3px ${C.brand}30`:"none"
              }}
            />
          </div>
        </div>

function SpinWheel({angle,spinning,phase}){
  // Slot order matches SPIN_PTS index: 0=500 … 6=3500, 7=20K (jackpot, gold)
  const ptSegs=[{v:"500",c:"#8b5cf6"},{v:"1K",c:"#06b6d4"},{v:"1.5K",c:"#10b981"},{v:"2K",c:"#ec4899"},{v:"2.5K",c:"#f97316"},{v:"3K",c:"#6366f1"},{v:"3.5K",c:"#84cc16"},{v:"20K",c:"#FFD700"}];
  const udSegs=[{v:"$1",c:"#10b981"},{v:"$2",c:C.gold},{v:"$3",c:"#8b5cf6"},{v:"$1",c:"#06b6d4"},{v:"$2",c:"#ec4899"},{v:"$3",c:"#f97316"},{v:"$1",c:"#6366f1"},{v:"$2",c:"#84cc16"}];
  const segs=phase==="points"?ptSegs:udSegs;
  const n=8,r=88,cx=96,cy=96;
  return(<div style={{position:"relative",width:192,height:192,margin:"0 auto"}}>
    <div style={{position:"absolute",inset:-8,borderRadius:"50%",background:`conic-gradient(${segs.map((s,i)=>`${s.c} ${i*45}deg ${(i+1)*45}deg`).join(",")})`,opacity:.1,filter:"blur(10px)"}}/>
    <svg width="192" height="192" style={{transform:`rotate(${angle}deg)`,transition:spinning?"transform 3.8s cubic-bezier(.17,.67,.08,1)":"none",borderRadius:"50%",position:"relative",zIndex:1,filter:"drop-shadow(0 0 20px rgba(139,92,246,.4))"}}>
      {segs.map((s,i)=>{
        const a1=(2*Math.PI/n)*i-Math.PI/2,a2=(2*Math.PI/n)*(i+1)-Math.PI/2;
        const x1=cx+r*Math.cos(a1),y1=cy+r*Math.sin(a1),x2=cx+r*Math.cos(a2),y2=cy+r*Math.sin(a2);
        const ma=(a1+a2)/2,tx=cx+(r*.62)*Math.cos(ma),ty=cy+(r*.62)*Math.sin(ma);
        return(<g key={i}><path d={`M${cx},${cy} L${x1},${y1} A${r},${r} 0 0,1 ${x2},${y2} Z`} fill={s.c} opacity=".85"/><text x={tx} y={ty} textAnchor="middle" dominantBaseline="middle" fill="#fff" fontSize="10" fontWeight="800" fontFamily="DM Mono,monospace">{s.v}</text></g>);
      })}
      <circle cx={cx} cy={cy} r="16" fill={C.s1} stroke="rgba(255,255,255,.15)" strokeWidth="2"/>
      <text x={cx} y={cy+1} textAnchor="middle" dominantBaseline="middle" fontSize="13">🎯</text>
    </svg>
    <div style={{position:"absolute",top:-6,left:"50%",transform:"translateX(-50%)",width:0,height:0,borderLeft:"9px solid transparent",borderRight:"9px solid transparent",borderTop:`20px solid ${C.gold}`,zIndex:2,filter:`drop-shadow(0 3px 8px ${C.gold}88)`}}/>
  </div>);
}

function AuthScreen({onLogin,lang}){
  const [mode,setMode]      = useState("welcome");
  const [method,setMethod]  = useState("email");
  const [form,setForm]      = useState({name:"", username:"", email:"", phone:"", countryCode:"+1", pass:"", conf:"", refCode:"", country:""});
  const [errs,setErrs]      = useState({});
  const [loading,setLoading]= useState(false);
  const [users,setUsers]    = useState(INITIAL_USERS);
  /* OTP states */
  const [otpStep,setOtpStep]    = useState(false);
  const [otpInput,setOtpInput]  = useState(["","","","","",""]);
  const [otpErr,setOtpErr]      = useState("");
  const [otpSending,setOtpSending] = useState(false);
  const [resendT,setResendT]    = useState(60);
  const [canResend,setCanResend] = useState(false);
  const [pendingUser,setPU]     = useState(null);
  const [otpToken,setOtpToken]  = useState(null);
  const otpRefs = [useRef(),useRef(),useRef(),useRef(),useRef(),useRef()];

  const f=(k)=>v=>setForm(p=>({...p,[k]:v}));
  const L=(k)=>t$(lang,k);

  /* OTP resend timer */
  useEffect(()=>{
    if(!otpStep)return;
    setResendT(60);
    setCanResend(false);
    const iv=setInterval(()=>setResendT(t=>{
      if(t<=1){
        setCanResend(true);
        return 0;
      }
      return t-1;
    }),1000);
    return()=>clearInterval(iv);
  },[otpStep]);

  /* ===== FIXED sendOtp FUNCTION WITH ERROR HANDLING ===== */
  const sendOtp = async (nu) => {
    setPU(nu);
    setOtpStep(true);
    setOtpInput(["","","","","",""]);
    setOtpErr("");
    setOtpSending(true);
    
    try {
      console.log('1. Starting OTP send for:', nu.email);
      
      const baseUrl = window.location.origin;
      const apiUrl = `${baseUrl}/api/send-otp`;
      console.log('2. Fetching from:', apiUrl);
      
      const res = await fetch(apiUrl, {
        method: 'POST',
        headers: { 
          'Content-Type': 'application/json',
          'Accept': 'application/json'
        },
        body: JSON.stringify({ email: nu.email })
      });
      
      console.log('3. Response status:', res.status);
      
      const text = await res.text();
      console.log('4. Raw response:', text);
      
      let data;
      try {
        data = JSON.parse(text);
        console.log('5. Parsed data:', data);
      } catch (e) {
        console.error('6. JSON parse error:', e);
        setOtpErr(`Server returned invalid response. Status: ${res.status}`);
        setOtpSending(false);
        return;
      }
      
      if (data.success) {
        console.log('7. Success!');
        setOtpToken(data.token);
        setOtpErr("");
      } else {
        console.log('7. Error received:', data.error);
        // FIXED: Convert error object to string safely
        let errorMessage = "Failed to send code";
        if (data.error) {
          if (typeof data.error === 'string') {
            errorMessage = data.error;
          } else if (typeof data.error === 'object') {
            errorMessage = data.error.message || JSON.stringify(data.error);
          }
        }
        setOtpErr(errorMessage);
      }
    } catch (err) {
      console.error('8. Fetch error:', err);
      setOtpErr(`Network error: ${err.message}`);
    } finally {
      setOtpSending(false);
      setTimeout(() => otpRefs[0].current?.focus(), 100);
    }
  };
  /* ===== END OF FIXED sendOtp FUNCTION ===== */

  const resendOtp = async () => {
    if (!canResend) return;
    setOtpInput(["","","","","",""]);
    setOtpErr("");
    setOtpSending(true);
    
    try {
      const baseUrl = window.location.origin;
      const apiUrl = `${baseUrl}/api/send-otp`;
      
      const res = await fetch(apiUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: pendingUser.email })
      });
      
      const text = await res.text();
      let data;
      try {
        data = JSON.parse(text);
      } catch (e) {
        setOtpErr("Invalid server response");
        setOtpSending(false);
        return;
      }
      
      if (data.success) {
        setOtpErr("");
        setOtpToken(data.token);
        setResendT(60);
        setCanResend(false);
      } else {
        let errorMessage = "Failed to resend code";
        if (data.error) {
          if (typeof data.error === 'string') {
            errorMessage = data.error;
          } else if (typeof data.error === 'object') {
            errorMessage = data.error.message || JSON.stringify(data.error);
          }
        }
        setOtpErr(errorMessage);
      }
    } catch (err) {
      setOtpErr("Network error");
    } finally {
      setOtpSending(false);
      setTimeout(() => otpRefs[0].current?.focus(), 100);
    }
  };

  const handleOtpKey=(idx,val)=>{
    if(!/^[0-9]?$/.test(val))return;
    const nv=[...otpInput];nv[idx]=val;setOtpInput(nv);
    if(val&&idx<5)otpRefs[idx+1].current.focus();
  };
  
  const handleOtpBack=(idx,e)=>{
    if(e.key==="Backspace"&&!otpInput[idx]&&idx>0)otpRefs[idx-1].current.focus();
  };

  const verifyOtp=async()=>{
    const entered=otpInput.join("");
    if(entered.length<6){setOtpErr("Please enter 6-digit code");return;}
    if(!otpToken){setOtpErr("Session expired. Please request a new code.");return;}
    setOtpSending(true);
    try{
      const res=await fetch(`${window.location.origin}/api/verify-otp`,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({token:otpToken,otp:entered})
      });
      const data=await res.json();
      if(data.success){
        setUsers(p=>[...p,pendingUser]);
        // Persist new user to Supabase
        try{
          const saveRes=await fetch('/api/user',{method:'POST',headers:{'Content-Type':'application/json'},
            body:JSON.stringify({...pendingUser,joined:new Date().toLocaleDateString('en-US',{month:'short',year:'numeric'}),pts:0,usd:0,tasksDone:{},adLeft:5,adDate:new Date().toDateString(),refCode:pendingUser.refCode||null,refBy:pendingUser.refBy||null,refPts:0,refs:[]})});
          if(!saveRes.ok){
            const e=await saveRes.json();
            console.error('Failed to save user:',e);
            setOtpErr('Account created but failed to save: '+(e.error||'DB error. Check Vercel env vars.'));
            return;
          }
        }catch(e){
          console.error('Failed to save user:',e);
          setOtpErr('Account created but DB save failed. Check Vercel env vars (SUPABASE_URL, SUPABASE_SERVICE_KEY).');
          return;
        }
        // ── Award 2,000 pts signup bonus to the referrer ─────────────────
        if(pendingUser.refBy){
          try{
            const rr=await fetch(`/api/user?refCode=${encodeURIComponent(pendingUser.refBy)}`);
            const rd=await rr.json();
            if(rd.user){
              const ref=rd.user;
              const joinedLabel=new Date().toLocaleDateString('en-US',{month:'short',year:'numeric'});
              const newRefs=[...(ref.refs||[]),{name:pendingUser.name,joined:joinedLabel,pts:0}];
              await fetch('/api/user',{method:'POST',headers:{'Content-Type':'application/json'},
                body:JSON.stringify({id:ref.id,email:ref.email,pts:(ref.pts||0)+REF_SIGNUP_BONUS,refPts:(ref.refPts||0)+REF_SIGNUP_BONUS,refs:newRefs})});
            }
          }catch(_){}
        }
        onLogin(pendingUser);
      } else {
        setOtpErr(typeof data.error==='string'?data.error:'Invalid code');
      }
    } catch(err){
      setOtpErr('Network error. Please try again.');
    } finally {
      setOtpSending(false);
    }
  };

  const validate=()=>{
    const e={};
    if(mode==="register"&&!form.name.trim()) e.name=L("required");
    if(mode==="register"&&!form.username.trim()) e.username="Username is required";

    if(form.pass.length<6) e.pass="Min 6 characters";
    if(mode==="register"&&form.pass!==form.conf) e.conf="Passwords don't match";

    return Object.keys(e).length===0;
  };

  const submit=async()=>{
    if(!validate()) return;
    setLoading(true);
    if(mode==="login"){
      let foundUser=null;
      // Check demo/admin users first (in-memory) for credentials

      // Always fetch the DB record so we get the latest pts/usd/state.
      // For in-memory/demo users this merges their saved progress on top of the
      // hardcoded seed values; for real registered users it IS the source of truth.
      if(foundUser&&!foundUser.isAdmin){
        try{
          const r=await fetch(`/api/user?email=${encodeURIComponent(form.email)}`);
          const d=await r.json();
          if(d.user) foundUser={...foundUser,...d.user};
        }catch(e){}
      }
      // Fall back to DB-only lookup for real registered users (no in-memory entry)
      if(!foundUser&&method==="email"){
        try{
          const r=await fetch(`/api/user?email=${encodeURIComponent(form.email)}`);
          const d=await r.json();
          if(d.user&&d.user.pass===form.pass) foundUser=d.user;
        }catch(e){}
      }
      setLoading(false);
      if(foundUser) onLogin(foundUser);
      else setErrs({pass:"Invalid credentials"});

      if(users.find(x=>x.email===form.email)){setLoading(false);setErrs({email:"Account already exists"});return;}

      const _uid="u"+Date.now();
      const _rc=form.username.toLowerCase().replace(/[^a-z0-9]/g,"").substring(0,10)+String(Math.floor(Math.random()*90)+10);

        refCode:_rc,refBy:form.refCode.trim().toLowerCase()||null,refPts:0,refs:[]};
      setLoading(false);
      sendOtp(nu);
    }
  };

  /* OTP SCREEN */
  if(otpStep) return(
    <div style={{minHeight:"100vh",background:C.bg,fontFamily:"'Plus Jakarta Sans',sans-serif",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24,position:"relative",overflow:"hidden"}}>

      <div style={{width:"100%",maxWidth:360,animation:"up .3s ease"}}>
        <div style={{textAlign:"center",marginBottom:32}}>
          <div style={{width:80,height:80,borderRadius:22,background:"linear-gradient(135deg,rgba(139,92,246,.2),rgba(6,182,212,.15))",border:"1px solid rgba(139,92,246,.3)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:36,margin:"0 auto 18px",animation:"float 3s ease infinite",boxShadow:`0 0 30px ${C.brand}60`}}>

          <div style={{fontSize:13,color:C.muted,lineHeight:1.65}}>
            A 6-digit code was sent to<br/>
            <span style={{color:C.brandLt,fontWeight:600}}>{method==="email"?form.email:form.countryCode+form.phone}</span>

        </div>

        {/* OTP Boxes */}
        <div style={{display:"flex",gap:10,justifyContent:"center",marginBottom:16}}>
          {otpInput.map((v,i)=>(
            <input key={i} ref={otpRefs[i]} value={v}
              onChange={e=>handleOtpKey(i,e.target.value)}
              onKeyDown={e=>handleOtpBack(i,e)}
              maxLength={1} inputMode="numeric"
              style={{
                width:48,
                height:56,
                textAlign:"center",
                fontSize:22,
                fontWeight:800,
                fontFamily:"'DM Mono',monospace",
                background:"rgba(139,92,246,.08)",
                border:`2px solid ${v?C.brand:otpErr?"rgba(239,68,68,.4)":"rgba(139,92,246,.22)"}`,
                borderRadius:13,
                color:"#fff",
                outline:"none",
                transition:"all .15s",
                boxShadow:v?`0 0 0 3px ${C.brand}40`:"none"

        <div style={{textAlign:"center",marginBottom:20,fontSize:14}}>
          <span style={{color:resendT>0?C.gold:C.red}}>

        </div>

        {otpErr&&<div style={{textAlign:"center",color:C.red,fontSize:12,marginBottom:12,fontWeight:600}}>⚠ {otpErr}</div>}

        {otpSending && (
          <div style={{textAlign:"center",marginBottom:12}}>
            <div style={{display:"inline-block",width:20,height:20,borderRadius:"50%",border:"2px solid #8b5cf6",borderTopColor:"transparent",animation:"spin 1s linear infinite"}}></div>

          </div>

        <Inp label={L("password")} type="password" val={form.pass} onChange={f("pass")} err={errs.pass} placeholder="••••••••" icon="🔒"/>
        {mode==="register"&&<Inp label="Confirm Password" type="password" val={form.conf} onChange={f("conf")} err={errs.conf} placeholder="••••••••" icon="🔑"/>}
        {mode==="register"&&<Inp label="Referral Code (optional)" val={form.refCode} onChange={f("refCode")} placeholder="Enter a friend's referral code" icon="🔗"/>}
      </div>

    </div>
  );
}

// Generates a random hex string of given length
function randHex(len){
  const arr = new Uint8Array(len/2);
  crypto.getRandomValues(arr);
  return Array.from(arr,b=>b.toString(16).padStart(2,"0")).join("");
}
function makeApiKey(){ return `wsh_live_${randHex(32)}`; }
function makeWebhookSecret(){ return `whsec_${randHex(24)}`; }
function keyPrefix(full){ return full.slice(0,14)+"…"; }
function fmtDate(iso){ return new Date(iso).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}); }

function previewHtml(html, subject){
  let out = html;
  let subj = subject;
  Object.entries(EMAIL_PREVIEW_VALUES).forEach(([k,v])=>{
    const re = new RegExp(k.replace(/[{}]/g,"\\$&"),"g");
    out  = out.replace(re,v);
    subj = subj.replace(re,v);
  });
  return {html:out, subject:subj};
}

// Formats a window in seconds to a readable string
function fmtWindow(secs){
  if(secs<60)   return `${secs}s`;
  if(secs<3600) return `${secs/60}m`;
  if(secs<86400) return `${secs/3600}h`;
  return `${secs/86400}d`;
}

function fmtRate(limit, windowSecs){
  return `${limit} / ${fmtWindow(windowSecs)}`;
}

/* ── Users Tab ─────────────────────────────────── */
function AdminUsers({users, setUsers, adminUser}){
  const [search,setSearch]   = useState("");
  const [confirm,setConfirm] = useState(null);
  const [modal,setModal]     = useState(null); // "create"|"edit"
  const [form,setForm]       = useState({});
  const [saving,setSaving]   = useState(false);
  const [saveMsg,setSaveMsg] = useState("");

  const canDelete  = can(adminUser,"delete_users");
  const canToggle  = can(adminUser,"toggle_user_active");
  const canEdit    = can(adminUser,"edit_users");
  const canCreate  = can(adminUser,"create_users");
  const canBalance = can(adminUser,"edit_user_balance");

  const regularUsers = users.filter(u=>u.role==="user"||(!u.isAdmin&&!u.role));
  const filtered = regularUsers.filter(u=>
    (u.name||"").toLowerCase().includes(search.toLowerCase()) ||
    (u.email||"").toLowerCase().includes(search.toLowerCase())
  );

  const fv = (k,type="text") => e => setForm(p=>({...p,[k]:type==="number"?Number(e.target.value):type==="bool"?e.target.checked:e.target.value}));

  const openCreate = () => {
    setForm({name:"",email:"",pts:0,usd:0,country:"",active:true});
    setModal("create");
    setSaveMsg("");
  };

  const openEdit = (u) => {
    setForm({name:u.name||"",email:u.email||"",pts:u.pts||0,usd:u.usd||0,country:u.country||"",active:u.active??true,_id:u.id});
    setModal("edit");
    setSaveMsg("");
  };

  const saveUser = async () => {
    if(!form.email?.trim()||!form.name?.trim()){setSaveMsg("Name and email are required.");return;}
    setSaving(true); setSaveMsg("");
    try {
      if(modal==="create"){
        const newId = `u_${Date.now()}`;
        const payload = {action:"adminCreate",id:newId,name:form.name.trim(),email:form.email.trim(),pts:Number(form.pts)||0,usd:Number(form.usd)||0,country:form.country||"",active:form.active??true,role:"user",joined:new Date().toISOString().slice(0,10)};
        const r = await fetch('/api/user',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
        const d = await r.json();
        if(!r.ok) throw new Error(d.error||"Failed to create user");
        setUsers(prev=>[...prev,{...payload,id:newId}]);
        logAudit(adminUser.email,"create_user",`Created ${form.name} (${form.email})`);
        setSaveMsg("✓ User created!");
      } else {
        const updates = {action:"adminUpdate",userId:form._id,name:form.name.trim(),email:form.email.trim(),active:form.active??true};
        if(canBalance){updates.pts=Number(form.pts)||0;updates.usd=Number(form.usd)||0;}
        if(form.country!==undefined)updates.country=form.country;
        const r = await fetch('/api/user',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(updates)});
        const d = await r.json();
        if(!r.ok) throw new Error(d.error||"Failed to save");
        setUsers(prev=>prev.map(u=>u.id===form._id?{...u,...updates}:u));
        logAudit(adminUser.email,"edit_user",`Edited ${form.name} (${form.email})`);
        setSaveMsg("✓ Saved!");
      }
      setTimeout(()=>{setModal(null);setSaveMsg("");},1200);
    } catch(err){setSaveMsg("Error: "+err.message);}
    finally{setSaving(false);}
  };

  const toggleActive = async (id) => {
    const u = users.find(x=>x.id===id);
    const newActive = !u.active;
    fetch('/api/user',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:"adminUpdate",userId:id,active:newActive})}).catch(()=>{});
    setUsers(prev=>prev.map(x=>x.id===id?{...x,active:newActive}:x));
    logAudit(adminUser.email,newActive?"activate_user":"ban_user",`${newActive?"Activated":"Banned"} ${u?.name||id}`);
    setConfirm(null);
  };

  const deleteUser = async (id) => {
    const u = users.find(x=>x.id===id);
    fetch('/api/user',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:"adminDelete",userId:id})}).catch(()=>{});
    setUsers(prev=>prev.filter(x=>x.id!==id));
    logAudit(adminUser.email,"delete_user",`Deleted ${u?.name||id} (${u?.email||""})`);
    setConfirm(null);
  };

  const resetPoints = async (u) => {
    fetch('/api/user',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:"adminUpdate",userId:u.id,pts:0,usd:0})}).catch(()=>{});
    setUsers(prev=>prev.map(x=>x.id===u.id?{...x,pts:0,usd:0}:x));
    logAudit(adminUser.email,"reset_balance",`Reset balance for ${u.name}`);
    setConfirm(null);
  };

  return (
    <div>
      {/* Toolbar */}
      <div style={{display:"flex",gap:10,marginBottom:16}}>
        <div style={{position:"relative",flex:1}}>
          <span style={{position:"absolute",left:13,top:"50%",transform:"translateY(-50%)",fontSize:15,pointerEvents:"none"}}>🔍</span>
          <input className="inp-base" placeholder="Search by name or email…" value={search} onChange={e=>setSearch(e.target.value)} style={{paddingLeft:38,margin:0}}/>
        </div>
        {canCreate&&(
          <button onClick={openCreate} style={{background:`linear-gradient(135deg,${C.brand},${C.brandDk})`,border:"none",borderRadius:12,padding:"0 16px",color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer",flexShrink:0,whiteSpace:"nowrap"}}>
            + New User
          </button>
        )}
      </div>

      <div style={{fontSize:12,color:"rgba(255,255,255,.35)",marginBottom:12}}>
        {filtered.length} user{filtered.length!==1?"s":""} found
      </div>

      {filtered.map(u=>(
        <div key={u.id} className="user-row">
          <div style={{width:38,height:38,borderRadius:"50%",flexShrink:0,background:`linear-gradient(135deg,${C.brand},${C.brandDk})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,fontWeight:700,color:C.white}}>
            {(u.name||"?").charAt(0).toUpperCase()}
          </div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontWeight:700,color:C.white,fontSize:14,display:"flex",alignItems:"center",gap:6}}>
              {u.name}
              {!u.active&&<span style={{fontSize:10,background:"rgba(239,68,68,.15)",color:C.red,border:"1px solid rgba(239,68,68,.3)",borderRadius:99,padding:"1px 7px"}}>Inactive</span>}
            </div>
            <div style={{fontSize:11,color:"rgba(255,255,255,.4)",marginTop:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{u.email}</div>
            <div style={{fontSize:11,color:"rgba(255,255,255,.3)",marginTop:1}}>
              {u.country} · <span style={{color:C.gold}}>{(u.pts||0).toLocaleString()} pts</span> · ${(u.usd||0).toFixed(2)}
            </div>
          </div>
          <div style={{display:"flex",gap:6,flexShrink:0,flexWrap:"wrap",justifyContent:"flex-end"}}>
            {canEdit&&<button onClick={()=>openEdit(u)} style={{background:"rgba(139,92,246,.15)",border:`1px solid ${C.border2}`,color:C.brandLt,borderRadius:8,padding:"6px 10px",fontSize:12,fontWeight:600,cursor:"pointer"}}>✏️</button>}
            {canBalance&&<button onClick={()=>setConfirm({type:"reset",userId:u.id,userName:u.name,user:u})} title="Reset balance" style={{background:"rgba(245,158,11,.1)",border:"1px solid rgba(245,158,11,.3)",color:C.gold,borderRadius:8,padding:"6px 10px",fontSize:12,fontWeight:600,cursor:"pointer"}}>🔄</button>}
            {canToggle&&<button onClick={()=>setConfirm({type:"toggle",userId:u.id,userName:u.name,active:u.active})} style={{background:u.active?"rgba(239,68,68,.15)":"rgba(16,185,129,.15)",border:`1px solid ${u.active?"rgba(239,68,68,.3)":"rgba(16,185,129,.3)"}`,color:u.active?C.red:C.green,borderRadius:8,padding:"6px 10px",fontSize:12,fontWeight:600,cursor:"pointer"}}>{u.active?"🚫":"✅"}</button>}
            {canDelete&&<button onClick={()=>setConfirm({type:"delete",userId:u.id,userName:u.name})} style={{background:"rgba(239,68,68,.12)",border:"1px solid rgba(239,68,68,.25)",color:C.red,borderRadius:8,padding:"6px 10px",fontSize:12,fontWeight:600,cursor:"pointer"}}>🗑</button>}
          </div>
        </div>
      ))}

      {/* Create / Edit modal */}
      {modal&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.85)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:999,padding:16}}>
          <div style={{background:C.s2,borderRadius:20,padding:24,maxWidth:380,width:"100%",border:`1px solid ${C.border}`,maxHeight:"90vh",overflowY:"auto"}}>
            <div style={{fontWeight:800,color:C.white,fontSize:17,marginBottom:20}}>
              {modal==="create"?"➕ Create New User":"✏️ Edit User"}
            </div>
            {[
              {label:"Full Name",key:"name",type:"text",placeholder:"e.g. John Doe"},
              {label:"Email",key:"email",type:"email",placeholder:"user@example.com"},
              {label:"Country",key:"country",type:"text",placeholder:"e.g. US, UK, 🇺🇸"},
            ].map(f=>(
              <div key={f.key} style={{marginBottom:14}}>
                <div style={{fontSize:12,fontWeight:600,color:"rgba(255,255,255,.5)",marginBottom:5}}>{f.label}</div>
                <input className="inp-base" type={f.type} placeholder={f.placeholder} value={form[f.key]||""} onChange={fv(f.key)} style={{margin:0}}/>
              </div>
            ))}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}}>
              {[
                {label:"Points (pts)",key:"pts",disabled:!canBalance},
                {label:"USD Balance",key:"usd",disabled:!canBalance},
              ].map(f=>(
                <div key={f.key}>
                  <div style={{fontSize:12,fontWeight:600,color:f.disabled?"rgba(255,255,255,.2)":"rgba(255,255,255,.5)",marginBottom:5}}>{f.label}{f.disabled&&<span style={{fontSize:10,marginLeft:4}}>(no perm)</span>}</div>
                  <input className="inp-base" type="number" min="0" value={form[f.key]||0} onChange={fv(f.key,"number")} disabled={f.disabled} style={{margin:0,opacity:f.disabled?.4:1}}/>
                </div>
              ))}
            </div>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:20,padding:"10px 14px",background:"rgba(255,255,255,.04)",borderRadius:10,border:`1px solid ${C.border}`}}>
              <span style={{fontSize:13,color:"rgba(255,255,255,.6)",flex:1}}>Account Active</span>
              <input type="checkbox" checked={form.active??true} onChange={fv("active","bool")} style={{width:18,height:18,accentColor:C.brand,cursor:"pointer"}}/>
            </div>
            {saveMsg&&<div style={{fontSize:12,color:saveMsg.startsWith("✓")?C.green:C.red,marginBottom:12,textAlign:"center"}}>{saveMsg}</div>}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <button onClick={()=>setModal(null)} style={{background:C.s3,border:`1px solid ${C.border}`,borderRadius:12,padding:11,color:C.white,fontWeight:600,cursor:"pointer",fontSize:14}}>Cancel</button>
              <button onClick={saveUser} disabled={saving} style={{background:saving?"rgba(139,92,246,.4)":`linear-gradient(135deg,${C.brand},${C.brandDk})`,border:"none",borderRadius:12,padding:11,color:"#fff",fontWeight:700,cursor:saving?"not-allowed":"pointer",fontSize:14}}>
                {saving?"Saving…":modal==="create"?"Create":"Save Changes"}
              </button>
            </div>
          </div>
        </div>
      )}

      {/* Confirmation dialog */}
      {confirm&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.8)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:999,padding:16}}>
          <div style={{background:C.s2,borderRadius:20,padding:24,maxWidth:300,width:"100%",border:`1px solid ${C.border}`}}>
            <div style={{fontSize:32,textAlign:"center",marginBottom:12}}>
              {confirm.type==="delete"?"🗑️":confirm.type==="reset"?"🔄":"⚠️"}
            </div>
            <div style={{fontWeight:700,color:C.white,fontSize:15,textAlign:"center",marginBottom:8}}>
              {confirm.type==="delete"?`Delete "${confirm.userName}"?`
              :confirm.type==="reset"?`Reset "${confirm.userName}"'s balance?`
              :`${confirm.active?"Deactivate":"Activate"} "${confirm.userName}"?`}
            </div>
            <div style={{fontSize:12,color:"rgba(255,255,255,.45)",textAlign:"center",marginBottom:20}}>
              {confirm.type==="delete"?"This cannot be undone."
              :confirm.type==="reset"?"Points and USD balance will be set to 0."
              :confirm.active?"User will lose access.":"User will regain access."}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <button onClick={()=>setConfirm(null)} style={{background:C.s3,border:`1px solid ${C.border}`,borderRadius:12,padding:11,color:C.white,fontWeight:600,cursor:"pointer"}}>Cancel</button>
              <button
                onClick={()=>confirm.type==="delete"?deleteUser(confirm.userId):confirm.type==="reset"?resetPoints(confirm.user):toggleActive(confirm.userId)}
                style={{background:confirm.type==="reset"?`linear-gradient(135deg,${C.gold},#b45309)`:confirm.type==="delete"||confirm.active?`linear-gradient(135deg,${C.red},#b91c1c)`:`linear-gradient(135deg,${C.green},#047857)`,border:"none",borderRadius:12,padding:11,color:"#fff",fontWeight:700,cursor:"pointer"}}
              >{confirm.type==="delete"?"Delete":confirm.type==="reset"?"Reset Balance":confirm.active?"Deactivate":"Activate"}</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ── Roles Tab (super_admin only) ───────────────── */
function AdminRoles({users, setUsers, adminUser}){
  const [confirm,setConfirm] = useState(null);
  const staffUsers = users.filter(u=>u.isAdmin||u.role==="super_admin"||u.role==="moderator");

  const changeRole = (id, newRole) => {
    if(id===adminUser.id) return; // can't demote self
    setUsers(prev=>prev.map(u=>u.id===id
      ? {...u, role:newRole, isAdmin:newRole!=="user"}
      : u
    ));
    setConfirm(null);
  };

  const promoteUser = (id) => {
    setUsers(prev=>prev.map(u=>u.id===id
      ? {...u, role:"moderator", isAdmin:true}
      : u
    ));
    setConfirm(null);
  };

  const nonAdminUsers = users.filter(u=>!u.isAdmin&&(!u.role||u.role==="user"));

  return (
    <div>

            <div style={{flex:1}}>
              <div style={{fontWeight:700,color:C.white,fontSize:14,display:"flex",alignItems:"center",gap:8}}>
                {u.name}
                {u.id===adminUser.id&&<span style={{fontSize:10,color:C.muted}}>(you)</span>}

            <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>

                width:38,height:38,borderRadius:"50%",flexShrink:0,

/* ── Analytics Tab ────────────────────────────── */
function AdminAnalytics({users}){
  const regular = users.filter(u=>!u.email?.includes('sys.internal')&&(u.role==="user"||(!u.isAdmin&&!u.role)));
  const top5 = [...regular].sort((a,b)=>(b.pts||0)-(a.pts||0)).slice(0,5);
  const maxPts = top5[0]?.pts||1;
  const activeCount = regular.filter(u=>u.active).length;
  const inactiveCount = regular.length - activeCount;
  const activePct = regular.length?Math.round(activeCount/regular.length*100):0;

  const countryMap = {};
  regular.forEach(u=>{const k=u.country||"🌍";countryMap[k]=(countryMap[k]||0)+1;});
  const countries = Object.entries(countryMap).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const maxC = countries[0]?.[1]||1;

  const buckets=[
    {label:"0 – 1k",min:0,max:1000},
    {label:"1k – 10k",min:1000,max:10000},
    {label:"10k – 50k",min:10000,max:50000},
    {label:"50k+",min:50000,max:Infinity},
  ].map(b=>({...b,count:regular.filter(u=>(u.pts||0)>=b.min&&(u.pts||0)<b.max).length}));
  const maxB = Math.max(...buckets.map(b=>b.count),1);

  const BAR_COLORS=[C.gold,C.brandLt,C.cyan,C.green,C.pink];
  const SL={fontSize:13,fontWeight:700,color:"rgba(255,255,255,.4)",letterSpacing:1,marginBottom:12};

  return(
    <div>
      <div style={{display:"flex",flexWrap:"wrap",gap:12,marginBottom:24}}>
        <StatCard icon="👥" label="Total Users"   value={regular.length}                                    color={C.brandLt}/>
        <StatCard icon="✅" label="Active Users"  value={activeCount}    sub={`${activePct}% active`}       color={C.green}/>
        <StatCard icon="⭐" label="Total Points"  value={regular.reduce((s,u)=>s+(u.pts||0),0).toLocaleString()} color={C.gold}/>
        <StatCard icon="🌍" label="Countries"     value={Object.keys(countryMap).length}                   color={C.cyan}/>
      </div>

      {/* Top 5 bar chart */}
      <div style={SL}>TOP 5 EARNERS</div>
      <div style={{background:C.s2,border:`1px solid ${C.border}`,borderRadius:16,padding:18,marginBottom:24}}>
        {top5.length===0?<div style={{color:"rgba(255,255,255,.3)",textAlign:"center",padding:16}}>No users yet.</div>:
        top5.map((u,i)=>(
          <div key={u.id} style={{marginBottom:i<4?14:0}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:14}}>{["🥇","🥈","🥉","4️⃣","5️⃣"][i]}</span>
                <span style={{fontWeight:700,color:C.white,fontSize:13}}>{u.name}</span>
                <span style={{fontSize:11,color:"rgba(255,255,255,.35)"}}>{u.country}</span>
              </div>
              <span style={{fontWeight:800,color:BAR_COLORS[i],fontSize:13}}>{(u.pts||0).toLocaleString()} pts</span>
            </div>
            <div style={{height:7,background:"rgba(255,255,255,.06)",borderRadius:99}}>
              <div style={{height:"100%",width:`${Math.round((u.pts||0)/maxPts*100)}%`,background:`linear-gradient(90deg,${BAR_COLORS[i]},${BAR_COLORS[i]}88)`,borderRadius:99}}/>
            </div>
          </div>
        ))}
      </div>

      {/* Active vs Inactive */}
      <div style={SL}>ACTIVE VS INACTIVE</div>
      <div style={{background:C.s2,border:`1px solid ${C.border}`,borderRadius:16,padding:18,marginBottom:24}}>
        <div style={{display:"flex",borderRadius:99,overflow:"hidden",height:24,marginBottom:12}}>
          {activeCount>0&&<div style={{flex:activeCount,background:`linear-gradient(90deg,${C.green},${C.green}99)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:"#fff"}}>{activePct}%</div>}
          {inactiveCount>0&&<div style={{flex:inactiveCount,background:"rgba(239,68,68,.3)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:C.red}}>{100-activePct}%</div>}
        </div>
        <div style={{display:"flex",gap:20}}>
          <div style={{display:"flex",alignItems:"center",gap:6}}><div style={{width:10,height:10,borderRadius:"50%",background:C.green}}/><span style={{fontSize:12,color:"rgba(255,255,255,.6)"}}>Active: <strong style={{color:C.white}}>{activeCount}</strong></span></div>
          <div style={{display:"flex",alignItems:"center",gap:6}}><div style={{width:10,height:10,borderRadius:"50%",background:C.red}}/><span style={{fontSize:12,color:"rgba(255,255,255,.6)"}}>Inactive: <strong style={{color:C.white}}>{inactiveCount}</strong></span></div>
        </div>
      </div>

      {/* Country distribution */}
      <div style={SL}>COUNTRY DISTRIBUTION</div>
      <div style={{background:C.s2,border:`1px solid ${C.border}`,borderRadius:16,padding:18,marginBottom:24}}>
        {countries.length===0?<div style={{color:"rgba(255,255,255,.3)",textAlign:"center",padding:12}}>No data.</div>:
        countries.map(([flag,count])=>(
          <div key={flag} style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
            <span style={{fontSize:20,width:28,textAlign:"center",flexShrink:0}}>{flag}</span>
            <div style={{flex:1}}><div style={{height:6,background:"rgba(255,255,255,.06)",borderRadius:99}}><div style={{height:"100%",width:`${Math.round(count/maxC*100)}%`,background:`linear-gradient(90deg,${C.brandLt},${C.cyan})`,borderRadius:99}}/></div></div>
            <span style={{fontSize:12,color:"rgba(255,255,255,.5)",width:28,textAlign:"right",flexShrink:0}}>{count}</span>
          </div>
        ))}
      </div>

      {/* Points distribution */}
      <div style={SL}>POINTS DISTRIBUTION</div>
      <div style={{background:C.s2,border:`1px solid ${C.border}`,borderRadius:16,padding:18}}>
        {buckets.map(b=>(
          <div key={b.label} style={{marginBottom:12}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
              <span style={{fontSize:12,color:"rgba(255,255,255,.6)",fontWeight:600}}>{b.label}</span>
              <span style={{fontSize:12,color:C.brandLt,fontWeight:700}}>{b.count} user{b.count!==1?"s":""}</span>
            </div>
            <div style={{height:6,background:"rgba(255,255,255,.06)",borderRadius:99}}><div style={{height:"100%",width:`${Math.round(b.count/maxB*100)}%`,background:`linear-gradient(90deg,${C.brand},${C.pink})`,borderRadius:99}}/></div>
          </div>
        ))}
      </div>
    </div>
  );
}

  const filtered = log.filter(e=>
    (e.action||"").toLowerCase().includes(search.toLowerCase())||

/* ── Data Export Tab ───────────────────────────── */
function AdminExport({users}){
  const [done,setDone] = useState(null);
  const exportable = users.filter(u=>!u.email?.includes('sys.internal'));

  const dl = (content, filename, type) => {
    const a=document.createElement('a');
    a.href=URL.createObjectURL(new Blob([content],{type}));
    a.download=filename; a.click();
  };

  const exportCSV = () => {
    const headers=['id','name','email','country','pts','usd','active','joined','refCode','role'];
    const rows=exportable.map(u=>headers.map(h=>{const v=u[h]??'';return typeof v==='string'&&(v.includes(',')||v.includes('"'))?`"${v.replace(/"/g,'""')}"`:v;}).join(','));
    dl([headers.join(','),...rows].join('\n'),`wish-users-${new Date().toISOString().slice(0,10)}.csv`,'text/csv');
    setDone('csv'); setTimeout(()=>setDone(null),3000);
  };

  const exportJSON = () => {
    dl(JSON.stringify(exportable,null,2),`wish-users-${new Date().toISOString().slice(0,10)}.json`,'application/json');
    setDone('json'); setTimeout(()=>setDone(null),3000);
  };

  return (
    <div>
      <div style={{background:"rgba(139,92,246,.07)",border:`1px solid ${C.border2}`,borderRadius:14,padding:"16px",marginBottom:24,display:"flex",alignItems:"center",gap:14}}>
        <div style={{fontSize:36}}>📥</div>
        <div>
          <div style={{fontSize:15,fontWeight:700,color:C.white,marginBottom:2}}>Export User Data</div>
          <div style={{fontSize:13,color:"rgba(255,255,255,.5)"}}>{exportable.length} users ready to export</div>
        </div>
      </div>

      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        {[
          {label:"Export as CSV",sub:"Spreadsheet-compatible format, opens in Excel / Google Sheets",icon:"📊",fn:exportCSV,id:"csv",color:C.green},
          {label:"Export as JSON",sub:"Raw data format, suitable for backups and developer use",icon:"📄",fn:exportJSON,id:"json",color:C.brandLt},
        ].map(opt=>(
          <div key={opt.id} style={{background:C.s2,border:`1px solid ${C.border}`,borderRadius:14,padding:"16px 20px",display:"flex",alignItems:"center",gap:14}}>
            <div style={{fontSize:28,flexShrink:0}}>{opt.icon}</div>
            <div style={{flex:1}}>
              <div style={{fontSize:14,fontWeight:700,color:C.white}}>{opt.label}</div>
              <div style={{fontSize:12,color:"rgba(255,255,255,.4)",marginTop:2}}>{opt.sub}</div>
            </div>
            <button onClick={opt.fn} style={{background:done===opt.id?`${opt.color}22`:`linear-gradient(135deg,${opt.color},${opt.color}cc)`,border:done===opt.id?`1px solid ${opt.color}`:"none",borderRadius:10,padding:"9px 18px",color:done===opt.id?opt.color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer",flexShrink:0,transition:"all .3s"}}>
              {done===opt.id?"✓ Downloaded":"Download"}
            </button>

        ))}

      <div style={{marginTop:24,background:"rgba(245,158,11,.06)",border:"1px solid rgba(245,158,11,.2)",borderRadius:12,padding:"12px 16px",display:"flex",gap:10,alignItems:"flex-start"}}>
        <span style={{fontSize:14}}>⚠️</span>
        <span style={{fontSize:12,color:"rgba(255,255,255,.5)",lineHeight:1.5}}>Exports contain personal data (emails, names). Handle in accordance with your privacy policy and applicable regulations.</span>
      </div>
    </div>
  );
}

/* ── ScopeCheckboxes helper ────────────────────── */
function ScopeGrid({items, selected, onChange, color=C.brand}){
  const groups = [...new Set(items.map(i=>i.group))];
  return (
    <div>
      {groups.map(g=>(
        <div key={g} style={{marginBottom:12}}>
          <div style={{fontSize:11,fontWeight:700,color:"rgba(255,255,255,.35)",letterSpacing:1,marginBottom:6}}>{g.toUpperCase()}</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {items.filter(i=>i.group===g).map(item=>{
              const on = selected.includes(item.id);
              return (
                <button key={item.id} onClick={()=>onChange(on?selected.filter(s=>s!==item.id):[...selected,item.id])}
                  style={{
                    padding:"5px 11px",borderRadius:8,fontSize:12,fontWeight:600,cursor:"pointer",
                    background:on?`${color}22`:"rgba(255,255,255,.04)",
                    border:`1px solid ${on?color:"rgba(255,255,255,.12)"}`,
                    color:on?color:"rgba(255,255,255,.45)",
                    transition:"all .15s",
                  }}
                >{on?"✓ ":""}{item.label}</button>
              );
            })}
          </div>
        </div>
      ))}
    </div>
  );
}
