<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wish App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0818;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #app { width: 100%; max-width: 420px; padding: 20px; }
        .card {
            background: linear-gradient(135deg, #13102a, #1a1540);
            border: 1px solid rgba(139,92,246,0.2);
            border-radius: 24px;
            padding: 32px;
        }
        .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo-icon {
            width: 72px; height: 72px;
            background: linear-gradient(135deg, #8b5cf6, #ec4899);
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 36px;
            margin: 0 auto 12px;
        }
        .logo h1 { font-size: 28px; font-weight: 700; }
        .logo p { color: rgba(255,255,255,0.5); font-size: 14px; margin-top: 4px; }
        label { display: block; font-size: 13px; color: rgba(255,255,255,0.6); margin-bottom: 6px; }
        input {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(139,92,246,0.3);
            border-radius: 12px;
            padding: 14px 16px;
            color: white;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: #8b5cf6; }
        input::placeholder { color: rgba(255,255,255,0.25); }
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #8b5cf6, #ec4899);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.9; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .field { margin-bottom: 20px; }
        .error { color: #ef4444; font-size: 13px; margin-top: 8px; }
        .info { color: rgba(255,255,255,0.5); font-size: 13px; text-align: center; margin-top: 12px; }
    </style>
</head>
<body>
<div id="app"></div>

<script>
    let otpToken = null;

    function showLogin() {
        document.getElementById('app').innerHTML = `
            <div class="card">
                <div class="logo">
                    <div class="logo-icon">✨</div>
                    <h1>Wish App</h1>
                    <p>Earn rewards every day</p>
                </div>
                <div class="field">
                    <label>Phone Number</label>
                    <input id="phone" type="tel" placeholder="+1234567890" />
                </div>
                <button onclick="sendOtp()" id="sendBtn">Send OTP</button>
                <div id="loginError" class="error"></div>
            </div>
        `;
    }

    async function sendOtp() {
        const phone = document.getElementById('phone').value.trim();
        const btn = document.getElementById('sendBtn');
        const errEl = document.getElementById('loginError');
        errEl.textContent = '';

        if (!phone) {
            errEl.textContent = 'Please enter your phone number.';
            return;
        }

        btn.disabled = true;
        btn.textContent = 'Sending…';

        try {
            const res = await fetch('/api/send-otp', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phone })
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || 'Failed to send OTP');
            otpToken = data.token || null;
            showOtp(phone);
        } catch (e) {
            errEl.textContent = e.message;
            btn.disabled = false;
            btn.textContent = 'Send OTP';
        }
    }

    function showOtp(phone) {
        document.getElementById('app').innerHTML = `
            <div class="card">
                <div class="logo">
                    <div class="logo-icon">🔐</div>
                    <h1>Verify OTP</h1>
                    <p>Enter the code sent to ${phone}</p>
                </div>
                <div class="field">
                    <label>One-Time Password</label>
                    <input id="otp" type="number" placeholder="123456" />
                </div>
                <button onclick="verifyOtp('${phone}')" id="verifyBtn">Verify</button>
                <div id="otpError" class="error"></div>
                <p class="info"><span style="cursor:pointer;color:#a78bfa;" onclick="showLogin()">← Back</span></p>
            </div>
        `;
    }

    async function verifyOtp(phone) {
        const otp = document.getElementById('otp').value.trim();
        const btn = document.getElementById('verifyBtn');
        const errEl = document.getElementById('otpError');
        errEl.textContent = '';

        if (!otp) {
            errEl.textContent = 'Please enter the OTP.';
            return;
        }

        btn.disabled = true;
        btn.textContent = 'Verifying…';

        try {
            const res = await fetch('/api/verify-otp', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phone, otp, token: otpToken })
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || 'Invalid OTP');
            showDashboard(data.user);
        } catch (e) {
            errEl.textContent = e.message;
            btn.disabled = false;
            btn.textContent = 'Verify';
        }
    }

    function showDashboard(user) {
        document.getElementById('app').innerHTML = `
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;">
                    <div style="display:flex; align-items:center; gap:10px;">
                        <div style="width:45px; height:45px; background:linear-gradient(135deg, #8b5cf6, #ec4899); border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:24px;">✨</div>
                        <div>
                            <div style="font-weight:bold; font-size:18px;">Welcome, ${user.name}</div>
                            <div style="font-size:12px; color:rgba(255,255,255,0.5);">${user.phone}</div>
                        </div>
                    </div>
                    <button onclick="logout()" style="width:auto; padding:8px 16px; background:rgba(239,68,68,0.1); color:#ef4444; border:1px solid rgba(239,68,68,0.2); border-radius:10px; cursor:pointer; margin-top:0;">Logout</button>
                </div>

                <div style="background:linear-gradient(135deg, #1a1540, #13102a); padding:25px; border-radius:20px; border:1px solid rgba(139,92,246,0.3); margin-bottom:20px;">
                    <div style="color:#a78bfa; font-size:14px; margin-bottom:8px;">Total Balance</div>
                    <div style="display:flex; align-items:baseline; gap:10px;">
                        <span style="font-size:48px; font-weight:bold; background:linear-gradient(135deg, #fff, #a78bfa); -webkit-background-clip:text; -webkit-text-fill-color:transparent;">${user.pts.toLocaleString()}</span>
                        <span style="color:rgba(255,255,255,0.4);">pts</span>
                    </div>
                    <div style="color:#10b981; font-size:18px;">≈ $${(user.pts * 0.001).toFixed(2)}</div>
                    <div style="margin-top:15px; height:4px; background:rgba(139,92,246,0.1); border-radius:2px;">
                        <div style="height:100%; width:65%; background:linear-gradient(90deg, #8b5cf6, #ec4899); border-radius:2px;"></div>
                    </div>
                </div>

                <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
                    <div style="background:#0d0b1e; padding:18px; border-radius:15px; text-align:center;">
                        <div style="font-size:28px; margin-bottom:8px;">⛏️</div>
                        <div style="font-size:12px; color:rgba(255,255,255,0.5); margin-bottom:4px;">Mining</div>
                        <div style="font-size:16px; font-weight:bold; color:#06b6d4;">8h cycle</div>
                    </div>
                    <div style="background:#0d0b1e; padding:18px; border-radius:15px; text-align:center;">
                        <div style="font-size:28px; margin-bottom:8px;">🎰</div>
                        <div style="font-size:12px; color:rgba(255,255,255,0.5); margin-bottom:4px;">Spins</div>
                        <div style="font-size:16px; font-weight:bold; color:#f59e0b;">3 left</div>
                    </div>
                    <div style="background:#0d0b1e; padding:18px; border-radius:15px; text-align:center;">
                        <div style="font-size:28px; margin-bottom:8px;">📋</div>
                        <div style="font-size:12px; color:rgba(255,255,255,0.5); margin-bottom:4px;">Tasks</div>
                        <div style="font-size:16px; font-weight:bold; color:#10b981;">5 new</div>
                    </div>
                    <div style="background:#0d0b1e; padding:18px; border-radius:15px; text-align:center;">
                        <div style="font-size:28px; margin-bottom:8px;">🏆</div>
                        <div style="font-size:12px; color:rgba(255,255,255,0.5); margin-bottom:4px;">Rank</div>
                        <div style="font-size:16px; font-weight:bold; color:#ec4899;">#42</div>
                    </div>
                </div>

                <div style="margin-top:20px;">
                    <h3 style="font-size:18px; margin-bottom:12px;">Quick Actions</h3>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                        <button style="padding:14px; background:rgba(139,92,246,0.1); border:1px solid rgba(139,92,246,0.2); border-radius:12px; color:white; font-size:14px; cursor:pointer; margin-top:0;">📺 Watch Ad</button>
                        <button style="padding:14px; background:rgba(139,92,246,0.1); border:1px solid rgba(139,92,246,0.2); border-radius:12px; color:white; font-size:14px; cursor:pointer; margin-top:0;">🎮 Spin Wheel</button>
                        <button style="padding:14px; background:rgba(139,92,246,0.1); border:1px solid rgba(139,92,246,0.2); border-radius:12px; color:white; font-size:14px; cursor:pointer; margin-top:0;">📋 Do Tasks</button>
                        <button style="padding:14px; background:rgba(139,92,246,0.1); border:1px solid rgba(139,92,246,0.2); border-radius:12px; color:white; font-size:14px; cursor:pointer; margin-top:0;">👥 Refer</button>
                    </div>
                </div>
            </div>
        `;
    }

    function logout() {
        otpToken = null;
        showLogin();
    }

    // Boot
    showLogin();
</script>
</body>
</html>
