function SpinWheel({angle,spinning,phase}){
  const ptSegs=[{v:"100",c:"#8b5cf6"},{v:"150",c:"#06b6d4"},{v:"200",c:C.gold},{v:"250",c:"#ec4899"},{v:"300",c:"#10b981"},{v:"350",c:"#f97316"},{v:"400",c:"#6366f1"},{v:"500",c:"#84cc16"}];
  const udSegs=[{v:"$1",c:"#10b981"},{v:"$2",c:C.gold},{v:"$3",c:"#8b5cf6"},{v:"$1",c:"#06b6d4"},{v:"$2",c:"#ec4899"},{v:"$3",c:"#f97316"},{v:"$1",c:"#6366f1"},{v:"$2",c:"#84cc16"}];
  const segs=phase==="points"?ptSegs:udSegs;
  const n=8,r=88,cx=96,cy=96;
  return(<div style={{position:"relative",width:192,height:192,margin:"0 auto"}}>
    <div style={{position:"absolute",inset:-8,borderRadius:"50%",background:`conic-gradient(${segs.map((s,i)=>`${s.c} ${i*45}deg ${(i+1)*45}deg`).join(",")})`,opacity:.1,filter:"blur(10px)"}}/>
    <svg width="192" height="192" style={{transform:`rotate(${angle}deg)`,transition:spinning?"transform 3.8s cubic-bezier(.17,.67,.08,1)":"none",borderRadius:"50%",position:"relative",zIndex:1,filter:"drop-shadow(0 0 20px rgba(139,92,246,.4))"}}>
      {segs.map((s,i)=>{
        const a1=(2*Math.PI/n)*i-Math.PI/2,a2=(2*Math.PI/n)*(i+1)-Math.PI/2;
        const x1=cx+r*Math.cos(a1),y1=cy+r*Math.sin(a1),x2=cx+r*Math.cos(a2),y2=cy+r*Math.sin(a2);
        const ma=(a1+a2)/2,tx=cx+(r*.62)*Math.cos(ma),ty=cy+(r*.62)*Math.sin(ma);
        return(<g key={i}><path d={`M${cx},${cy} L${x1},${y1} A${r},${r} 0 0,1 ${x2},${y2} Z`} fill={s.c} opacity=".85"/><text x={tx} y={ty} textAnchor="middle" dominantBaseline="middle" fill="#fff" fontSize="10" fontWeight="800" fontFamily="DM Mono,monospace">{s.v}</text></g>);
      })}
      <circle cx={cx} cy={cy} r="16" fill={C.s1} stroke="rgba(255,255,255,.15)" strokeWidth="2"/>
      <text x={cx} y={cy+1} textAnchor="middle" dominantBaseline="middle" fontSize="13">🎯</text>
    </svg>
    <div style={{position:"absolute",top:-6,left:"50%",transform:"translateX(-50%)",width:0,height:0,borderLeft:"9px solid transparent",borderRight:"9px solid transparent",borderTop:`20px solid ${C.gold}`,zIndex:2,filter:`drop-shadow(0 3px 8px ${C.gold}88)`}}/>
  </div>);
}

      try {
        data = JSON.parse(text);
        console.log('5. Parsed data:', data);
      } catch (e) {
        console.error('6. JSON parse error:', e);
        setOtpErr(`Server returned invalid response. Status: ${res.status}`);
        setOtpSending(false);
        return;
      }
      
      if (data.success) {
        console.log('7. Success!');
        setOtpToken(data.token);
        setOtpErr("");
      } else {
        console.log('7. Error received:', data.error);
        // FIXED: Convert error object to string safely
        let errorMessage = "Failed to send code";
        if (data.error) {
          if (typeof data.error === 'string') {
            errorMessage = data.error;
          } else if (typeof data.error === 'object') {
            errorMessage = data.error.message || JSON.stringify(data.error);
          }
        }
        setOtpErr(errorMessage);
      }
    } catch (err) {
      console.error('8. Fetch error:', err);
      setOtpErr(`Network error: ${err.message}`);
    } finally {
      setOtpSending(false);
      setTimeout(() => otpRefs[0].current?.focus(), 100);
    }
  };
  /* ===== END OF FIXED sendOtp FUNCTION ===== */

  const resendOtp = async () => {
    if (!canResend) return;
    setOtpInput(["","","","","",""]);
    setOtpErr("");
    setOtpSending(true);
    
    try {
      const baseUrl = window.location.origin;
      const apiUrl = `${baseUrl}/api/send-otp`;
      
      const res = await fetch(apiUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: pendingUser.email })
      });
      
      const text = await res.text();
      let data;
      try {
        data = JSON.parse(text);
      } catch (e) {
        setOtpErr("Invalid server response");
        setOtpSending(false);
        return;
      }
      
      if (data.success) {
        setOtpErr("");
        setOtpToken(data.token);
        setResendT(60);
        setCanResend(false);
      } else {
        let errorMessage = "Failed to resend code";
        if (data.error) {
          if (typeof data.error === 'string') {
            errorMessage = data.error;
          } else if (typeof data.error === 'object') {
            errorMessage = data.error.message || JSON.stringify(data.error);
          }
        }
        setOtpErr(errorMessage);
      }
    } catch (err) {
      setOtpErr("Network error");
    } finally {
      setOtpSending(false);
      setTimeout(() => otpRefs[0].current?.focus(), 100);
    }
  };

  const handleOtpKey=(idx,val)=>{
    if(!/^[0-9]?$/.test(val))return;
    const nv=[...otpInput];nv[idx]=val;setOtpInput(nv);
    if(val&&idx<5)otpRefs[idx+1].current.focus();
  };
  
  const handleOtpBack=(idx,e)=>{
    if(e.key==="Backspace"&&!otpInput[idx]&&idx>0)otpRefs[idx-1].current.focus();
  };

  const verifyOtp=async()=>{
    const entered=otpInput.join("");
    if(entered.length<6){setOtpErr("Please enter 6-digit code");return;}
    if(!otpToken){setOtpErr("Session expired. Please request a new code.");return;}
    setOtpSending(true);
    try{
      const res=await fetch(`${window.location.origin}/api/verify-otp`,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({token:otpToken,otp:entered})
      });
      const data=await res.json();
      if(data.success){
        setUsers(p=>[...p,pendingUser]);
        onLogin(pendingUser);
      } else {
        setOtpErr(typeof data.error==='string'?data.error:'Invalid code');
      }
    } catch(err){
      setOtpErr('Network error. Please try again.');
    } finally {
      setOtpSending(false);
    }
  };

  const validate=()=>{
    const e={};
    if(mode==="register"&&!form.name.trim()) e.name=L("required");
    if(method==="email"){
      if(!form.email.match(/^[^\s@]+@[^\s@]+\.[^\s@]+$/)) e.email=L("invalidEmail");
    } else {
      if(!form.phone.trim()) e.phone=L("invalidPhone");
    }
    if(form.pass.length<6) e.pass="Min 6 characters";
    if(mode==="register"&&form.pass!==form.conf) e.conf="Passwords don't match";
    setErrs(e);
    return Object.keys(e).length===0;
  };

  const submit=()=>{
    if(!validate()) return;
    setLoading(true);
    setTimeout(()=>{
      setLoading(false);
      if(mode==="login"){
        let foundUser = null;
        if (method === "email") {
          for (let i = 0; i < users.length; i++) {
            if (users[i].email === form.email && users[i].pass === form.pass) {
              foundUser = users[i];
              break;
            }
          }
        } else {
          const fullPhone = form.countryCode + form.phone;
          for (let i = 0; i < users.length; i++) {
            if (users[i].phone === fullPhone && users[i].pass === form.pass) {
              foundUser = users[i];
              break;
            }
          }
        }
        
        if (foundUser) {
          onLogin(foundUser);
        } else {
          setErrs({pass: "Invalid credentials"});
        }
      } else {
        const exists = users.find(x=>x.email===form.email);
        if(exists){setErrs({email:"Account already exists"});return;}
        const fullPhone = form.countryCode + form.phone;
        const nu={
          id:"u"+Date.now(), name:form.name, email:form.email, 
          phone: fullPhone,
          pass:form.pass, pts:0, usd:0, joined:"Now", country:"🌍", isAdmin:false, active:true
        };
        sendOtp(nu);
      }
    },900);
  };

  /* OTP SCREEN */
  if(otpStep) return(
    <div style={{minHeight:"100vh",background:C.bg,fontFamily:"'Plus Jakarta Sans',sans-serif",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24,position:"relative",overflow:"hidden"}}>
      <style>{CSS}</style>
      <div style={{position:"absolute",width:380,height:380,borderRadius:"50%",background:"radial-gradient(circle,rgba(139,92,246,.12),transparent 70%)",top:-100,left:"50%",transform:"translateX(-50%)",pointerEvents:"none"}}/>

      <div style={{width:"100%",maxWidth:360,animation:"up .3s ease"}}>
        <div style={{textAlign:"center",marginBottom:32}}>
          <div style={{width:80,height:80,borderRadius:22,background:"linear-gradient(135deg,rgba(139,92,246,.2),rgba(6,182,212,.15))",border:"1px solid rgba(139,92,246,.3)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:36,margin:"0 auto 18px",animation:"float 3s ease infinite",boxShadow:`0 0 30px ${C.brand}60`}}>
            {method==="email"?"📧":"📱"}
          </div>
          <div style={{fontSize:24,fontWeight:900,letterSpacing:-.5,background:`linear-gradient(135deg,${C.white},${C.brandLt})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",marginBottom:8}}>
            Verify {method==="email"?"Email":"Phone"}
          </div>
          <div style={{fontSize:13,color:C.muted,lineHeight:1.65}}>
            A 6-digit code was sent to<br/>
            <span style={{color:C.brandLt,fontWeight:600}}>{method==="email"?form.email:form.countryCode+form.phone}</span>
          </div>
        </div>

        {/* OTP Boxes */}
        <div style={{display:"flex",gap:10,justifyContent:"center",marginBottom:16}}>
          {otpInput.map((v,i)=>(
            <input key={i} ref={otpRefs[i]} value={v}
              onChange={e=>handleOtpKey(i,e.target.value)}
              onKeyDown={e=>handleOtpBack(i,e)}
              maxLength={1} inputMode="numeric"
              style={{
                width:48,
                height:56,
                textAlign:"center",
                fontSize:22,
                fontWeight:800,
                fontFamily:"'DM Mono',monospace",
                background:"rgba(139,92,246,.08)",
                border:`2px solid ${v?C.brand:otpErr?"rgba(239,68,68,.4)":"rgba(139,92,246,.22)"}`,
                borderRadius:13,
                color:"#fff",
                outline:"none",
                transition:"all .15s",
                boxShadow:v?`0 0 0 3px ${C.brand}40`:"none"
              }}
            />
          ))}
        </div>

        <div style={{textAlign:"center",marginBottom:20,fontSize:14}}>
          <span style={{color:resendT>0?C.gold:C.red}}>
            {resendT>0 ? `⏰ Code expires in ${resendT}s` : '⏰ Code expired!'}
          </span>
        </div>

        {otpErr&&<div style={{textAlign:"center",color:C.red,fontSize:12,marginBottom:12,fontWeight:600}}>⚠ {otpErr}</div>}

        {otpSending && (
          <div style={{textAlign:"center",marginBottom:12}}>
            <div style={{display:"inline-block",width:20,height:20,borderRadius:"50%",border:"2px solid #8b5cf6",borderTopColor:"transparent",animation:"spin 1s linear infinite"}}></div>
            <span style={{marginLeft:8,color:C.muted}}>Sending code...</span>
          </div>
        )}

        <Btn 
          label={otpSending ? "Sending..." : "✓ Verify & Continue"} 
          onClick={verifyOtp} 
          disabled={otpSending || otpInput.some(v=>!v)} 
          full 
          variant="brand" 
          style={{marginBottom:12}}
        />

        <div style={{textAlign:"center",fontSize:12,color:C.muted}}>
          Didn't receive the code?{" "}
          {resendT>0
            ?<span style={{color:C.muted}}>Resend in {resendT}s</span>
            :<span onClick={resendOtp} style={{color:canResend?C.brandLt:C.muted,cursor:canResend?"pointer":"default",fontWeight:700}}>Resend Code</span>}
        </div>

        <div style={{marginTop:16,textAlign:"center"}}>
          <span onClick={()=>{setOtpStep(false);setPU(null);}} style={{fontSize:12,color:C.muted,cursor:"pointer"}}>← Change {method==="email"?"Email":"Phone"}</span>
        </div>
      </div>
    </div>
  );

  /* Welcome */
  if(mode==="welcome") return(
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24,fontFamily:"'Plus Jakarta Sans',sans-serif",position:"relative",overflow:"hidden"}}>
      <style>{CSS}</style>
      <div style={{position:"absolute",width:400,height:400,borderRadius:"50%",background:"radial-gradient(circle,rgba(139,92,246,.15),transparent 70%)",top:-100,left:"50%",transform:"translateX(-50%)",pointerEvents:"none",animation:"float 6s ease infinite"}}/>
      <div style={{position:"absolute",width:300,height:300,borderRadius:"50%",background:"radial-gradient(circle,rgba(236,72,153,.08),transparent 70%)",bottom:60,right:-80,pointerEvents:"none",animation:"float 4s ease infinite reverse"}}/>

        <div style={{fontSize:16,color:C.muted,fontWeight:500}}>{APP_TAGLINE}</div>
      </div>

      <div style={{width:"100%",maxWidth:360,display:"flex",flexDirection:"column",gap:12}}>
        <Btn label={`✨ ${L("signIn")}`} onClick={()=>setMode("login")} full variant="brand" style={{padding:16,fontSize:15,borderRadius:15}} animate/>
        <Btn label={`🚀 ${L("signUp")}`} onClick={()=>setMode("register")} full variant="ghost" style={{padding:16,fontSize:15,borderRadius:15}}/>
      </div>

      <div style={{marginTop:32,display:"flex",gap:16,flexWrap:"wrap",justifyContent:"center"}}>
        {["🌍 International","🔒 Secure","💵 Real Rewards","📱 Mobile"].map((f,i)=>(
          <span key={i} style={{fontSize:11,color:C.muted,display:"flex",alignItems:"center",gap:4}}>{f}</span>
        ))}
      </div>
    </div>
  );

  return(
    <div style={{minHeight:"100vh",background:C.bg,fontFamily:"'Plus Jakarta Sans',sans-serif",display:"flex",flexDirection:"column",padding:24,paddingTop:60,position:"relative",overflow:"hidden"}}>
      <style>{CSS}</style>
      <div style={{position:"absolute",width:350,height:350,borderRadius:"50%",background:"radial-gradient(circle,rgba(139,92,246,.12),transparent 70%)",top:-120,right:-80,pointerEvents:"none",animation:"float 5s ease infinite"}}/>

      <button onClick={()=>setMode("welcome")} style={{background:"none",border:"none",cursor:"pointer",color:C.muted,fontSize:13,fontFamily:"inherit",marginBottom:32,display:"flex",alignItems:"center",gap:6}}>← Back</button>

      <div style={{marginBottom:32,animation:"up .3s ease"}}>
        <div style={{fontSize:30,fontWeight:900,letterSpacing:-.5,background:`linear-gradient(135deg,${C.white},${C.brandLt})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",marginBottom:6}}>
          {mode==="login"?L("welcomeBack"):L("joinWish")}
        </div>
        <div style={{fontSize:14,color:C.muted}}>{mode==="login"?L("noAcc"):L("haveAcc")} <span onClick={()=>{setMode(mode==="login"?"register":"login");setErrs({});}} style={{color:C.brandLt,cursor:"pointer",fontWeight:700}}>{mode==="login"?L("signUp"):L("signIn")}</span></div>
      </div>

      <div style={{display:"flex",background:"rgba(139,92,246,.08)",borderRadius:12,padding:4,marginBottom:22}}>
        {["email","phone"].map(m=>(
          <div key={m} onClick={()=>{setMethod(m);setErrs({});}} style={{flex:1,textAlign:"center",padding:"10px",borderRadius:10,cursor:"pointer",background:method===m?`linear-gradient(135deg,${C.brand},${C.brandDk})`:"transparent",color:method===m?C.white:C.muted,fontWeight:600,fontSize:13,transition:"all .2s"}}>
            {m==="email"?"📧 Email":"📱 Phone"}
          </div>
        ))}
      </div>

      <div style={{animation:"up .3s ease .05s both"}}>
        {mode==="register"&&<Inp label={L("name")} val={form.name} onChange={f("name")} err={errs.name} placeholder="Your full name" icon="👤"/>}
        
        {method==="email"
          ?<Inp label={L("email")} type="email" val={form.email} onChange={f("email")} err={errs.email} placeholder="you@example.com" icon="📧"/>
          :<Inp 
              type="phone-with-code"
              label={L("phone")}
              val={form.phone}
              onChange={(e)=>f("phone")(e.target.value)}
              onCountryChange={(e)=>f("countryCode")(e.target.value)}
              selectedCountry={form.countryCode}
              err={errs.phone}
              placeholder="123 456 7890"
              icon="📱"
            />}
        
        <Inp label={L("password")} type="password" val={form.pass} onChange={f("pass")} err={errs.pass} placeholder="••••••••" icon="🔒"/>
        {mode==="register"&&<Inp label="Confirm Password" type="password" val={form.conf} onChange={f("conf")} err={errs.conf} placeholder="••••••••" icon="🔑"/>}
      </div>

      <Btn label={loading?"⏳ Please wait…":(mode==="login"?`🔓 ${L("signIn")}`:`🚀 ${L("signUp")}`)} onClick={submit} full variant="brand" disabled={loading} style={{marginTop:8,padding:16,fontSize:15,borderRadius:15}}/>
    </div>
  );
}

            <div style={{width:40,height:40,borderRadius:12,background:(PL[j.platform]||C.brand)+"22",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,overflow:"hidden"}}>{LOGOS[j.platform]||<span style={{fontSize:20}}>{PE[j.platform]}</span>}</div>

              <div style={{fontSize:13,fontWeight:700,color:C.gold}}>+{j.pts}</div>

    ),
    leaders:(

          <div key={i} style={{background:l.isMe?`rgba(139,92,246,.15)`:C.s2,borderRadius:14,padding:"12px 14px",marginBottom:8,border:`1px solid ${l.isMe?C.brand:C.border}`,display:"flex",alignItems:"center",gap:12}}>

            <div style={{fontSize:22}}>{l.country}</div>

          </div>
        ))}
      </div>

    mining:(

        <div style={{background:`linear-gradient(135deg,${C.brandDk},${C.brand})`,borderRadius:20,padding:24,textAlign:"center",marginBottom:16}}>
          <div style={{position:"relative",width:110,height:110,margin:"0 auto 16px",display:"flex",alignItems:"center",justifyContent:"center"}}>
            {mineStarted&&<div style={{position:"absolute",width:"100%",height:"100%",borderRadius:"50%",border:"2px dashed rgba(245,158,11,.5)",animation:"rotate 8s linear infinite"}}/>}
            {mineStarted&&<div style={{position:"absolute",width:10,height:10,borderRadius:"50%",background:C.gold,animation:"orbit 2s linear infinite",boxShadow:`0 0 8px ${C.gold}`}}/>}

              width:90,height:90,borderRadius:"50%",
              background:`radial-gradient(circle at 35% 35%,${C.gold}40,${C.brandDk}90)`,
              border:`2.5px solid ${C.gold}80`,

            <div style={{fontSize:16,fontWeight:700,color:C.white,marginBottom:6}}>No Balance Yet</div>
            <div style={{fontSize:13,color:C.muted}}>Start earning by watching ads, completing tasks, or mining to see your balance here.</div>
          </div>
          :<div style={{background:`linear-gradient(135deg,${C.s3},${C.s2})`,borderRadius:20,padding:24,marginBottom:16,border:`1px solid ${C.border}`}}>

            <div style={{display:"flex",gap:8}}>
              <input value={editName} onChange={e=>setEN(e.target.value)} style={{flex:1,background:"rgba(139,92,246,.07)",border:`1.5px solid ${C.border2}`,color:"#fff",borderRadius:10,padding:"10px 12px",fontSize:13,outline:"none",fontFamily:"inherit"}} placeholder="Your name"/>
              <button onClick={()=>{if(editName.trim()){setU(p=>({...p,name:editName.trim()}));setPMsg("Name updated!");}else setPMsg("Name can't be empty!");setTimeout(()=>setPMsg(""),2500);}} style={{background:C.brand,border:"none",borderRadius:10,padding:"10px 16px",color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer"}}>Save</button>
            </div>
          </div>

          {/* Email */}
          <div style={{marginBottom:12}}>

              <input value={editEmail} onChange={e=>setEE(e.target.value)} type="email" style={{flex:1,background:"rgba(139,92,246,.07)",border:`1.5px solid ${C.border2}`,color:"#fff",borderRadius:10,padding:"10px 12px",fontSize:13,outline:"none",fontFamily:"inherit"}} placeholder="you@email.com"/>

            </div>
          </div>

            <button onClick={()=>{if(editPass.length>=6){setU(p=>({...p,pass:editPass}));setEP("");setPMsg("Password updated!");}else setPMsg("Min 6 characters!");setTimeout(()=>setPMsg(""),2500);}} style={{width:"100%",background:`linear-gradient(135deg,${C.brand},${C.pink})`,border:"none",borderRadius:10,padding:"11px",color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer"}}>🔒 Update Password</button>

            <div style={{marginTop:12,textAlign:"center",padding:"8px 12px",borderRadius:10,background:profileMsg.includes("Invalid")||profileMsg.includes("Min")||profileMsg.includes("empty")?"rgba(239,68,68,.15)":"rgba(16,185,129,.15)",color:profileMsg.includes("Invalid")||profileMsg.includes("Min")||profileMsg.includes("empty")?C.red:C.green,fontWeight:700,fontSize:13}}>

        </div>

        <div style={{background:C.s2,borderRadius:16,padding:16,border:`1px solid ${C.border}`}}>

              <span style={{color:C.white,fontWeight:700,fontSize:13}}>{v}</span>

    {id:"tasks",icon:"✅",label:L("tasks")},

    {id:"wallet",icon:"💰",label:L("wallet")},
    {id:"profile",icon:"👤",label:L("profile")},

    <div style={{minHeight:"100vh",background:C.bg,color:C.white,fontFamily:"'DM Sans',sans-serif",maxWidth:480,margin:"0 auto",position:"relative",display:"flex",flexDirection:"column",direction:dir}}>
      {/* Header */}

            <button onClick={()=>setLM(p=>!p)} style={{background:C.s2,border:`1px solid ${C.border}`,borderRadius:8,padding:"5px 10px",color:C.white,fontSize:13,cursor:"pointer"}}>{(LANGS[lang]||LANGS.en).flag} {lang.toUpperCase()}</button>

              <div style={{position:"absolute",right:0,top:"110%",background:C.s2,border:`1px solid ${C.border}`,borderRadius:10,zIndex:99,minWidth:140,overflow:"hidden"}}>

                  <button key={k} onClick={()=>{setLang(k);setLM(false);}} style={{display:"block",width:"100%",padding:"8px 12px",background:"none",border:"none",color:lang===k?C.brandLt:C.white,cursor:"pointer",textAlign:"left",fontSize:13}}>{v.flag} {v.name}</button>

            <div style={{fontSize:10,fontWeight:tab===n.id?700:400,marginTop:1}}>{n.label}</div>

            <div style={{fontSize:60,marginBottom:8}}>{adData.emoji}</div>
            <div style={{fontSize:18,fontWeight:700,color:C.white,marginBottom:4}}>{adData.cat} Ad</div>
            <div style={{fontSize:13,color:C.muted,marginBottom:20}}>Watch to earn {adData.pts} pts</div>
            <div style={{background:C.faint,borderRadius:12,padding:"16px",marginBottom:16,fontSize:13,color:C.muted}}>📢 Sponsored content</div>
            <button onClick={claimAd} style={{width:"100%",background:`linear-gradient(135deg,${C.brand},${C.pink})`,border:"none",borderRadius:12,padding:"13px",color:"#fff",fontWeight:700,fontSize:15,cursor:"pointer"}}>✓ Claim +{adData.pts} pts</button>
          </div>
        </div>
      )}
      {/* Mining Ad Modal */}
      {mineAdShow&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.88)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:99,padding:16}}>
          <div style={{background:C.s2,borderRadius:20,padding:28,maxWidth:340,width:"100%",textAlign:"center",border:`1px solid ${C.border2}`}}>
            <div style={{fontSize:64,marginBottom:12}}>⛏️</div>
            <div style={{fontSize:20,fontWeight:800,color:C.white,marginBottom:6}}>Activate Mining</div>

            <div style={{background:"rgba(139,92,246,.1)",borderRadius:12,padding:"14px",marginBottom:16,fontSize:13,color:C.muted,border:`1px solid ${C.border}`}}>📢 Sponsored content — supports the platform</div>

        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.85)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:99,padding:16}}>

            <div style={{fontSize:36,marginBottom:12}}>👋</div>
            <div style={{fontSize:16,fontWeight:700,color:C.white,marginBottom:20}}>{L("logoutQ")}</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <button onClick={()=>setLD(false)} style={{background:C.s3,border:`1px solid ${C.border}`,borderRadius:12,padding:"11px",color:C.white,fontWeight:600,cursor:"pointer"}}>{L("cancel")}</button>
              <button onClick={onLogout} style={{background:C.red,border:"none",borderRadius:12,padding:"11px",color:"#fff",fontWeight:700,cursor:"pointer"}}>{L("yes")}</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════
   ROOT
═══════════════════════════════════════════════ */
function WishApp(){
  const [loggedUser,setLU] = useState(null);
  const [lang,setLang]     = useState("en");

  const handleLogin=(u)=>{ setLU(u); };
  const handleLogout=()=>{ setLU(null); };

  if(!loggedUser) return <AuthScreen onLogin={handleLogin} lang={lang}/>;
  if(loggedUser.isAdmin) return <AdminPanel user={loggedUser} onExit={handleLogout} lang={lang}/>;
  return <MainApp user={loggedUser} onLogout={handleLogout} lang={lang} setLang={setLang}/>;
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(WishApp));
</script>
</body>
</html>
