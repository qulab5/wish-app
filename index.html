  /* New enhanced animations */
  @keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-8px); }
    100% { transform: translateY(0px); }
  }
  @keyframes pulse-glow {
    0% { box-shadow: 0 0 0 0 rgba(139,92,246,0.7); }
    70% { box-shadow: 0 0 0 15px rgba(139,92,246,0); }
    100% { box-shadow: 0 0 0 0 rgba(139,92,246,0); }
  }
  @keyframes shimmer {
    0% { background-position: -1000px 0; }
    100% { background-position: 1000px 0; }
  }
  @keyframes rotate {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
  @keyframes mine-pulse {
    0%   { box-shadow: 0 0 20px rgba(245,158,11,.6), 0 0 40px rgba(139,92,246,.4); transform: scale(1); }
    50%  { box-shadow: 0 0 40px rgba(245,158,11,.9), 0 0 80px rgba(139,92,246,.6); transform: scale(1.08); }
    100% { box-shadow: 0 0 20px rgba(245,158,11,.6), 0 0 40px rgba(139,92,246,.4); transform: scale(1); }
  }
  @keyframes orbit {
    from { transform: rotate(0deg) translateX(56px) rotate(0deg); }
    to   { transform: rotate(360deg) translateX(56px) rotate(-360deg); }
  }
  @keyframes swing {
    0%   { transform: rotate(-18deg); }
    30%  { transform: rotate(13deg);  }
    55%  { transform: rotate(-7deg);  }
    72%  { transform: rotate(4deg);   }
    86%  { transform: rotate(-2deg);  }
    95%  { transform: rotate(1deg);   }
    100% { transform: rotate(0deg);   }
  }
  @keyframes dotPulse {
    0%,100% { transform: scale(0.75); opacity: 0.35; }
    50%     { transform: scale(1.25); opacity: 1;    }
  }
  @keyframes splashFade {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0);    }
  }
  @keyframes shake {
    0%,100% { transform: translateX(0);   }
    20%     { transform: translateX(-9px);}
    40%     { transform: translateX(9px); }
    60%     { transform: translateX(-5px);}
    80%     { transform: translateX(5px); }
  }

    0%   { transform: scale(0.6); opacity: 0; }
    70%  { transform: scale(1.15); }
    100% { transform: scale(1);   opacity: 1; }
  }

    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);

function Card({ch,style={},glow=false,animate=false}){

function Inp({label,type="text",val,onChange,err,placeholder,icon,countryCode,onCountryChange,selectedCountry}){
  const [show,setShow]=useState(false);
  const [focused,setFocused]=useState(false);
  
  const shouldShowError = err && typeof err === 'string' && err !== '[object Object]' && err.trim() !== '';
  
  if (type === "phone-with-code") {
    return (
      <div style={{marginBottom:16}}>
        {label&&<div style={{fontSize:11,fontWeight:700,color:C.muted,letterSpacing:.08,textTransform:"uppercase",marginBottom:6}}>{label}</div>}
        <div style={{display:"flex",gap:8}}>
          <div style={{position:"relative", width:"120px"}}>
            <select 
              value={selectedCountry} 
              onChange={onCountryChange}
              className="country-select"
              style={{
                width:"100%",
                padding:"13px 30px 13px 12px",
                background:"rgba(139,92,246,.07)",
                border:`1.5px solid ${shouldShowError?"rgba(239,68,68,.5)":focused?C.brand:C.border2}`,
                color:C.white,
                borderRadius:13,
                fontSize:14,
                fontFamily:"inherit",
                outline:"none",
                transition:"border 0.2s, box-shadow 0.2s",
                boxShadow:focused?`0 0 0 3px ${C.brand}30`:"none",
                appearance:"none",
                cursor:"pointer"
              }}
              onFocus={()=>setFocused(true)}
              onBlur={()=>setFocused(false)}
            >
              {COUNTRIES.map((c, idx) => (
                <option key={idx} value={c.code} style={{background:C.s1, color:"#fff", padding:"10px"}}>
                  {c.flag} {c.code} {c.name}
                </option>
              ))}
            </select>
          </div>
          
          <div style={{position:"relative", flex:1}}>
            {icon&&<div style={{position:"absolute",left:14,top:"50%",transform:"translateY(-50%)",fontSize:18,lineHeight:1,color:focused?C.brand:C.muted,transition:"color 0.2s"}}>{icon}</div>}
            <input 
              type="tel"
              value={val} 
              onChange={(e) => onChange(e.target.value)}
              placeholder={placeholder}
              onFocus={()=>setFocused(true)}
              onBlur={()=>setFocused(false)}
              style={{
                width:"100%",
                background:"rgba(139,92,246,.07)",
                border:`1.5px solid ${shouldShowError?"rgba(239,68,68,.5)":focused?C.brand:C.border2}`,
                color:C.white,
                borderRadius:13,
                padding:`13px 16px 13px ${icon?"44px":"16px"}`,
                fontSize:14,
                fontFamily:"inherit",
                outline:"none",
                transition:"border 0.2s, box-shadow 0.2s",
                boxShadow:focused?`0 0 0 3px ${C.brand}30`:"none"
              }}
            />
          </div>
        </div>
        {shouldShowError && <div style={{fontSize:11,color:C.red,marginTop:4}}>⚠ {err}</div>}
      </div>
    );
  }
  
  return(
    <div style={{marginBottom:16}}>
      {label&&<div style={{fontSize:11,fontWeight:700,color:C.muted,letterSpacing:.08,textTransform:"uppercase",marginBottom:6}}>{label}</div>}
      <div style={{position:"relative"}}>
        {icon&&<div style={{position:"absolute",left:14,top:"50%",transform:"translateY(-50%)",fontSize:18,lineHeight:1,color:focused?C.brand:C.muted,transition:"color 0.2s"}}>{icon}</div>}
        <input 
          type={type==="password"?(show?"text":"password"):type} 
          value={val} 
          onChange={(e) => onChange(e.target.value)}
          placeholder={placeholder}
          onFocus={()=>setFocused(true)}
          onBlur={()=>setFocused(false)}
          style={{
            width:"100%",
            background:"rgba(139,92,246,.07)",
            border:`1.5px solid ${shouldShowError?"rgba(239,68,68,.5)":focused?C.brand:C.border2}`,
            color:C.white,
            borderRadius:13,
            padding:`13px ${type==="password"?"44px":"16px"} 13px ${icon?"44px":"16px"}`,
            fontSize:14,
            fontFamily:"inherit",
            outline:"none",
            boxSizing:"border-box",
            transition:"border 0.2s, box-shadow 0.2s",
            boxShadow:focused?`0 0 0 3px ${C.brand}30`:"none"
          }}
        />
        {type==="password"&&<button onClick={()=>setShow(s=>!s)} style={{position:"absolute",right:14,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",fontSize:16,color:C.muted,lineHeight:1}}>{show?"🙈":"👁"}</button>}
      </div>
      {shouldShowError && <div style={{fontSize:11,color:C.red,marginTop:4}}>⚠ {err}</div>}
    </div>
  );

function SpinWheel({angle,spinning,phase}){
  const ptSegs=[{v:"100",c:"#8b5cf6"},{v:"150",c:"#06b6d4"},{v:"200",c:C.gold},{v:"250",c:"#ec4899"},{v:"300",c:"#10b981"},{v:"350",c:"#f97316"},{v:"400",c:"#6366f1"},{v:"500",c:"#84cc16"}];
  const udSegs=[{v:"$1",c:"#10b981"},{v:"$2",c:C.gold},{v:"$3",c:"#8b5cf6"},{v:"$1",c:"#06b6d4"},{v:"$2",c:"#ec4899"},{v:"$3",c:"#f97316"},{v:"$1",c:"#6366f1"},{v:"$2",c:"#84cc16"}];
  const segs=phase==="points"?ptSegs:udSegs;
  const n=8,r=88,cx=96,cy=96;
  return(<div style={{position:"relative",width:192,height:192,margin:"0 auto"}}>
    <div style={{position:"absolute",inset:-8,borderRadius:"50%",background:`conic-gradient(${segs.map((s,i)=>`${s.c} ${i*45}deg ${(i+1)*45}deg`).join(",")})`,opacity:.1,filter:"blur(10px)"}}/>
    <svg width="192" height="192" style={{transform:`rotate(${angle}deg)`,transition:spinning?"transform 3.8s cubic-bezier(.17,.67,.08,1)":"none",borderRadius:"50%",position:"relative",zIndex:1,filter:"drop-shadow(0 0 20px rgba(139,92,246,.4))"}}>
      {segs.map((s,i)=>{
        const a1=(2*Math.PI/n)*i-Math.PI/2,a2=(2*Math.PI/n)*(i+1)-Math.PI/2;
        const x1=cx+r*Math.cos(a1),y1=cy+r*Math.sin(a1),x2=cx+r*Math.cos(a2),y2=cy+r*Math.sin(a2);
        const ma=(a1+a2)/2,tx=cx+(r*.62)*Math.cos(ma),ty=cy+(r*.62)*Math.sin(ma);
        return(<g key={i}><path d={`M${cx},${cy} L${x1},${y1} A${r},${r} 0 0,1 ${x2},${y2} Z`} fill={s.c} opacity=".85"/><text x={tx} y={ty} textAnchor="middle" dominantBaseline="middle" fill="#fff" fontSize="10" fontWeight="800" fontFamily="DM Mono,monospace">{s.v}</text></g>);
      })}
      <circle cx={cx} cy={cy} r="16" fill={C.s1} stroke="rgba(255,255,255,.15)" strokeWidth="2"/>
      <text x={cx} y={cy+1} textAnchor="middle" dominantBaseline="middle" fontSize="13">🎯</text>
    </svg>
    <div style={{position:"absolute",top:-6,left:"50%",transform:"translateX(-50%)",width:0,height:0,borderLeft:"9px solid transparent",borderRight:"9px solid transparent",borderTop:`20px solid ${C.gold}`,zIndex:2,filter:`drop-shadow(0 3px 8px ${C.gold}88)`}}/>
  </div>);
}

/* ═══════════════════════════════════════════════
   ██   AUTH SCREENS 
═══════════════════════════════════════════════ */
function AuthScreen({onLogin,lang}){
  const [mode,setMode]      = useState("welcome");
  const [method,setMethod]  = useState("email");
  const [form,setForm]      = useState({name:"", email:"", phone:"", countryCode:"+1", pass:"", conf:"", refCode:""});
  const [errs,setErrs]      = useState({});
  const [loading,setLoading]= useState(false);
  const [users,setUsers]    = useState(INITIAL_USERS);
  /* OTP states */
  const [otpStep,setOtpStep]    = useState(false);
  const [otpInput,setOtpInput]  = useState(["","","","","",""]);
  const [otpErr,setOtpErr]      = useState("");
  const [otpSending,setOtpSending] = useState(false);
  const [resendT,setResendT]    = useState(60);
  const [canResend,setCanResend] = useState(false);
  const [pendingUser,setPU]     = useState(null);
  const [otpToken,setOtpToken]  = useState(null);
  const otpRefs = [useRef(),useRef(),useRef(),useRef(),useRef(),useRef()];

  const f=(k)=>v=>setForm(p=>({...p,[k]:v}));
  const L=(k)=>t$(lang,k);

  /* OTP resend timer */
  useEffect(()=>{
    if(!otpStep)return;
    setResendT(60);
    setCanResend(false);
    const iv=setInterval(()=>setResendT(t=>{
      if(t<=1){
        setCanResend(true);
        return 0;
      }
      return t-1;
    }),1000);
    return()=>clearInterval(iv);
  },[otpStep]);

  /* ===== FIXED sendOtp FUNCTION WITH ERROR HANDLING ===== */
  const sendOtp = async (nu) => {
    setPU(nu);
    setOtpStep(true);
    setOtpInput(["","","","","",""]);
    setOtpErr("");
    setOtpSending(true);
    
    try {
      console.log('1. Starting OTP send for:', nu.email);
      
      const baseUrl = window.location.origin;
      const apiUrl = `${baseUrl}/api/send-otp`;
      console.log('2. Fetching from:', apiUrl);
      
      const res = await fetch(apiUrl, {
        method: 'POST',
        headers: { 
          'Content-Type': 'application/json',
          'Accept': 'application/json'
        },
        body: JSON.stringify({ email: nu.email })
      });
      
      console.log('3. Response status:', res.status);
      
      const text = await res.text();
      console.log('4. Raw response:', text);
      
      let data;
      try {
        data = JSON.parse(text);
        console.log('5. Parsed data:', data);
      } catch (e) {
        console.error('6. JSON parse error:', e);
        setOtpErr(`Server returned invalid response. Status: ${res.status}`);
        setOtpSending(false);
        return;
      }
      
      if (data.success) {
        console.log('7. Success!');
        setOtpToken(data.token);
        setOtpErr("");
      } else {
        console.log('7. Error received:', data.error);
        // FIXED: Convert error object to string safely
        let errorMessage = "Failed to send code";
        if (data.error) {
          if (typeof data.error === 'string') {
            errorMessage = data.error;
          } else if (typeof data.error === 'object') {
            errorMessage = data.error.message || JSON.stringify(data.error);
          }
        }
        setOtpErr(errorMessage);
      }
    } catch (err) {
      console.error('8. Fetch error:', err);
      setOtpErr(`Network error: ${err.message}`);
    } finally {
      setOtpSending(false);
      setTimeout(() => otpRefs[0].current?.focus(), 100);
    }
  };
  /* ===== END OF FIXED sendOtp FUNCTION ===== */

  const resendOtp = async () => {
    if (!canResend) return;
    setOtpInput(["","","","","",""]);
    setOtpErr("");
    setOtpSending(true);
    
    try {
      const baseUrl = window.location.origin;
      const apiUrl = `${baseUrl}/api/send-otp`;
      
      const res = await fetch(apiUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: pendingUser.email })
      });
      
      const text = await res.text();
      let data;
      try {
        data = JSON.parse(text);
      } catch (e) {
        setOtpErr("Invalid server response");
        setOtpSending(false);
        return;
      }
      
      if (data.success) {
        setOtpErr("");
        setOtpToken(data.token);
        setResendT(60);
        setCanResend(false);
      } else {
        let errorMessage = "Failed to resend code";
        if (data.error) {
          if (typeof data.error === 'string') {
            errorMessage = data.error;
          } else if (typeof data.error === 'object') {
            errorMessage = data.error.message || JSON.stringify(data.error);
          }
        }
        setOtpErr(errorMessage);
      }
    } catch (err) {
      setOtpErr("Network error");
    } finally {
      setOtpSending(false);
      setTimeout(() => otpRefs[0].current?.focus(), 100);
    }
  };

  const handleOtpKey=(idx,val)=>{
    if(!/^[0-9]?$/.test(val))return;
    const nv=[...otpInput];nv[idx]=val;setOtpInput(nv);
    if(val&&idx<5)otpRefs[idx+1].current.focus();
  };
  
  const handleOtpBack=(idx,e)=>{
    if(e.key==="Backspace"&&!otpInput[idx]&&idx>0)otpRefs[idx-1].current.focus();
  };

  const verifyOtp=async()=>{
    const entered=otpInput.join("");
    if(entered.length<6){setOtpErr("Please enter 6-digit code");return;}
    if(!otpToken){setOtpErr("Session expired. Please request a new code.");return;}
    setOtpSending(true);
    try{
      const res=await fetch(`${window.location.origin}/api/verify-otp`,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({token:otpToken,otp:entered})
      });
      const data=await res.json();
      if(data.success){
        setUsers(p=>[...p,pendingUser]);
        // Persist new user to Supabase
        try{
          const saveRes=await fetch('/api/user',{method:'POST',headers:{'Content-Type':'application/json'},
            body:JSON.stringify({...pendingUser,joined:new Date().toLocaleDateString('en-US',{month:'short',year:'numeric'}),pts:0,usd:0,tasksDone:{},adLeft:5,adDate:new Date().toDateString(),refCode:pendingUser.refCode||null,refBy:pendingUser.refBy||null,refPts:0,refs:[]})});
          if(!saveRes.ok){
            const e=await saveRes.json();
            console.error('Failed to save user:',e);
            setOtpErr('Account created but failed to save: '+(e.error||'DB error. Check Vercel env vars.'));
            return;
          }
        }catch(e){
          console.error('Failed to save user:',e);
          setOtpErr('Account created but DB save failed. Check Vercel env vars (SUPABASE_URL, SUPABASE_SERVICE_KEY).');
          return;
        }
        // ── Award 2,000 pts signup bonus to the referrer ─────────────────
        if(pendingUser.refBy){
          try{
            const rr=await fetch(`/api/user?refCode=${encodeURIComponent(pendingUser.refBy)}`);
            const rd=await rr.json();
            if(rd.user){
              const ref=rd.user;
              const joinedLabel=new Date().toLocaleDateString('en-US',{month:'short',year:'numeric'});
              const newRefs=[...(ref.refs||[]),{name:pendingUser.name,joined:joinedLabel,pts:0}];
              await fetch('/api/user',{method:'POST',headers:{'Content-Type':'application/json'},
                body:JSON.stringify({id:ref.id,email:ref.email,pts:(ref.pts||0)+REF_SIGNUP_BONUS,refPts:(ref.refPts||0)+REF_SIGNUP_BONUS,refs:newRefs})});
            }
          }catch(_){}
        }
        onLogin(pendingUser);
      } else {
        setOtpErr(typeof data.error==='string'?data.error:'Invalid code');
      }
    } catch(err){
      setOtpErr('Network error. Please try again.');
    } finally {
      setOtpSending(false);
    }
  };

  const validate=()=>{
    const e={};
    if(mode==="register"&&!form.name.trim()) e.name=L("required");
    if(method==="email"){
      if(!form.email.match(/^[^\s@]+@[^\s@]+\.[^\s@]+$/)) e.email=L("invalidEmail");
    } else {
      if(!form.phone.trim()) e.phone=L("invalidPhone");
    }
    if(form.pass.length<6) e.pass="Min 6 characters";
    if(mode==="register"&&form.pass!==form.conf) e.conf="Passwords don't match";
    setErrs(e);
    return Object.keys(e).length===0;
  };

  const submit=async()=>{
    if(!validate()) return;
    setLoading(true);
    if(mode==="login"){
      let foundUser=null;
      // Check demo/admin users first (in-memory) for credentials
      if(method==="email"){
        foundUser=users.find(u=>u.email===form.email&&u.pass===form.pass)||null;
      } else {
        const fp=form.countryCode+form.phone;
        foundUser=users.find(u=>u.phone===fp&&u.pass===form.pass)||null;
      }
      // Always fetch the DB record so we get the latest pts/usd/state.
      // For in-memory/demo users this merges their saved progress on top of the
      // hardcoded seed values; for real registered users it IS the source of truth.
      if(foundUser&&!foundUser.isAdmin&&method==="email"){
        try{
          const r=await fetch(`/api/user?email=${encodeURIComponent(form.email)}`);
          const d=await r.json();
          if(d.user) foundUser={...foundUser,...d.user};
        }catch(e){}
      }
      // Fall back to DB-only lookup for real registered users (no in-memory entry)
      if(!foundUser&&method==="email"){
        try{
          const r=await fetch(`/api/user?email=${encodeURIComponent(form.email)}`);
          const d=await r.json();
          if(d.user&&d.user.pass===form.pass) foundUser=d.user;
        }catch(e){}
      }
      setLoading(false);
      if(foundUser) onLogin(foundUser);
      else setErrs({pass:"Invalid credentials"});
    } else {
      // Register: check for duplicates in memory and MongoDB
      if(users.find(x=>x.email===form.email)){setLoading(false);setErrs({email:"Account already exists"});return;}
      try{
        const r=await fetch(`/api/user?email=${encodeURIComponent(form.email)}`);
        const d=await r.json();
        if(d.user){setLoading(false);setErrs({email:"Account already exists"});return;}
      }catch(e){}
      const fullPhone=form.countryCode+form.phone;
      const _uid="u"+Date.now();
      const _rc=form.name.toLowerCase().replace(/[^a-z0-9]/g,"").substring(0,10)+_uid.slice(-4);
      const nu={id:_uid,name:form.name,email:form.email,phone:fullPhone,pass:form.pass,pts:0,usd:0,joined:"Now",country:"🌍",isAdmin:false,active:true,
        refCode:_rc,refBy:form.refCode.trim().toLowerCase()||null,refPts:0,refs:[]};
      setLoading(false);
      sendOtp(nu);
    }
  };

  /* OTP SCREEN */
  if(otpStep) return(
    <div style={{minHeight:"100vh",background:C.bg,fontFamily:"'Plus Jakarta Sans',sans-serif",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24,position:"relative",overflow:"hidden"}}>
      <style>{CSS}</style>
      <div style={{position:"absolute",width:380,height:380,borderRadius:"50%",background:"radial-gradient(circle,rgba(139,92,246,.12),transparent 70%)",top:-100,left:"50%",transform:"translateX(-50%)",pointerEvents:"none"}}/>

      <div style={{width:"100%",maxWidth:360,animation:"up .3s ease"}}>
        <div style={{textAlign:"center",marginBottom:32}}>
          <div style={{width:80,height:80,borderRadius:22,background:"linear-gradient(135deg,rgba(139,92,246,.2),rgba(6,182,212,.15))",border:"1px solid rgba(139,92,246,.3)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:36,margin:"0 auto 18px",animation:"float 3s ease infinite",boxShadow:`0 0 30px ${C.brand}60`}}>
            {method==="email"?"📧":"📱"}
          </div>
          <div style={{fontSize:24,fontWeight:900,letterSpacing:-.5,background:`linear-gradient(135deg,${C.white},${C.brandLt})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",marginBottom:8}}>
            Verify {method==="email"?"Email":"Phone"}
          </div>
          <div style={{fontSize:13,color:C.muted,lineHeight:1.65}}>
            A 6-digit code was sent to<br/>
            <span style={{color:C.brandLt,fontWeight:600}}>{method==="email"?form.email:form.countryCode+form.phone}</span>
          </div>
        </div>

        {/* OTP Boxes */}
        <div style={{display:"flex",gap:10,justifyContent:"center",marginBottom:16}}>
          {otpInput.map((v,i)=>(
            <input key={i} ref={otpRefs[i]} value={v}
              onChange={e=>handleOtpKey(i,e.target.value)}
              onKeyDown={e=>handleOtpBack(i,e)}
              maxLength={1} inputMode="numeric"
              style={{
                width:48,
                height:56,
                textAlign:"center",
                fontSize:22,
                fontWeight:800,
                fontFamily:"'DM Mono',monospace",
                background:"rgba(139,92,246,.08)",
                border:`2px solid ${v?C.brand:otpErr?"rgba(239,68,68,.4)":"rgba(139,92,246,.22)"}`,
                borderRadius:13,
                color:"#fff",
                outline:"none",
                transition:"all .15s",
                boxShadow:v?`0 0 0 3px ${C.brand}40`:"none"
              }}
            />
          ))}
        </div>

        <div style={{textAlign:"center",marginBottom:20,fontSize:14}}>
          <span style={{color:resendT>0?C.gold:C.red}}>
            {resendT>0 ? `⏰ Code expires in ${resendT}s` : '⏰ Code expired!'}
          </span>
        </div>

        {otpErr&&<div style={{textAlign:"center",color:C.red,fontSize:12,marginBottom:12,fontWeight:600}}>⚠ {otpErr}</div>}

        {otpSending && (
          <div style={{textAlign:"center",marginBottom:12}}>
            <div style={{display:"inline-block",width:20,height:20,borderRadius:"50%",border:"2px solid #8b5cf6",borderTopColor:"transparent",animation:"spin 1s linear infinite"}}></div>
            <span style={{marginLeft:8,color:C.muted}}>Sending code...</span>
          </div>
        )}

        <Btn 
          label={otpSending ? "Sending..." : "✓ Verify & Continue"} 
          onClick={verifyOtp} 
          disabled={otpSending || otpInput.some(v=>!v)} 
          full 
          variant="brand" 
          style={{marginBottom:12}}
        />

        <div style={{textAlign:"center",fontSize:12,color:C.muted}}>
          Didn't receive the code?{" "}
          {resendT>0
            ?<span style={{color:C.muted}}>Resend in {resendT}s</span>
            :<span onClick={resendOtp} style={{color:canResend?C.brandLt:C.muted,cursor:canResend?"pointer":"default",fontWeight:700}}>Resend Code</span>}
        </div>

        <div style={{marginTop:16,textAlign:"center"}}>
          <span onClick={()=>{setOtpStep(false);setPU(null);}} style={{fontSize:12,color:C.muted,cursor:"pointer"}}>← Change {method==="email"?"Email":"Phone"}</span>
        </div>
      </div>
    </div>
  );

  /* Welcome */
  if(mode==="welcome") return(
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24,fontFamily:"'Plus Jakarta Sans',sans-serif",position:"relative",overflow:"hidden"}}>
      <style>{CSS}</style>
      <div style={{position:"absolute",width:400,height:400,borderRadius:"50%",background:"radial-gradient(circle,rgba(139,92,246,.15),transparent 70%)",top:-100,left:"50%",transform:"translateX(-50%)",pointerEvents:"none",animation:"float 6s ease infinite"}}/>
      <div style={{position:"absolute",width:300,height:300,borderRadius:"50%",background:"radial-gradient(circle,rgba(236,72,153,.08),transparent 70%)",bottom:60,right:-80,pointerEvents:"none",animation:"float 4s ease infinite reverse"}}/>

      <div style={{textAlign:"center",marginBottom:48,animation:"up .5s ease"}}>
        <div style={{width:90,height:90,borderRadius:26,background:`linear-gradient(135deg,${C.brand},${C.pink})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:44,margin:"0 auto 22px",boxShadow:`0 8px 32px rgba(139,92,246,.4)`,animation:"float 3s ease infinite"}}>✨</div>
        <div style={{fontSize:42,fontWeight:900,letterSpacing:-1,background:`linear-gradient(135deg,${C.white},${C.brandLt},${C.pink})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",marginBottom:8}}>{APP_NAME}</div>
        <div style={{fontSize:16,color:C.muted,fontWeight:500}}>{APP_TAGLINE}</div>
      </div>

      <div style={{width:"100%",maxWidth:360,display:"flex",flexDirection:"column",gap:12}}>
        <Btn label={`✨ ${L("signIn")}`} onClick={()=>setMode("login")} full variant="brand" style={{padding:16,fontSize:15,borderRadius:15}} animate/>
        <Btn label={`🚀 ${L("signUp")}`} onClick={()=>setMode("register")} full variant="ghost" style={{padding:16,fontSize:15,borderRadius:15}}/>
      </div>

      <div style={{marginTop:32,display:"flex",gap:16,flexWrap:"wrap",justifyContent:"center"}}>
        {["🌍 International","🔒 Secure","💵 Real Rewards","📱 Mobile"].map((f,i)=>(
          <span key={i} style={{fontSize:11,color:C.muted,display:"flex",alignItems:"center",gap:4}}>{f}</span>
        ))}
      </div>
    </div>
  );

  return(
    <div style={{minHeight:"100vh",background:C.bg,fontFamily:"'Plus Jakarta Sans',sans-serif",display:"flex",flexDirection:"column",padding:24,paddingTop:60,position:"relative",overflow:"hidden"}}>
      <style>{CSS}</style>
      <div style={{position:"absolute",width:350,height:350,borderRadius:"50%",background:"radial-gradient(circle,rgba(139,92,246,.12),transparent 70%)",top:-120,right:-80,pointerEvents:"none",animation:"float 5s ease infinite"}}/>

      <button onClick={()=>setMode("welcome")} style={{background:"none",border:"none",cursor:"pointer",color:C.muted,fontSize:13,fontFamily:"inherit",marginBottom:32,display:"flex",alignItems:"center",gap:6}}>← Back</button>

      <div style={{marginBottom:32,animation:"up .3s ease"}}>
        <div style={{fontSize:30,fontWeight:900,letterSpacing:-.5,background:`linear-gradient(135deg,${C.white},${C.brandLt})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",marginBottom:6}}>
          {mode==="login"?L("welcomeBack"):L("joinWish")}
        </div>
        <div style={{fontSize:14,color:C.muted}}>{mode==="login"?L("noAcc"):L("haveAcc")} <span onClick={()=>{setMode(mode==="login"?"register":"login");setErrs({});}} style={{color:C.brandLt,cursor:"pointer",fontWeight:700}}>{mode==="login"?L("signUp"):L("signIn")}</span></div>
      </div>

      <div style={{display:"flex",background:"rgba(139,92,246,.08)",borderRadius:12,padding:4,marginBottom:22}}>
        {["email","phone"].map(m=>(
          <div key={m} onClick={()=>{setMethod(m);setErrs({});}} style={{flex:1,textAlign:"center",padding:"10px",borderRadius:10,cursor:"pointer",background:method===m?`linear-gradient(135deg,${C.brand},${C.brandDk})`:"transparent",color:method===m?C.white:C.muted,fontWeight:600,fontSize:13,transition:"all .2s"}}>
            {m==="email"?"📧 Email":"📱 Phone"}
          </div>
        ))}
      </div>

      <div style={{animation:"up .3s ease .05s both"}}>
        {mode==="register"&&<Inp label={L("name")} val={form.name} onChange={f("name")} err={errs.name} placeholder="Your full name" icon="👤"/>}
        
        {method==="email"
          ?<Inp label={L("email")} type="email" val={form.email} onChange={f("email")} err={errs.email} placeholder="you@example.com" icon="📧"/>
          :<Inp 
              type="phone-with-code"
              label={L("phone")}
              val={form.phone}
              onChange={(e)=>f("phone")(e.target.value)}
              onCountryChange={(e)=>f("countryCode")(e.target.value)}
              selectedCountry={form.countryCode}
              err={errs.phone}
              placeholder="123 456 7890"
              icon="📱"
            />}
        
        <Inp label={L("password")} type="password" val={form.pass} onChange={f("pass")} err={errs.pass} placeholder="••••••••" icon="🔒"/>
        {mode==="register"&&<Inp label="Confirm Password" type="password" val={form.conf} onChange={f("conf")} err={errs.conf} placeholder="••••••••" icon="🔑"/>}
        {mode==="register"&&<Inp label="Referral Code (optional)" val={form.refCode} onChange={f("refCode")} placeholder="Enter a friend's referral code" icon="🔗"/>}
      </div>

      <Btn label={loading?"⏳ Please wait…":(mode==="login"?`🔓 ${L("signIn")}`:`🚀 ${L("signUp")}`)} onClick={submit} full variant="brand" disabled={loading} style={{marginTop:8,padding:16,fontSize:15,borderRadius:15}}/>
    </div>
  );
}

// Generates a random hex string of given length
function randHex(len){
  const arr = new Uint8Array(len/2);
  crypto.getRandomValues(arr);
  return Array.from(arr,b=>b.toString(16).padStart(2,"0")).join("");
}
function makeApiKey(){ return `wsh_live_${randHex(32)}`; }
function makeWebhookSecret(){ return `whsec_${randHex(24)}`; }

function previewHtml(html, subject){
  let out = html;
  let subj = subject;
  Object.entries(EMAIL_PREVIEW_VALUES).forEach(([k,v])=>{
    const re = new RegExp(k.replace(/[{}]/g,"\\$&"),"g");
    out  = out.replace(re,v);
    subj = subj.replace(re,v);
  });
  return {html:out, subject:subj};
}

// Formats a window in seconds to a readable string
function fmtWindow(secs){
  if(secs<60)   return `${secs}s`;
  if(secs<3600) return `${secs/60}m`;
  if(secs<86400) return `${secs/3600}h`;
  return `${secs/86400}d`;
}

function fmtRate(limit, windowSecs){
  return `${limit} / ${fmtWindow(windowSecs)}`;
}

function AdminUsers({users, setUsers, adminUser}){
  const [search,setSearch] = useState("");
  const [confirm,setConfirm] = useState(null); // {type,userId}

  const regularUsers = users.filter(u=>u.role==="user"||(!u.isAdmin&&!u.role));
  const filtered = regularUsers.filter(u=>
    u.name.toLowerCase().includes(search.toLowerCase()) ||
    u.email.toLowerCase().includes(search.toLowerCase())
  );

  const toggleActive = (id) => {
    setUsers(prev=>prev.map(u=>u.id===id?{...u,active:!u.active}:u));
    setConfirm(null);
  };
  const deleteUser = (id) => {
    setUsers(prev=>prev.filter(u=>u.id!==id));
    setConfirm(null);
  };

  const canDelete = can(adminUser,"delete_users");
  const canToggle = can(adminUser,"toggle_user_active");
  const canEdit   = can(adminUser,"edit_users");

  return (
    <div>
      <div style={{position:"relative",marginBottom:16}}>
        <span style={{position:"absolute",left:13,top:"50%",transform:"translateY(-50%)",fontSize:15,pointerEvents:"none"}}>🔍</span>
        <input
          className="inp-base"
          placeholder="Search users by name or email…"
          value={search}
          onChange={e=>setSearch(e.target.value)}
          style={{paddingLeft:38}}
        />
      </div>

      <div style={{fontSize:12,color:"rgba(255,255,255,.35)",marginBottom:12}}>

/* ── Roles Tab (super_admin only) ───────────────── */
function AdminRoles({users, setUsers, adminUser}){
  const [confirm,setConfirm] = useState(null);
  const staffUsers = users.filter(u=>u.isAdmin||u.role==="super_admin"||u.role==="moderator");

  const changeRole = (id, newRole) => {
    if(id===adminUser.id) return; // can't demote self
    setUsers(prev=>prev.map(u=>u.id===id
      ? {...u, role:newRole, isAdmin:newRole!=="user"}
      : u
    ));
    setConfirm(null);
  };

  const promoteUser = (id) => {
    setUsers(prev=>prev.map(u=>u.id===id
      ? {...u, role:"moderator", isAdmin:true}
      : u

    setConfirm(null);

            <div key={u.id} className="user-row">
              <div style={{
                width:38,height:38,borderRadius:"50%",flexShrink:0,
                background:`linear-gradient(135deg,${C.brand},${C.brandDk})`,
                display:"flex",alignItems:"center",justifyContent:"center",
                fontSize:16,fontWeight:700,color:C.white,

              <div style={{flex:1}}>
                <div style={{fontWeight:700,color:C.white,fontSize:14}}>{u.name}</div>
                <div style={{fontSize:11,color:"rgba(255,255,255,.4)",marginTop:1}}>{u.email}</div>
              </div>
              <button

                style={{background:"rgba(6,182,212,.12)",border:"1px solid rgba(6,182,212,.3)",color:C.cyan,borderRadius:8,padding:"6px 12px",fontSize:12,fontWeight:600,cursor:"pointer",flexShrink:0}}

              {confirm.type==="promote"
                ? `Promote "${confirm.userName}" to Moderator?`

            <div style={{fontSize:12,color:"rgba(255,255,255,.45)",textAlign:"center",marginBottom:20}}>

/* ── ScopeCheckboxes helper ────────────────────── */
function ScopeGrid({items, selected, onChange, color=C.brand}){
  const groups = [...new Set(items.map(i=>i.group))];
  return (
    <div>
      {groups.map(g=>(
        <div key={g} style={{marginBottom:12}}>
          <div style={{fontSize:11,fontWeight:700,color:"rgba(255,255,255,.35)",letterSpacing:1,marginBottom:6}}>{g.toUpperCase()}</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {items.filter(i=>i.group===g).map(item=>{
              const on = selected.includes(item.id);
              return (
                <button key={item.id} onClick={()=>onChange(on?selected.filter(s=>s!==item.id):[...selected,item.id])}
                  style={{
                    padding:"5px 11px",borderRadius:8,fontSize:12,fontWeight:600,cursor:"pointer",
                    background:on?`${color}22`:"rgba(255,255,255,.04)",
                    border:`1px solid ${on?color:"rgba(255,255,255,.12)"}`,
                    color:on?color:"rgba(255,255,255,.45)",
                    transition:"all .15s",
                  }}
                >{on?"✓ ":""}{item.label}</button>
              );
            })}
          </div>
        </div>
      ))}
    </div>
  );
}

/* ── API Keys Tab ──────────────────────────────── */
function AdminApiKeys(){
  const [keys,setKeys] = useState(INITIAL_API_KEYS);
  const [modal,setModal] = useState(null);  // null | "create" | "edit" | "revoke" | "created"
  const [form,setForm] = useState({name:"",scopes:[]});
  const [editId,setEditId] = useState(null);
  const [revokeId,setRevokeId] = useState(null);
  const [newKeyFull,setNewKeyFull] = useState("");
  const [copied,setCopied] = useState(false);
  const [showSecret,setShowSecret] = useState({});

  const openCreate = () => { setForm({name:"",scopes:[]}); setModal("create"); };
  const openEdit   = (k) => { setEditId(k.id); setForm({name:k.name,scopes:[...k.scopes]}); setModal("edit"); };
  const openRevoke = (k) => { setRevokeId(k.id); setModal("revoke"); };

  const createKey = () => {
    if(!form.name.trim()||!form.scopes.length) return;
    const full = makeApiKey();
    const k = {
      id:`ak_${Date.now()}`, name:form.name.trim(),
      prefix:full.slice(0,14), fullKey:full,
      scopes:form.scopes, status:"active",
      createdAt:new Date().toISOString(), lastUsed:null,
    };
    setKeys(prev=>[k,...prev]);
    setNewKeyFull(full);
    setModal("created");
  };

  const saveEdit = () => {
    if(!form.name.trim()||!form.scopes.length) return;
    setKeys(prev=>prev.map(k=>k.id===editId?{...k,name:form.name.trim(),scopes:form.scopes}:k));
    setModal(null);
  };

  const revokeKey = () => {
    setKeys(prev=>prev.map(k=>k.id===revokeId?{...k,status:"revoked",fullKey:null}:k));
    setModal(null);
  };

  const copyKey = () => {
    navigator.clipboard.writeText(newKeyFull).catch(()=>{});
    setCopied(true);
    setTimeout(()=>setCopied(false),2000);
  };

  const activeKeys  = keys.filter(k=>k.status==="active");
  const revokedKeys = keys.filter(k=>k.status==="revoked");

  const KeyCard = ({k}) => (
    <div className="user-row" style={{flexDirection:"column",alignItems:"stretch",gap:10}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <div style={{
          width:36,height:36,borderRadius:9,flexShrink:0,
          background:k.status==="active"?"rgba(16,185,129,.15)":"rgba(239,68,68,.1)",
          border:`1px solid ${k.status==="active"?"rgba(16,185,129,.3)":"rgba(239,68,68,.2)"}`,
          display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,
        }}>🔑</div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
            <span style={{fontWeight:700,color:C.white,fontSize:14}}>{k.name}</span>
            <span style={{
              fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:99,
              background:k.status==="active"?"rgba(16,185,129,.15)":"rgba(239,68,68,.1)",
              color:k.status==="active"?C.green:C.red,
              border:`1px solid ${k.status==="active"?"rgba(16,185,129,.3)":"rgba(239,68,68,.2)"}`,
            }}>{k.status==="active"?"● ACTIVE":"✕ REVOKED"}</span>
          </div>
          <div style={{fontSize:11,color:"rgba(255,255,255,.35)",marginTop:2,fontFamily:"monospace"}}>
            {k.prefix}{"●".repeat(16)}
          </div>
          <div style={{fontSize:11,color:"rgba(255,255,255,.3)",marginTop:2}}>
            Created {fmtDate(k.createdAt)}
            {k.lastUsed&&<span> · Last used {fmtDate(k.lastUsed)}</span>}
            {!k.lastUsed&&<span style={{color:"rgba(255,255,255,.2)"}}> · Never used</span>}
          </div>
        </div>
        {k.status==="active"&&(
          <div style={{display:"flex",gap:6,flexShrink:0}}>
            <button onClick={()=>openEdit(k)} style={{background:"rgba(139,92,246,.12)",border:`1px solid ${C.border2}`,color:C.brandLt,borderRadius:8,padding:"6px 10px",fontSize:12,fontWeight:600,cursor:"pointer"}}>Edit</button>
            <button onClick={()=>openRevoke(k)} style={{background:"rgba(239,68,68,.1)",border:"1px solid rgba(239,68,68,.25)",color:C.red,borderRadius:8,padding:"6px 10px",fontSize:12,fontWeight:600,cursor:"pointer"}}>Revoke</button>
          </div>
        )}
      </div>
      <div style={{display:"flex",flexWrap:"wrap",gap:5,paddingLeft:46}}>
        {k.scopes.map(s=>(
          <span key={s} style={{fontSize:10,fontWeight:600,padding:"2px 8px",borderRadius:6,background:"rgba(139,92,246,.1)",color:C.brandLt,border:`1px solid ${C.border}`}}>{s}</span>
        ))}
      </div>
    </div>
  );

  return (
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
        <div>
          <div style={{fontWeight:700,color:C.white,fontSize:15}}>API Keys</div>
          <div style={{fontSize:12,color:"rgba(255,255,255,.4)",marginTop:2}}>{activeKeys.length} active · {revokedKeys.length} revoked</div>
        </div>
        <button onClick={openCreate} style={{background:`linear-gradient(135deg,${C.brand},${C.brandDk})`,border:"none",color:"#fff",borderRadius:10,padding:"9px 16px",fontSize:13,fontWeight:700,cursor:"pointer",boxShadow:`0 4px 16px ${C.brand}60`}}>+ New Key</button>
      </div>

      <div style={{background:"rgba(245,158,11,.07)",border:"1px solid rgba(245,158,11,.2)",borderRadius:11,padding:"10px 14px",marginBottom:18,display:"flex",gap:9,alignItems:"flex-start"}}>
        <span style={{fontSize:15,flexShrink:0}}>⚠️</span>
        <span style={{fontSize:12,color:"rgba(255,255,255,.55)",lineHeight:1.5}}>API keys grant programmatic access to your platform. Keep them secret — never share or commit them to source control. A key's full value is only shown once at creation.</span>
      </div>

      {activeKeys.length>0&&(
        <div style={{marginBottom:20}}>
          {activeKeys.map(k=><KeyCard key={k.id} k={k}/>)}
        </div>
      )}

      {revokedKeys.length>0&&(
        <div>
          <div style={{fontSize:12,fontWeight:700,color:"rgba(255,255,255,.25)",letterSpacing:1,marginBottom:10}}>REVOKED KEYS</div>
          {revokedKeys.map(k=><KeyCard key={k.id} k={k}/>)}

      {/* Create / Edit modal */}
      {(modal==="create"||modal==="edit")&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.82)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:999,padding:16}}>
          <div style={{background:C.s1,borderRadius:"20px 20px 16px 16px",padding:24,width:"100%",maxWidth:480,border:`1px solid ${C.border}`,maxHeight:"90vh",overflowY:"auto"}}>
            <div style={{fontWeight:800,fontSize:17,color:C.white,marginBottom:4}}>{modal==="create"?"Create New API Key":"Edit API Key"}</div>
            <div style={{fontSize:12,color:"rgba(255,255,255,.4)",marginBottom:20}}>{modal==="create"?"The full key is shown once — copy it immediately.":"You can update the key name and its permission scopes."}</div>

            <div style={{marginBottom:16}}>

            <div style={{
              background:"rgba(0,0,0,.4)",border:`1px solid ${C.border2}`,borderRadius:10,padding:"12px 14px",
              fontFamily:"monospace",fontSize:12,color:C.green,wordBreak:"break-all",marginBottom:14,
            }}>{newKeyFull}</div>
            <button onClick={copyKey} style={{
              width:"100%",padding:12,borderRadius:12,border:"none",cursor:"pointer",fontWeight:700,fontSize:14,
              background:copied?`linear-gradient(135deg,${C.green},#047857)`:`linear-gradient(135deg,${C.brand},${C.brandDk})`,
              color:"#fff",marginBottom:10,transition:"background .3s",
            }}>{copied?"✓ Copied!":"📋 Copy to Clipboard"}</button>
            <button onClick={()=>{setModal(null);setNewKeyFull("");}} style={{width:"100%",padding:12,borderRadius:12,border:`1px solid ${C.border}`,background:C.s3,color:C.white,fontWeight:600,cursor:"pointer",fontSize:14}}>I've saved it — Close</button>
          </div>
        </div>
      )}

      {/* Revoke confirm */}
      {modal==="revoke"&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.82)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:999,padding:16}}>
          <div style={{background:C.s2,borderRadius:20,padding:24,maxWidth:300,width:"100%",border:`1px solid rgba(239,68,68,.25)`}}>
            <div style={{fontSize:32,textAlign:"center",marginBottom:12}}>🚫</div>
            <div style={{fontWeight:700,color:C.white,fontSize:15,textAlign:"center",marginBottom:8}}>Revoke "{keys.find(k=>k.id===revokeId)?.name}"?</div>
            <div style={{fontSize:12,color:"rgba(255,255,255,.45)",textAlign:"center",marginBottom:20}}>This key will stop working immediately. This cannot be undone.</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <button onClick={()=>setModal(null)} style={{background:C.s3,border:`1px solid ${C.border}`,borderRadius:12,padding:11,color:C.white,fontWeight:600,cursor:"pointer"}}>Cancel</button>
              <button onClick={revokeKey} style={{background:`linear-gradient(135deg,${C.red},#b91c1c)`,border:"none",borderRadius:12,padding:11,color:"#fff",fontWeight:700,cursor:"pointer"}}>Revoke Key</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ── Webhooks Tab ──────────────────────────────── */
function AdminWebhooks(){
  const [hooks,setHooks] = useState(INITIAL_WEBHOOKS);
  const [modal,setModal] = useState(null); // null | "create" | "edit" | "delete" | "test"
  const [form,setForm]   = useState({name:"",url:"",events:[],secret:""});
  const [editId,setEditId]   = useState(null);
  const [deleteId,setDeleteId] = useState(null);
  const [testId,setTestId]   = useState(null);
  const [testResult,setTestResult] = useState(null);
  const [showSecret,setShowSecret] = useState({});
  const [urlErr,setUrlErr] = useState("");

  const validateUrl = v => {
    try { new URL(v); setUrlErr(""); return true; }
    catch { setUrlErr("Enter a valid HTTPS URL"); return false; }
  };

  const openCreate = () => {
    setForm({name:"",url:"",events:[],secret:makeWebhookSecret()});
    setUrlErr("");
    setModal("create");
  };
  const openEdit = (h) => {
    setEditId(h.id);
    setForm({name:h.name,url:h.url,events:[...h.events],secret:h.secret});
    setUrlErr("");
    setModal("edit");
  };
  const openDelete = (h) => { setDeleteId(h.id); setModal("delete"); };
  const openTest   = (h) => { setTestId(h.id); setTestResult(null); setModal("test"); };

  const createHook = () => {
    if(!form.name.trim()||!validateUrl(form.url)||!form.events.length) return;
    const h = {
      id:`wh_${Date.now()}`, name:form.name.trim(),
      url:form.url.trim(), events:form.events,
      secret:form.secret||makeWebhookSecret(),
      status:"active",
      createdAt:new Date().toISOString(),
      lastTriggered:null, failCount:0,
    };
    setHooks(prev=>[h,...prev]);
    setModal(null);
  };

  const saveEdit = () => {
    if(!form.name.trim()||!validateUrl(form.url)||!form.events.length) return;
    setHooks(prev=>prev.map(h=>h.id===editId?{...h,name:form.name.trim(),url:form.url.trim(),events:form.events,secret:form.secret}:h));
    setModal(null);
  };

  const deleteHook  = () => { setHooks(prev=>prev.filter(h=>h.id!==deleteId)); setModal(null); };
  const toggleHook  = (id) => setHooks(prev=>prev.map(h=>h.id===id?{...h,status:h.status==="active"?"inactive":"active"}:h));
  const regenerateSecret = () => setForm(p=>({...p,secret:makeWebhookSecret()}));

  const runTest = () => {
    setTestResult("loading");
    setTimeout(()=>{
      const ok = Math.random()>0.25;
      setTestResult(ok
        ? { ok:true,  status:200, body:'{"received":true,"event":"test.ping"}', ms:Math.floor(120+Math.random()*180) }
        : { ok:false, status:503, body:'Service Unavailable',                   ms:Math.floor(5000+Math.random()*3000) }
      );
    }, 1200);
  };

  const HookCard = ({h}) => (
    <div className="user-row" style={{flexDirection:"column",alignItems:"stretch",gap:10}}>
      <div style={{display:"flex",alignItems:"flex-start",gap:10}}>
        <div style={{
          width:36,height:36,borderRadius:9,flexShrink:0,
          background:h.status==="active"?"rgba(6,182,212,.12)":"rgba(255,255,255,.05)",
          border:`1px solid ${h.status==="active"?"rgba(6,182,212,.3)":"rgba(255,255,255,.1)"}`,
          display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,
        }}>🔗</div>

        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
            <span style={{fontWeight:700,color:C.white,fontSize:14}}>{h.name}</span>
            {h.failCount>0&&<span style={{fontSize:10,fontWeight:700,padding:"2px 7px",borderRadius:99,background:"rgba(245,158,11,.15)",color:C.gold,border:"1px solid rgba(245,158,11,.3)"}}>{h.failCount} fail{h.failCount!==1?"s":""}</span>}
          </div>
          <div style={{fontSize:11,color:"rgba(255,255,255,.4)",marginTop:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{h.url}</div>
          <div style={{fontSize:11,color:"rgba(255,255,255,.3)",marginTop:2}}>
            Created {fmtDate(h.createdAt)}
            {h.lastTriggered?<span> · Last fired {fmtDate(h.lastTriggered)}</span>:<span style={{color:"rgba(255,255,255,.2)"}}> · Never fired</span>}
          </div>
        </div>

        <div style={{display:"flex",gap:6,flexShrink:0,flexWrap:"wrap",justifyContent:"flex-end"}}>
          <button onClick={()=>toggleHook(h.id)}
            className={`toggle ${h.status==="active"?"on":"off"}`}
            title={h.status==="active"?"Disable":"Enable"}
            style={{width:40,height:22,fontSize:0}}
          />
          <button onClick={()=>openTest(h)}   style={{background:"rgba(6,182,212,.1)",border:"1px solid rgba(6,182,212,.25)",color:C.cyan,borderRadius:8,padding:"5px 9px",fontSize:11,fontWeight:600,cursor:"pointer"}}>Test</button>
          <button onClick={()=>openEdit(h)}   style={{background:"rgba(139,92,246,.1)",border:`1px solid ${C.border2}`,color:C.brandLt,borderRadius:8,padding:"5px 9px",fontSize:11,fontWeight:600,cursor:"pointer"}}>Edit</button>
          <button onClick={()=>openDelete(h)} style={{background:"rgba(239,68,68,.1)",border:"1px solid rgba(239,68,68,.25)",color:C.red,borderRadius:8,padding:"5px 9px",fontSize:11,fontWeight:600,cursor:"pointer"}}>Delete</button>
        </div>
      </div>

      {/* Events */}
      <div style={{display:"flex",flexWrap:"wrap",gap:5,paddingLeft:46}}>
        {h.events.map(e=>(
          <span key={e} style={{fontSize:10,fontWeight:600,padding:"2px 8px",borderRadius:6,background:"rgba(6,182,212,.08)",color:C.cyan,border:"1px solid rgba(6,182,212,.2)"}}>{e}</span>
        ))}
      </div>

      {/* Secret row */}
      <div style={{paddingLeft:46,display:"flex",alignItems:"center",gap:8}}>
        <span style={{fontSize:11,color:"rgba(255,255,255,.3)",fontFamily:"monospace"}}>
          {showSecret[h.id] ? h.secret : h.secret.slice(0,12)+"●".repeat(12)}
        </span>
        <button onClick={()=>setShowSecret(p=>({...p,[h.id]:!p[h.id]}))}
          style={{background:"none",border:"none",cursor:"pointer",fontSize:13,color:C.muted,padding:0,lineHeight:1}}
        >{showSecret[h.id]?"🙈":"👁"}</button>
      </div>
    </div>
  );

  const FormModal = ({isEdit}) => (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.82)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:999,padding:16}}>
      <div style={{background:C.s1,borderRadius:"20px 20px 16px 16px",padding:24,width:"100%",maxWidth:480,border:`1px solid ${C.border}`,maxHeight:"90vh",overflowY:"auto"}}>
        <div style={{fontWeight:800,fontSize:17,color:C.white,marginBottom:20}}>{isEdit?"Edit Webhook":"Add Webhook"}</div>

        <div style={{marginBottom:14}}>
          <div style={{fontSize:12,fontWeight:600,color:"rgba(255,255,255,.5)",marginBottom:6}}>Name <span style={{color:C.red}}>*</span></div>
          <input className="inp-base" placeholder="e.g. Reward Notifier" value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))}/>
        </div>

        <div style={{marginBottom:14}}>
          <div style={{fontSize:12,fontWeight:600,color:"rgba(255,255,255,.5)",marginBottom:6}}>Endpoint URL <span style={{color:C.red}}>*</span></div>
          <input className="inp-base" placeholder="https://your-server.com/webhooks/wish" value={form.url}
            onChange={e=>{setForm(p=>({...p,url:e.target.value}));if(urlErr)validateUrl(e.target.value);}}
            onBlur={e=>validateUrl(e.target.value)}/>
          {urlErr&&<div style={{fontSize:11,color:C.red,marginTop:4}}>⚠ {urlErr}</div>}
        </div>

        <div style={{marginBottom:14}}>
          <div style={{fontSize:12,fontWeight:600,color:"rgba(255,255,255,.5)",marginBottom:6}}>Signing Secret</div>
          <div style={{display:"flex",gap:8}}>
            <input className="inp-base" readOnly value={form.secret} style={{fontFamily:"monospace",fontSize:11,flex:1}}/>
            <button onClick={regenerateSecret} title="Regenerate" style={{background:"rgba(139,92,246,.12)",border:`1px solid ${C.border2}`,color:C.brandLt,borderRadius:10,padding:"0 12px",fontSize:13,cursor:"pointer",flexShrink:0}}>↺</button>
          </div>
          <div style={{fontSize:11,color:"rgba(255,255,255,.3)",marginTop:4}}>Used to verify payload signatures on your server.</div>
        </div>

        <div style={{marginBottom:20}}>
          <div style={{fontSize:12,fontWeight:600,color:"rgba(255,255,255,.5)",marginBottom:6}}>Events to Subscribe <span style={{color:C.red}}>*</span></div>
          <ScopeGrid items={WEBHOOK_EVENTS} selected={form.events} onChange={e=>setForm(p=>({...p,events:e}))} color={C.cyan}/>
          {form.events.length===0&&<div style={{fontSize:11,color:C.red,marginTop:6}}>⚠ Select at least one event</div>}
        </div>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <button onClick={()=>setModal(null)} style={{background:C.s3,border:`1px solid ${C.border}`,borderRadius:12,padding:12,color:C.white,fontWeight:600,cursor:"pointer"}}>Cancel</button>
          <button
            onClick={isEdit?saveEdit:createHook}
            disabled={!form.name.trim()||!form.url.trim()||!form.events.length}
            style={{
              background:(!form.name.trim()||!form.url.trim()||!form.events.length)?"rgba(255,255,255,.07)":`linear-gradient(135deg,${C.cyan},#0284c7)`,
              border:"none",borderRadius:12,padding:12,fontWeight:700,cursor:(!form.name.trim()||!form.url.trim()||!form.events.length)?"default":"pointer",
              color:(!form.name.trim()||!form.url.trim()||!form.events.length)?"rgba(255,255,255,.3)":"#fff",
            }}
          >{isEdit?"Save Changes":"Add Webhook"}</button>
        </div>
      </div>
    </div>
  );

  return (
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
        <div>
          <div style={{fontWeight:700,color:C.white,fontSize:15}}>Webhooks</div>
          <div style={{fontSize:12,color:"rgba(255,255,255,.4)",marginTop:2}}>
            {hooks.filter(h=>h.status==="active").length} active · {hooks.filter(h=>h.status==="inactive").length} inactive
          </div>
        </div>
        <button onClick={openCreate} style={{background:`linear-gradient(135deg,${C.cyan},#0284c7)`,border:"none",color:"#fff",borderRadius:10,padding:"9px 16px",fontSize:13,fontWeight:700,cursor:"pointer",boxShadow:`0 4px 16px ${C.cyan}60`}}>+ Add Webhook</button>
      </div>

      {hooks.map(h=><HookCard key={h.id} h={h}/>)}

      {modal==="create" && <FormModal isEdit={false}/>}
      {modal==="edit"   && <FormModal isEdit={true}/>}

      {/* Delete confirm */}
      {modal==="delete"&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.82)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:999,padding:16}}>
          <div style={{background:C.s2,borderRadius:20,padding:24,maxWidth:300,width:"100%",border:`1px solid rgba(239,68,68,.25)`}}>
            <div style={{fontSize:32,textAlign:"center",marginBottom:12}}>🗑️</div>
            <div style={{fontWeight:700,color:C.white,fontSize:15,textAlign:"center",marginBottom:8}}>Delete "{hooks.find(h=>h.id===deleteId)?.name}"?</div>
            <div style={{fontSize:12,color:"rgba(255,255,255,.45)",textAlign:"center",marginBottom:20}}>Your endpoint will stop receiving events immediately.</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <button onClick={()=>setModal(null)} style={{background:C.s3,border:`1px solid ${C.border}`,borderRadius:12,padding:11,color:C.white,fontWeight:600,cursor:"pointer"}}>Cancel</button>
              <button onClick={deleteHook} style={{background:`linear-gradient(135deg,${C.red},#b91c1c)`,border:"none",borderRadius:12,padding:11,color:"#fff",fontWeight:700,cursor:"pointer"}}>Delete</button>
            </div>
          </div>
        </div>
      )}

      {/* Test modal */}
      {modal==="test"&&(()=>{
        const h = hooks.find(x=>x.id===testId);
        return (
          <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.85)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:999,padding:16}}>
            <div style={{background:C.s1,borderRadius:20,padding:24,maxWidth:400,width:"100%",border:`1px solid ${C.border}`}}>
              <div style={{fontWeight:800,fontSize:16,color:C.white,marginBottom:4}}>Test Webhook</div>
              <div style={{fontSize:12,color:"rgba(255,255,255,.4)",marginBottom:16,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{h?.url}</div>

              {!testResult&&(
                <div style={{textAlign:"center",padding:"20px 0"}}>
                  <button onClick={runTest} style={{background:`linear-gradient(135deg,${C.cyan},#0284c7)`,border:"none",color:"#fff",borderRadius:12,padding:"12px 28px",fontSize:14,fontWeight:700,cursor:"pointer"}}>🚀 Send Test Ping</button>
                  <div style={{fontSize:11,color:"rgba(255,255,255,.3)",marginTop:10}}>Sends a <code style={{background:"rgba(255,255,255,.08)",padding:"1px 5px",borderRadius:4}}>test.ping</code> event to your endpoint.</div>
                </div>
              )}

              {testResult==="loading"&&(
                <div style={{textAlign:"center",padding:"24px 0",color:"rgba(255,255,255,.5)",fontSize:13}}>
                  <div style={{fontSize:28,marginBottom:8,animation:"rotate 1s linear infinite",display:"inline-block"}}>⏳</div>
                  <div>Sending request…</div>
                </div>
              )}

              {testResult&&testResult!=="loading"&&(
                <div>
                  <div style={{
                    background:testResult.ok?"rgba(16,185,129,.08)":"rgba(239,68,68,.08)",
                    border:`1px solid ${testResult.ok?"rgba(16,185,129,.3)":"rgba(239,68,68,.3)"}`,
                    borderRadius:12,padding:14,marginBottom:14,
                  }}>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                      <span style={{fontSize:20}}>{testResult.ok?"✅":"❌"}</span>
                      <span style={{fontWeight:700,color:testResult.ok?C.green:C.red,fontSize:14}}>
                        {testResult.ok?"Success":"Failed"}
                      </span>
                      <span style={{marginLeft:"auto",fontSize:11,color:"rgba(255,255,255,.4)",fontFamily:"monospace"}}>{testResult.ms}ms</span>
                    </div>
                    <div style={{display:"flex",gap:8,marginBottom:8}}>
                      <span style={{
                        fontSize:12,fontWeight:700,padding:"2px 8px",borderRadius:6,
                        background:testResult.ok?"rgba(16,185,129,.15)":"rgba(239,68,68,.15)",
                        color:testResult.ok?C.green:C.red,
                      }}>HTTP {testResult.status}</span>
                    </div>
                    <div style={{fontFamily:"monospace",fontSize:11,color:"rgba(255,255,255,.6)",background:"rgba(0,0,0,.3)",padding:"8px 10px",borderRadius:8,wordBreak:"break-all"}}>{testResult.body}</div>
                  </div>
                  <button onClick={runTest} style={{width:"100%",background:"rgba(255,255,255,.05)",border:`1px solid ${C.border}`,borderRadius:10,padding:10,color:C.muted,fontSize:13,fontWeight:600,cursor:"pointer",marginBottom:8}}>Retry Test</button>
                </div>
              )}

              <button onClick={()=>setModal(null)} style={{width:"100%",background:C.s3,border:`1px solid ${C.border}`,borderRadius:12,padding:11,color:C.white,fontWeight:600,cursor:"pointer",fontSize:14}}>Close</button>
            </div>
          </div>
        );
      })()}
    </div>
  );
}

/* ── Email Templates Tab ───────────────────────── */
function AdminEmailTemplates(){
  const [templates,setTemplates] = useState(INITIAL_EMAIL_TEMPLATES);
  const [editId,setEditId]       = useState(null); // template id being edited, or null = list view
  const [previewMode,setPreview] = useState(false);
  const [saved,setSaved]         = useState(false);
  const [resetConfirm,setRC]     = useState(false);
  const iframeRef                = React.useRef(null);

  // Draft state while editing
  const [draft,setDraft] = useState({subject:"",html:""});

  const openEditor = (tpl) => {
    setDraft({subject:tpl.subject, html:tpl.html});
    setEditId(tpl.id);
    setPreview(false);
    setSaved(false);
    setRC(false);
  };

  const closeEditor = () => { setEditId(null); setPreview(false); };

  const saveDraft = () => {
    setTemplates(prev=>prev.map(t=>t.id===editId
      ? {...t, subject:draft.subject, html:draft.html, updatedAt:new Date().toISOString()}
      : t
    ));
    setSaved(true);
    setTimeout(()=>setSaved(false),2500);
  };

  const resetToDefault = () => {
    const orig = INITIAL_EMAIL_TEMPLATES.find(t=>t.id===editId);
    if(orig){ setDraft({subject:orig.subject, html:orig.html}); }
    setRC(false);
  };

  const toggleEnabled = (id) => {
    setTemplates(prev=>prev.map(t=>t.id===id?{...t,enabled:!t.enabled}:t));
  };

  // Insert a variable tag at cursor position in the active textarea
  const insertVar = (tag, field) => {
    const el = document.getElementById(`email-${field}`);
    if(!el) return;
    const s = el.selectionStart, e = el.selectionEnd;
    const val = draft[field];
    const next = val.slice(0,s)+tag+val.slice(e);
    setDraft(p=>({...p,[field]:next}));
    // restore cursor after React re-render
    setTimeout(()=>{ el.focus(); el.setSelectionRange(s+tag.length,s+tag.length); },0);
  };

  // Update iframe preview whenever draft changes
  React.useEffect(()=>{
    if(!previewMode||!iframeRef.current) return;
    const {html,subject} = previewHtml(draft.html, draft.subject);
    const doc = iframeRef.current.contentDocument||iframeRef.current.contentWindow.document;
    doc.open(); doc.write(`<!doctype html><html><head><meta charset="utf-8"><title>${subject}</title></head><body style="margin:0;">${html}</body></html>`); doc.close();
  },[previewMode,draft]);

  /* ── List view ── */
  if(!editId){
    return (
      <div>
        <div style={{fontWeight:700,color:C.white,fontSize:15,marginBottom:4}}>Email Templates</div>
        <div style={{fontSize:12,color:"rgba(255,255,255,.4)",marginBottom:16}}>Edit the emails sent to your users. Changes are saved per-session.</div>

          <div key={tpl.id} className="user-row" style={{cursor:"default"}}>
            <div style={{
              width:40,height:40,borderRadius:10,flexShrink:0,
              background:"rgba(139,92,246,.12)",border:`1px solid ${C.border}`,
