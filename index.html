<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wish — Earn & Reward Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #0d0b1e; font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        @keyframes glow {
            0% { box-shadow: 0 0 20px rgba(139,92,246,0.3); }
            50% { box-shadow: 0 0 40px rgba(139,92,246,0.6); }
            100% { box-shadow: 0 0 20px rgba(139,92,246,0.3); }
        }
        @keyframes up {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script>
        const { useState, useEffect, useRef } = React;

        // Enhanced Colors
        const C = {
            bg: "#0d0b1e",
            s1: "#13102a",
            s2: "#191534",
            s3: "#211d42",
            brand: "#8b5cf6",
            brandLt: "#a78bfa",
            brandDk: "#6d28d9",
            pink: "#ec4899",
            cyan: "#06b6d4",
            gold: "#f59e0b",
            goldLt: "#fbbf24",
            green: "#10b981",
            greenLt: "#34d399",
            red: "#ef4444",
            muted: "rgba(255,255,255,.4)",
            white: "#fff"
        };

        // Initialize default users
        useEffect(() => {
            const users = JSON.parse(localStorage.getItem('wish_users') || '[]');
            if (users.length === 0) {
                // Add default users
                const defaultUsers = [
                    { id: "u1", name: "Ahmad Ali", email: "ahmad@wish.com", phone: "", pass: "ahmad123", pts: 48200, usd: 48.2, joined: "Jan 2025", country: "🇵🇰", isAdmin: false, active: true },
                    { id: "u2", name: "Sara Khan", email: "sara@wish.com", phone: "", pass: "sara123", pts: 41500, usd: 41.5, joined: "Feb 2025", country: "🇮🇳", isAdmin: false, active: true },
                    { id: "admin", name: "Admin", email: "admin@wish.com", phone: "", pass: "admin@123", pts: 0, usd: 0, joined: "Jan 2025", country: "🌍", isAdmin: true, active: true }
                ];
                localStorage.setItem('wish_users', JSON.stringify(defaultUsers));
            }
        }, []);

        // Password Strength Checker
        function checkPasswordStrength(password) {
            let score = 0;
            const feedback = [];
            
            if (password.length >= 8) score++;
            else feedback.push("8+ chars");
            
            if (password.length >= 12) score++;
            
            if (/[A-Z]/.test(password)) score++;
            else feedback.push("uppercase");
            
            if (/[a-z]/.test(password)) score++;
            else feedback.push("lowercase");
            
            if (/[0-9]/.test(password)) score++;
            else feedback.push("number");
            
            if (/[^A-Za-z0-9]/.test(password)) score++;
            else feedback.push("special");
            
            let strength = "Weak";
            let color = C.red;
            
            if (score >= 5) {
                strength = "Strong";
                color = C.green;
            } else if (score >= 3) {
                strength = "Medium";
                color = C.gold;
            }
            
            return { score, strength, color, feedback };
        }

        // ========== AUTH SCREEN ==========
        function AuthScreen({ onLogin }) {
            const [mode, setMode] = useState("welcome");
            const [method, setMethod] = useState("email");
            const [form, setForm] = useState({ name: "", email: "", phone: "", pass: "", conf: "" });
            const [errors, setErrors] = useState({});
            const [loading, setLoading] = useState(false);
            const [otpStep, setOtpStep] = useState(false);
            const [otpInput, setOtpInput] = useState(["", "", "", "", "", ""]);
            const [otpError, setOtpError] = useState("");
            const [otpSending, setOtpSending] = useState(false);
            const [resendTimer, setResendTimer] = useState(60);
            const [canResend, setCanResend] = useState(false);
            const [pendingUser, setPendingUser] = useState(null);
            const [showPass, setShowPass] = useState(false);
            const [showConfirm, setShowConfirm] = useState(false);
            const otpRefs = [useRef(), useRef(), useRef(), useRef(), useRef(), useRef()];

            // Timer
            useEffect(() => {
                if (!otpStep || resendTimer <= 0) return;
                const interval = setInterval(() => {
                    setResendTimer(prev => {
                        if (prev <= 1) {
                            setCanResend(true);
                            return 0;
                        }
                        return prev - 1;
                    });
                }, 1000);
                return () => clearInterval(interval);
            }, [otpStep, resendTimer]);

            const sendOtp = (userData) => {
                setPendingUser(userData);
                setOtpStep(true);
                setOtpInput(["", "", "", "", "", ""]);
                setOtpError("");
                setOtpSending(true);
                setResendTimer(60);
                setCanResend(false);

                setTimeout(() => {
                    const otp = Math.floor(100000 + Math.random() * 900000).toString();
                    console.log('📧 Your OTP:', otp);
                    setOtpError(`Test OTP: ${otp} (check console)`);
                    setOtpSending(false);
                    setTimeout(() => otpRefs[0].current?.focus(), 100);
                }, 1000);
            };

            const verifyOtp = () => {
                const code = otpInput.join('');
                if (code.length < 6) {
                    setOtpError('Enter all 6 digits');
                    return;
                }
                setOtpSending(true);
                
                setTimeout(() => {
                    const users = JSON.parse(localStorage.getItem('wish_users') || '[]');
                    const newUser = {
                        id: 'u' + Date.now(),
                        name: pendingUser.name,
                        email: pendingUser.email,
                        phone: pendingUser.phone || '',
                        pass: pendingUser.pass,
                        pts: 1250,
                        usd: 1.25,
                        joined: new Date().toLocaleDateString(),
                        country: '🌍',
                        isAdmin: false,
                        active: true
                    };
                    
                    users.push(newUser);
                    localStorage.setItem('wish_users', JSON.stringify(users));
                    onLogin(newUser);
                    setOtpSending(false);
                }, 1000);
            };

            const resendOtp = () => {
                if (!canResend) return;
                setOtpInput(["", "", "", "", "", ""]);
                setOtpError("");
                setResendTimer(60);
                setCanResend(false);
                setOtpSending(true);
                
                setTimeout(() => {
                    const otp = Math.floor(100000 + Math.random() * 900000).toString();
                    console.log('📧 New OTP:', otp);
                    setOtpError(`New OTP: ${otp} (check console)`);
                    setOtpSending(false);
                    setTimeout(() => otpRefs[0].current?.focus(), 100);
                }, 1000);
            };

            const handleOtpChange = (index, value) => {
                if (!/^\d?$/.test(value)) return;
                const newOtp = [...otpInput];
                newOtp[index] = value;
                setOtpInput(newOtp);
                if (value && index < 5) otpRefs[index + 1].current?.focus();
            };

            const handleOtpKeyDown = (index, e) => {
                if (e.key === 'Backspace' && !otpInput[index] && index > 0) {
                    otpRefs[index - 1].current?.focus();
                }
            };

            // Handle Enter key for form submission
            const handleKeyPress = (e) => {
                if (e.key === 'Enter') {
                    handleSubmit(e);
                }
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                
                // Validation
                const newErrors = {};
                if (mode === 'register') {
                    if (!form.name) newErrors.name = 'Name required';
                    if (!form.email && !form.phone) newErrors.email = 'Email or phone required';
                    if (!form.pass) newErrors.pass = 'Password required';
                    if (form.pass !== form.conf) newErrors.conf = 'Passwords do not match';
                    
                    const strength = checkPasswordStrength(form.pass);
                    if (strength.score < 3) newErrors.pass = 'Password too weak';
                } else {
                    if (!form.email && !form.phone) newErrors.email = 'Email or phone required';
                    if (!form.pass) newErrors.pass = 'Password required';
                }
                
                if (Object.keys(newErrors).length > 0) {
                    setErrors(newErrors);
                    return;
                }
                
                setLoading(true);
                setErrors({});
                
                setTimeout(() => {
                    if (mode === 'login') {
                        const users = JSON.parse(localStorage.getItem('wish_users') || '[]');
                        const user = users.find(u => {
                            if (method === 'email') {
                                return u.email === form.email && u.pass === form.pass;
                            } else {
                                return u.phone === form.phone && u.pass === form.pass;
                            }
                        });
                        
                        if (user) {
                            onLogin(user);
                        } else {
                            setErrors({ pass: 'Invalid credentials' });
                        }
                    } else {
                        sendOtp({
                            name: form.name,
                            email: form.email,
                            phone: form.phone,
                            pass: form.pass
                        });
                    }
                    setLoading(false);
                }, 500);
            };

            const passwordStrength = checkPasswordStrength(form.pass);

            // OTP Screen
            if (otpStep) {
                const isEmail = pendingUser?.email?.includes('@');
                const masked = isEmail 
                    ? pendingUser.email.replace(/(.{2})(.+)(@.+)/, '$1****$3')
                    : pendingUser.phone?.replace(/(.{3}).+(.{2})$/, '$1*****$2');

                return React.createElement('div', { style: { minHeight: '100vh', background: 'radial-gradient(circle at 50% 0%, #1a1540, #0d0b1e)', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '20px' } },
                    React.createElement('div', { style: { background: C.s1, padding: '40px 30px', borderRadius: '30px', width: '100%', maxWidth: '380px', border: '1px solid rgba(139,92,246,.3)', boxShadow: '0 20px 60px rgba(139,92,246,.2)', animation: 'up 0.4s ease' } },
                        React.createElement('div', { style: { textAlign: 'center', marginBottom: '30px' } },
                            React.createElement('div', { style: { fontSize: '56px', marginBottom: '15px', animation: 'float 3s ease infinite' } }, '✨'),
                            React.createElement('h2', { style: { color: '#fff', fontSize: '24px', marginBottom: '5px' } }, 'Verify Your Account'),
                            React.createElement('p', { style: { color: C.muted, fontSize: '13px' } }, 
                                'Code sent to ', 
                                React.createElement('span', { style: { color: C.brandLt, fontFamily: "'DM Mono',monospace" } }, masked)
                            )
                        ),

                        React.createElement('div', { style: { display: 'flex', gap: '8px', justifyContent: 'center', marginBottom: '25px' } },
                            otpInput.map((v, i) => 
                                React.createElement('input', {
                                    key: i,
                                    ref: otpRefs[i],
                                    type: 'text',
                                    maxLength: 1,
                                    value: v,
                                    onChange: (e) => handleOtpChange(i, e.target.value),
                                    onKeyDown: (e) => handleOtpKeyDown(i, e),
                                    style: {
                                        width: '48px',
                                        height: '56px',
                                        textAlign: 'center',
                                        fontSize: '24px',
                                        fontFamily: "'DM Mono',monospace",
                                        fontWeight: 'bold',
                                        background: v ? 'rgba(139,92,246,.15)' : '#0d0b1e',
                                        border: '2px solid ' + (v ? C.brand : 'rgba(139,92,246,.2)'),
                                        borderRadius: '14px',
                                        color: '#fff',
                                        outline: 'none',
                                        transition: 'all 0.2s',
                                        boxShadow: v ? '0 0 0 3px rgba(139,92,246,.2)' : 'none'
                                    }
                                })
                            )
                        ),

                        React.createElement('div', { style: { textAlign: 'center', marginBottom: '20px', fontSize: '14px' } },
                            React.createElement('span', { style: { color: resendTimer > 0 ? C.gold : C.red } },
                                resendTimer > 0 ? `⏰ Code expires in ${resendTimer}s` : '⏰ Code expired!'
                            )
                        ),

                        otpError && React.createElement('div', { style: { background: 'rgba(239,68,68,.1)', border: '1px solid rgba(239,68,68,.2)', borderRadius: '12px', padding: '12px', marginBottom: '20px', color: '#f87171', fontSize: '13px', textAlign: 'center' } }, otpError),

                        React.createElement('button', {
                            onClick: verifyOtp,
                            disabled: otpSending,
                            style: {
                                width: '100%',
                                padding: '16px',
                                background: 'linear-gradient(135deg, #8b5cf6, #6d28d9)',
                                border: 'none',
                                borderRadius: '16px',
                                color: '#fff',
                                fontSize: '16px',
                                fontWeight: 'bold',
                                cursor: 'pointer',
                                marginBottom: '12px',
                                transition: 'all 0.2s',
                                boxShadow: '0 8px 20px rgba(139,92,246,.4)'
                            }
                        }, otpSending ? 'Verifying...' : '✓ Verify & Continue'),

                        React.createElement('button', {
                            onClick: resendOtp,
                            disabled: !canResend,
                            style: {
                                width: '100%',
                                padding: '12px',
                                background: 'transparent',
                                border: '1px solid ' + (canResend ? C.brand : 'rgba(139,92,246,.2)'),
                                borderRadius: '14px',
                                color: canResend ? C.brandLt : C.muted,
                                cursor: canResend ? 'pointer' : 'default',
                                fontSize: '14px',
                                fontWeight: 'bold',
                                marginBottom: '10px',
                                transition: 'all 0.2s'
                            }
                        }, canResend ? '⟲ Resend Code' : `⟲ Resend in ${resendTimer}s`),

                        React.createElement('button', {
                            onClick: () => { setOtpStep(false); setPendingUser(null); },
                            style: {
                                width: '100%',
                                padding: '10px',
                                background: 'transparent',
                                border: 'none',
                                color: C.muted,
                                cursor: 'pointer',
                                fontSize: '13px',
                                textDecoration: 'underline'
                            }
                        }, '← Use different ' + (isEmail ? 'email' : 'phone'))
                    )
                );
            }

            // Welcome Screen (Enhanced)
            if (mode === 'welcome') {
                return React.createElement('div', { style: { minHeight: '100vh', background: 'radial-gradient(circle at 50% 0%, #1a1540, #0d0b1e)', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: '20px', position: 'relative', overflow: 'hidden' } },
                    // Animated background elements
                    React.createElement('div', { style: { position: 'absolute', width: '600px', height: '600px', borderRadius: '50%', background: 'radial-gradient(circle, rgba(139,92,246,.15) 0%, transparent 70%)', top: '-300px', left: '50%', transform: 'translateX(-50%)', animation: 'glow 4s ease infinite' } }),
                    React.createElement('div', { style: { position: 'absolute', width: '400px', height: '400px', borderRadius: '50%', background: 'radial-gradient(circle, rgba(236,72,153,.1) 0%, transparent 70%)', bottom: '-200px', right: '-100px' } }),
                    
                    React.createElement('div', { style: { textAlign: 'center', marginBottom: '50px', animation: 'up 0.6s ease', position: 'relative', zIndex: 1 } },
                        React.createElement('div', { style: { fontSize: '80px', marginBottom: '20px', animation: 'float 4s ease infinite' } }, '✨'),
                        React.createElement('h1', { style: { fontSize: '48px', fontWeight: '800', background: 'linear-gradient(135deg, #fff, #a78bfa, #ec4899)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent', marginBottom: '10px', letterSpacing: '-1px' } }, 'Wish'),
                        React.createElement('p', { style: { fontSize: '18px', color: C.muted, fontWeight: '300' } }, 'Earn rewards, achieve your dreams')
                    ),
                    
                    React.createElement('div', { style: { width: '100%', maxWidth: '320px', animation: 'up 0.8s ease', position: 'relative', zIndex: 1 } },
                        React.createElement('button', { 
                            onClick: () => setMode('login'), 
                            style: { 
                                width: '100%', 
                                padding: '18px', 
                                background: 'linear-gradient(135deg, #8b5cf6, #6d28d9)',
                                border: 'none', 
                                borderRadius: '18px', 
                                color: '#fff', 
                                fontSize: '18px', 
                                fontWeight: 'bold', 
                                cursor: 'pointer', 
                                marginBottom: '15px',
                                boxShadow: '0 10px 25px rgba(139,92,246,.5)',
                                transition: 'all 0.2s'
                            },
                            onMouseEnter: (e) => e.currentTarget.style.transform = 'translateY(-2px)',
                            onMouseLeave: (e) => e.currentTarget.style.transform = 'translateY(0)'
                        }, '🚀 Sign In'),
                        
                        React.createElement('button', { 
                            onClick: () => setMode('register'), 
                            style: { 
                                width: '100%', 
                                padding: '18px', 
                                background: 'rgba(255,255,255,.05)', 
                                border: '2px solid rgba(139,92,246,.3)',
                                borderRadius: '18px', 
                                color: '#fff', 
                                fontSize: '18px', 
                                fontWeight: 'bold', 
                                cursor: 'pointer',
                                backdropFilter: 'blur(10px)',
                                transition: 'all 0.2s'
                            },
                            onMouseEnter: (e) => { e.currentTarget.style.background = 'rgba(139,92,246,.1)'; e.currentTarget.style.borderColor = C.brand; },
                            onMouseLeave: (e) => { e.currentTarget.style.background = 'rgba(255,255,255,.05)'; e.currentTarget.style.borderColor = 'rgba(139,92,246,.3)'; }
                        }, '✨ Create Account')
                    ),
                    
                    React.createElement('div', { style: { display: 'flex', gap: '20px', marginTop: '40px', fontSize: '13px', color: C.muted, animation: 'up 1s ease' } },
                        ['🌍 Global', '🔒 Secure', '💰 Real Rewards'].map((text, i) => 
                            React.createElement('span', { key: i, style: { display: 'flex', alignItems: 'center', gap: '5px' } }, text)
                        )
                    )
                );
            }

            // Login/Register Form (Enhanced)
            return React.createElement('div', { style: { minHeight: '100vh', background: 'radial-gradient(circle at 50% 0%, #1a1540, #0d0b1e)', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '20px' } },
                React.createElement('div', { style: { background: 'rgba(19,16,42,.9)', backdropFilter: 'blur(20px)', padding: '40px 30px', borderRadius: '30px', width: '100%', maxWidth: '380px', border: '1px solid rgba(139,92,246,.3)', boxShadow: '0 20px 60px rgba(0,0,0,.5)', animation: 'up 0.4s ease' } },
                    
                    React.createElement('button', { onClick: () => setMode('welcome'), style: { background: 'none', border: 'none', color: C.muted, fontSize: '14px', cursor: 'pointer', marginBottom: '20px', display: 'flex', alignItems: 'center', gap: '5px' } }, '← Back'),
                    
                    React.createElement('h2', { style: { color: '#fff', fontSize: '28px', fontWeight: '700', marginBottom: '5px', background: 'linear-gradient(135deg, #fff, #a78bfa)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent' } }, 
                        mode === 'login' ? 'Welcome Back' : 'Join Wish'
                    ),
                    
                    React.createElement('p', { style: { color: C.muted, fontSize: '14px', marginBottom: '25px' } },
                        mode === 'login' ? 'Sign in to continue earning' : 'Start your rewards journey today'
                    ),
                    
                    // Method switcher
                    React.createElement('div', { style: { display: 'flex', gap: '10px', background: 'rgba(0,0,0,.3)', borderRadius: '14px', padding: '4px', marginBottom: '20px' } },
                        ['email', 'phone'].map(m => 
                            React.createElement('button', {
                                key: m,
                                onClick: () => setMethod(m),
                                style: {
                                    flex: 1,
                                    padding: '10px',
                                    background: method === m ? 'linear-gradient(135deg,#8b5cf6,#6d28d9)' : 'transparent',
                                    border: 'none',
                                    borderRadius: '12px',
                                    color: method === m ? '#fff' : C.muted,
                                    cursor: 'pointer',
                                    fontSize: '14px',
                                    fontWeight: method === m ? 'bold' : 'normal',
                                    transition: 'all 0.2s'
                                }
                            }, m === 'email' ? '📧 Email' : '📱 Phone')
                        )
                    ),

                    // Name field (register only)
                    mode === 'register' && React.createElement('div', { style: { marginBottom: '15px' } },
                        React.createElement('input', {
                            type: 'text',
                            placeholder: 'Full Name',
                            value: form.name,
                            onChange: (e) => setForm({...form, name: e.target.value}),
                            onKeyPress: handleKeyPress,
                            style: {
                                width: '100%',
                                padding: '14px',
                                background: '#0d0b1e',
                                border: '2px solid ' + (errors.name ? C.red : 'rgba(139,92,246,.2)'),
                                borderRadius: '14px',
                                color: '#fff',
                                fontSize: '14px',
                                outline: 'none',
                                transition: 'all 0.2s'
                            }
                        }),
                        errors.name && React.createElement('div', { style: { color: C.red, fontSize: '12px', marginTop: '5px', marginLeft: '5px' } }, errors.name)
                    ),

                    // Email/Phone field
                    React.createElement('div', { style: { marginBottom: '15px' } },
                        React.createElement('input', {
                            type: method === 'email' ? 'email' : 'tel',
                            placeholder: method === 'email' ? 'your@email.com' : '+1 234 567 890',
                            value: method === 'email' ? form.email : form.phone,
                            onChange: (e) => setForm({...form, [method === 'email' ? 'email' : 'phone']: e.target.value}),
                            onKeyPress: handleKeyPress,
                            style: {
                                width: '100%',
                                padding: '14px',
                                background: '#0d0b1e',
                                border: '2px solid ' + ((errors.email || errors.phone) ? C.red : 'rgba(139,92,246,.2)'),
                                borderRadius: '14px',
                                color: '#fff',
                                fontSize: '14px',
                                outline: 'none',
                                transition: 'all 0.2s'
                            }
                        })
                    ),

                    // Password field
                    React.createElement('div', { style: { marginBottom: mode === 'register' ? '10px' : '20px', position: 'relative' } },
                        React.createElement('input', {
                            type: showPass ? 'text' : 'password',
                            placeholder: 'Password',
                            value: form.pass,
                            onChange: (e) => setForm({...form, pass: e.target.value}),
                            onKeyPress: handleKeyPress,
                            style: {
                                width: '100%',
                                padding: '14px',
                                paddingRight: '45px',
                                background: '#0d0b1e',
                                border: '2px solid ' + (errors.pass ? C.red : 'rgba(139,92,246,.2)'),
                                borderRadius: '14px',
                                color: '#fff',
                                fontSize: '14px',
                                outline: 'none',
                                transition: 'all 0.2s'
                            }
                        }),
                        React.createElement('button', {
                            onClick: () => setShowPass(!showPass),
                            style: {
                                position: 'absolute',
                                right: '12px',
                                top: '50%',
                                transform: 'translateY(-50%)',
                                background: 'none',
                                border: 'none',
                                color: C.muted,
                                cursor: 'pointer',
                                fontSize: '18px'
                            }
                        }, showPass ? '👁️' : '👁️‍🗨️')
                    ),

                    // Password strength meter (register only)
                    mode === 'register' && form.pass.length > 0 && React.createElement('div', { style: { marginBottom: '15px' } },
                        React.createElement('div', { style: { display: 'flex', gap: '4px', marginBottom: '5px' } },
                            [1,2,3,4,5,6].map(i => 
                                React.createElement('div', {
                                    key: i,
                                    style: {
                                        flex: 1,
