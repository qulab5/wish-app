  // FIXED: Only show error if it's a non-empty string and not "[object Object]"
  const shouldShowError = err && typeof err === 'string' && err !== '[object Object]' && err.trim() !== '';
  
  // If it's a phone input with country code
  if (type === "phone-with-code") {
    return (
      <div style={{marginBottom:16}}>
        {label&&<div style={{fontSize:11,fontWeight:700,color:C.muted,letterSpacing:.08,textTransform:"uppercase",marginBottom:6}}>{label}</div>}
        <div style={{display:"flex",gap:8}}>
          {/* Country Code Dropdown with Flags */}
          <div style={{position:"relative", width:"120px"}}>
            <select 
              value={selectedCountry} 
              onChange={onCountryChange}
              className="country-select"
              style={{
                width:"100%",
                padding:"13px 30px 13px 12px",
                background:"rgba(139,92,246,.07)",
                border:`1.5px solid ${shouldShowError?"rgba(239,68,68,.5)":focused?C.brand:C.border2}`,
                color:C.white,
                borderRadius:13,
                fontSize:14,
                fontFamily:"inherit",
                outline:"none",

                appearance:"none",
                cursor:"pointer"
              }}
              onFocus={()=>setFocused(true)}
              onBlur={()=>setFocused(false)}
            >
              {COUNTRIES.map((c, idx) => (
                <option key={idx} value={c.code} style={{background:C.s1, color:"#fff", padding:"10px"}}>
                  {c.flag} {c.code} {c.name}
                </option>
              ))}
            </select>
          </div>
          
          {/* Phone Number Input */}
          <div style={{position:"relative", flex:1}}>
            {icon&&<div style={{position:"absolute",left:14,top:"50%",transform:"translateY(-50%)",fontSize:18,lineHeight:1,color:focused?C.brand:C.muted,transition:"color 0.2s"}}>{icon}</div>}
            <input 
              type="tel"
              value={val} 
              onChange={(e) => onChange(e.target.value)} // FIXED: e.target.value

              onBlur={()=>setFocused(false)}

                width:"100%",
                background:"rgba(139,92,246,.07)",

            />
          </div>
        </div>
        {shouldShowError && <div style={{fontSize:11,color:C.red,marginTop:4}}>⚠ {err}</div>}
      </div>
    );
  }
  
  // Regular input (non-phone) - FIXED HERE
  return(
    <div style={{marginBottom:16}}>
      {label&&<div style={{fontSize:11,fontWeight:700,color:C.muted,letterSpacing:.08,textTransform:"uppercase",marginBottom:6}}>{label}</div>}

        <input 
          type={type==="password"?(show?"text":"password"):type} 
          value={val} 
          onChange={(e) => onChange(e.target.value)} // FIXED: e.target.value instead of onChange directly
          placeholder={placeholder}
          onFocus={()=>setFocused(true)}
          onBlur={()=>setFocused(false)}
          style={{
            width:"100%",
            background:"rgba(139,92,246,.07)",
            border:`1.5px solid ${shouldShowError?"rgba(239,68,68,.5)":focused?C.brand:C.border2}`,
            color:C.white,
            borderRadius:13,

            fontSize:14,

function SpinWheel({angle,spinning,phase}){
  const ptSegs=[{v:"100",c:"#8b5cf6"},{v:"150",c:"#06b6d4"},{v:"200",c:C.gold},{v:"250",c:"#ec4899"},{v:"300",c:"#10b981"},{v:"350",c:"#f97316"},{v:"400",c:"#6366f1"},{v:"500",c:"#84cc16"}];
  const udSegs=[{v:"$1",c:"#10b981"},{v:"$2",c:C.gold},{v:"$3",c:"#8b5cf6"},{v:"$1",c:"#06b6d4"},{v:"$2",c:"#ec4899"},{v:"$3",c:"#f97316"},{v:"$1",c:"#6366f1"},{v:"$2",c:"#84cc16"}];
  const segs=phase==="points"?ptSegs:udSegs;
  const n=8,r=88,cx=96,cy=96;
  return(<div style={{position:"relative",width:192,height:192,margin:"0 auto"}}>
    <div style={{position:"absolute",inset:-8,borderRadius:"50%",background:`conic-gradient(${segs.map((s,i)=>`${s.c} ${i*45}deg ${(i+1)*45}deg`).join(",")})`,opacity:.1,filter:"blur(10px)"}}/>
    <svg width="192" height="192" style={{transform:`rotate(${angle}deg)`,transition:spinning?"transform 3.8s cubic-bezier(.17,.67,.08,1)":"none",borderRadius:"50%",position:"relative",zIndex:1,filter:"drop-shadow(0 0 20px rgba(139,92,246,.4))"}}>
      {segs.map((s,i)=>{
        const a1=(2*Math.PI/n)*i-Math.PI/2,a2=(2*Math.PI/n)*(i+1)-Math.PI/2;
        const x1=cx+r*Math.cos(a1),y1=cy+r*Math.sin(a1),x2=cx+r*Math.cos(a2),y2=cy+r*Math.sin(a2);
        const ma=(a1+a2)/2,tx=cx+(r*.62)*Math.cos(ma),ty=cy+(r*.62)*Math.sin(ma);
        return(<g key={i}><path d={`M${cx},${cy} L${x1},${y1} A${r},${r} 0 0,1 ${x2},${y2} Z`} fill={s.c} opacity=".85"/><text x={tx} y={ty} textAnchor="middle" dominantBaseline="middle" fill="#fff" fontSize="10" fontWeight="800" fontFamily="DM Mono,monospace">{s.v}</text></g>);
      })}
      <circle cx={cx} cy={cy} r="16" fill={C.s1} stroke="rgba(255,255,255,.15)" strokeWidth="2"/>
      <text x={cx} y={cy+1} textAnchor="middle" dominantBaseline="middle" fontSize="13">🎯</text>
    </svg>
    <div style={{position:"absolute",top:-6,left:"50%",transform:"translateX(-50%)",width:0,height:0,borderLeft:"9px solid transparent",borderRight:"9px solid transparent",borderTop:`20px solid ${C.gold}`,zIndex:2,filter:`drop-shadow(0 3px 8px ${C.gold}88)`}}/>
  </div>);
}

    if(e.key==="Backspace"&&!otpInput[idx]&&idx>0)otpRefs[idx-1].current.focus();
  };

  const verifyOtp=()=>{
    const entered=otpInput.join("");
    if(entered.length<6){setOtpErr("Please enter 6-digit code");return;}
    if(entered!==otpCode){setOtpErr("Wrong code. Try again.");return;}
    setUsers(p=>[...p,pendingUser]);
    onLogin(pendingUser);
  };

  const resendOtp=()=>{
    const code=genOtp();
    setOtpCode(code);
    setOtpInput(["","","","","",""]);
    setOtpErr("");
    setResendT(60);
    setTimeout(()=>otpRefs[0].current&&otpRefs[0].current.focus(),100);
  };

  const validate=()=>{
    const e={};
    if(mode==="register"&&!form.name.trim()) e.name=L("required");
    if(method==="email"){
      if(!form.email.match(/^[^\s@]+@[^\s@]+\.[^\s@]+$/)) e.email=L("invalidEmail");
    } else {
      if(!form.phone.trim()) e.phone=L("invalidPhone");
    }
    if(form.pass.length<6) e.pass="Min 6 characters";
    if(mode==="register"&&form.pass!==form.conf) e.conf="Passwords don't match";
    setErrs(e);
    return Object.keys(e).length===0;
  };

  const submit=()=>{
    if(!validate()) return;
    setLoading(true);
    setTimeout(()=>{
      setLoading(false);
      if(mode==="login"){
        // Fixed login logic
        let foundUser = null;
        if (method === "email") {
          for (let i = 0; i < users.length; i++) {
            if (users[i].email === form.email && users[i].pass === form.pass) {
              foundUser = users[i];
              break;
            }
          }
        } else {
          const fullPhone = form.countryCode + form.phone;
          for (let i = 0; i < users.length; i++) {
            if (users[i].phone === fullPhone && users[i].pass === form.pass) {
              foundUser = users[i];
              break;
            }
          }
        }
        
        if (foundUser) {
          onLogin(foundUser);
        } else {
          setErrs({pass: "Invalid credentials"});
        }
      } else {
        const exists = users.find(x=>x.email===form.email);
        if(exists){setErrs({email:"Account already exists"});return;}
        const fullPhone = form.countryCode + form.phone;
        const nu={
          id:"u"+Date.now(), name:form.name, email:form.email, 
          phone: fullPhone,
          pass:form.pass, pts:0, usd:0, joined:"Now", country:"🌍", isAdmin:false, active:true
        };
        sendOtp(nu);
      }
    },900);
  };

  /* OTP SCREEN */
  if(otpStep) return(
    <div style={{minHeight:"100vh",background:C.bg,fontFamily:"'Plus Jakarta Sans',sans-serif",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24,position:"relative",overflow:"hidden"}}>
      <style>{CSS}</style>
      <div style={{position:"absolute",width:380,height:380,borderRadius:"50%",background:"radial-gradient(circle,rgba(139,92,246,.12),transparent 70%)",top:-100,left:"50%",transform:"translateX(-50%)",pointerEvents:"none"}}/>

      <div style={{width:"100%",maxWidth:360,animation:"up .3s ease"}}>
        <div style={{textAlign:"center",marginBottom:32}}>
          <div style={{width:80,height:80,borderRadius:22,background:"linear-gradient(135deg,rgba(139,92,246,.2),rgba(6,182,212,.15))",border:"1px solid rgba(139,92,246,.3)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:36,margin:"0 auto 18px",animation:"float 3s ease infinite",boxShadow:`0 0 30px ${C.brand}60`}}>
            {method==="email"?"📧":"📱"}
          </div>
          <div style={{fontSize:24,fontWeight:900,letterSpacing:-.5,background:`linear-gradient(135deg,${C.white},${C.brandLt})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",marginBottom:8}}>
            Verify {method==="email"?"Email":"Phone"}
          </div>
          <div style={{fontSize:13,color:C.muted,lineHeight:1.65}}>
            A 6-digit code was sent to<br/>
            <span style={{color:C.brandLt,fontWeight:600}}>{method==="email"?form.email:form.countryCode+form.phone}</span>
          </div>
        </div>

        {/* OTP Boxes */}
        <div style={{display:"flex",gap:10,justifyContent:"center",marginBottom:16}}>
          {otpInput.map((v,i)=>(
            <input key={i} ref={otpRefs[i]} value={v}
              onChange={e=>handleOtpKey(i,e.target.value)}
              onKeyDown={e=>handleOtpBack(i,e)}
              maxLength={1} inputMode="numeric"
              style={{
                width:48,
                height:56,
                textAlign:"center",
                fontSize:22,
                fontWeight:800,
                fontFamily:"'DM Mono',monospace",
                background:"rgba(139,92,246,.08)",
                border:`2px solid ${v?C.brand:otpErr?"rgba(239,68,68,.4)":"rgba(139,92,246,.22)"}`,
                borderRadius:13,
                color:"#fff",
                outline:"none",
                transition:"all .15s",
                boxShadow:v?`0 0 0 3px ${C.brand}40`:"none"
              }}
            />
          ))}
        </div>

        {otpErr&&<div style={{textAlign:"center",color:C.red,fontSize:12,marginBottom:12,fontWeight:600}}>⚠ {otpErr}</div>}

        {/* Demo hint — show OTP since no real backend */}
        <div style={{background:"rgba(245,158,11,.08)",border:"1px solid rgba(245,158,11,.2)",borderRadius:12,padding:"12px 16px",marginBottom:18,textAlign:"center"}}>
          <div style={{fontSize:10,color:C.gold,fontWeight:700,textTransform:"uppercase",letterSpacing:.08,marginBottom:4}}>🔔 Demo Mode — Your Code</div>
          <div style={{fontFamily:"'DM Mono',monospace",fontSize:28,fontWeight:900,color:C.gold,letterSpacing:6}}>{otpCode}</div>
          <div style={{fontSize:10,color:C.muted,marginTop:4}}>In production, this code is sent via SMS/Email</div>
        </div>

        <Btn label="✓ Verify & Create Account" onClick={verifyOtp} full variant="brand" animate style={{marginBottom:14}}/>

        <div style={{textAlign:"center",fontSize:12,color:C.muted}}>
          Didn't receive the code?{" "}
          {resendT>0
            ?<span style={{color:C.muted}}>Resend in {resendT}s</span>
            :<span onClick={resendOtp} style={{color:C.brandLt,cursor:"pointer",fontWeight:700}}>Resend Code</span>}
        </div>

        <div style={{marginTop:16,textAlign:"center"}}>
          <span onClick={()=>{setOtpStep(false);setPU(null);}} style={{fontSize:12,color:C.muted,cursor:"pointer"}}>← Change {method==="email"?"Email":"Phone"}</span>
        </div>
      </div>
    </div>
  );

  /* Welcome */
  if(mode==="welcome") return(
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24,fontFamily:"'Plus Jakarta Sans',sans-serif",position:"relative",overflow:"hidden"}}>
      <style>{CSS}</style>
      {/* bg orbs */}
      <div style={{position:"absolute",width:400,height:400,borderRadius:"50%",background:"radial-gradient(circle,rgba(139,92,246,.15),transparent 70%)",top:-100,left:"50%",transform:"translateX(-50%)",pointerEvents:"none",animation:"float 6s ease infinite"}}/>
      <div style={{position:"absolute",width:300,height:300,borderRadius:"50%",background:"radial-gradient(circle,rgba(236,72,153,.08),transparent 70%)",bottom:60,right:-80,pointerEvents:"none",animation:"float 4s ease infinite reverse"}}/>

      <div style={{textAlign:"center",marginBottom:48,animation:"up .5s ease"}}>
        <div style={{width:90,height:90,borderRadius:26,background:`linear-gradient(135deg,${C.brand},${C.pink})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:44,margin:"0 auto 22px",boxShadow:`0 8px 32px rgba(139,92,246,.4)`,animation:"float 3s ease infinite"}}>✨</div>
        <div style={{fontSize:42,fontWeight:900,letterSpacing:-1,background:`linear-gradient(135deg,${C.white},${C.brandLt},${C.pink})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",marginBottom:8}}>{APP_NAME}</div>
        <div style={{fontSize:16,color:C.muted,fontWeight:500}}>{APP_TAGLINE}</div>
      </div>

      <div style={{width:"100%",maxWidth:360,display:"flex",flexDirection:"column",gap:12}}>
        <Btn label={`✨ ${L("signIn")}`} onClick={()=>setMode("login")} full variant="brand" style={{padding:16,fontSize:15,borderRadius:15}} animate/>
        <Btn label={`🚀 ${L("signUp")}`} onClick={()=>setMode("register")} full variant="ghost" style={{padding:16,fontSize:15,borderRadius:15}}/>
      </div>

      <div style={{marginTop:32,display:"flex",gap:16,flexWrap:"wrap",justifyContent:"center"}}>
        {["🌍 International","🔒 Secure","💵 Real Rewards","📱 Mobile"].map((f,i)=>(
          <span key={i} style={{fontSize:11,color:C.muted,display:"flex",alignItems:"center",gap:4}}>{f}</span>
        ))}
      </div>
    </div>
  );

  return(
    <div style={{minHeight:"100vh",background:C.bg,fontFamily:"'Plus Jakarta Sans',sans-serif",display:"flex",flexDirection:"column",padding:24,paddingTop:60,position:"relative",overflow:"hidden"}}>
      <style>{CSS}</style>
      <div style={{position:"absolute",width:350,height:350,borderRadius:"50%",background:"radial-gradient(circle,rgba(139,92,246,.12),transparent 70%)",top:-120,right:-80,pointerEvents:"none",animation:"float 5s ease infinite"}}/>

      {/* back */}
      <button onClick={()=>setMode("welcome")} style={{background:"none",border:"none",cursor:"pointer",color:C.muted,fontSize:13,fontFamily:"inherit",marginBottom:32,display:"flex",alignItems:"center",gap:6}}>← Back</button>

      <div style={{marginBottom:32,animation:"up .3s ease"}}>
        <div style={{fontSize:30,fontWeight:900,letterSpacing:-.5,background:`linear-gradient(135deg,${C.white},${C.brandLt})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",marginBottom:6}}>
          {mode==="login"?L("welcomeBack"):L("joinWish")}
        </div>
        <div style={{fontSize:14,color:C.muted}}>{mode==="login"?L("noAcc"):L("haveAcc")} <span onClick={()=>{setMode(mode==="login"?"register":"login");setErrs({});}} style={{color:C.brandLt,cursor:"pointer",fontWeight:700}}>{mode==="login"?L("signUp"):L("signIn")}</span></div>
      </div>

      {/* method toggle */}
      <div style={{display:"flex",background:"rgba(139,92,246,.08)",borderRadius:12,padding:4,marginBottom:22}}>
        {["email","phone"].map(m=>(
          <div key={m} onClick={()=>{setMethod(m);setErrs({});}} style={{flex:1,textAlign:"center",padding:"10px",borderRadius:10,cursor:"pointer",background:method===m?`linear-gradient(135deg,${C.brand},${C.brandDk})`:"transparent",color:method===m?C.white:C.muted,fontWeight:600,fontSize:13,transition:"all .2s"}}>
            {m==="email"?"📧 Email":"📱 Phone"}
          </div>
        ))}
      </div>

      <div style={{animation:"up .3s ease .05s both"}}>
        {mode==="register"&&<Inp label={L("name")} val={form.name} onChange={f("name")} err={errs.name} placeholder="Your full name" icon="👤"/>}
        
        {method==="email"
          ?<Inp label={L("email")} type="email" val={form.email} onChange={f("email")} err={errs.email} placeholder="you@example.com" icon="📧"/>
          :<Inp 
              type="phone-with-code"
              label={L("phone")}
              val={form.phone}
              onChange={(e)=>f("phone")(e.target.value)}
              onCountryChange={(e)=>f("countryCode")(e.target.value)}
              selectedCountry={form.countryCode}
              err={errs.phone}
              placeholder="123 456 7890"
              icon="📱"
            />}
        
        <Inp label={L("password")} type="password" val={form.pass} onChange={f("pass")} err={errs.pass} placeholder="••••••••" icon="🔒"/>
        {mode==="register"&&<Inp label="Confirm Password" type="password" val={form.conf} onChange={f("conf")} err={errs.conf} placeholder="••••••••" icon="🔑"/>}
      </div>

      <Btn label={loading?"⏳ Please wait…":(mode==="login"?`🔓 ${L("signIn")}`:`🚀 ${L("signUp")}`)} onClick={submit} full variant="brand" disabled={loading} style={{marginTop:8,padding:16,fontSize:15,borderRadius:15}}/>
    </div>
  );
}

            {["Su","Mo","Tu","We","Th","Fr","Sa"].map(d=><div key={d} style={{textAlign:"center",fontSize:10,fontWeight:700,color:d==="Su"?C.gold:C.muted,padding:"3px 0"}}>{d}</div>)}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:5,marginBottom:14}}>
            {Array.from({length:cFirst}).map((_,i)=>{const d=pDays-cFirst+i+1;return(<div key={"p"+i} style={{aspectRatio:"1",borderRadius:8,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"rgba(139,92,246,.03)",border:`1px solid ${C.border}`,opacity:.25}}><span style={{fontSize:11,color:C.muted}}>{d}</span></div>);})}
            {Array.from({length:cDays}).map((_,i)=>{
              const d=i+1,dt=new Date(calY,calM,d);
              const isToday=d===todayDate&&calM===now.getMonth()&&calY===now.getFullYear();
              const isSun=dt.getDay()===0,hasMine=mDays.includes(d)&&calM===now.getMonth();
              return(<div key={d} style={{aspectRatio:"1",borderRadius:8,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:1,background:isToday?`linear-gradient(135deg,${C.brand},${C.brandDk})`:hasMine?"rgba(16,185,129,.1)":isSun?"rgba(245,158,11,.07)":"rgba(139,92,246,.04)",border:`1px solid ${isToday?"transparent":hasMine?"rgba(16,185,129,.2)":isSun?"rgba(245,158,11,.15)":C.border}`,boxShadow:isToday?`0 4px 12px rgba(139,92,246,.35)`:"none"}}>
                <span style={{fontSize:11,fontWeight:isToday?900:500,color:isToday?"#fff":isSun?C.gold:C.white}}>{d}</span>
                {hasMine&&<span style={{fontSize:8,color:C.green}}>✓</span>}
                {!hasMine&&<span style={{fontSize:7,color:C.muted,fontFamily:"'DM Mono',monospace"}}>{isSun?"2×":"+"+( DAILY_PTS_MAP[d]||60)}</span>}
              </div>);
            })}
          </div>
          <div style={{display:"flex",gap:13,flexWrap:"wrap",marginBottom:14}}>
            {[{col:C.brand,l:"Today"},{col:C.green,l:"Mining ✓"},{col:C.gold,l:"Sunday 2×"}].map((x,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:5}}><div style={{width:9,height:9,borderRadius:3,background:x.col}}/><span style={{fontSize:10,color:C.muted}}>{x.l}</span></div>
            ))}
          </div>
          <DivLine/>
          <SH title="Activity Bonuses"/>
          {[{id:1,t:"Complete profile",pts:200,e:"👤"},{id:2,t:"Daily check-in",pts:50,e:"📅"},{id:3,t:"Rate the app",pts:150,e:"⭐"},{id:4,t:"Invite friend",pts:100,e:"📲"}].map(b=>{
            const done=doneBonus.includes(b.id),sm=isSunday?2:1;
            return(<div key={b.id} style={{background:C.s2,border:`1px solid ${C.border}`,borderRadius:14,padding:"13px 15px",marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center",opacity:done?.55:1}}>
              <div style={{display:"flex",gap:11,alignItems:"center"}}>
                <div style={{width:40,height:40,borderRadius:11,background:"rgba(139,92,246,.08)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>{b.e}</div>
                <div><div style={{fontWeight:600,fontSize:13,marginBottom:2}}>{b.t}</div><div style={{fontFamily:"'DM Mono',monospace",fontSize:12,color:C.green}}>+{b.pts*sm} pts</div></div>
              </div>
              <Btn label={done?"Done":"Claim"} onClick={()=>{if(!done){setDB(p=>[...p,b.id]);addR(b.pts*sm,+(b.pts*sm*USD_PER_POINT).toFixed(3),b.t);toast$(`+${b.pts*sm} pts!`);}}} disabled={done} variant={done?"ghost":"brand"} style={{padding:"8px 14px",fontSize:12,borderRadius:10}}/>
            </div>);
          })}
          <DivLine/>
          <SH title="Refer & Earn" right={<span style={{fontSize:11,color:C.muted}}>+300 pts each</span>}/>
          <div style={{background:C.s2,border:`1px solid ${C.border2}`,borderRadius:16,padding:"16px",marginBottom:13}}>
            <div style={{display:"flex",gap:8,marginBottom:11}}>
              <input className="inp-base" value={refInput} onChange={e=>setRI(e.target.value)} placeholder="Friend's referral code"/>
              <Btn label="Add" onClick={()=>{if(!refInput.trim())return;setRefs(r=>[...r,refInput.trim()]);addR(REFERRAL_BONUS,+(REFERRAL_BONUS*USD_PER_POINT).toFixed(2),`Referral: ${refInput}`);setRI("");toast$(`+${REFERRAL_BONUS} pts!`);}} variant="brand" style={{padding:"11px 16px",fontSize:13,borderRadius:11,flexShrink:0}}/>
            </div>
            {refs.map((r,i)=>(
              <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderTop:`1px solid ${C.border}`}}>
                <div style={{display:"flex",gap:9,alignItems:"center"}}><Avatar name={r} size={28}/><span style={{fontSize:13,fontWeight:500}}>{r}</span></div>
                <span style={{fontFamily:"'DM Mono',monospace",color:C.green,fontWeight:700,fontSize:12}}>+{REFERRAL_BONUS} pts</span>
              </div>
            ))}
          </div>
        </div>}

        {/* WALLET */}
        {tab==="wallet"&&<div className="sec">
          <div style={{background:"linear-gradient(145deg,#0f1e15,#0d1a20)",border:"1px solid rgba(16,185,129,.2)",borderRadius:19,padding:"20px",marginBottom:13}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div>
                <div style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:.1,marginBottom:6}}>{L("usdBal")}</div>
                <div style={{fontSize:42,fontWeight:900,color:C.green,fontFamily:"'DM Mono',monospace",letterSpacing:-1.5,lineHeight:1}}>{balHide?"$••••":"$"+usdBal.toFixed(2)}</div>
                <div style={{fontSize:12,color:C.muted,marginTop:7}}>{points.toLocaleString()} pts earned</div>
              </div>
              <button onClick={()=>setBalHide(h=>!h)} style={{background:"none",border:"none",cursor:"pointer",color:C.muted,fontSize:22,padding:4}}>{balHide?"🙈":"👁"}</button>
            </div>
          </div>

          {/* KYC */}
          <div style={{background:"linear-gradient(145deg,rgba(139,92,246,.08),rgba(236,72,153,.04))",border:`1px solid ${C.border2}`,borderRadius:19,padding:"20px",marginBottom:13}}>
            <div style={{display:"flex",gap:12,alignItems:"flex-start",marginBottom:16}}>
              <div style={{width:48,height:48,borderRadius:13,background:"rgba(139,92,246,.12)",border:`1px solid ${C.border2}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>🔐</div>
              <div><div style={{fontWeight:700,fontSize:15,marginBottom:4}}>KYC Verification</div><div style={{fontSize:12,color:C.muted,lineHeight:1.65}}>Verify identity to unlock withdrawals.</div></div>
            </div>
            {[{n:1,l:"Account Created",done:true,soon:false},{n:2,l:"Phone Verified",done:true,soon:false},{n:3,l:"Submit ID / CNIC",done:false,soon:true},{n:4,l:"Selfie Verification",done:false,soon:true},{n:5,l:"KYC Approved",done:false,soon:true},{n:6,l:"Withdrawals Unlocked",done:false,soon:false}].map(s=>(
              <div key={s.n} style={{display:"flex",alignItems:"center",gap:11,marginBottom:10}}>
                <div style={{width:28,height:28,borderRadius:"50%",flexShrink:0,background:s.done?"rgba(16,185,129,.15)":s.soon?"rgba(245,158,11,.08)":"rgba(255,255,255,.05)",border:`1.5px solid ${s.done?"rgba(16,185,129,.4)":s.soon?"rgba(245,158,11,.25)":"rgba(255,255,255,.1)"}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800,color:s.done?C.green:s.soon?C.gold:C.muted}}>
                  {s.done?"✓":s.n}
                </div>
                <div style={{fontSize:13,fontWeight:s.done?600:400,color:s.done?C.white:C.muted,flex:1}}>{s.l}</div>
                {s.done&&<span style={{fontSize:10,color:C.green,fontWeight:600}}>✓</span>}
                {s.soon&&<Pill label="SOON" col={C.gold} anim/>}
              </div>
            ))}
            <Btn label="🔐 KYC — Coming Soon" onClick={()=>{}} disabled full variant="brand" style={{marginTop:11,padding:13,fontSize:13}}/>
          </div>

          {/* withdrawal */}
          <div style={{background:"rgba(139,92,246,.05)",border:`1px solid ${C.border}`,borderRadius:16,padding:"26px 20px",marginBottom:13,textAlign:"center"}}>
            <div style={{fontSize:40,marginBottom:13}}>💳</div>
            <Pill label="🚀 Withdrawal — Coming Soon" col={C.gold} anim/>
          </div>

          <SH title="Transaction History"/>
          {txns.map(tx=>(
            <div key={tx.id} style={{background:C.s2,border:`1px solid ${C.border}`,borderRadius:13,padding:"12px 15px",marginBottom:7,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div><div style={{fontSize:13,fontWeight:500}}>{tx.desc}</div><div style={{fontSize:10,color:C.muted,marginTop:1}}>{tx.time}</div></div>
              <div style={{textAlign:"right"}}>
                {tx.pts>0&&<div style={{fontFamily:"'DM Mono',monospace",fontWeight:600,fontSize:11,color:C.brandLt}}>+{tx.pts} pts</div>}
                {tx.usd>0&&<div style={{fontFamily:"'DM Mono',monospace",fontWeight:700,fontSize:13,color:C.green}}>{balHide?"$••":"+$"+(tx.usd>=1?tx.usd.toFixed(2):tx.usd.toFixed(3))}</div>}
              </div>
            </div>
          ))}
        </div>}

      </div>

      {/* BOTTOM NAV */}
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,zIndex:100,background:"rgba(13,11,30,.97)",backdropFilter:"blur(28px)",borderTop:"1px solid rgba(139,92,246,.12)"}}>
        <div style={{display:"flex"}}>
          {tabs.map(t=>(
            <div key={t.id} className="tab-btn" onClick={()=>setTab(t.id)} style={{color:tab===t.id?C.white:C.muted}}>
              <div style={{width:38,height:38,borderRadius:12,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,background:tab===t.id?`linear-gradient(135deg,${C.brand},${C.brandDk})`:"transparent",boxShadow:tab===t.id?`0 4px 14px rgba(139,92,246,.35)`:"none",transition:"all .2s"}}>{t.icon}</div>
              <div style={{fontSize:9,fontWeight:tab===t.id?700:400,letterSpacing:.03}}>{t.label}</div>
            </div>
          ))}
        </div>
      </div>

      {/* MODALS */}
      {/* Language Picker */}
      {showLP&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.85)",zIndex:1000,display:"flex",alignItems:"flex-end",justifyContent:"center",backdropFilter:"blur(10px)"}} onClick={()=>setShowLP(false)}>
        <div style={{width:"100%",maxWidth:430,background:C.s1,borderRadius:"22px 22px 0 0",padding:"22px 20px 40px",animation:"up .25s ease"}} onClick={e=>e.stopPropagation()}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <div style={{fontWeight:700,fontSize:16}}>🌐 Language</div>
            <Btn label="✕" onClick={()=>setShowLP(false)} variant="ghost" style={{padding:"6px 12px",fontSize:13,borderRadius:9}}/>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9}}>
            {Object.entries(LANGS).map(([code,info])=>(
              <div key={code} onClick={()=>{setLang(code);setShowLP(false);}} style={{padding:"12px 14px",borderRadius:13,cursor:"pointer",background:lang===code?"rgba(139,92,246,.15)":C.s2,border:`1.5px solid ${lang===code?C.brand:C.border}`,display:"flex",gap:10,alignItems:"center",transition:"all .15s"}}>
                <span style={{fontSize:22}}>{info.flag}</span>
                <div><div style={{fontSize:12,fontWeight:700,color:lang===code?C.brandLt:C.white}}>{info.name}</div></div>
              </div>
            ))}
          </div>
        </div>
      </div>}

      {/* Exchange modal */}
      {showExch&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.88)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:22,backdropFilter:"blur(12px)"}}>
        <div style={{width:"100%",maxWidth:340,background:C.s1,border:`1px solid ${C.border2}`,borderRadius:22,padding:"28px 24px",textAlign:"center",animation:"popIn .25s ease"}}>
          <div style={{fontSize:40,marginBottom:14}}>💱</div>
          <div style={{fontWeight:800,fontSize:18,marginBottom:6}}>Exchange</div>
          <Pill label="Coming Soon" col={C.gold} anim/>
          <div style={{fontSize:12,color:C.muted,marginTop:14,marginBottom:22,lineHeight:1.7}}>Convert your points to crypto or other currencies. Launching soon!</div>
          <Btn label="Close" onClick={()=>setSE(false)} full variant="ghost" style={{padding:13}}/>
        </div>
      </div>}

      {/* Logout modal */}
      {showLogout&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.88)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:22,backdropFilter:"blur(12px)"}}>
        <div style={{width:"100%",maxWidth:320,background:C.s1,border:`1px solid ${C.border}`,borderRadius:22,padding:"28px 24px",textAlign:"center",animation:"popIn .25s ease"}}>
          <div style={{fontSize:40,marginBottom:14}}>🚪</div>
          <div style={{fontWeight:800,fontSize:17,marginBottom:8}}>{L("logout")}?</div>
          <div style={{fontSize:13,color:C.muted,marginBottom:22}}>{L("logoutQ")}</div>
          <div style={{display:"flex",gap:9}}>
            <Btn label={L("cancel")} onClick={()=>setSL(false)} variant="ghost" style={{flex:1,padding:13}}/>
            <Btn label={L("yes")} onClick={onLogout} variant="red" style={{flex:1,padding:13}}/>
          </div>
        </div>
      </div>}

      {/* Skip cooldown modal */}
      {showSkip&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.88)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:22,backdropFilter:"blur(12px)"}}>
        <div style={{width:"100%",maxWidth:330,background:C.s1,border:"1px solid rgba(245,158,11,.22)",borderRadius:22,padding:"28px 24px",textAlign:"center",animation:"popIn .25s ease"}}>
          <div style={{fontSize:40,marginBottom:12}}>⏳</div>
          <div style={{fontWeight:800,fontSize:17,marginBottom:6}}>Cooldown Active</div>
          <div style={{fontFamily:"'DM Mono',monospace",fontSize:36,fontWeight:900,color:C.gold,animation:"tick 1s infinite",lineHeight:1,marginBottom:8}}>{fmtT(cdLeft)}</div>
          <div style={{fontSize:12,color:C.muted,marginBottom:20,lineHeight:1.7}}>Watch one ad to instantly clear the cooldown.</div>
          <Btn label="📺 Watch Ad to Skip" onClick={()=>openAd(true)} full style={{marginBottom:9,padding:14}}/>
          <Btn label="Wait Instead" onClick={()=>setShowSkip(false)} full variant="ghost" style={{padding:13}}/>
        </div>
      </div>}

      {/* Ad modal */}
      {showAd&&curAd&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.92)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:22,backdropFilter:"blur(12px)"}}>
        <div style={{width:"100%",maxWidth:350,background:C.s1,border:`1px solid ${C.border}`,borderRadius:22,padding:"28px 24px",textAlign:"center",animation:"popIn .25s ease"}}>
          <div style={{fontSize:10,fontWeight:700,color:C.muted,letterSpacing:.1,textTransform:"uppercase",marginBottom:14}}>{isSkip?"Skip Cooldown":"Advertisement"}</div>
          <div style={{width:80,height:80,borderRadius:22,margin:"0 auto 14px",background:"rgba(139,92,246,.1)",border:`1px solid ${C.border2}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:42}}>{curAd.emoji}</div>
          <div style={{fontWeight:800,fontSize:16,marginBottom:3}}>{curAd.cat} Ad</div>
          <div style={{fontSize:12,color:C.muted,marginBottom:18}}>Special offer for you!</div>
          {!adReady
            ?<div style={{marginBottom:18}}><Ring val={adTimer} max={5}/><div style={{fontSize:12,color:C.muted,marginTop:11}}>{isSkip?"Clearing cooldown…":<>Earning <span style={{color:C.green,fontWeight:700}}>+{curAd.pts} pts</span>{needAd&&<span style={{color:C.brandLt}}> · spin unlocks after</span>}</>}</div>
              {isSunday&&sunAds%5===4&&<div style={{fontSize:11,color:C.gold,marginTop:4,fontWeight:600}}>Next ad = 5 Sunday Spins! 🎰</div>}</div>
            :<Btn label={isSkip?"⚡ Clear Cooldown":`🎉 Claim +${curAd.pts} pts${isSunday&&(sunAds+1)%5===0?" + 5 Spins 🎰":""}`} onClick={claimAd} full style={{marginBottom:9,padding:15,fontSize:14}}/>}
          {!adReady&&<Btn label="Close" onClick={()=>setShowAd(false)} full variant="ghost" style={{padding:11,fontSize:12}}/>}
        </div>
      </div>}
    </div>
  );
}

/* ═══════════════════════════════════════════════
   ██   ROOT
═══════════════════════════════════════════════ */
function WishApp(){
  const [loggedUser,setLU] = useState(null);
  const [lang,setLang]     = useState("en");

  const handleLogin=(u)=>{ setLU(u); };
  const handleLogout=()=>{ setLU(null); };

  if(!loggedUser) return <AuthScreen onLogin={handleLogin} lang={lang}/>;
  if(loggedUser.isAdmin) return <AdminPanel user={loggedUser} onExit={handleLogout} lang={lang}/>;
  return <MainApp user={loggedUser} onLogout={handleLogout} lang={lang} setLang={setLang}/>;
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(WishApp));
</script>
</body>
</html>
