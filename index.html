function showDashboard(user) {
    document.getElementById('app').innerHTML = `
        <div class="card">
            <!-- Header with gradient -->
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;">
                <div style="display:flex; align-items:center; gap:10px;">
                    <div style="width:45px; height:45px; background:linear-gradient(135deg, #8b5cf6, #ec4899); border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:24px;">✨</div>
                    <div>
                        <div style="font-weight:bold; font-size:18px;">Welcome, ${user.name}</div>
                        <div style="font-size:12px; color:rgba(255,255,255,0.5);">${user.email}</div>
                    </div>
                </div>
                <button onclick="logout()" style="width:auto; padding:8px 16px; background:rgba(239,68,68,0.1); color:#ef4444; border:1px solid rgba(239,68,68,0.2); border-radius:10px; cursor:pointer;">Logout</button>
            </div>
            
            <!-- Enhanced Balance Card -->
            <div style="background:linear-gradient(135deg, #1a1540, #13102a); padding:25px; border-radius:20px; border:1px solid rgba(139,92,246,0.3); margin-bottom:20px;">
                <div style="color:#a78bfa; font-size:14px; margin-bottom:8px;">Total Balance</div>
                <div style="display:flex; align-items:baseline; gap:10px;">
                    <span style="font-size:48px; font-weight:bold; background:linear-gradient(135deg, #fff, #a78bfa); -webkit-background-clip:text; -webkit-text-fill-color:transparent;">${user.pts.toLocaleString()}</span>
                    <span style="color:rgba(255,255,255,0.4);">pts</span>
                </div>
                <div style="color:#10b981; font-size:18px;">≈ $${(user.pts * 0.001).toFixed(2)}</div>
                <div style="margin-top:15px; height:4px; background:rgba(139,92,246,0.1); border-radius:2px;">
                    <div style="height:100%; width:65%; background:linear-gradient(90deg, #8b5cf6, #ec4899); border-radius:2px;"></div>
                </div>
            </div>

            <!-- Stats Grid -->
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
                <div style="background:#0d0b1e; padding:18px; border-radius:15px; text-align:center;">
                    <div style="font-size:28px; margin-bottom:8px;">⛏️</div>
                    <div style="font-size:12px; color:rgba(255,255,255,0.5); margin-bottom:4px;">Mining</div>
                    <div style="font-size:16px; font-weight:bold; color:#06b6d4;">8h cycle</div>
                </div>
                <div style="background:#0d0b1e; padding:18px; border-radius:15px; text-align:center;">
                    <div style="font-size:28px; margin-bottom:8px;">🎰</div>
                    <div style="font-size:12px; color:rgba(255,255,255,0.5); margin-bottom:4px;">Spins</div>
                    <div style="font-size:16px; font-weight:bold; color:#f59e0b;">3 left</div>
                </div>
                <div style="background:#0d0b1e; padding:18px; border-radius:15px; text-align:center;">
                    <div style="font-size:28px; margin-bottom:8px;">📋</div>
                    <div style="font-size:12px; color:rgba(255,255,255,0.5); margin-bottom:4px;">Tasks</div>
                    <div style="font-size:16px; font-weight:bold; color:#10b981;">5 new</div>
                </div>
                <div style="background:#0d0b1e; padding:18px; border-radius:15px; text-align:center;">
                    <div style="font-size:28px; margin-bottom:8px;">🏆</div>
                    <div style="font-size:12px; color:rgba(255,255,255,0.5); margin-bottom:4px;">Rank</div>
                    <div style="font-size:16px; font-weight:bold; color:#ec4899;">#42</div>
                </div>
            </div>

            <!-- Quick Actions -->
            <div style="margin-top:20px;">
                <h3 style="font-size:18px; margin-bottom:12px;">Quick Actions</h3>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                    <button style="padding:14px; background:rgba(139,92,246,0.1); border:1px solid rgba(139,92,246,0.2); border-radius:12px; color:white; font-size:14px; cursor:pointer;">📺 Watch Ad</button>
                    <button style="padding:14px; background:rgba(139,92,246,0.1); border:1px solid rgba(139,92,246,0.2); border-radius:12px; color:white; font-size:14px; cursor:pointer;">🎮 Spin Wheel</button>
                    <button style="padding:14px; background:rgba(139,92,246,0.1); border:1px solid rgba(139,92,246,0.2); border-radius:12px; color:white; font-size:14px; cursor:pointer;">📋 Do Tasks</button>
                    <button style="padding:14px; background:rgba(139,92,246,0.1); border:1px solid rgba(139,92,246,0.2); border-radius:12px; color:white; font-size:14px; cursor:pointer;">👥 Refer</button>
                </div>
            </div>
        </div>
    `;
}
