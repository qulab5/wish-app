      body:"This weekend only, every ad you watch earns 2× points…",
      audience:{ filter:"active", countries:[], minPts:"", maxPts:"" },
      recipientCount:3, status:"sent",
      sentAt:"2025-03-15T08:30:00Z", sentBy:"admin@wish.com",
      sent:3, failed:0,
    },
    {
      id:"bcast_demo3", type:"warning", channel:"in_app",
      subject:"Scheduled maintenance — Saturday 2 AM UTC",
      body:"The platform will be down for ~30 minutes…",
      audience:{ filter:"all", countries:[], minPts:"", maxPts:"" },
      recipientCount:4, status:"scheduled",
      sentAt:null, scheduledFor:"2025-04-05T02:00:00Z", sentBy:"admin@wish.com",
      sent:0, failed:0,
    },
  ]);

  const preview = filterAudience(users, audience);
  const countries = uniqueCountries(users);
  const typeInfo    = BROADCAST_TYPES.find(t => t.id === type);
  const channelInfo = BROADCAST_CHANNELS.find(c => c.id === channel);
  const bodyLimit   = channel === "in_app" ? 280 : 5000;
  const canSend     = subject.trim() && body.trim() && preview.length > 0
                      && (sendMode === "now" || scheduledFor);

  const doSend = async () => {
    setConfirm(false);
    setSending(true);
    setSR(null);

    const payload = {
      subject: subject.trim(),
      body: body.trim(),
      type, channel,
      audience,
      scheduledFor: sendMode === "scheduled" ? scheduledFor : null,
      sentBy: adminUser.email,
    };

    try {
      const res = await fetch("/api/broadcast", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });

      // Guard against non-JSON responses (e.g. Vercel HTML error pages)
      const contentType = res.headers.get("content-type") || "";
      if (!contentType.includes("application/json")) {
        throw new Error(`Server returned HTTP ${res.status} (non-JSON response)`);
      }

      const json = await res.json();
      if (!json.success) throw new Error(json.error || `Server error (HTTP ${res.status})`);

      const entry = {
        id: `bcast_${Date.now()}`, type, channel, subject: subject.trim(), body: body.trim(),
        audience: { ...audience },
        recipientCount: preview.length,
        status: sendMode === "scheduled" ? "scheduled" : "sent",
        sentAt: sendMode === "now" ? new Date().toISOString() : null,
        scheduledFor: sendMode === "scheduled" ? scheduledFor : null,
        sentBy: adminUser.email,
        sent: json.sent ?? 0, failed: json.failed ?? 0,
        note: json.note,
      };
      setHistory(h => [entry, ...h]);
      setSR({ ok: true, sent: json.sent, failed: json.failed, note: json.note, source: "live" });
      setSubject(""); setBody("");
    } catch (err) {
      // Demo fallback ONLY when the endpoint doesn't exist yet (local dev without API routes).
      // A TypeError means the fetch itself failed (network down / endpoint absent).
      // A real deployed API returning 4xx/5xx is a genuine error — show it, don't fake success.
      const isNoEndpoint = (err instanceof TypeError) || err.message.includes("HTTP 404");
      if (isNoEndpoint) {
        await new Promise(r => setTimeout(r, 1400));
        const failed = Math.floor(preview.length * 0.05);
        const sent   = preview.length - failed;
        const entry  = {
          id: `bcast_${Date.now()}`, type, channel, subject: subject.trim(), body: body.trim(),
          audience: { ...audience },
          recipientCount: preview.length,
          status: sendMode === "scheduled" ? "scheduled" : "sent",
          sentAt: sendMode === "now" ? new Date().toISOString() : null,
          scheduledFor: sendMode === "scheduled" ? scheduledFor : null,
          sentBy: adminUser.email,
          sent, failed, source: "demo",
        };
        setHistory(h => [entry, ...h]);
        setSR({ ok: true, sent, failed, source: "demo" });
        setSubject(""); setBody("");
      } else {
        setSR({ ok: false, error: err.message });
      }
    } finally {
      setSending(false);
    }
  };

  // ── audience description for history / confirm dialog ──
  const audienceLabel = (a) => {
    const parts = [];
    parts.push(a.filter === "active" ? "Active users" : a.filter === "inactive" ? "Inactive users" : "All users");
    if (a.countries?.length) parts.push(a.countries.join(" "));
    if (a.minPts !== "" && a.minPts != null) parts.push(`≥ ${Number(a.minPts).toLocaleString()} pts`);
    if (a.maxPts !== "" && a.maxPts != null) parts.push(`≤ ${Number(a.maxPts).toLocaleString()} pts`);
    return parts.join(" · ");
  };

  const statusStyle = (status) => ({
    sent:      { bg:"rgba(16,185,129,.12)",  color:C.green, border:"rgba(16,185,129,.3)",  label:"Sent" },
    scheduled: { bg:"rgba(6,182,212,.1)",    color:C.cyan,  border:"rgba(6,182,212,.3)",   label:"Scheduled" },
    failed:    { bg:"rgba(239,68,68,.1)",    color:C.red,   border:"rgba(239,68,68,.3)",   label:"Failed" },
    draft:     { bg:"rgba(255,255,255,.05)", color:C.muted, border:"rgba(255,255,255,.1)", label:"Draft" },
  }[status] || { bg:"rgba(255,255,255,.05)", color:C.muted, border:"rgba(255,255,255,.1)", label:status });

  return (
    <div style={{ display:"flex", flexDirection:"column", gap:20 }}>

      {/* ── Compose card ── */}
      <div style={{ background:C.s2, border:`1px solid ${C.border}`, borderRadius:16, overflow:"hidden" }}>
        <div style={{ padding:"14px 18px", borderBottom:`1px solid ${C.border}`, fontWeight:700, color:C.white, fontSize:14, display:"flex", alignItems:"center", gap:8 }}>
          <span style={{ fontSize:16 }}>✍️</span> New Broadcast
        </div>

        <div style={{ padding:"16px 18px", display:"flex", flexDirection:"column", gap:16 }}>

          {/* Message type */}
          <div>
            <div style={{ fontSize:12, fontWeight:600, color:"rgba(255,255,255,.45)", marginBottom:8 }}>Message Type</div>
            <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
              {BROADCAST_TYPES.map(t => (
                <button key={t.id} onClick={() => setType(t.id)} style={{
                  padding:"7px 14px", borderRadius:9, fontSize:12, fontWeight:600, cursor:"pointer",
                  background: type===t.id ? `${t.color}22` : "rgba(255,255,255,.04)",
                  border:`1px solid ${type===t.id ? t.color : "rgba(255,255,255,.1)"}`,
                  color: type===t.id ? t.color : "rgba(255,255,255,.4)",
                  transition:"all .15s",
                }}>{t.icon} {t.label}</button>
              ))}
            </div>
          </div>

          {/* Channel */}
          <div>
            <div style={{ fontSize:12, fontWeight:600, color:"rgba(255,255,255,.45)", marginBottom:8 }}>Channel</div>
            <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
              {BROADCAST_CHANNELS.map(ch => (
                <button key={ch.id} onClick={() => !ch.disabled && setChannel(ch.id)}
                  disabled={ch.disabled}
                  style={{
                    flex:"1 1 120px", padding:"9px 12px", borderRadius:10, cursor:ch.disabled?"default":"pointer", textAlign:"left",
                    background: channel===ch.id ? "rgba(139,92,246,.18)" : ch.disabled ? "rgba(255,255,255,.02)" : "rgba(255,255,255,.04)",
                    border:`1px solid ${channel===ch.id ? C.brand : "rgba(255,255,255,.1)"}`,
                    color: ch.disabled ? "rgba(255,255,255,.2)" : channel===ch.id ? C.white : "rgba(255,255,255,.45)",
                    opacity: ch.disabled ? .45 : 1,
                    transition:"all .15s",
                  }}>
                  <div style={{ fontSize:15, marginBottom:2 }}>{ch.icon} <span style={{ fontSize:12, fontWeight:700 }}>{ch.label}{ch.disabled&&" (soon)"}</span></div>
                  <div style={{ fontSize:10, opacity:.7 }}>{ch.desc}</div>
                </button>
              ))}
            </div>
          </div>

          {/* Subject */}
          <div>
            <div style={{ fontSize:12, fontWeight:600, color:"rgba(255,255,255,.45)", marginBottom:6 }}>
              Subject {channel==="in_app" && <span style={{ fontWeight:400, color:"rgba(255,255,255,.25)" }}>· shown as notification title</span>}
            </div>
            <input
              className="inp-base"
              placeholder={channel==="in_app" ? "Short notification title…" : "Email subject line…"}
              value={subject}
              onChange={e => setSubject(e.target.value)}
            />
          </div>

          {/* Body */}
          <div>
            <div style={{ fontSize:12, fontWeight:600, color:"rgba(255,255,255,.45)", marginBottom:6, display:"flex", justifyContent:"space-between" }}>
              <span>
                Message Body
                {channel==="email" && <span style={{ fontWeight:400, color:"rgba(255,255,255,.25)", marginLeft:4 }}>· HTML supported</span>}
              </span>
              <span style={{ fontWeight:400, color: body.length > bodyLimit*0.9 ? C.red : "rgba(255,255,255,.25)" }}>
                {body.length}{channel==="in_app" && `/${bodyLimit}`}
              </span>
            </div>
            <textarea
              value={body}
              onChange={e => setBody(e.target.value)}
              maxLength={channel==="in_app" ? bodyLimit : undefined}
              placeholder={
                channel==="email"
                  ? "<p>Hi {{name}},</p>\n<p>We have exciting news for you…</p>"
                  : "Your message to users (plain text, max 280 chars)…"
              }
              style={{
                width:"100%", minHeight: channel==="email" ? 180 : 100,
                background:"rgba(0,0,0,.3)", border:`1.5px solid ${C.border2}`,
                color:"#e2e8f0", borderRadius:12, padding:"12px 14px",
                fontSize:13, fontFamily: channel==="email" ? "'DM Mono','Courier New',monospace" : "inherit",
                lineHeight:1.7, outline:"none", resize:"vertical", boxSizing:"border-box",
                transition:"border .2s",
              }}
              onFocus={e => e.target.style.borderColor="rgba(139,92,246,.5)"}
              onBlur={e  => e.target.style.borderColor="rgba(139,92,246,.25)"}
            />
          </div>
        </div>
      </div>

      {/* ── Audience card ── */}
      <div style={{ background:C.s2, border:`1px solid ${C.border}`, borderRadius:16, overflow:"hidden" }}>
        <div style={{ padding:"14px 18px", borderBottom:`1px solid ${C.border}`, display:"flex", alignItems:"center", justifyContent:"space-between" }}>
          <div style={{ fontWeight:700, color:C.white, fontSize:14, display:"flex", alignItems:"center", gap:8 }}>
            <span style={{ fontSize:16 }}>🎯</span> Audience
          </div>
          <div style={{
            background: preview.length > 0 ? "rgba(16,185,129,.12)" : "rgba(255,255,255,.05)",
            border:`1px solid ${preview.length > 0 ? "rgba(16,185,129,.3)" : "rgba(255,255,255,.1)"}`,
            borderRadius:99, padding:"4px 12px", fontSize:12, fontWeight:700,
            color: preview.length > 0 ? C.green : "rgba(255,255,255,.35)",
          }}>
            {preview.length} recipient{preview.length !== 1 ? "s" : ""}
          </div>
        </div>

        <div style={{ padding:"16px 18px", display:"flex", flexDirection:"column", gap:14 }}>
          {/* Filter */}
          <div>
            <div style={{ fontSize:12, fontWeight:600, color:"rgba(255,255,255,.45)", marginBottom:8 }}>User Status</div>
            <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
              {[
                { id:"all",      label:"All Users",      icon:"👥" },
                { id:"active",   label:"Active Only",    icon:"✅" },
                { id:"inactive", label:"Inactive Only",  icon:"🚫" },
              ].map(f => (
                <button key={f.id} onClick={() => aud("filter")(f.id)} style={{
                  padding:"7px 14px", borderRadius:9, fontSize:12, fontWeight:600, cursor:"pointer",
                  background: audience.filter===f.id ? "rgba(139,92,246,.2)" : "rgba(255,255,255,.04)",
                  border:`1px solid ${audience.filter===f.id ? C.brand : "rgba(255,255,255,.1)"}`,
                  color: audience.filter===f.id ? C.white : "rgba(255,255,255,.4)",
                }}>{f.icon} {f.label}</button>
              ))}
            </div>
          </div>

          {/* Country */}
          {countries.length > 0 && (
            <div>
              <div style={{ fontSize:12, fontWeight:600, color:"rgba(255,255,255,.45)", marginBottom:8 }}>
                Country <span style={{ fontWeight:400, color:"rgba(255,255,255,.25)" }}>· leave blank for all</span>
              </div>
              <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
                {countries.map(c => {
                  const on = audience.countries.includes(c);
                  return (
                    <button key={c} onClick={() => toggleCountry(c)} style={{
                      padding:"5px 11px", borderRadius:8, fontSize:13, cursor:"pointer",
                      background: on ? "rgba(139,92,246,.2)" : "rgba(255,255,255,.04)",
                      border:`1px solid ${on ? C.brand : "rgba(255,255,255,.1)"}`,
                      color: on ? C.white : "rgba(255,255,255,.5)",
                    }}>{c}</button>
                  );
                })}
              </div>
            </div>
          )}

          {/* Points range */}
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
            <div>
              <div style={{ fontSize:12, fontWeight:600, color:"rgba(255,255,255,.45)", marginBottom:6 }}>Min Points</div>
              <input className="inp-base" type="number" min={0} placeholder="e.g. 10000"
                value={audience.minPts} onChange={e => aud("minPts")(e.target.value)} />
            </div>
            <div>
              <div style={{ fontSize:12, fontWeight:600, color:"rgba(255,255,255,.45)", marginBottom:6 }}>Max Points</div>
              <input className="inp-base" type="number" min={0} placeholder="e.g. 50000"
                value={audience.maxPts} onChange={e => aud("maxPts")(e.target.value)} />
            </div>
          </div>

          {/* Recipient preview */}
          {preview.length > 0 && (
            <div style={{ background:"rgba(255,255,255,.03)", border:`1px solid ${C.border}`, borderRadius:10, padding:"10px 12px" }}>
              <div style={{ fontSize:11, fontWeight:700, color:"rgba(255,255,255,.3)", marginBottom:8, letterSpacing:1 }}>PREVIEW</div>
              <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
                {preview.slice(0,6).map(u => (
                  <div key={u.id} style={{ display:"flex", alignItems:"center", gap:5, background:"rgba(139,92,246,.1)", border:`1px solid ${C.border}`, borderRadius:8, padding:"4px 9px" }}>
                    <span style={{ fontSize:11 }}>{u.country}</span>
                    <span style={{ fontSize:12, color:C.white, fontWeight:600 }}>{u.name}</span>
                    <span style={{ fontSize:10, color:"rgba(255,255,255,.35)" }}>{u.pts.toLocaleString()} pts</span>
                  </div>
                ))}
                {preview.length > 6 && (
                  <div style={{ padding:"4px 9px", fontSize:12, color:"rgba(255,255,255,.35)" }}>+{preview.length - 6} more</div>
                )}
              </div>
            </div>
          )}
          {preview.length === 0 && (
            <div style={{ fontSize:12, color:C.red, textAlign:"center", padding:"8px 0" }}>⚠ No users match the current filters.</div>
          )}
        </div>
      </div>

      {/* ── Schedule card ── */}
      <div style={{ background:C.s2, border:`1px solid ${C.border}`, borderRadius:16, overflow:"hidden" }}>
        <div style={{ padding:"14px 18px", borderBottom:`1px solid ${C.border}`, fontWeight:700, color:C.white, fontSize:14, display:"flex", alignItems:"center", gap:8 }}>
          <span style={{ fontSize:16 }}>🗓</span> Delivery
        </div>
        <div style={{ padding:"16px 18px", display:"flex", flexDirection:"column", gap:14 }}>
          <div style={{ display:"flex", gap:8 }}>
            {[
              { id:"now",       label:"Send Now",  icon:"⚡" },
              { id:"scheduled", label:"Schedule",  icon:"🕐" },
            ].map(m => (
              <button key={m.id} onClick={() => setSendMode(m.id)} style={{
                flex:1, padding:"10px", borderRadius:10, cursor:"pointer",
                background: sendMode===m.id ? "rgba(139,92,246,.2)" : "rgba(255,255,255,.04)",
                border:`1px solid ${sendMode===m.id ? C.brand : "rgba(255,255,255,.1)"}`,
                color: sendMode===m.id ? C.white : "rgba(255,255,255,.4)",
                fontWeight:600, fontSize:13,
              }}>{m.icon} {m.label}</button>
            ))}
          </div>
          {sendMode === "scheduled" && (
            <div>
              <div style={{ fontSize:12, fontWeight:600, color:"rgba(255,255,255,.45)", marginBottom:6 }}>Send At</div>
              <input
                type="datetime-local"
                className="inp-base"
                value={scheduledFor}
                onChange={e => setSF(e.target.value)}
                min={new Date(Date.now()+60000).toISOString().slice(0,16)}
                style={{ colorScheme:"dark" }}
              />
            </div>
          )}
        </div>
      </div>

      {/* ── Send button ── */}
      <button
        onClick={() => setConfirm(true)}
        disabled={!canSend || sending}
        style={{
          width:"100%", padding:15, borderRadius:13, border:"none",
          background: (!canSend||sending) ? "rgba(255,255,255,.07)" : `linear-gradient(135deg,${typeInfo.color},${typeInfo.color}cc)`,
          color: (!canSend||sending) ? "rgba(255,255,255,.3)" : "#fff",
          fontWeight:800, fontSize:15, cursor:(!canSend||sending)?"default":"pointer",
          boxShadow:(!canSend||sending)?"none":`0 6px 24px ${typeInfo.color}60`,
          transition:"all .2s",
        }}
      >
          {sending ? "⏳ Sending…" : sendMode==="scheduled" ? `🗓 Schedule ${typeInfo.icon} ${typeInfo.label}` : `${typeInfo.icon} Send ${typeInfo.label} to ${preview.length} user${preview.length!==1?"s":""}`}
      </button>

      {/* Validation hints — shown only when button is disabled and user hasn't started sending */}
      {!canSend && !sending && (
        <div style={{ display:"flex", flexWrap:"wrap", gap:6, justifyContent:"center" }}>
          {!subject.trim() && (
            <span style={{ fontSize:11, color:"rgba(255,255,255,.35)", background:"rgba(255,255,255,.05)", border:"1px solid rgba(255,255,255,.1)", borderRadius:99, padding:"3px 10px" }}>
              ✏️ Subject required
            </span>
          )}
          {!body.trim() && (
            <span style={{ fontSize:11, color:"rgba(255,255,255,.35)", background:"rgba(255,255,255,.05)", border:"1px solid rgba(255,255,255,.1)", borderRadius:99, padding:"3px 10px" }}>
              ✏️ Message body required
            </span>
          )}
          {preview.length === 0 && (
            <span style={{ fontSize:11, color:"rgba(239,68,68,.6)", background:"rgba(239,68,68,.08)", border:"1px solid rgba(239,68,68,.2)", borderRadius:99, padding:"3px 10px" }}>
              ⚠️ No recipients match filters
            </span>
          )}
          {sendMode === "scheduled" && !scheduledFor && (
            <span style={{ fontSize:11, color:"rgba(255,255,255,.35)", background:"rgba(255,255,255,.05)", border:"1px solid rgba(255,255,255,.1)", borderRadius:99, padding:"3px 10px" }}>
              🕐 Schedule time required
            </span>
          )}
        </div>
      )}

      {/* Send result */}
      {sendResult && (
        <div style={{
          background: sendResult.ok ? "rgba(16,185,129,.08)" : "rgba(239,68,68,.08)",
          border:`1px solid ${sendResult.ok ? "rgba(16,185,129,.3)" : "rgba(239,68,68,.3)"}`,
          borderRadius:12, padding:"14px 16px",
        }}>
          <div style={{ fontWeight:700, fontSize:14, color: sendResult.ok ? C.green : C.red, marginBottom:6 }}>
            {sendResult.ok ? (sendResult.source==="demo" ? "✅ Sent (demo mode)" : "✅ Sent!") : "❌ Failed"}
          </div>
          {sendResult.ok && (
            <div style={{ fontSize:13, color:"rgba(255,255,255,.6)" }}>
              <strong style={{ color:C.white }}>{sendResult.sent}</strong> {channel==="in_app"?"users will see this in Announcements":"delivered"}
              {sendResult.failed > 0 && <span style={{ color:C.red }}> · {sendResult.failed} failed</span>}
              {sendResult.note  && <div style={{ fontSize:11, color:"rgba(255,255,255,.35)", marginTop:4 }}>ℹ {sendResult.note}</div>}
            </div>
          )}
          {!sendResult.ok && <div style={{ fontSize:12, color:C.red }}>{sendResult.error}</div>}
          <button onClick={() => setSR(null)} style={{ marginTop:10, background:"none", border:"none", color:C.muted, fontSize:12, cursor:"pointer", textDecoration:"underline" }}>Dismiss</button>
        </div>
      )}

      {/* ── History ── */}
      {history.length > 0 && (
        <div style={{ background:C.s2, border:`1px solid ${C.border}`, borderRadius:16, overflow:"hidden" }}>
          <div style={{ padding:"14px 18px", borderBottom:`1px solid ${C.border}`, fontWeight:700, color:C.white, fontSize:14, display:"flex", alignItems:"center", gap:8 }}>
            <span style={{ fontSize:16 }}>📋</span> Broadcast History
          </div>
          {history.map((b, i) => {
            const ti  = BROADCAST_TYPES.find(t => t.id === b.type) || BROADCAST_TYPES[0];
            const ci  = BROADCAST_CHANNELS.find(c => c.id === b.channel) || BROADCAST_CHANNELS[0];
            const ss  = statusStyle(b.status);
            return (
              <div key={b.id} style={{
                padding:"14px 18px",
                borderBottom: i < history.length-1 ? `1px solid ${C.border}` : undefined,
              }}>
                <div style={{ display:"flex", alignItems:"flex-start", gap:10 }}>
                  <div style={{
                    width:38, height:38, borderRadius:9, flexShrink:0,
                    background:`${ti.color}18`, border:`1px solid ${ti.color}40`,
                    display:"flex", alignItems:"center", justifyContent:"center", fontSize:18,
                  }}>{ti.icon}</div>

                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ display:"flex", alignItems:"center", gap:7, flexWrap:"wrap" }}>
                      <span style={{ fontWeight:700, color:C.white, fontSize:13 }}>{b.subject}</span>
                      <span style={{
                        fontSize:10, fontWeight:700, padding:"2px 7px", borderRadius:99,
                        background:ss.bg, color:ss.color, border:`1px solid ${ss.border}`,
                      }}>{ss.label}</span>
                      {b.source==="demo" && <span style={{ fontSize:10, color:C.gold, fontWeight:600 }}>demo</span>}
                    </div>
                    <div style={{ fontSize:11, color:"rgba(255,255,255,.35)", marginTop:3, display:"flex", gap:10, flexWrap:"wrap" }}>
                      <span>{ci.icon} {ci.label}</span>
                      <span>🎯 {audienceLabel(b.audience)}</span>
                      <span>👥 {b.recipientCount} recipient{b.recipientCount!==1?"s":""}</span>
                      {b.sent > 0 && <span style={{ color:C.green }}>✓ {b.sent} sent</span>}
                      {b.failed > 0 && <span style={{ color:C.red }}>✕ {b.failed} failed</span>}
                    </div>
                    <div style={{ fontSize:10, color:"rgba(255,255,255,.25)", marginTop:2 }}>
                      {b.status==="scheduled"
                        ? `Scheduled for ${fmtDate(b.scheduledFor)}`
                        : `Sent ${fmtDate(b.sentAt)}`
                      } · by {b.sentBy}
                    </div>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* ── Confirm dialog ── */}
      {confirm && (
        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,.88)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:999, padding:16 }}>
          <div style={{ background:C.s1, borderRadius:20, padding:24, maxWidth:360, width:"100%", border:`1px solid ${typeInfo.color}55` }}>
            <div style={{ fontSize:32, textAlign:"center", marginBottom:8 }}>{typeInfo.icon}</div>
            <div style={{ fontWeight:800, color:C.white, fontSize:16, textAlign:"center", marginBottom:4 }}>
              {sendMode==="scheduled" ? "Schedule broadcast?" : "Send broadcast now?"}
            </div>

            <div style={{ background:"rgba(255,255,255,.04)", border:`1px solid ${C.border}`, borderRadius:10, padding:"12px 14px", margin:"16px 0", fontSize:12 }}>
              {[
                ["Type",     `${typeInfo.icon} ${typeInfo.label}`],
                ["Channel",  `${channelInfo.icon} ${channelInfo.label}`],
                ["Subject",  subject],
                ["Audience", audienceLabel(audience)],
                ["Recipients", `${preview.length} user${preview.length!==1?"s":""}`],
                sendMode==="scheduled" ? ["Scheduled for", scheduledFor ? fmtDate(scheduledFor) : "—"] : ["Delivery","Immediately"],
              ].map(([k,v]) => (
                <div key={k} style={{ display:"flex", gap:8, marginBottom:4 }}>
                  <span style={{ color:"rgba(255,255,255,.4)", minWidth:80, flexShrink:0 }}>{k}</span>
                  <span style={{ color:C.white, wordBreak:"break-word" }}>{v}</span>
                </div>
              ))}
            </div>

            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
              <button onClick={() => setConfirm(false)} style={{ background:C.s3, border:`1px solid ${C.border}`, borderRadius:12, padding:12, color:C.white, fontWeight:600, cursor:"pointer" }}>Cancel</button>
              <button onClick={doSend} style={{
                background:`linear-gradient(135deg,${typeInfo.color},${typeInfo.color}aa)`,
                border:"none", borderRadius:12, padding:12, color:"#fff", fontWeight:700, cursor:"pointer",
              }}>{sendMode==="scheduled" ? "Schedule" : "Send Now"}</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function WalletTab({ u, C, setU }) {
  const [wallet,    setWallet]    = useState(u.walletAddress || '');
  const [wishBal,   setWBal]      = useState(u.tokens ?? 0);
  const [solBal,    setSBal]      = useState(null);
  const [mintCfg,   setMintCfg]   = useState(false);
  const [screen,    setScreen]    = useState('main');
  const [sendTo,    setSendTo]    = useState('');
  const [sendAmt,   setSendAmt]   = useState('');
  const [msg,       setMsg]       = useState('');
  const [busy,      setBusy]      = useState(false);
  const [copied,    setCopied]    = useState(false);
  const [creating,  setCreating]  = useState(false);
  const [balLoading,setBalLoad]   = useState(false);
  const [txHistory,  setTxHistory] = useState([]);
  const [walletTab,  setWalletTab] = useState('assets');
  const [displayBal, setDisplayBal] = useState(0);
  const auroraRef    = useRef(null);
  const auroraRafRef = useRef(null);

  // ── Auto-create or restore wallet on mount ─────────────────────────────────
  useEffect(() => {
    loadTx();
    if (u.walletAddress) { loadBalances(u.walletAddress); return; }
    setCreating(true);
    fetch(`/api/wallet?userId=${encodeURIComponent(u.id)}`)
      .then(r => r.json())
      .then(d => { if (d.address) { setWallet(d.address); loadBalances(d.address); }
                   else setMsg(d.error || 'Could not create wallet'); })
      .catch(e => setMsg('Network error: ' + e.message))
      .finally(() => setCreating(false));
  }, []);

  useEffect(() => {
    if (u.walletAddress && !wallet) { setWallet(u.walletAddress); loadBalances(u.walletAddress); }
  }, [u.walletAddress]);

  // Keep WISH balance in sync with in-app tokens when mint not on-chain yet
  useEffect(() => {
    if (!mintCfg) setWBal(u.tokens ?? 0);
  }, [u.tokens, mintCfg]);

  // ── Count-up animation whenever wishBal changes ────────────────────────────
  useEffect(() => {
    const target = wishBal ?? 0;
    const duration = 1200;
    const start = Date.now();
    const from = 0;
    const tick = () => {
      const elapsed = Date.now() - start;
      const progress = Math.min(elapsed / duration, 1);
      const ease = 1 - Math.pow(1 - progress, 3);
      setDisplayBal(Math.round(from + (target - from) * ease));
      if (progress < 1) auroraRafRef._countUp = requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);
    return () => cancelAnimationFrame(auroraRafRef._countUp);
  }, [wishBal]);

  // ── Aurora canvas animation ────────────────────────────────────────────────
  useEffect(() => {
    const canvas = auroraRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    let t = 0;
    const resize = () => { canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight; };
    resize();
    window.addEventListener('resize', resize);
    const draw = () => {
      const w = canvas.width, h = canvas.height;
      ctx.clearRect(0, 0, w, h);
      const g1 = ctx.createRadialGradient(w*.3, h*.2+Math.sin(t*.4)*30, 0, w*.3, h*.2+Math.sin(t*.4)*30, w*.7);
      g1.addColorStop(0,'rgba(245,158,11,.18)'); g1.addColorStop(1,'transparent');
      ctx.fillStyle = g1; ctx.fillRect(0,0,w,h);
      const g2 = ctx.createRadialGradient(w*.75, h*.1+Math.cos(t*.3)*35, 0, w*.75, h*.1+Math.cos(t*.3)*35, w*.6);
      g2.addColorStop(0,'rgba(139,92,246,.22)'); g2.addColorStop(1,'transparent');
      ctx.fillStyle = g2; ctx.fillRect(0,0,w,h);
      const g3 = ctx.createRadialGradient(w*.6, h*.55+Math.sin(t*.5+1)*20, 0, w*.6, h*.55+Math.sin(t*.5+1)*20, w*.5);
      g3.addColorStop(0,'rgba(6,182,212,.12)'); g3.addColorStop(1,'transparent');
      ctx.fillStyle = g3; ctx.fillRect(0,0,w,h);
      t += 0.015;
      auroraRafRef.current = requestAnimationFrame(draw);
    };
    draw();
    return () => { cancelAnimationFrame(auroraRafRef.current); window.removeEventListener('resize', resize); };
  }, []);

  // ── Balance fetch (server-side — avoids CORS on public Solana RPC) ─────────
  const loadBalances = async (addr) => {
    setBalLoad(true);
    try {
      const r = await fetch(`/api/walletBalance?address=${encodeURIComponent(addr)}`);
      const d = await r.json();
      if (!d.error) {
        setSBal(d.sol);
        setMintCfg(!!d.mintConfigured);
        if (d.mintConfigured) {
          setWBal(d.wish);
        } else {
          // Fetch fresh token balance from DB so the refresh button shows
          // the real value even when the in-memory state is stale.
          try {
            const ur = await fetch(`/api/user?email=${encodeURIComponent(u.email)}`);
            const ud = await ur.json();
            const fresh = ud.user?.tokens ?? u.tokens ?? 0;
            setWBal(fresh);
            setU(p => ({ ...p, tokens: fresh }));
          } catch { setWBal(u.tokens ?? 0); }
        }
      }
    } catch(e) { console.warn('[balances]', e.message); }
    finally { setBalLoad(false); }
  };

  // ── Send WISH coins (server-side signing) ──────────────────────────────────
  const send = async () => {
    if (busy || !wallet || !sendTo.trim() || !sendAmt) return;
    setBusy(true); setMsg('');
    try {
      const r = await fetch('/api/walletSend', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId: u.id, toAddress: sendTo.trim(), amount: Number(sendAmt) }),
      });
      const d = await r.json();
      if (d.error) throw new Error(d.error);
      // Update local balance immediately without waiting for a reload
      setWBal(d.newBalance);
      setU(p => ({ ...p, tokens: d.newBalance }));
      setMsg('✅ Sent successfully!');
      setSendTo(''); setSendAmt('');
      loadTx();
      setTimeout(() => { setMsg(''); setScreen('main'); }, 1800);
    } catch(e) { setMsg('❌ ' + (e.message || 'Send failed')); }
    finally    { setBusy(false); }
  };

  const loadTx = () => {
    fetch(`/api/walletTx?userId=${encodeURIComponent(u.id)}`)
      .then(r => r.json())
      .then(d => { if (d.txs) setTxHistory(d.txs); })
      .catch(() => {});
  };

  const copyAddr = async () => {
    try { await navigator.clipboard.writeText(wallet); } catch { /* ignore */ }
    setCopied(true); setTimeout(() => setCopied(false), 2000);
  };

  const back = () => { setScreen('main'); setMsg(''); };
  const fmt  = n => (n === null) ? null : Number(n).toLocaleString(undefined, {maximumFractionDigits:4});

  // ── Loading placeholder ────────────────────────────────────────────────────
  if (!wallet) return (
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'70px 24px',minHeight:320}}>
      <div style={{fontSize:54,marginBottom:20,animation:'float 2.5s ease-in-out infinite'}}>🪙</div>
      {creating
        ? <>
            <div style={{fontSize:15,fontWeight:700,color:C.white,marginBottom:12}}>Setting up your wallet…</div>
            <div style={{display:'flex',gap:7}}>
              {[0,1,2].map(i => <div key={i} style={{width:9,height:9,borderRadius:'50%',background:'#8b5cf6',animation:'dotPulse 1.2s ease infinite',animationDelay:`${i*0.22}s`}}/>)}
            </div>
          </>
        : <div style={{fontSize:13,color:'#f87171',textAlign:'center',lineHeight:1.6}}>{msg || 'Could not load wallet. Refresh to try again.'}</div>}
    </div>
  );

  // ── Send screen ────────────────────────────────────────────────────────────
  if (screen === 'send') return (
    <div style={{padding:'0 16px 32px',animation:'up .3s ease'}}>
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:24}}>
        <button onClick={back} style={{width:36,height:36,borderRadius:10,background:'rgba(255,255,255,.07)',border:'none',color:C.white,fontSize:18,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>←</button>
        <div style={{fontSize:17,fontWeight:800,color:C.white}}>Send Wish Coins</div>
      </div>
      <div style={{background:'linear-gradient(135deg,rgba(245,158,11,.12),rgba(249,115,22,.08))',border:'1px solid rgba(245,158,11,.25)',borderRadius:14,padding:'12px 16px',marginBottom:20,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span style={{fontSize:12,color:'rgba(255,255,255,.45)'}}>Available balance</span>
        <span style={{fontWeight:800,color:'#f59e0b',fontSize:18}}>{wishBal??'…'} <span style={{fontSize:12,opacity:.6}}>WISH</span></span>
      </div>
      <input style={{background:'rgba(255,255,255,.06)',border:'1px solid rgba(255,255,255,.1)',borderRadius:12,padding:'14px 16px',color:C.white,fontSize:14,width:'100%',outline:'none',marginBottom:12,boxSizing:'border-box'}}
        placeholder="Recipient wallet address" value={sendTo} onChange={e=>setSendTo(e.target.value)}/>
      <input style={{background:'rgba(255,255,255,.06)',border:'1px solid rgba(255,255,255,.1)',borderRadius:12,padding:'14px 16px',color:C.white,fontSize:22,fontWeight:700,width:'100%',outline:'none',marginBottom:20,boxSizing:'border-box'}}
        type="number" min="0" placeholder="0" value={sendAmt} onChange={e=>setSendAmt(e.target.value)}/>
      <button onClick={send} disabled={busy||!sendTo||!sendAmt||Number(sendAmt)<=0}
        style={{width:'100%',padding:'16px 0',background:(!sendTo||!sendAmt||Number(sendAmt)<=0)?'rgba(255,255,255,.06)':'linear-gradient(135deg,#f59e0b,#f97316)',border:'none',borderRadius:14,color:(!sendTo||!sendAmt||Number(sendAmt)<=0)?'rgba(255,255,255,.25)':'#fff',fontWeight:800,fontSize:16,cursor:(!sendTo||!sendAmt||Number(sendAmt)<=0)?'not-allowed':'pointer',opacity:busy?.7:1}}>
        {busy?'⏳ Sending…':'📤 Confirm Send'}
      </button>
      {msg && <div style={{marginTop:14,background:msg.startsWith('✅')?'rgba(52,211,153,.08)':'rgba(248,113,113,.08)',border:`1px solid ${msg.startsWith('✅')?'rgba(52,211,153,.25)':'rgba(248,113,113,.25)'}`,borderRadius:12,padding:'10px 14px',color:msg.startsWith('✅')?'#34d399':'#f87171',fontSize:12,fontFamily:'monospace'}}>{msg}</div>}
    </div>
  );

  // ── Receive screen ─────────────────────────────────────────────────────────
  if (screen === 'receive') return (
    <div style={{padding:'0 16px 32px',animation:'up .3s ease'}}>
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:24}}>
        <button onClick={back} style={{width:36,height:36,borderRadius:10,background:'rgba(255,255,255,.07)',border:'none',color:C.white,fontSize:18,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>←</button>
        <div style={{fontSize:17,fontWeight:800,color:C.white}}>Receive</div>
      </div>
      <div style={{background:'linear-gradient(145deg,#1a0833,#120f2e)',border:'1px solid rgba(139,92,246,.2)',borderRadius:22,padding:'24px 20px',textAlign:'center'}}>
        <div style={{display:'inline-block',padding:10,background:'#fff',borderRadius:18,marginBottom:20,boxShadow:'0 0 50px rgba(139,92,246,.35)'}}>
          <img src={`https://api.qrserver.com/v1/create-qr-code/?data=${wallet}&size=180x180&bgcolor=ffffff&color=1a0833&margin=8`}
            alt="QR" style={{display:'block',borderRadius:10,width:180,height:180}}/>
        </div>
        <div style={{fontSize:11,color:'#a78bfa',fontFamily:'monospace',wordBreak:'break-all',lineHeight:1.8,background:'rgba(139,92,246,.08)',borderRadius:12,padding:'10px 14px',marginBottom:20}}>
          {wallet}
        </div>
        <button onClick={copyAddr}
          style={{width:'100%',padding:'15px 0',background:copied?'linear-gradient(135deg,#34d399,#10b981)':'linear-gradient(135deg,#8b5cf6,#7c3aed)',border:'none',borderRadius:14,color:'#fff',fontWeight:800,fontSize:15,cursor:'pointer',transition:'all .25s',boxShadow:copied?'0 4px 20px rgba(52,211,153,.3)':'0 4px 20px rgba(139,92,246,.3)'}}>
          {copied ? '✓ Copied!' : '📋 Copy Address'}
        </button>
      </div>
    </div>
  );

  // ── Main screen ────────────────────────────────────────────────────────────
  return (
    <div style={{position:'relative',background:'#060612',minHeight:'100%',overflowX:'hidden',fontFamily:"'Outfit',sans-serif"}}>

      {/* Aurora canvas */}
      <canvas ref={auroraRef} style={{position:'absolute',top:0,left:0,width:'100%',height:'100%',pointerEvents:'none',zIndex:0}}/>

      {/* Noise grain overlay */}
      <svg style={{position:'absolute',top:0,left:0,width:'100%',height:'100%',pointerEvents:'none',zIndex:1,opacity:.025}} xmlns="http://www.w3.org/2000/svg">
        <filter id="wNoise"><feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/></filter>
        <rect width="100%" height="100%" filter="url(#wNoise)"/>
      </svg>

      {/* Scrollable content */}
      <div style={{position:'relative',zIndex:2,paddingBottom:32,animation:'up .3s ease'}}>


        {/* Header */}
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 20px 14px'}}>
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <div style={{width:40,height:40,borderRadius:12,overflow:'hidden',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',padding:0,boxShadow:'0 4px 20px rgba(245,158,11,.5), 0 0 0 1px rgba(245,158,11,.2)'}}><WishLogo size={40} radius={12}/></div>
            <div>
              <div style={{fontSize:9,color:'rgba(255,255,255,.3)',letterSpacing:'2px',textTransform:'uppercase',fontWeight:500,marginBottom:1}}>Your Balance</div>
              <div style={{fontSize:17,fontWeight:700,background:'linear-gradient(90deg,#e2d9f3,#fbbf24)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>Wish Wallet</div>
            </div>
          </div>
          <button onClick={()=>loadBalances(wallet)} title="Refresh"
            style={{width:36,height:36,borderRadius:10,background:'rgba(255,255,255,.05)',border:'1px solid rgba(255,255,255,.1)',color:'rgba(255,255,255,.6)',fontSize:18,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',animation:balLoading?'spin 1s linear infinite':'none',transition:'background .15s',fontFamily:'inherit'}}>↻</button>
        </div>

        {/* Hero balance card */}
        <div style={{margin:'0 16px',borderRadius:24,background:'linear-gradient(145deg,#12082e 0%,#0c1a3d 50%,#071e28 100%)',border:'1px solid rgba(255,255,255,.1)',boxShadow:'0 24px 60px rgba(0,0,0,.6), inset 0 0 0 1px rgba(255,255,255,.05)',position:'relative',overflow:'hidden'}}>
          {/* Top shimmer line */}
          <div style={{position:'absolute',top:0,left:'10%',right:'10%',height:1,background:'linear-gradient(90deg,transparent,rgba(245,158,11,.7),rgba(139,92,246,.7),transparent)',zIndex:3,pointerEvents:'none'}}/>

          {/* Main content */}
          <div style={{position:'relative',zIndex:4,padding:'24px 22px 20px',background:'linear-gradient(180deg,rgba(255,255,255,.04) 0%,transparent 100%)'}}>
            {/* Top: coin + balance */}
            <div style={{display:'flex',alignItems:'flex-start',gap:18,marginBottom:20}}>
              {/* Animated coin */}

              <div style={{position:'absolute',left:0,top:'15%',bottom:'15%',width:3,borderRadius:'0 3px 3px 0',background:'#f59e0b'}}/>
              <div style={{display:'flex',alignItems:'center',gap:14,padding:'16px 16px 16px 20px'}}>

                <div style={{flex:1}}><div style={{fontSize:15,fontWeight:700,color:'#fff'}}>Wish Coin</div></div>

              <div style={{position:'absolute',left:0,top:'15%',bottom:'15%',width:3,borderRadius:'0 3px 3px 0',background:'#9945FF'}}/>
              <div style={{display:'flex',alignItems:'center',gap:14,padding:'16px 16px 16px 20px'}}>
                <div style={{width:46,height:46,borderRadius:14,background:'rgba(153,69,255,.12)',border:'1px solid rgba(153,69,255,.3)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,fontWeight:900,color:'#9945FF',flexShrink:0}}>◎</div>

                  <div style={{fontSize:17,fontWeight:800,color:'#9945FF'}}>{balLoading&&solBal===null?<span style={{opacity:.4}}>…</span>:(solBal??'—')}</div>
                  <div style={{fontSize:11,fontWeight:600,color:'#34d399',marginTop:2}}>▲ 0.00%</div>

        {/* Activity tab */}
        {walletTab==='activity'&&(
          <div style={{padding:'0 16px',display:'flex',flexDirection:'column',gap:10}}>
            {txHistory.length===0
              ? <div style={{textAlign:'center',padding:'32px 0',color:'rgba(255,255,255,.2)',fontSize:13}}>No transactions yet</div>
              : txHistory.map(tx=>{
                  const isSent=tx.type==='sent';
                  const addr=tx.address||'';
                  const short=addr.length>10?addr.slice(0,5)+'…'+addr.slice(-5):addr||'—';
                  const date=new Date(tx.createdAt).toLocaleDateString(undefined,{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
                  return(
                    <div key={tx.id} style={{borderRadius:18,background:'rgba(255,255,255,.04)',border:'1px solid rgba(255,255,255,.07)',overflow:'hidden'}}>
                      <div style={{display:'flex',alignItems:'center',gap:14,padding:'14px 16px'}}>
                        <div style={{width:42,height:42,borderRadius:13,background:isSent?'rgba(244,67,54,.12)':'rgba(16,185,129,.12)',border:`1px solid ${isSent?'rgba(244,67,54,.3)':'rgba(16,185,129,.3)'}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,flexShrink:0,color:isSent?'#f87171':'#34d399',fontWeight:700}}>
                          {isSent?'↑':'↓'}
                        </div>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:14,fontWeight:600,color:'#fff'}}>{isSent?'Sent':'Received'}</div>

                        </div>

                          <div style={{fontSize:14,fontWeight:700,color:isSent?'#f87171':'#34d399'}}>{isSent?'−':'+'}{tx.amount}</div>
                          <div style={{fontSize:11,color:'rgba(255,255,255,.25)',marginTop:1}}>{date}</div>
                        </div>
                      </div>
                    </div>
                  );

            }

        )}

    </div>
  );
}

/* ═══════════════════════════════════════════════
   MAIN APP
═══════════════════════════════════════════════ */
function MainApp({user,onLogout,lang,setLang}){
  const [tab,setTab]       = useState("home");
  const [u,setU]           = useState({...user});
  const [logoutDlg,setLD]  = useState(false);
  const [tasksDone,setTD]  = useState({});
  const [joinsDone,setJD]  = useState({});
  const [adLeft,setAL]     = useState(5);
  const [adShowing,setAS]  = useState(false);
  const [adData,setAD]     = useState(null);
  const [spinning,setSpin]   = useState(false);
  const [spinResult,setSR]   = useState(null);
  const [spinAngle,setSA]    = useState(0);
  const [spinNextFree,setSNF]= useState(()=>Security.load('snf_'+user.id,0)||0); // epoch ms when next free spin is available
  const [extraSpins,setES]   = useState(0);   // additional spins earned by watching ads
  const [spinAdPopup,setSAP] = useState(false);
  const [mineStartedAt,setMSAt]= useState(0);        // epoch ms when session began (0 = no session)
  const [mineT,setMineT]       = useState(MINE_SESSION_S);
  const [mineReady,setMR]      = useState(false);
  const [mineStarted,setMS]    = useState(false);
  const [mineAdShow,setMAd]    = useState(false);
  // Test ad modal state
  const [testAdModal,setTestAdModal]         = useState(null);   // null | 'rewarded' | 'interstitial'
  const [testAdCountdown,setTestAdCountdown] = useState(0);
  const testAdCallbackRef                    = React.useRef(null);
  const [mineBoosts,setMineBoosts] = useState(0);
  const [adToast,setAdToast]       = useState('');   // brief confirmation toast after ad claim
  const [convSuccess,setConvS] = useState(false);  // flash "Converted!" feedback
  const [langMenu,setLM]      = useState(false);
  const [avatarPick,setAP]    = useState(false);
  const fileInputRef          = React.useRef(null);
  const [picCapture,setPC]    = useState(false);
  const [editName,setEN]      = useState(user.name);
  const [editEmail,setEE]     = useState(user.email);
  const [editPass,setEP]      = useState("");
  const [editCurrPass,setECP] = useState("");
  const [profileMsg,setPMsg]  = useState("");
  const [sidebarOpen, setSO]  = useState(false);
  const [sidebarView, setSV]  = useState(null);
  const [refCopied,  setRefCopied] = useState("");
  const [annList, setAnnList]     = useState([]);
  const [annToast, setAnnToast]   = useState(null);
  const annToastShown = React.useRef(false);
  const [editingField, setEF] = useState(null);
  // Guard: auto-save must not fire until the initial DB load has finished.
  // Without this, the stale localStorage user (saved at login time) would be
  // written back to the DB 2 seconds after every page refresh, overwriting any
  // points/state that were saved to the DB since that last login.
  const dbLoaded = React.useRef(false);
  // Always-current mirror of u — lets setTimeout callbacks (e.g. doSpin's
  // 4.2s timer) read the latest pts/usd without stale-closure issues.
  const uRef = React.useRef(u);
  useEffect(()=>{ uRef.current = u; });
  const L = k => t$(lang,k);
  const dir = (LANGS[lang]||LANGS.en).dir;

  useEffect(()=>{
    if(!mineStarted||mineReady)return;
    const iv=setInterval(()=>setMineT(t=>{if(t<=1){setMR(true);return 0;}return t-1;}),1000);
    return()=>clearInterval(iv);
  },[mineStarted,mineReady]);

  // Fetch announcements from server and show toast for new ones
  useEffect(()=>{
    function loadAnns(){
      fetch('/api/announcements')
        .then(r=>r.ok?r.json():null)
        .then(d=>{
          if(!d?.announcements) return;
          setAnnList(d.announcements);
          const lastSeen = Number(localStorage.getItem('wish_ann_seen')||0);
          const fresh = d.announcements.filter(a=>new Date(a.sentAt).getTime()>lastSeen);
          if(fresh.length>0 && !annToastShown.current){
            annToastShown.current = true;
            setAnnToast(fresh[0]);
            setTimeout(()=>setAnnToast(null), 7000);
          }
        })
        .catch(()=>{});
    }
    loadAnns();
    const iv = setInterval(loadAnns, 60000);
    return ()=>clearInterval(iv);
  },[]);

  // Load saved progress from MongoDB on first mount
  useEffect(()=>{
    fetch(`/api/user?email=${encodeURIComponent(user.email)}`)
      .then(r=>r.json())
      .then(d=>{
        // Always unlock auto-save, even when the user isn't in the DB yet
        // (demo/in-memory users). Without this the flag stays false and saves
        // are permanently blocked for those accounts.
        dbLoaded.current = true;
        if(!d.user) return;
        const {pts,usd,avatar,name,pass:dbPass,tasksDone:td,adLeft:al,adDate,spinAngle:sa,
               spinNextFree:snf,extraSpins:es,lang:dbLang,tokens:dbTokens,
               refCode:dbRefCode,refBy:dbRefBy,refPts:dbRefPts,refs:dbRefs,
               walletAddress:dbWa}=d.user;
        // Restore language preference from DB (cross-device)
        if(dbLang){ setLang(dbLang); Security.save('lang',dbLang); }
        setU(p=>({...p,
          // Prefer the DB value, but never let a DB 0 overwrite a locally-earned
          // value that was already synced to localStorage.  Saves bring the DB
          // value UP; a DB value lower than localStorage means a save failed.
          pts: Math.max(pts ?? 0, p.pts),
          usd: Math.max(usd ?? 0, p.usd),
          tokens: dbTokens ?? p.tokens ?? 0,
          avatar:avatar||p.avatar,
          name:name||p.name,
          pass:dbPass||p.pass,
          refCode:       dbRefCode||p.refCode||null,
          refBy:         dbRefBy  ||p.refBy  ||null,
          refPts:        Math.max(dbRefPts??0, p.refPts??0),
          refs:          dbRefs   ||p.refs   ||[],
          walletAddress: dbWa     ||p.walletAddress||null,
        }));
        const today=new Date().toDateString();
        if(al!=null) setAL(al);
        if(sa!=null) setSA(sa);
        // Take max(DB, local) — prevents a stale DB 0 from overwriting a valid local cooldown.
        setSNF(p=>Math.max(snf??0, p));
        if(es!=null)  setES(es);
        // ── Restore task state + mining session ──────────────────────────────
        // Mining session start time is stored as tasksDone.__mine_startedAt
        // (a reserved JSONB key) so it persists without any schema migration.
        if(td){
          setTD(td);
          const msa = td.__mine_startedAt;
          const mb  = td.__mine_boosts || 0;
          if(msa){
            const effSession = td.__mine_eff_session || MINE_SESSION_S;
            const elapsedS = Math.floor((Date.now() - msa) / 1000);
            setMSAt(msa);
            setMineBoosts(mb);
            if(elapsedS >= effSession){
              // Session finished while user was away — ready to claim
              setMineT(0); setMS(true); setMR(true);
            } else {
              // Session still running — resume from correct position
              setMineT(effSession - elapsedS); setMS(true); setMR(false);
            }
          }
        }
      })
      .catch(()=>{ dbLoaded.current = true; });  // unlock even on network error
  },[]);

  // Keep last_user in localStorage in sync so page refreshes restore the session.
  useEffect(()=>{
    if(!dbLoaded.current) return;
    Security.save('last_user', {...u});
  },[u.pts,u.usd,u.name,u.avatar,u.pass]);

  // Persist spinNextFree to localStorage immediately on change so it survives
  // a page refresh even if the DB save hasn't completed yet.
  useEffect(()=>{
    if(spinNextFree>0) Security.save('snf_'+u.id, spinNextFree);
  },[spinNextFree]);

  // Auto-save progress (debounced 2s after last change).
  // avatar is intentionally excluded — it is saved explicitly after upload
  // to avoid sending a huge base64 data-URL that exceeds Supabase's body limit.
  useEffect(()=>{
    // Skip until the initial DB load has applied fresh server state.
    // Without this guard the stale localStorage snapshot (saved at login time)
    // would overwrite the DB 2 seconds after every page refresh.
    if(!dbLoaded.current) return;
    const t=setTimeout(()=>{
      fetch('/api/user',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({id:u.id,email:u.email,name:u.name,pass:u.pass,pts:u.pts,usd:u.usd,
          avatar:u.avatar,
          tokens:u.tokens??0,tasksDone,adLeft,adDate:new Date().toDateString(),spinAngle,spinNextFree,extraSpins,
          refCode:u.refCode||null,refPts:u.refPts??0,refs:u.refs??[]})
      }).then(r=>r.json()).then(d=>{if(!d.success)console.error('[auto-save]',d);}).catch(e=>console.error('[auto-save]',e));
    },2000);
    return()=>clearTimeout(t);
  },[u.pts,u.usd,u.name,u.avatar,u.pass,u.refPts,tasksDone,adLeft,spinAngle,spinNextFree,extraSpins]);

  const fmtTime=s=>{const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;return`${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(sec).padStart(2,"0")}`;};
  const addPts=(pts,usd=0)=>setU(p=>({...p,pts:p.pts+pts,usd:+(p.usd+usd).toFixed(2)}));

  // Immediately save specific profile fields to DB + localStorage.
  // Used for name/password changes so a quick refresh doesn't revert them
  // (the 2s auto-save debounce is too slow for interactive saves).
  const saveProfileField = (fields) => {
    setU(p => ({...p, ...fields}));
    Security.save('last_user', {...u, ...fields});
    fetch('/api/user', {method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({id: u.id, email: u.email, ...fields})
    }).catch(()=>{});
  };

  // Pts accumulated in the current mining session (updates every second as mineT ticks).
  // elapsed-time pts + boost pts — transferred to balance only on Claim.
  const mineElapsed = MINE_SESSION_S - mineT;
  const mineAccum = mineStarted
    ? Math.floor(mineElapsed * MINE_PTS_HOUR / 3600) + mineBoosts * MINE_BOOST_PTS
    : 0;

  const watchAd=()=>{
    if(adLeft<=0) return;
    const today = new Date().toDateString();

    // ── Build or restore today's 5-ad sequence ──────────────────────────────
    // Sequence is ['time', …4 shuffled entries of 1×time + 3×pts]
    // Generated once per day, stored in tasksDone so it survives refresh.
    // adLeft counts DOWN: 5→4→3→2→1; index into seq = 5 - adLeft.
    let seq;
    if(tasksDone.__ad_seq_date === today &&
       Array.isArray(tasksDone.__ad_seq) &&
       tasksDone.__ad_seq.length === 5){
      seq = tasksDone.__ad_seq;
    } else {
      // Generate fresh sequence — first slot is ALWAYS 'time'
      const pool = ['time','pts','pts','pts'];
      for(let i=pool.length-1;i>0;i--){
        const j=Math.floor(Math.random()*(i+1));
        [pool[i],pool[j]]=[pool[j],pool[i]];
      }
      seq = ['time',...pool];
      // Save sequence immediately (before the countdown starts)
      const newTD = {...tasksDone, __ad_seq_date:today, __ad_seq:seq};
      setTD(newTD);
      fetch('/api/user',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({id:u.id,email:u.email,tasksDone:newTD})
      }).catch(()=>{});
    }

    const idx   = 5 - adLeft;                // 0 = first, 4 = last
    const type  = seq[idx] || 'pts';
    const reward = buildAdReward(type);       // computed NOW, before countdown

    // Store reward in ref so callback never has a stale-closure problem
    testAdCallbackRef.current = null;         // reset before reuse
    showRewardedAd(()=>{
      setAD(reward);
      setAS(true);
    });
  };
  // Helper: show a toast for 3 seconds then clear it
  const showAdToast=(msg)=>{ setAdToast(msg); setTimeout(()=>setAdToast(''),3000); };

  const claimAd=()=>{
    const newAL=adLeft-1;
    setAL(p=>p-1); setAS(false);
    if(adData.type==='time'){
      const deductSecs=adData.mins*60;
      if(mineStarted&&!mineReady){
        // Mining running — apply deduction directly to live countdown
        const newT=Math.max(0,mineT-deductSecs);
        setMineT(newT);
        if(newT<=0) setMR(true);
        showAdToast(`⏱️ Mining timer reduced by ${adData.mins} min!`);
        fetch('/api/user',{method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({id:u.id,email:u.email,adLeft:newAL,adDate:new Date().toDateString()})
        }).catch(()=>{});
      } else if(!mineStarted){
        // Mining not started — bank the seconds; applied when mining begins
        const banked=(tasksDone.__pre_mine_deduct||0)+deductSecs;
        const newTD={...tasksDone,__pre_mine_deduct:banked};
        setTD(newTD);
        showAdToast(`⏱️ −${adData.mins} min saved! Applied when you start mining.`);
        fetch('/api/user',{method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({id:u.id,email:u.email,adLeft:newAL,adDate:new Date().toDateString(),tasksDone:newTD})
        }).catch(()=>{});
      } else {
        fetch('/api/user',{method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({id:u.id,email:u.email,adLeft:newAL,adDate:new Date().toDateString()})
        }).catch(()=>{});
      }
    } else {
      const newPts=u.pts+adData.pts;
      const newUsd=+(u.usd+adData.pts*USD_PER_POINT).toFixed(2);
      addPts(adData.pts);
      showAdToast(`⭐ +${adData.pts.toLocaleString()} pts added to your balance!`);
      fetch('/api/user',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({id:u.id,email:u.email,pts:newPts,usd:newUsd,adLeft:newAL,adDate:new Date().toDateString()})
      }).catch(()=>{});
    }
    setAD(null);
  };
  const doSpin=()=>{
    if(spinning) return;
    const now=Date.now();
    const hasFree=now>=spinNextFree;
    const totalSpins=(hasFree?1:0)+extraSpins;
    if(totalSpins<=0){setSAP(true);return;}
    setSpin(true);setSR(null);
    // Pre-compute post-spin values now, while state is fresh.
    const newSnf=hasFree?now+24*60*60*1000:spinNextFree;
    const newEs=hasFree?extraSpins:extraSpins-1;

    // __spin_milestone_at: the attempt number that triggers the 20K jackpot.
    // Jackpot fires every 24–25 spins; after each jackpot the next threshold
    // is set 24–25 spins ahead so the cycle continues indefinitely.
    const prevAttempts  = tasksDone.__spin_attempts  || 0;
    const milestoneAt   = tasksDone.__spin_milestone_at
                          || (24 + Math.floor(Math.random() * 2));  // 24 or 25
    const newAttempts   = prevAttempts + 1;
    const isJackpot     = newAttempts >= milestoneAt;
    const newMilestoneAt= isJackpot
                          ? newAttempts + 24 + Math.floor(Math.random() * 2)
                          : milestoneAt;

    // Choose slot: jackpot → slot 7 (20 000 pts); otherwise random from 0–6.
    const i = isJackpot
      ? SPIN_JACKPOT_IDX
      : Math.floor(Math.random() * SPIN_JACKPOT_IDX);   // 0 – 6 inclusive

    if(isJackpot) console.log(`[Spin] 🎉 JACKPOT triggered on attempt #${newAttempts}`);

    // Persist spin consumption + updated attempt counters immediately.
    const newTD = {...tasksDone,
      __spin_attempts:   newAttempts,
      __spin_milestone_at: newMilestoneAt,
    };

      body:JSON.stringify({id:u.id,email:u.email,spinNextFree:newSnf,extraSpins:newEs,tasksDone:newTD})
    }).catch(()=>{});

      const newUsd=+(cu.usd+SPIN_USD[i]*0.01).toFixed(2);
      addPts(SPIN_PTS[i],SPIN_USD[i]*0.01);
      setSR({pts:SPIN_PTS[i],usd:SPIN_USD[i]*0.01,isJackpot});
      setSpin(false);

      fetch('/api/user',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({id:cu.id,email:cu.email,pts:newPts,usd:newUsd,
          spinAngle:newAngle,spinNextFree:newSnf,extraSpins:newEs,tasksDone:newTD})
      })
      .then(r=>r.json())
      .then(d=>{ if(!d.success) console.error('[spin save]',d); })
      .catch(e=>console.error('[spin save network]',e));
