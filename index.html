<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wish App</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #0d0b1e; font-family: 'Plus Jakarta Sans', sans-serif; }
        @keyframes up { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>
    <script>
        const { useState, useEffect, useRef } = React;

        // Colors
        const C = {
            bg: "#0d0b1e",
            s1: "#13102a",
            s2: "#191534",
            brand: "#8b5cf6",
            brandLt: "#a78bfa",
            brandDk: "#6d28d9",
            green: "#10b981",
            gold: "#f59e0b",
            red: "#ef4444",
            muted: "rgba(255,255,255,.4)"
        };

        // ========== AUTH SCREEN ==========
        function AuthScreen({ onLogin }) {
            const [mode, setMode] = useState("welcome");
            const [method, setMethod] = useState("email");
            const [form, setForm] = useState({ name: "", email: "", phone: "", pass: "", conf: "" });
            const [errors, setErrors] = useState({});
            const [loading, setLoading] = useState(false);
            const [otpStep, setOtpStep] = useState(false);
            const [otpInput, setOtpInput] = useState(["", "", "", "", "", ""]);
            const [otpError, setOtpError] = useState("");
            const [otpSending, setOtpSending] = useState(false);
            const [resendTimer, setResendTimer] = useState(60);
            const [canResend, setCanResend] = useState(false);
            const [pendingUser, setPendingUser] = useState(null);
            const otpRefs = [useRef(), useRef(), useRef(), useRef(), useRef(), useRef()];

            // Timer
            useEffect(() => {
                if (!otpStep || resendTimer <= 0) return;
                const interval = setInterval(() => {
                    setResendTimer(prev => {
                        if (prev <= 1) {
                            setCanResend(true);
                            return 0;
                        }
                        return prev - 1;
                    });
                }, 1000);
                return () => clearInterval(interval);
            }, [otpStep, resendTimer]);

            const sendOtp = (userData) => {
                setPendingUser(userData);
                setOtpStep(true);
                setOtpInput(["", "", "", "", "", ""]);
                setOtpError("");
                setOtpSending(true);
                setResendTimer(60);
                setCanResend(false);

                setTimeout(() => {
                    const otp = Math.floor(100000 + Math.random() * 900000).toString();
                    console.log('📧 Your OTP:', otp);
                    setOtpError(`Test OTP: ${otp} (check console)`);
                    setOtpSending(false);
                    setTimeout(() => otpRefs[0].current?.focus(), 100);
                }, 1000);
            };

            const verifyOtp = () => {
                const code = otpInput.join('');
                if (code.length < 6) {
                    setOtpError('Enter all 6 digits');
                    return;
                }
                setOtpSending(true);
                
                setTimeout(() => {
                    const newUser = {
                        id: 'u' + Date.now(),
                        name: pendingUser.name,
                        email: pendingUser.email,
                        phone: pendingUser.phone || '',
                        pass: pendingUser.pass,
                        pts: 1250,
                        usd: 1.25,
                        joined: new Date().toLocaleDateString(),
                        country: '🌍',
                        isAdmin: false,
                        active: true
                    };
                    
                    const users = JSON.parse(localStorage.getItem('wish_users') || '[]');
                    users.push(newUser);
                    localStorage.setItem('wish_users', JSON.stringify(users));
                    onLogin(newUser);
                    setOtpSending(false);
                }, 1000);
            };

            const resendOtp = () => {
                if (!canResend) return;
                setOtpInput(["", "", "", "", "", ""]);
                setOtpError("");
                setResendTimer(60);
                setCanResend(false);
                setOtpSending(true);
                
                setTimeout(() => {
                    const otp = Math.floor(100000 + Math.random() * 900000).toString();
                    console.log('📧 New OTP:', otp);
                    setOtpError(`New OTP: ${otp} (check console)`);
                    setOtpSending(false);
                    setTimeout(() => otpRefs[0].current?.focus(), 100);
                }, 1000);
            };

            const handleOtpChange = (index, value) => {
                if (!/^\d?$/.test(value)) return;
                const newOtp = [...otpInput];
                newOtp[index] = value;
                setOtpInput(newOtp);
                if (value && index < 5) otpRefs[index + 1].current?.focus();
            };

            const handleOtpKeyDown = (index, e) => {
                if (e.key === 'Backspace' && !otpInput[index] && index > 0) {
                    otpRefs[index - 1].current?.focus();
                }
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                setLoading(true);
                
                setTimeout(() => {
                    if (mode === 'login') {
                        const users = JSON.parse(localStorage.getItem('wish_users') || '[]');
                        const user = users.find(u => 
                            (u.email === form.email || u.phone === form.phone) && u.pass === form.pass
                        );
                        if (user) {
                            onLogin(user);
                        } else {
                            setErrors({ pass: 'Invalid credentials' });
                        }
                    } else {
                        if (!form.name || !form.email || !form.pass) {
                            setErrors({ name: 'All fields required' });
                            setLoading(false);
                            return;
                        }
                        sendOtp({
                            name: form.name,
                            email: form.email,
                            phone: form.phone,
                            pass: form.pass
                        });
                    }
                    setLoading(false);
                }, 500);
            };

            // OTP Screen
            if (otpStep) {
                return React.createElement('div', { style: { minHeight: '100vh', background: C.bg, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '20px' } },
                    React.createElement('div', { style: { background: C.s1, padding: '30px', borderRadius: '20px', width: '100%', maxWidth: '380px', border: '1px solid rgba(139,92,246,.2)' } },
                        React.createElement('div', { style: { textAlign: 'center', marginBottom: '20px' } },
                            React.createElement('div', { style: { fontSize: '48px', marginBottom: '10px' } }, '✨'),
                            React.createElement('div', { style: { fontSize: '20px', fontWeight: 'bold', color: '#fff' } }, 'Verify Code'),
                            React.createElement('div', { style: { fontSize: '12px', color: C.muted, marginTop: '5px' } }, 'Enter the 6-digit code')
                        ),
                        React.createElement('div', { style: { display: 'flex', gap: '8px', justifyContent: 'center', marginBottom: '20px' } },
                            otpInput.map((v, i) => 
                                React.createElement('input', {
                                    key: i,
                                    ref: otpRefs[i],
                                    type: 'text',
                                    maxLength: 1,
                                    value: v,
                                    onChange: (e) => handleOtpChange(i, e.target.value),
                                    onKeyDown: (e) => handleOtpKeyDown(i, e),
                                    style: {
                                        width: '45px',
                                        height: '50px',
                                        textAlign: 'center',
                                        fontSize: '20px',
                                        background: '#0d0b1e',
                                        border: '1px solid ' + (v ? C.brand : 'rgba(139,92,246,.2)'),
                                        borderRadius: '10px',
                                        color: '#fff'
                                    }
                                })
                            )
                        ),
                        React.createElement('div', { style: { textAlign: 'center', marginBottom: '15px', fontSize: '13px', color: C.gold } },
                            resendTimer > 0 ? `Code expires in ${resendTimer}s` : 'Code expired!'
                        ),
                        otpError && React.createElement('div', { style: { background: 'rgba(239,68,68,.1)', border: '1px solid rgba(239,68,68,.2)', borderRadius: '8px', padding: '10px', marginBottom: '15px', color: '#f87171', fontSize: '12px', textAlign: 'center' } }, otpError),
                        React.createElement('button', {
                            onClick: verifyOtp,
                            disabled: otpSending,
                            style: {
                                width: '100%',
                                padding: '14px',
                                background: 'linear-gradient(135deg,#8b5cf6,#6d28d9)',
                                border: 'none',
                                borderRadius: '12px',
                                color: '#fff',
                                fontSize: '15px',
                                fontWeight: 'bold',
                                cursor: 'pointer',
                                marginBottom: '10px'
                            }
                        }, otpSending ? 'Verifying...' : 'Verify'),
                        React.createElement('button', {
                            onClick: resendOtp,
                            disabled: !canResend,
                            style: {
                                width: '100%',
                                padding: '10px',
                                background: 'transparent',
                                border: 'none',
                                color: canResend ? C.brandLt : C.muted,
                                cursor: canResend ? 'pointer' : 'default',
                                fontSize: '13px',
                                textDecoration: 'underline'
                            }
                        }, canResend ? 'Resend Code' : `Resend in ${resendTimer}s`),
                        React.createElement('button', {
                            onClick: () => { setOtpStep(false); setPendingUser(null); },
                            style: {
                                width: '100%',
                                padding: '10px',
                                background: 'transparent',
                                border: 'none',
                                color: C.muted,
                                cursor: 'pointer',
                                fontSize: '12px',
                                marginTop: '10px'
                            }
                        }, '← Back')
                    )
                );
            }

            // Welcome Screen
            if (mode === 'welcome') {
                return React.createElement('div', { style: { minHeight: '100vh', background: C.bg, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: '20px', animation: 'up 0.3s ease' } },
                    React.createElement('div', { style: { textAlign: 'center', marginBottom: '40px' } },
                        React.createElement('div', { style: { fontSize: '72px', marginBottom: '20px' } }, '✨'),
                        React.createElement('div', { style: { fontSize: '36px', fontWeight: 'bold', color: '#fff', marginBottom: '10px' } }, 'Wish'),
                        React.createElement('div', { style: { fontSize: '16px', color: C.muted } }, 'Earn & Reward Platform')
                    ),
                    React.createElement('div', { style: { width: '100%', maxWidth: '300px' } },
                        React.createElement('button', { onClick: () => setMode('login'), style: { width: '100%', padding: '15px', background: 'linear-gradient(135deg,#8b5cf6,#6d28d9)', border: 'none', borderRadius: '12px', color: '#fff', fontSize: '16px', fontWeight: 'bold', cursor: 'pointer', marginBottom: '10px' } }, 'Sign In'),
                        React.createElement('button', { onClick: () => setMode('register'), style: { width: '100%', padding: '15px', background: 'rgba(255,255,255,.05)', border: '1px solid rgba(139,92,246,.2)', borderRadius: '12px', color: '#fff', fontSize: '16px', fontWeight: 'bold', cursor: 'pointer' } }, 'Create Account')
                    )
                );
            }

            // Login/Register Form
            return React.createElement('div', { style: { minHeight: '100vh', background: C.bg, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '20px' } },
                React.createElement('div', { style: { background: C.s1, padding: '30px', borderRadius: '20px', width: '100%', maxWidth: '350px', border: '1px solid rgba(139,92,246,.2)' } },
                    React.createElement('button', { onClick: () => setMode('welcome'), style: { background: 'none', border: 'none', color: C.muted, fontSize: '14px', cursor: 'pointer', marginBottom: '15px' } }, '← Back'),
                    React.createElement('h2', { style: { color: '#fff', marginBottom: '20px' } }, mode === 'login' ? 'Welcome Back' : 'Create Account'),
                    
                    mode === 'register' && React.createElement('input', {
                        type: 'text',
                        placeholder: 'Full Name',
                        value: form.name,
                        onChange: (e) => setForm({...form, name: e.target.value}),
                        style: { width: '100%', padding: '12px', marginBottom: '15px', background: '#0d0b1e', border: '1px solid rgba(139,92,246,.2)', borderRadius: '10px', color: '#fff' }
                    }),

                    React.createElement('div', { style: { display: 'flex', gap: '10px', marginBottom: '15px' } },
                        ['email', 'phone'].map(m => 
                            React.createElement('button', {
                                key: m,
                                onClick: () => setMethod(m),
                                style: {
                                    flex: 1,
                                    padding: '8px',
                                    background: method === m ? C.brand : 'transparent',
                                    border: '1px solid ' + (method === m ? C.brand : 'rgba(139,92,246,.2)'),
                                    borderRadius: '8px',
                                    color: method === m ? '#fff' : C.muted,
                                    cursor: 'pointer'
                                }
                            }, m === 'email' ? '📧 Email' : '📱 Phone')
                        )
                    ),

                    React.createElement('input', {
                        type: method === 'email' ? 'email' : 'tel',
                        placeholder: method === 'email' ? 'your@email.com' : '+123456789',
                        value: method === 'email' ? form.email : form.phone,
                        onChange: (e) => setForm({...form, [method === 'email' ? 'email' : 'phone']: e.target.value}),
                        style: { width: '100%', padding: '12px', marginBottom: '15px', background: '#0d0b1e', border: '1px solid rgba(139,92,246,.2)', borderRadius: '10px', color: '#fff' }
                    }),

                    React.createElement('input', {
                        type: 'password',
                        placeholder: 'Password',
                        value: form.pass,
                        onChange: (e) => setForm({...form, pass: e.target.value}),
                        style: { width: '100%', padding: '12px', marginBottom: '15px', background: '#0d0b1e', border: '1px solid rgba(139,92,246,.2)', borderRadius: '10px', color: '#fff' }
                    }),

                    mode === 'register' && React.createElement('input', {
                        type: 'password',
                        placeholder: 'Confirm Password',
                        value: form.conf,
                        onChange: (e) => setForm({...form, conf: e.target.value}),
                        style: { width: '100%', padding: '12px', marginBottom: '20px', background: '#0d0b1e', border: '1px solid rgba(139,92,246,.2)', borderRadius: '10px', color: '#fff' }
                    }),

                    errors.pass && React.createElement('div', { style: { color: C.red, fontSize: '12px', marginBottom: '10px' } }, errors.pass),

                    React.createElement('button', {
                        onClick: handleSubmit,
                        disabled: loading,
                        style: {
                            width: '100%',
                            padding: '14px',
                            background: loading ? 'rgba(139,92,246,.5)' : 'linear-gradient(135deg,#8b5cf6,#6d28d9)',
                            border: 'none',
                            borderRadius: '12px',
                            color: '#fff',
                            fontSize: '16px',
                            fontWeight: 'bold',
                            cursor: loading ? 'wait' : 'pointer'
                        }
                    }, loading ? 'Please wait...' : (mode === 'login' ? 'Sign In' : 'Create Account'))
                )
            );
        }

        // ========== MAIN APP ==========
        function MainApp({ user, onLogout }) {
            return React.createElement('div', { style: { minHeight: '100vh', background: C.bg, color: '#fff', padding: '20px' } },
                React.createElement('div', { style: { maxWidth: '400px', margin: '0 auto' } },
                    React.createElement('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '20px' } },
                        React.createElement('div', { style: { display: 'flex', alignItems: 'center', gap: '10px' } },
                            React.createElement('div', { style: { width: '40px', height: '40px', borderRadius: '10px', background: 'linear-gradient(135deg,#8b5cf6,#ec4899)', display: 'flex', alignItems: 'center', justifyContent: 'center' } }, '✨'),
                            React.createElement('div', null,
                                React.createElement('div', { style: { fontWeight: 'bold' } }, 'Welcome,', ' ', user.name),
                                React.createElement('div', { style: { fontSize: '12px', color: C.muted } }, user.email || user.phone)
                            )
                        ),
                        React.createElement('button', { onClick: onLogout, style: { padding: '8px 12px', background: 'rgba(239,68,68,.1)', border: '1px solid rgba(239,68,68,.2)', borderRadius: '8px', color: '#f87171', cursor: 'pointer' } }, 'Logout')
                    ),
                    React.createElement('div', { style: { background: C.s1, borderRadius: '16px', padding: '20px', border: '1px solid rgba(139,92,246,.1)', marginBottom: '20px' } },
                        React.createElement('div', { style: { fontSize: '14px', color: C.muted, marginBottom: '5px' } }, 'Total Points'),
                        React.createElement('div', { style: { fontSize: '36px', fontWeight: 'bold' } }, user.pts.toLocaleString()),
                        React.createElement('div', { style: { fontSize: '12px', color: C.green, marginTop: '5px' } }, '≈ $' + (user.pts * 0.001).toFixed(2))
                    ),
                    React.createElement('div', { style: { background: C.s1, borderRadius: '16px', padding: '20px', border: '1px solid rgba(139,92,246,.1)' } },
                        React.createElement('div', { style: { fontSize: '14px', color: C.muted, marginBottom: '10px' } }, 'Quick Stats'),
                        React.createElement('div', { style: { display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '10px' } },
                            React.createElement('div', { style: { padding: '10px', background: 'rgba(139,92,246,.1)', borderRadius: '8px', textAlign: 'center' } }, '📊 Mining'),
                            React.createElement('div', { style: { padding: '10px', background: 'rgba(139,92,246,.1)', borderRadius: '8px', textAlign: 'center' } }, '🎮 Spins'),
                            React.createElement('div', { style: { padding: '10px', background: 'rgba(139,92,246,.1)', borderRadius: '8px', textAlign: 'center' } }, '📋 Tasks'),
                            React.createElement('div', { style: { padding: '10px', background: 'rgba(139,92,246,.1)', borderRadius: '8px', textAlign: 'center' } }, '🏆 Leaderboard')
                        )
                    )
                )
            );
        }

        // ========== ROOT APP ==========
        function App() {
            const [user, setUser] = useState(null);
            
            useEffect(() => {
                const saved = localStorage.getItem('wish_current_user');
                if (saved) {
                    try {
                        setUser(JSON.parse(saved));
                    } catch (e) {}
                }
            }, []);

            const handleLogin = (userData) => {
                setUser(userData);
                localStorage.setItem('wish_current_user', JSON.stringify(userData));
            };

            const handleLogout = () => {
                setUser(null);
                localStorage.removeItem('wish_current_user');
            };

            if (!user) {
                return React.createElement(AuthScreen, { onLogin: handleLogin });
            }

            return React.createElement(MainApp, { user: user, onLogout: handleLogout });
        }

        // Render
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
