      body:"This weekend only, every ad you watch earns 2× points…",
      audience:{ filter:"active", countries:[], minPts:"", maxPts:"" },
      recipientCount:3, status:"sent",
      sentAt:"2025-03-15T08:30:00Z", sentBy:"admin@wish.com",
      sent:3, failed:0,
    },
    {
      id:"bcast_demo3", type:"warning", channel:"in_app",
      subject:"Scheduled maintenance — Saturday 2 AM UTC",
      body:"The platform will be down for ~30 minutes…",
      audience:{ filter:"all", countries:[], minPts:"", maxPts:"" },
      recipientCount:4, status:"scheduled",
      sentAt:null, scheduledFor:"2025-04-05T02:00:00Z", sentBy:"admin@wish.com",
      sent:0, failed:0,
    },
  ]);

  const preview = filterAudience(users, audience);
  const countries = uniqueCountries(users);
  const typeInfo    = BROADCAST_TYPES.find(t => t.id === type);
  const channelInfo = BROADCAST_CHANNELS.find(c => c.id === channel);
  const bodyLimit   = channel === "in_app" ? 280 : 5000;
  const canSend     = subject.trim() && body.trim() && preview.length > 0
                      && (sendMode === "now" || scheduledFor);

  const doSend = async () => {
    setConfirm(false);
    setSending(true);
    setSR(null);

    const payload = {
      subject: subject.trim(),
      body: body.trim(),
      type, channel,
      audience,
      scheduledFor: sendMode === "scheduled" ? scheduledFor : null,
      sentBy: adminUser.email,
    };

    try {
      const res  = await fetch("/api/broadcast", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });
      const json = await res.json();
      if (!json.success) throw new Error(json.error || `HTTP ${res.status}`);

      const entry = {
        id: `bcast_${Date.now()}`, type, channel, subject: subject.trim(), body: body.trim(),
        audience: { ...audience },
        recipientCount: preview.length,
        status: sendMode === "scheduled" ? "scheduled" : "sent",
        sentAt: sendMode === "now" ? new Date().toISOString() : null,
        scheduledFor: sendMode === "scheduled" ? scheduledFor : null,
        sentBy: adminUser.email,
        sent: json.sent ?? 0, failed: json.failed ?? 0,
        note: json.note,
      };
      setHistory(h => [entry, ...h]);
      setSR({ ok: true, sent: json.sent, failed: json.failed, note: json.note, source: "live" });
      setSubject(""); setBody("");
    } catch (err) {
      // Demo fallback — simulate delivery
      if (err.message.includes("fetch") || err.message.startsWith("HTTP 5") || err.message.startsWith("HTTP 4")) {
        await new Promise(r => setTimeout(r, 1400));
        const failed = Math.floor(preview.length * 0.05); // 5% simulated fail rate
        const sent   = preview.length - failed;
        const entry  = {
          id: `bcast_${Date.now()}`, type, channel, subject: subject.trim(), body: body.trim(),
          audience: { ...audience },
          recipientCount: preview.length,
          status: sendMode === "scheduled" ? "scheduled" : "sent",
          sentAt: sendMode === "now" ? new Date().toISOString() : null,
          scheduledFor: sendMode === "scheduled" ? scheduledFor : null,
          sentBy: adminUser.email,
          sent, failed, source: "demo",
        };
        setHistory(h => [entry, ...h]);
        setSR({ ok: true, sent, failed, source: "demo" });
        setSubject(""); setBody("");
      } else {
        setSR({ ok: false, error: err.message, source: "live" });
      }
    } finally {
      setSending(false);
    }
  };

  // ── audience description for history / confirm dialog ──
  const audienceLabel = (a) => {
    const parts = [];
    parts.push(a.filter === "active" ? "Active users" : a.filter === "inactive" ? "Inactive users" : "All users");
    if (a.countries?.length) parts.push(a.countries.join(" "));
    if (a.minPts !== "" && a.minPts != null) parts.push(`≥ ${Number(a.minPts).toLocaleString()} pts`);
    if (a.maxPts !== "" && a.maxPts != null) parts.push(`≤ ${Number(a.maxPts).toLocaleString()} pts`);
    return parts.join(" · ");
  };

  const statusStyle = (status) => ({
    sent:      { bg:"rgba(16,185,129,.12)",  color:C.green, border:"rgba(16,185,129,.3)",  label:"Sent" },
    scheduled: { bg:"rgba(6,182,212,.1)",    color:C.cyan,  border:"rgba(6,182,212,.3)",   label:"Scheduled" },
    failed:    { bg:"rgba(239,68,68,.1)",    color:C.red,   border:"rgba(239,68,68,.3)",   label:"Failed" },
    draft:     { bg:"rgba(255,255,255,.05)", color:C.muted, border:"rgba(255,255,255,.1)", label:"Draft" },
  }[status] || { bg:"rgba(255,255,255,.05)", color:C.muted, border:"rgba(255,255,255,.1)", label:status });

  return (
    <div style={{ display:"flex", flexDirection:"column", gap:20 }}>

      {/* ── Compose card ── */}
      <div style={{ background:C.s2, border:`1px solid ${C.border}`, borderRadius:16, overflow:"hidden" }}>
        <div style={{ padding:"14px 18px", borderBottom:`1px solid ${C.border}`, fontWeight:700, color:C.white, fontSize:14, display:"flex", alignItems:"center", gap:8 }}>
          <span style={{ fontSize:16 }}>✍️</span> New Broadcast
        </div>

        <div style={{ padding:"16px 18px", display:"flex", flexDirection:"column", gap:16 }}>

          {/* Message type */}
          <div>
            <div style={{ fontSize:12, fontWeight:600, color:"rgba(255,255,255,.45)", marginBottom:8 }}>Message Type</div>
            <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
              {BROADCAST_TYPES.map(t => (
                <button key={t.id} onClick={() => setType(t.id)} style={{
                  padding:"7px 14px", borderRadius:9, fontSize:12, fontWeight:600, cursor:"pointer",
                  background: type===t.id ? `${t.color}22` : "rgba(255,255,255,.04)",
                  border:`1px solid ${type===t.id ? t.color : "rgba(255,255,255,.1)"}`,
                  color: type===t.id ? t.color : "rgba(255,255,255,.4)",
                  transition:"all .15s",
                }}>{t.icon} {t.label}</button>
              ))}
            </div>
          </div>

          {/* Channel */}
          <div>
            <div style={{ fontSize:12, fontWeight:600, color:"rgba(255,255,255,.45)", marginBottom:8 }}>Channel</div>
            <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
              {BROADCAST_CHANNELS.map(ch => (
                <button key={ch.id} onClick={() => !ch.disabled && setChannel(ch.id)}
                  disabled={ch.disabled}
                  style={{
                    flex:"1 1 120px", padding:"9px 12px", borderRadius:10, cursor:ch.disabled?"default":"pointer", textAlign:"left",
                    background: channel===ch.id ? "rgba(139,92,246,.18)" : ch.disabled ? "rgba(255,255,255,.02)" : "rgba(255,255,255,.04)",
                    border:`1px solid ${channel===ch.id ? C.brand : "rgba(255,255,255,.1)"}`,
                    color: ch.disabled ? "rgba(255,255,255,.2)" : channel===ch.id ? C.white : "rgba(255,255,255,.45)",
                    opacity: ch.disabled ? .45 : 1,
                    transition:"all .15s",
                  }}>
                  <div style={{ fontSize:15, marginBottom:2 }}>{ch.icon} <span style={{ fontSize:12, fontWeight:700 }}>{ch.label}{ch.disabled&&" (soon)"}</span></div>
                  <div style={{ fontSize:10, opacity:.7 }}>{ch.desc}</div>
                </button>
              ))}
            </div>
          </div>

          {/* Subject */}
          <div>
            <div style={{ fontSize:12, fontWeight:600, color:"rgba(255,255,255,.45)", marginBottom:6 }}>
              Subject {channel==="in_app" && <span style={{ fontWeight:400, color:"rgba(255,255,255,.25)" }}>· shown as notification title</span>}
            </div>
            <input
              className="inp-base"
              placeholder={channel==="in_app" ? "Short notification title…" : "Email subject line…"}
              value={subject}
              onChange={e => setSubject(e.target.value)}
            />
          </div>

          {/* Body */}
          <div>
            <div style={{ fontSize:12, fontWeight:600, color:"rgba(255,255,255,.45)", marginBottom:6, display:"flex", justifyContent:"space-between" }}>
              <span>
                Message Body
                {channel==="email" && <span style={{ fontWeight:400, color:"rgba(255,255,255,.25)", marginLeft:4 }}>· HTML supported</span>}
              </span>
              <span style={{ fontWeight:400, color: body.length > bodyLimit*0.9 ? C.red : "rgba(255,255,255,.25)" }}>
                {body.length}{channel==="in_app" && `/${bodyLimit}`}
              </span>
            </div>
            <textarea
              value={body}
              onChange={e => setBody(e.target.value)}
              maxLength={channel==="in_app" ? bodyLimit : undefined}
              placeholder={
                channel==="email"
                  ? "<p>Hi {{name}},</p>\n<p>We have exciting news for you…</p>"
                  : "Your message to users (plain text, max 280 chars)…"
              }
              style={{
                width:"100%", minHeight: channel==="email" ? 180 : 100,
                background:"rgba(0,0,0,.3)", border:`1.5px solid ${C.border2}`,
                color:"#e2e8f0", borderRadius:12, padding:"12px 14px",
                fontSize:13, fontFamily: channel==="email" ? "'DM Mono','Courier New',monospace" : "inherit",
                lineHeight:1.7, outline:"none", resize:"vertical", boxSizing:"border-box",
                transition:"border .2s",
              }}
              onFocus={e => e.target.style.borderColor="rgba(139,92,246,.5)"}
              onBlur={e  => e.target.style.borderColor="rgba(139,92,246,.25)"}
            />
          </div>
        </div>
      </div>

      {/* ── Audience card ── */}
      <div style={{ background:C.s2, border:`1px solid ${C.border}`, borderRadius:16, overflow:"hidden" }}>
        <div style={{ padding:"14px 18px", borderBottom:`1px solid ${C.border}`, display:"flex", alignItems:"center", justifyContent:"space-between" }}>
          <div style={{ fontWeight:700, color:C.white, fontSize:14, display:"flex", alignItems:"center", gap:8 }}>
            <span style={{ fontSize:16 }}>🎯</span> Audience
          </div>
          <div style={{
            background: preview.length > 0 ? "rgba(16,185,129,.12)" : "rgba(255,255,255,.05)",
            border:`1px solid ${preview.length > 0 ? "rgba(16,185,129,.3)" : "rgba(255,255,255,.1)"}`,
            borderRadius:99, padding:"4px 12px", fontSize:12, fontWeight:700,
            color: preview.length > 0 ? C.green : "rgba(255,255,255,.35)",
          }}>
            {preview.length} recipient{preview.length !== 1 ? "s" : ""}
          </div>
        </div>

        <div style={{ padding:"16px 18px", display:"flex", flexDirection:"column", gap:14 }}>
          {/* Filter */}
          <div>
            <div style={{ fontSize:12, fontWeight:600, color:"rgba(255,255,255,.45)", marginBottom:8 }}>User Status</div>
            <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
              {[
                { id:"all",      label:"All Users",      icon:"👥" },
                { id:"active",   label:"Active Only",    icon:"✅" },
                { id:"inactive", label:"Inactive Only",  icon:"🚫" },
              ].map(f => (
                <button key={f.id} onClick={() => aud("filter")(f.id)} style={{
                  padding:"7px 14px", borderRadius:9, fontSize:12, fontWeight:600, cursor:"pointer",
                  background: audience.filter===f.id ? "rgba(139,92,246,.2)" : "rgba(255,255,255,.04)",
                  border:`1px solid ${audience.filter===f.id ? C.brand : "rgba(255,255,255,.1)"}`,
                  color: audience.filter===f.id ? C.white : "rgba(255,255,255,.4)",
                }}>{f.icon} {f.label}</button>
              ))}
            </div>
          </div>

          {/* Country */}
          {countries.length > 0 && (
            <div>
              <div style={{ fontSize:12, fontWeight:600, color:"rgba(255,255,255,.45)", marginBottom:8 }}>
                Country <span style={{ fontWeight:400, color:"rgba(255,255,255,.25)" }}>· leave blank for all</span>
              </div>
              <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
                {countries.map(c => {
                  const on = audience.countries.includes(c);
                  return (
                    <button key={c} onClick={() => toggleCountry(c)} style={{
                      padding:"5px 11px", borderRadius:8, fontSize:13, cursor:"pointer",
                      background: on ? "rgba(139,92,246,.2)" : "rgba(255,255,255,.04)",
                      border:`1px solid ${on ? C.brand : "rgba(255,255,255,.1)"}`,
                      color: on ? C.white : "rgba(255,255,255,.5)",
                    }}>{c}</button>
                  );
                })}
              </div>
            </div>
          )}

          {/* Points range */}
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
            <div>
              <div style={{ fontSize:12, fontWeight:600, color:"rgba(255,255,255,.45)", marginBottom:6 }}>Min Points</div>
              <input className="inp-base" type="number" min={0} placeholder="e.g. 10000"
                value={audience.minPts} onChange={e => aud("minPts")(e.target.value)} />
            </div>
            <div>
              <div style={{ fontSize:12, fontWeight:600, color:"rgba(255,255,255,.45)", marginBottom:6 }}>Max Points</div>
              <input className="inp-base" type="number" min={0} placeholder="e.g. 50000"
                value={audience.maxPts} onChange={e => aud("maxPts")(e.target.value)} />
            </div>
          </div>

          {/* Recipient preview */}
          {preview.length > 0 && (
            <div style={{ background:"rgba(255,255,255,.03)", border:`1px solid ${C.border}`, borderRadius:10, padding:"10px 12px" }}>
              <div style={{ fontSize:11, fontWeight:700, color:"rgba(255,255,255,.3)", marginBottom:8, letterSpacing:1 }}>PREVIEW</div>
              <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
                {preview.slice(0,6).map(u => (
                  <div key={u.id} style={{ display:"flex", alignItems:"center", gap:5, background:"rgba(139,92,246,.1)", border:`1px solid ${C.border}`, borderRadius:8, padding:"4px 9px" }}>
                    <span style={{ fontSize:11 }}>{u.country}</span>
                    <span style={{ fontSize:12, color:C.white, fontWeight:600 }}>{u.name}</span>
                    <span style={{ fontSize:10, color:"rgba(255,255,255,.35)" }}>{u.pts.toLocaleString()} pts</span>
                  </div>
                ))}
                {preview.length > 6 && (
                  <div style={{ padding:"4px 9px", fontSize:12, color:"rgba(255,255,255,.35)" }}>+{preview.length - 6} more</div>
                )}
              </div>
            </div>
          )}
          {preview.length === 0 && (
            <div style={{ fontSize:12, color:C.red, textAlign:"center", padding:"8px 0" }}>⚠ No users match the current filters.</div>
          )}
        </div>
      </div>

      {/* ── Schedule card ── */}
      <div style={{ background:C.s2, border:`1px solid ${C.border}`, borderRadius:16, overflow:"hidden" }}>
        <div style={{ padding:"14px 18px", borderBottom:`1px solid ${C.border}`, fontWeight:700, color:C.white, fontSize:14, display:"flex", alignItems:"center", gap:8 }}>
          <span style={{ fontSize:16 }}>🗓</span> Delivery
        </div>
        <div style={{ padding:"16px 18px", display:"flex", flexDirection:"column", gap:14 }}>
          <div style={{ display:"flex", gap:8 }}>
            {[
              { id:"now",       label:"Send Now",  icon:"⚡" },
              { id:"scheduled", label:"Schedule",  icon:"🕐" },
            ].map(m => (
              <button key={m.id} onClick={() => setSendMode(m.id)} style={{
                flex:1, padding:"10px", borderRadius:10, cursor:"pointer",
                background: sendMode===m.id ? "rgba(139,92,246,.2)" : "rgba(255,255,255,.04)",
                border:`1px solid ${sendMode===m.id ? C.brand : "rgba(255,255,255,.1)"}`,
                color: sendMode===m.id ? C.white : "rgba(255,255,255,.4)",
                fontWeight:600, fontSize:13,
              }}>{m.icon} {m.label}</button>
            ))}
          </div>
          {sendMode === "scheduled" && (
            <div>
              <div style={{ fontSize:12, fontWeight:600, color:"rgba(255,255,255,.45)", marginBottom:6 }}>Send At</div>
              <input
                type="datetime-local"
                className="inp-base"
                value={scheduledFor}
                onChange={e => setSF(e.target.value)}
                min={new Date(Date.now()+60000).toISOString().slice(0,16)}
                style={{ colorScheme:"dark" }}
              />
            </div>
          )}
        </div>
      </div>

      {/* ── Send button ── */}
      <button
        onClick={() => setConfirm(true)}
        disabled={!canSend || sending}
        style={{
          width:"100%", padding:15, borderRadius:13, border:"none",
          background: (!canSend||sending) ? "rgba(255,255,255,.07)" : `linear-gradient(135deg,${typeInfo.color},${typeInfo.color}cc)`,
          color: (!canSend||sending) ? "rgba(255,255,255,.3)" : "#fff",
          fontWeight:800, fontSize:15, cursor:(!canSend||sending)?"default":"pointer",
          boxShadow:(!canSend||sending)?"none":`0 6px 24px ${typeInfo.color}60`,
          transition:"all .2s",
        }}
      >
        {sending ? "⏳ Sending…" : sendMode==="scheduled" ? `🗓 Schedule ${typeInfo.icon} ${typeInfo.label}` : `${typeInfo.icon} Send ${typeInfo.label} to ${preview.length} user${preview.length!==1?"s":""}`}
      </button>

      {/* Send result */}
      {sendResult && (
        <div style={{
          background: sendResult.ok ? "rgba(16,185,129,.08)" : "rgba(239,68,68,.08)",
          border:`1px solid ${sendResult.ok ? "rgba(16,185,129,.3)" : "rgba(239,68,68,.3)"}`,
          borderRadius:12, padding:"14px 16px",
        }}>
          <div style={{ fontWeight:700, fontSize:14, color: sendResult.ok ? C.green : C.red, marginBottom:6 }}>
            {sendResult.ok ? (sendResult.source==="demo" ? "✅ Sent (demo mode)" : "✅ Sent!") : "❌ Failed"}
          </div>
          {sendResult.ok && (
            <div style={{ fontSize:13, color:"rgba(255,255,255,.6)" }}>
              <strong style={{ color:C.white }}>{sendResult.sent}</strong> delivered
              {sendResult.failed > 0 && <span style={{ color:C.red }}> · {sendResult.failed} failed</span>}
              {sendResult.note  && <div style={{ fontSize:11, color:"rgba(255,255,255,.35)", marginTop:4 }}>ℹ {sendResult.note}</div>}
            </div>
          )}
          {!sendResult.ok && <div style={{ fontSize:12, color:C.red }}>{sendResult.error}</div>}
          <button onClick={() => setSR(null)} style={{ marginTop:10, background:"none", border:"none", color:C.muted, fontSize:12, cursor:"pointer", textDecoration:"underline" }}>Dismiss</button>
        </div>
      )}

      {/* ── History ── */}
      {history.length > 0 && (
        <div style={{ background:C.s2, border:`1px solid ${C.border}`, borderRadius:16, overflow:"hidden" }}>
          <div style={{ padding:"14px 18px", borderBottom:`1px solid ${C.border}`, fontWeight:700, color:C.white, fontSize:14, display:"flex", alignItems:"center", gap:8 }}>
            <span style={{ fontSize:16 }}>📋</span> Broadcast History
          </div>
          {history.map((b, i) => {
            const ti  = BROADCAST_TYPES.find(t => t.id === b.type) || BROADCAST_TYPES[0];
            const ci  = BROADCAST_CHANNELS.find(c => c.id === b.channel) || BROADCAST_CHANNELS[0];
            const ss  = statusStyle(b.status);
            return (
              <div key={b.id} style={{
                padding:"14px 18px",
                borderBottom: i < history.length-1 ? `1px solid ${C.border}` : undefined,
              }}>
                <div style={{ display:"flex", alignItems:"flex-start", gap:10 }}>
                  <div style={{
                    width:38, height:38, borderRadius:9, flexShrink:0,
                    background:`${ti.color}18`, border:`1px solid ${ti.color}40`,
                    display:"flex", alignItems:"center", justifyContent:"center", fontSize:18,
                  }}>{ti.icon}</div>

                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ display:"flex", alignItems:"center", gap:7, flexWrap:"wrap" }}>
                      <span style={{ fontWeight:700, color:C.white, fontSize:13 }}>{b.subject}</span>
                      <span style={{
                        fontSize:10, fontWeight:700, padding:"2px 7px", borderRadius:99,
                        background:ss.bg, color:ss.color, border:`1px solid ${ss.border}`,
                      }}>{ss.label}</span>
                      {b.source==="demo" && <span style={{ fontSize:10, color:C.gold, fontWeight:600 }}>demo</span>}
                    </div>
                    <div style={{ fontSize:11, color:"rgba(255,255,255,.35)", marginTop:3, display:"flex", gap:10, flexWrap:"wrap" }}>
                      <span>{ci.icon} {ci.label}</span>
                      <span>🎯 {audienceLabel(b.audience)}</span>
                      <span>👥 {b.recipientCount} recipient{b.recipientCount!==1?"s":""}</span>
                      {b.sent > 0 && <span style={{ color:C.green }}>✓ {b.sent} sent</span>}
                      {b.failed > 0 && <span style={{ color:C.red }}>✕ {b.failed} failed</span>}
                    </div>
                    <div style={{ fontSize:10, color:"rgba(255,255,255,.25)", marginTop:2 }}>
                      {b.status==="scheduled"
                        ? `Scheduled for ${fmtDate(b.scheduledFor)}`
                        : `Sent ${fmtDate(b.sentAt)}`
                      } · by {b.sentBy}
                    </div>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* ── Confirm dialog ── */}
      {confirm && (
        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,.88)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:999, padding:16 }}>
          <div style={{ background:C.s1, borderRadius:20, padding:24, maxWidth:360, width:"100%", border:`1px solid ${typeInfo.color}55` }}>
            <div style={{ fontSize:32, textAlign:"center", marginBottom:8 }}>{typeInfo.icon}</div>
            <div style={{ fontWeight:800, color:C.white, fontSize:16, textAlign:"center", marginBottom:4 }}>
              {sendMode==="scheduled" ? "Schedule broadcast?" : "Send broadcast now?"}
            </div>

            <div style={{ background:"rgba(255,255,255,.04)", border:`1px solid ${C.border}`, borderRadius:10, padding:"12px 14px", margin:"16px 0", fontSize:12 }}>
              {[
                ["Type",     `${typeInfo.icon} ${typeInfo.label}`],
                ["Channel",  `${channelInfo.icon} ${channelInfo.label}`],
                ["Subject",  subject],
                ["Audience", audienceLabel(audience)],
                ["Recipients", `${preview.length} user${preview.length!==1?"s":""}`],
                sendMode==="scheduled" ? ["Scheduled for", scheduledFor ? fmtDate(scheduledFor) : "—"] : ["Delivery","Immediately"],
              ].map(([k,v]) => (
                <div key={k} style={{ display:"flex", gap:8, marginBottom:4 }}>
                  <span style={{ color:"rgba(255,255,255,.4)", minWidth:80, flexShrink:0 }}>{k}</span>
                  <span style={{ color:C.white, wordBreak:"break-word" }}>{v}</span>
                </div>
              ))}
            </div>

            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
              <button onClick={() => setConfirm(false)} style={{ background:C.s3, border:`1px solid ${C.border}`, borderRadius:12, padding:12, color:C.white, fontWeight:600, cursor:"pointer" }}>Cancel</button>
              <button onClick={doSend} style={{
                background:`linear-gradient(135deg,${typeInfo.color},${typeInfo.color}aa)`,
                border:"none", borderRadius:12, padding:12, color:"#fff", fontWeight:700, cursor:"pointer",
              }}>{sendMode==="scheduled" ? "Schedule" : "Send Now"}</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ── Main AdminPanel ───────────────────────────── */
function AdminPanel({user, onExit, lang}){
  const role = user.role || (user.isAdmin ? "super_admin" : "user");
  const [tab,setTab] = useState("dashboard");
  const [users,setUsers] = useState(INITIAL_USERS);

  const tabs = [
    { id:"dashboard", label:"Dashboard", icon:"📊", perm:"view_dashboard" },
    { id:"users",     label:"Users",     icon:"👥", perm:"view_users" },
    { id:"roles",     label:"Roles",     icon:"🛡️", perm:"manage_roles" },
    { id:"apikeys",   label:"API Keys",  icon:"🔑", perm:"manage_api_keys" },
    { id:"webhooks",  label:"Webhooks",  icon:"🔗", perm:"manage_webhooks" },
    { id:"emails",     label:"Emails",      icon:"✉️", perm:"manage_email_templates" },
    { id:"ratelimits", label:"Rate Limits", icon:"🛡️", perm:"manage_rate_limits" },
    { id:"backup",     label:"Backup",      icon:"💾", perm:"manage_backups" },
    { id:"broadcast",  label:"Broadcast",   icon:"📢", perm:"send_broadcasts" },
    { id:"settings",   label:"Settings",   icon:"⚙️", perm:"view_settings" },
  ].filter(t=>can(user,t.perm));

  // Ensure current tab is accessible; fall back to first allowed tab
  const activeTab = tabs.find(t=>t.id===tab) ? tab : (tabs[0]?.id||"dashboard");

  const roleInfo = ROLES[role] || ROLES.super_admin;

  return (
    <div style={{height:"100%",display:"flex",flexDirection:"column",background:C.bg,fontFamily:"'Plus Jakarta Sans',sans-serif",color:C.white}}>
      {/* Header */}
      <div style={{
        background:`linear-gradient(135deg,${C.s1},${C.s2})`,
        borderBottom:`1px solid ${C.border}`,
        padding:"16px 20px 0",
        flexShrink:0,
      }}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{
              width:36,height:36,borderRadius:10,
              background:`linear-gradient(135deg,${C.brand},${C.brandDk})`,
              display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,
            }}>✨</div>
            <div>
              <div style={{fontSize:16,fontWeight:800,color:C.white}}>Wish Admin</div>
              <div style={{fontSize:11,color:"rgba(255,255,255,.4)"}}>
                <span style={{color:roleInfo.color}}>{roleInfo.icon} {roleInfo.label}</span>
              </div>
            </div>
          </div>
          <button
            onClick={onExit}
            style={{background:"rgba(239,68,68,.1)",border:"1px solid rgba(239,68,68,.25)",color:C.red,borderRadius:10,padding:"7px 14px",fontSize:12,fontWeight:700,cursor:"pointer"}}
          >Exit</button>
        </div>

        {/* Nav tabs */}
        <div className="admin-nav">
          {tabs.map(t=>(
            <button key={t.id} className={`admin-tab${activeTab===t.id?" active":""}`} onClick={()=>setTab(t.id)}>
              {t.icon} {t.label}
            </button>
          ))}
        </div>
      </div>

      {/* Content */}
      <div style={{flex:1,overflowY:"auto",padding:20}}>
        {activeTab==="dashboard" && <AdminDashboard users={users} adminUser={user}/>}
        {activeTab==="users"     && <AdminUsers users={users} setUsers={setUsers} adminUser={user}/>}
        {activeTab==="roles"     && <AdminRoles users={users} setUsers={setUsers} adminUser={user}/>}
        {activeTab==="apikeys"   && <AdminApiKeys/>}
        {activeTab==="webhooks"  && <AdminWebhooks/>}
        {activeTab==="emails"      && <AdminEmailTemplates/>}
        {activeTab==="ratelimits" && <AdminRateLimits/>}
        {activeTab==="backup"     && <AdminBackup users={users} setUsers={setUsers} adminUser={user}/>}
        {activeTab==="broadcast"  && <AdminBroadcast users={users} adminUser={user}/>}
        {activeTab==="settings"   && <AdminSettings/>}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════
   MAIN APP
═══════════════════════════════════════════════ */
function MainApp({user,onLogout,lang,setLang}){
  const [tab,setTab]       = useState("home");
  const [u,setU]           = useState({...user});
  const [logoutDlg,setLD]  = useState(false);
  const [tasksDone,setTD]  = useState({});
  const [joinsDone,setJD]  = useState({});
  const [adLeft,setAL]     = useState(5);
  const [adShowing,setAS]  = useState(false);
  const [adData,setAD]     = useState(null);
  const [spinning,setSpin] = useState(false);
  const [spinResult,setSR] = useState(null);
  const [spinAngle,setSA] = useState(0);
  const [mineT,setMineT]      = useState(MINING_CYCLE);
  const [mineReady,setMR]     = useState(false);
  const [mineStarted,setMS]   = useState(false);
  const [mineAdShow,setMAd]   = useState(false);
  const [langMenu,setLM]      = useState(false);
  const [avatarPick,setAP]    = useState(false);
  const fileInputRef          = React.useRef(null);
  const [picCapture,setPC]    = useState(false);
  const [editName,setEN]      = useState(user.name);
  const [editEmail,setEE]     = useState(user.email);
  const [editPass,setEP]      = useState("");
  const [profileMsg,setPMsg]  = useState("");
  const L = k => t$(lang,k);
  const dir = (LANGS[lang]||LANGS.en).dir;

  useEffect(()=>{
    if(!mineStarted)return;
    const iv=setInterval(()=>setMineT(t=>{if(t<=1){setMR(true);return 0;}return t-1;}),1000);
    return()=>clearInterval(iv);
  },[mineStarted]);

  // Load saved progress from MongoDB on first mount
  useEffect(()=>{
    fetch(`/api/user?email=${encodeURIComponent(user.email)}`)
      .then(r=>r.json())
      .then(d=>{
        if(!d.user) return;
        const {pts,usd,avatar,name,tasksDone:td,adLeft:al,adDate,spinAngle:sa}=d.user;
        setU(p=>({...p,
          pts:pts??p.pts,
          usd:usd??p.usd,
          avatar:avatar||p.avatar,
          name:name||p.name
        }));
        if(td) setTD(td);
        const today=new Date().toDateString();
        if(al!=null) setAL(adDate===today?al:5);
        if(sa!=null) setSA(sa);
      })
      .catch(()=>{});
  },[]);

  // Auto-save progress to MongoDB (debounced 2s after last change)
  useEffect(()=>{
    const t=setTimeout(()=>{
      fetch('/api/user',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({id:u.id,email:u.email,name:u.name,pts:u.pts,usd:u.usd,avatar:u.avatar,
          tasksDone,adLeft,adDate:new Date().toDateString(),spinAngle})
      }).catch(()=>{});
    },2000);
    return()=>clearTimeout(t);
  },[u.pts,u.usd,u.avatar,u.name,tasksDone,adLeft,spinAngle]);

  const fmtTime=s=>{const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;return`${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(sec).padStart(2,"0")}`;};
  const addPts=(pts,usd=0)=>setU(p=>({...p,pts:p.pts+pts,usd:+(p.usd+usd).toFixed(2)}));
  const watchAd=()=>{if(adLeft<=0)return;setAD(rndAd());setAS(true);};
  const claimAd=()=>{addPts(adData.pts);setAL(p=>p-1);setAS(false);setAD(null);};
  const doSpin=()=>{
    if(spinning)return;
    setSpin(true);setSR(null);
    const i=Math.floor(Math.random()*SPIN_PTS.length);
    const targetOffset=(337.5-i*45+720)%360;
    const currentMod=spinAngle%360;
    const diff=(targetOffset-currentMod+360)%360;
    const newAngle=spinAngle+5*360+diff;
    setSA(newAngle);
    setTimeout(()=>{addPts(SPIN_PTS[i],SPIN_USD[i]*0.01);setSR({pts:SPIN_PTS[i],usd:SPIN_USD[i]*0.01});setSpin(false);},4200);
  };
  const doneTask=(id,pts)=>{if(tasksDone[id])return;setTD(p=>({...p,[id]:true}));addPts(pts);};
  const doneJoin=(id,pts)=>{if(joinsDone[id])return;setJD(p=>({...p,[id]:true}));addPts(pts);};
  const claimMining=()=>{if(!mineReady)return;addPts(500);setMineT(MINING_CYCLE);setMR(false);setMS(false);};
  const startMiningAfterAd=()=>{setMAd(false);setMS(true);};
  const PE={YouTube:"▶️",Facebook:"📘",Twitter:"🐦",Instagram:"📸",TikTok:"🎵",LinkedIn:"💼",Telegram:"✈️",WhatsApp:"💬"};

  const TAB={
    home:(
      <div style={{padding:"0 16px 16px"}}>
        <div style={{background:`linear-gradient(135deg,${C.brandDk},${C.brand})`,borderRadius:20,padding:"20px",marginBottom:16,position:"relative",overflow:"hidden"}}>
          <div style={{position:"absolute",top:-20,right:-20,fontSize:80,opacity:.1}}>⭐</div>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <div style={{width:52,height:52,borderRadius:"50%",background:"rgba(255,255,255,.2)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,fontWeight:800,border:"2px solid rgba(255,255,255,.4)"}}>{u.name[0].toUpperCase()}</div>
            <div>
              <div style={{fontSize:18,fontWeight:700,color:"#fff"}}>{u.name}</div>
              <div style={{fontSize:13,color:"rgba(255,255,255,.7)"}}>{u.country} · {u.joined}</div>
            </div>
            <div style={{marginLeft:"auto",background:"rgba(255,255,255,.15)",borderRadius:10,padding:"4px 10px",fontSize:12,color:"#fff"}}>✓ {L("verified")}</div>
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:16}}>

            <div key={s.label} style={{background:C.s2,borderRadius:14,padding:"12px 10px",textAlign:"center",border:`1px solid ${C.border}`}}>
              <div style={{fontSize:22}}>{s.icon}</div>
              <div style={{fontSize:16,fontWeight:800,color:C.brandLt,marginTop:2}}>{s.val}</div>
              <div style={{fontSize:11,color:C.muted,marginTop:1}}>{s.label}</div>
            </div>
          ))}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
          <button onClick={()=>setTab("earn")} style={{background:`linear-gradient(135deg,${C.brand},${C.pink})`,border:"none",borderRadius:14,padding:"14px",color:"#fff",fontWeight:700,fontSize:14,cursor:"pointer"}}>📺 {L("watchAd")}</button>

        </div>

          <div style={{fontSize:14,fontWeight:700,color:C.brandLt,marginBottom:10}}>🏆 {L("leaders")}</div>
          {FAKE_LEADERS.slice(0,3).map((l,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:i<2?`1px solid ${C.border}`:"none"}}>
              <div style={{fontSize:18}}>{"🥇🥈🥉"[i]}</div>
              <div style={{flex:1,fontSize:14,color:C.white}}>{l.country} {l.name}</div>
              <div style={{fontSize:13,fontWeight:700,color:C.gold}}>{l.pts.toLocaleString()}</div>
            </div>
          ))}
        </div>
      </div>
    ),
    earn:(
      <div style={{padding:"0 16px 16px"}}>
        <div style={{background:C.s2,borderRadius:16,padding:16,marginBottom:16,border:`1px solid ${C.border}`}}>
          <div style={{fontSize:15,fontWeight:700,color:C.white,marginBottom:4}}>📺 {L("watchAd")}</div>
          <div style={{fontSize:13,color:C.muted,marginBottom:12}}>{adLeft} {L("adsLeft")}</div>

          <div style={{fontSize:15,fontWeight:700,color:C.white,marginBottom:2}}>🎡 {L("spinNow")}</div>

            <SpinWheel angle={spinAngle} spinning={spinning} phase="points"/>

          {spinResult&&!spinning&&(
            <div style={{textAlign:"center",background:`linear-gradient(135deg,rgba(245,158,11,.2),rgba(139,92,246,.2))`,border:`1px solid ${C.gold}50`,borderRadius:12,padding:"12px 16px",marginBottom:12,animation:"popIn .4s ease"}}>
              <div style={{fontSize:22,marginBottom:4}}>🎉</div>
              <div style={{fontWeight:800,fontSize:16,color:C.gold}}>+{spinResult.pts} pts</div>

    tasks:(

        <div style={{fontSize:12,fontWeight:700,color:C.muted,marginBottom:10,letterSpacing:1}}>SOCIAL TASKS</div>

            <div style={{width:40,height:40,borderRadius:12,background:(PL[t.platform]||C.brand)+"22",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,overflow:"hidden"}}>{LOGOS[t.platform]||<span style={{fontSize:20}}>{PE[t.platform]}</span>}</div>

    wallet:(

          ?<div style={{background:`linear-gradient(135deg,${C.s3},${C.s2})`,borderRadius:20,padding:28,marginBottom:16,border:`1px dashed ${C.border}`,textAlign:"center"}}>
            <div style={{fontSize:40,marginBottom:10}}>💰</div>
            <div style={{fontSize:16,fontWeight:700,color:C.white,marginBottom:6}}>No Balance Yet</div>
            <div style={{fontSize:13,color:C.muted}}>Start earning by watching ads, completing tasks, or mining to see your balance here.</div>
          </div>

            <div style={{fontSize:13,color:C.muted,marginBottom:4}}>Total Balance</div>
            <div style={{fontSize:36,fontWeight:800,color:C.white}}>${u.usd.toFixed(2)}</div>
            <div style={{fontSize:13,color:C.muted,marginTop:4}}>{u.pts.toLocaleString()} pts</div>
          </div>
        }
        <div style={{background:C.s2,borderRadius:16,padding:16,marginBottom:16,border:`1px solid ${C.border}`}}>
          <div style={{fontSize:15,fontWeight:700,color:C.white,marginBottom:12}}>💱 {L("exchange")}</div>
          {[["Points",u.pts.toLocaleString()],["Rate","1000 pts = $1.00"],].map(([k,v])=>(
            <div key={k} style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
              <span style={{color:C.muted,fontSize:13}}>{k}</span>
              <span style={{color:C.white,fontWeight:700}}>{v}</span>
            </div>
          ))}
          <div style={{height:1,background:C.border,margin:"12px 0"}}/>
          <div style={{display:"flex",justifyContent:"space-between"}}>
            <span style={{color:C.muted,fontSize:13}}>USD Value</span>
            <span style={{color:C.green,fontWeight:800,fontSize:16}}>${(u.pts*USD_PER_POINT).toFixed(2)}</span>
          </div>
        </div>
        <div style={{background:C.s2,borderRadius:16,padding:16,border:`1px solid ${C.border}`,textAlign:"center"}}>
          <div style={{fontSize:32,marginBottom:8}}>🏦</div>
          <div style={{fontSize:15,fontWeight:700,color:C.white,marginBottom:6}}>{L("withdrawal")}</div>
          <div style={{fontSize:13,color:C.muted}}>USDT, EasyPaisa & JazzCash — coming soon</div>
        </div>
      </div>
    ),
    profile:(
      <div style={{padding:"0 16px 16px"}}>
        {/* Profile Header */}
        <div style={{background:`linear-gradient(135deg,${C.brandDk},${C.brand})`,borderRadius:20,padding:24,textAlign:"center",marginBottom:16,position:"relative"}}>
          {/* Hidden file input — reused for both camera & gallery */}
          <input ref={fileInputRef} type="file" accept="image/*" capture={picCapture?"user":undefined} style={{display:"none"}} onChange={e=>{
            const f=e.target.files&&e.target.files[0];
            if(!f)return;
            const rd=new FileReader();
            rd.onload=ev=>{ setU(p=>({...p,avatar:ev.target.result})); setAP(false); };
            rd.readAsDataURL(f);
            e.target.value="";
          }}/>
          <div onClick={()=>setAP(p=>!p)} style={{width:84,height:84,borderRadius:"50%",background:"rgba(255,255,255,.2)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:34,fontWeight:800,border:"3px solid rgba(255,255,255,.5)",margin:"0 auto 12px",cursor:"pointer",position:"relative",boxShadow:"0 0 20px rgba(0,0,0,.3)",overflow:"hidden"}}>
            {u.avatar&&u.avatar.startsWith("data:")
              ? <img src={u.avatar} style={{width:"100%",height:"100%",objectFit:"cover",borderRadius:"50%"}} alt="avatar"/>
              : <span style={{fontSize:36}}>{u.name[0].toUpperCase()}</span>
            }
            <div style={{position:"absolute",bottom:0,right:0,width:26,height:26,borderRadius:"50%",background:C.gold,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,border:"2px solid #fff"}}>📷</div>
          </div>
          {avatarPick&&(
            <div style={{background:"rgba(0,0,0,.55)",backdropFilter:"blur(8px)",borderRadius:16,padding:"16px 12px",marginBottom:12,border:"1px solid rgba(255,255,255,.12)"}}>
              <div style={{fontSize:13,fontWeight:700,color:"rgba(255,255,255,.7)",marginBottom:12,textTransform:"uppercase",letterSpacing:.08}}>Change Profile Photo</div>
              <div style={{display:"flex",gap:12,justifyContent:"center"}}>
                <button onClick={()=>{setPC(true);setAP(false);setTimeout(()=>{fileInputRef.current&&fileInputRef.current.click();},50);}} style={{flex:1,background:"rgba(139,92,246,.25)",border:"1.5px solid rgba(139,92,246,.5)",borderRadius:14,padding:"16px 8px",cursor:"pointer",color:"#fff",fontWeight:700,fontSize:13,display:"flex",flexDirection:"column",alignItems:"center",gap:8}}>
                  <span style={{fontSize:30}}>📷</span>Camera
                </button>
                <button onClick={()=>{setPC(false);setAP(false);setTimeout(()=>{fileInputRef.current&&fileInputRef.current.click();},50);}} style={{flex:1,background:"rgba(6,182,212,.2)",border:"1.5px solid rgba(6,182,212,.4)",borderRadius:14,padding:"16px 8px",cursor:"pointer",color:"#fff",fontWeight:700,fontSize:13,display:"flex",flexDirection:"column",alignItems:"center",gap:8}}>
                  <span style={{fontSize:30}}>🖼️</span>Gallery
                </button>
              </div>
              <button onClick={()=>setAP(false)} style={{marginTop:10,width:"100%",background:"transparent",border:"none",color:"rgba(255,255,255,.4)",fontSize:13,cursor:"pointer",padding:"6px 0"}}>Cancel</button>
            </div>
          )}
          <div style={{fontSize:20,fontWeight:800,color:"#fff"}}>{u.name}</div>
          <div style={{fontSize:13,color:"rgba(255,255,255,.7)",marginTop:2}}>{u.email}</div>
          <div style={{marginTop:8,display:"inline-block",background:"rgba(255,255,255,.15)",borderRadius:8,padding:"3px 12px",fontSize:12,color:"#fff"}}>✓ {L("verified")} · {u.country}</div>
        </div>

        {/* Edit Form */}
        <div style={{background:C.s2,borderRadius:16,padding:16,marginBottom:12,border:`1px solid ${C.border}`}}>
          <div style={{fontSize:15,fontWeight:700,color:C.brandLt,marginBottom:14}}>✏️ Edit Profile</div>

          {/* Name */}
          <div style={{marginBottom:12}}>
            <div style={{fontSize:11,color:C.muted,fontWeight:700,marginBottom:6,textTransform:"uppercase",letterSpacing:.08}}>Display Name</div>
            <div style={{display:"flex",gap:8}}>
              <input value={editName} onChange={e=>setEN(e.target.value)} style={{flex:1,background:"rgba(139,92,246,.07)",border:`1.5px solid ${C.border2}`,color:"#fff",borderRadius:10,padding:"10px 12px",fontSize:13,outline:"none",fontFamily:"inherit"}} placeholder="Your name"/>
              <button onClick={()=>{if(editName.trim()){setU(p=>({...p,name:editName.trim()}));setPMsg("Name updated!");}else setPMsg("Name can't be empty!");setTimeout(()=>setPMsg(""),2500);}} style={{background:C.brand,border:"none",borderRadius:10,padding:"10px 16px",color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer"}}>Save</button>
            </div>
          </div>

          {/* Email */}
          <div style={{marginBottom:12}}>
            <div style={{fontSize:11,color:C.muted,fontWeight:700,marginBottom:6,textTransform:"uppercase",letterSpacing:.08}}>Email Address</div>
            <div style={{display:"flex",gap:8}}>
              <input value={editEmail} onChange={e=>setEE(e.target.value)} type="email" style={{flex:1,background:"rgba(139,92,246,.07)",border:`1.5px solid ${C.border2}`,color:"#fff",borderRadius:10,padding:"10px 12px",fontSize:13,outline:"none",fontFamily:"inherit"}} placeholder="you@email.com"/>
              <button onClick={()=>{if(editEmail.match(/^[^\s@]+@[^\s@]+\.[^\s@]+$/)){setU(p=>({...p,email:editEmail}));setPMsg("Email updated!");}else setPMsg("Invalid email!");setTimeout(()=>setPMsg(""),2500);}} style={{background:C.brand,border:"none",borderRadius:10,padding:"10px 16px",color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer"}}>Save</button>
            </div>
          </div>

          {/* Password */}
          <div>
            <div style={{fontSize:11,color:C.muted,fontWeight:700,marginBottom:6,textTransform:"uppercase",letterSpacing:.08}}>New Password</div>
            <input value={editPass} onChange={e=>setEP(e.target.value)} type="password" style={{width:"100%",background:"rgba(139,92,246,.07)",border:`1.5px solid ${C.border2}`,color:"#fff",borderRadius:10,padding:"10px 12px",fontSize:13,outline:"none",fontFamily:"inherit",marginBottom:8}} placeholder="Min 6 characters"/>
            <button onClick={()=>{if(editPass.length>=6){setU(p=>({...p,pass:editPass}));setEP("");setPMsg("Password updated!");}else setPMsg("Min 6 characters!");setTimeout(()=>setPMsg(""),2500);}} style={{width:"100%",background:`linear-gradient(135deg,${C.brand},${C.pink})`,border:"none",borderRadius:10,padding:"11px",color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer"}}>🔒 Update Password</button>
          </div>

          {profileMsg&&(
            <div style={{marginTop:12,textAlign:"center",padding:"8px 12px",borderRadius:10,background:profileMsg.includes("Invalid")||profileMsg.includes("Min")||profileMsg.includes("empty")?"rgba(239,68,68,.15)":"rgba(16,185,129,.15)",color:profileMsg.includes("Invalid")||profileMsg.includes("Min")||profileMsg.includes("empty")?C.red:C.green,fontWeight:700,fontSize:13}}>
              {profileMsg.includes("Invalid")||profileMsg.includes("Min")||profileMsg.includes("empty")?`⚠️ ${profileMsg}`:`✓ ${profileMsg}`}
            </div>
          )}
        </div>

        {/* Stats */}
        <div style={{background:C.s2,borderRadius:16,padding:16,border:`1px solid ${C.border}`}}>
          <div style={{fontSize:15,fontWeight:700,color:C.brandLt,marginBottom:12}}>📊 Account Stats</div>
          {[["Member Since",u.joined],["Country",u.country],["Points",u.pts.toLocaleString()+" pts"],["USD Balance","$"+u.usd.toFixed(2)]].map(([k,v],i)=>(
            <div key={k} style={{display:"flex",justifyContent:"space-between",padding:"10px 0",borderBottom:i<3?`1px solid ${C.border}`:"none"}}>
              <span style={{color:C.muted,fontSize:13}}>{k}</span>
              <span style={{color:C.white,fontWeight:700,fontSize:13}}>{v}</span>
            </div>
          ))}
        </div>
      </div>
    ),
  };

  const NAV=[
    {id:"home",icon:"🏠",label:L("home")},
    {id:"earn",icon:"📺",label:L("earn")},
    {id:"tasks",icon:"✅",label:L("tasks")},
    {id:"mining",icon:"⛏️",label:L("mining")},
    {id:"wallet",icon:"💰",label:L("wallet")},
    {id:"profile",icon:"👤",label:L("profile")},
  ];

  return(
    <div style={{minHeight:"100vh",background:C.bg,color:C.white,fontFamily:"'DM Sans',sans-serif",maxWidth:480,margin:"0 auto",position:"relative",display:"flex",flexDirection:"column",direction:dir}}>
      {/* Header */}
      <div style={{padding:"14px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",background:C.s1,borderBottom:`1px solid ${C.border}`,position:"sticky",top:0,zIndex:10}}>
        <div style={{fontSize:20,fontWeight:800,background:`linear-gradient(90deg,${C.brandLt},${C.pink})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>⭐ {APP_NAME}</div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <div style={{position:"relative"}}>
            <button onClick={()=>setLM(p=>!p)} style={{background:C.s2,border:`1px solid ${C.border}`,borderRadius:8,padding:"5px 10px",color:C.white,fontSize:13,cursor:"pointer"}}>{(LANGS[lang]||LANGS.en).flag} {lang.toUpperCase()}</button>
            {langMenu&&(
              <div style={{position:"absolute",right:0,top:"110%",background:C.s2,border:`1px solid ${C.border}`,borderRadius:10,zIndex:99,minWidth:140,overflow:"hidden"}}>
                {Object.entries(LANGS).map(([k,v])=>(
                  <button key={k} onClick={()=>{setLang(k);setLM(false);}} style={{display:"block",width:"100%",padding:"8px 12px",background:"none",border:"none",color:lang===k?C.brandLt:C.white,cursor:"pointer",textAlign:"left",fontSize:13}}>{v.flag} {v.name}</button>
                ))}
              </div>
            )}
          </div>
          <button onClick={()=>setLD(true)} style={{background:C.s2,border:`1px solid ${C.border}`,borderRadius:8,padding:"5px 10px",color:C.red,fontSize:13,cursor:"pointer",fontWeight:600}}>{L("logout")}</button>
        </div>
      </div>
      {/* Content */}
      <div style={{flex:1,overflowY:"auto",paddingTop:16,paddingBottom:80}}>{TAB[tab]}</div>
      {/* Bottom Nav */}
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:C.s1,borderTop:`1px solid ${C.border}`,display:"flex",zIndex:10}}>
        {NAV.map(n=>(
          <button key={n.id} onClick={()=>setTab(n.id)} style={{flex:1,padding:"8px 2px",background:"none",border:"none",color:tab===n.id?C.brandLt:C.muted,cursor:"pointer",textAlign:"center"}}>
            <div style={{fontSize:20}}>{n.icon}</div>
            <div style={{fontSize:10,fontWeight:tab===n.id?700:400,marginTop:1}}>{n.label}</div>
          </button>
        ))}
      </div>
      {/* Ad Modal */}
      {adShowing&&adData&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.85)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:99,padding:16}}>
          <div style={{background:C.s2,borderRadius:20,padding:24,maxWidth:340,width:"100%",textAlign:"center",border:`1px solid ${C.border}`}}>
            <div style={{fontSize:60,marginBottom:8}}>{adData.emoji}</div>
            <div style={{fontSize:18,fontWeight:700,color:C.white,marginBottom:4}}>{adData.cat} Ad</div>
            <div style={{fontSize:13,color:C.muted,marginBottom:20}}>Watch to earn {adData.pts} pts</div>
            <div style={{background:C.faint,borderRadius:12,padding:"16px",marginBottom:16,fontSize:13,color:C.muted}}>📢 Sponsored content</div>
            <button onClick={claimAd} style={{width:"100%",background:`linear-gradient(135deg,${C.brand},${C.pink})`,border:"none",borderRadius:12,padding:"13px",color:"#fff",fontWeight:700,fontSize:15,cursor:"pointer"}}>✓ Claim +{adData.pts} pts</button>
          </div>
        </div>
      )}
      {/* Mining Ad Modal */}
      {mineAdShow&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.88)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:99,padding:16}}>
          <div style={{background:C.s2,borderRadius:20,padding:28,maxWidth:340,width:"100%",textAlign:"center",border:`1px solid ${C.border2}`}}>
            <div style={{fontSize:64,marginBottom:12}}>⛏️</div>
            <div style={{fontSize:20,fontWeight:800,color:C.white,marginBottom:6}}>Activate Mining</div>
            <div style={{fontSize:13,color:C.muted,marginBottom:20,lineHeight:1.6}}>Watch a short sponsored ad to start your 8-hour mining session and earn <span style={{color:C.gold,fontWeight:700}}>500 pts</span>!</div>
            <div style={{background:"rgba(139,92,246,.1)",borderRadius:12,padding:"14px",marginBottom:16,fontSize:13,color:C.muted,border:`1px solid ${C.border}`}}>📢 Sponsored content — supports the platform</div>
            <button onClick={startMiningAfterAd} style={{width:"100%",background:`linear-gradient(135deg,${C.gold},${C.pink})`,border:"none",borderRadius:14,padding:"14px",color:"#fff",fontWeight:800,fontSize:15,cursor:"pointer",boxShadow:"0 4px 20px rgba(245,158,11,.3)"}}>⛏️ Start Mining Now</button>
            <button onClick={()=>setMAd(false)} style={{marginTop:10,background:"none",border:"none",color:C.muted,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>Maybe later</button>
          </div>
        </div>
      )}
      {/* Logout Dialog */}
      {logoutDlg&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.85)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:99,padding:16}}>
          <div style={{background:C.s2,borderRadius:20,padding:24,maxWidth:320,width:"100%",textAlign:"center",border:`1px solid ${C.border}`}}>
            <div style={{fontSize:36,marginBottom:12}}>👋</div>
            <div style={{fontSize:16,fontWeight:700,color:C.white,marginBottom:20}}>{L("logoutQ")}</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <button onClick={()=>setLD(false)} style={{background:C.s3,border:`1px solid ${C.border}`,borderRadius:12,padding:"11px",color:C.white,fontWeight:600,cursor:"pointer"}}>{L("cancel")}</button>
              <button onClick={onLogout} style={{background:C.red,border:"none",borderRadius:12,padding:"11px",color:"#fff",fontWeight:700,cursor:"pointer"}}>{L("yes")}</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════
   ROOT
═══════════════════════════════════════════════ */
function WishApp(){
  const [loggedUser,setLU] = useState(null);
  const [lang,setLang]     = useState("en");

  const handleLogin=(u)=>{ setLU(u); };
  const handleLogout=()=>{ setLU(null); };

  const isAdminUser = loggedUser && (loggedUser.role==="super_admin"||loggedUser.role==="moderator"||loggedUser.isAdmin);
  if(!loggedUser) return <AuthScreen onLogin={handleLogin} lang={lang}/>;
  if(isAdminUser) return <AdminPanel user={loggedUser} onExit={handleLogout} lang={lang}/>;
  return <MainApp user={loggedUser} onLogout={handleLogout} lang={lang} setLang={setLang}/>;
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(WishApp));
</script>
</body>
</html>
